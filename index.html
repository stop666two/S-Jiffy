  <style>
    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }
    .cat-tag {
      font-size: var(--font-size-xs);
      font-family: var(--font-mono);
      padding: 4px 10px;
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .cat-tag:hover {
      border-color: var(--color-text-primary);
      color: var(--color-text-primary);
    }
    .cat-tag.active {
      background: var(--color-text-primary);
      color: #FFFFFF;
      border-color: var(--color-text-primary);
    }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-3);
    }
    .tool-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background-color 0.2s;
    }
    .tool-card:hover {
      border-color: var(--color-text-primary);
      background: var(--color-bg-soft);
    }
    .tool-card h2 {
      font-size: var(--font-size-base);
      font-weight: 600;
      margin-bottom: 4px;
      font-family: var(--font-mono);
    }
    .tool-card p {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .tool-card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tool-card .tags span {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--color-text-disabled);
      letter-spacing: 0.02em;
    }
    .tool-card.hidden {
      display: none;
    }
  </style>
</head>

      var activeCategory = null;

      function renderCategories() {
        var bar = document.getElementById('categoryBar');
        bar.innerHTML = '';
        var allBtn = document.createElement('button');
        allBtn.className = 'cat-tag' + (activeCategory === null ? ' active' : '');
        allBtn.textContent = '全部';
        allBtn.addEventListener('click', function () { activeCategory = null; renderCategories(); renderTools(); });
        bar.appendChild(allBtn);

        categories.forEach(function (cat) {
          var count = tools.filter(function (t) { return t.cats.indexOf(cat) !== -1; }).length;
          if (count === 0) return;
          var btn = document.createElement('button');
          btn.className = 'cat-tag' + (activeCategory === cat ? ' active' : '');
          btn.textContent = cat + ' ' + count;
          btn.addEventListener('click', function () {
            activeCategory = activeCategory === cat ? null : cat;
            renderCategories();
            renderTools();
          });
          bar.appendChild(btn);
        });
      }

      var currentSection = 'all';

      function getToolByName(name) {
        for (var i = 0; i < tools.length; i++) {
          if (tools[i].name === name) return tools[i];
        }
        return null;
      }

      function renderTools() {
        var grid = document.getElementById('toolGrid');
        grid.innerHTML = '';
        var list = [];

        if (currentSection === 'freq') {
          var freq = getFrequentlyUsed(12);
          freq.forEach(function (t) {
            var tool = getToolByName(t.name);
            if (tool) list.push(tool);
          });
          if (list.length === 0) { grid.innerHTML = '<p style="color:var(--color-text-disabled);padding:var(--space-4);">暂无使用记录，点击工具后会自动记录。</p>'; return; }
        } else if (currentSection === 'recent') {
          var recent = getRecentUsed(8);
          recent.forEach(function (t) {
            var tool = getToolByName(t.name);
            if (tool) list.push(tool);
          });
          if (list.length === 0) { grid.innerHTML = '<p style="color:var(--color-text-disabled);padding:var(--space-4);">暂无使用记录。</p>'; return; }
        } else if (currentSection === 'popular') {
          POPULAR_TOOLS.forEach(function (name) {
            var tool = getToolByName(name);
            if (tool) list.push(tool);
          });
        } else {
          list = activeCategory ? tools.filter(function (t) { return t.cats.indexOf(activeCategory) !== -1; }) : tools;
        }

        list.forEach(function (tool) {
          var card = document.createElement('a');
          card.href = tool.link;
          card.className = 'tool-card';
          card.addEventListener('click', function () { recordUse(tool.name); });
          var tagsHtml = tool.cats.map(function (c) { return '<span>#' + c + '</span>'; }).join('');
          card.innerHTML = '<h2>' + tool.name + '</h2><p>' + tool.desc + '</p><div class="tags">' + tagsHtml + '</div>';
          grid.appendChild(card);
        });
      }

      function renderSectionTabs() {
        var tabs = document.querySelectorAll('.sec-tab');
        tabs.forEach(function (tab) {
          tab.addEventListener('click', function () {
            tabs.forEach(function (t) { t.className = 'sec-tab'; });
            this.className = 'sec-tab active';
            currentSection = this.dataset.section;
            activeCategory = null;
            renderCategories();
            renderTools();
          });
        });
      }

      // style for section tabs
      var secStyle = document.createElement('style');
      secStyle.textContent = '.sec-tab{font-family:var(--font-mono);font-size:var(--font-size-sm);padding:6px 14px;border:1px solid var(--color-border);border-radius:9999px;background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s;letter-spacing:0.02em;}.sec-tab:hover{border-color:var(--color-text-primary);color:var(--color-text-primary);}.sec-tab.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary);}';
      document.head.appendChild(secStyle);

      renderSectionTabs();
      renderCategories();
      renderTools();
    })();
  </script>
