<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S-Jiffy · 即用即走工具</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }
    .cat-tag {
      font-size: var(--font-size-xs);
      font-family: var(--font-mono);
      padding: 4px 10px;
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }
    .cat-tag:hover {
      border-color: var(--color-text-primary);
      color: var(--color-text-primary);
    }
    .cat-tag.active {
      background: var(--color-text-primary);
      color: #FFFFFF;
      border-color: var(--color-text-primary);
    }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-3);
    }
    .tool-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background-color 0.2s;
    }
    .tool-card:hover {
      border-color: var(--color-text-primary);
      background: var(--color-bg-soft);
    }
    .tool-card h2 {
      font-size: var(--font-size-base);
      font-weight: 600;
      margin-bottom: 4px;
      font-family: var(--font-mono);
    }
    .tool-card p {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .tool-card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tool-card .tags span {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--color-text-disabled);
      letter-spacing: 0.02em;
    }
    .tool-card.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="https://github.com/stop666two/S-Jiffy" target="_blank" class="logo" style="display:flex;align-items:center;gap:6px;">S-Jiffy <span style="font-size:11px;color:var(--color-text-secondary);font-weight:400;">GitHub</span></a>
  </header>
  <main class="tool-workspace">
    <h1>即用即走工具集</h1>
    <p class="tool-desc">轻量、瞬时的生产力工具，打开即用，用完即走。所有操作均在浏览器本地完成，极少情况下可能出现问题，请自行校验结果，如有问题请提交 <a href="https://github.com/stop666two/S-Jiffy/issues" target="_blank" style="color:var(--color-text-primary);text-decoration:underline;">Issues</a>。</p>
    <div class="section-tabs" id="sectionTabs" style="display:flex;gap:var(--space-3);margin-bottom:var(--space-3);flex-wrap:wrap;">
      <button class="sec-tab active" data-section="all">全部工具</button>
      <button class="sec-tab" data-section="history">历史记录 <span id="historyBadge" style="font-size:11px;color:var(--color-text-disabled);"></span></button>
      <button class="sec-tab" data-section="popular">热门工具</button>
    </div>
    <div class="search-bar" id="searchBar" style="margin-bottom:var(--space-3);">
      <input id="searchInput" class="input" type="text" placeholder="搜索工具名称、描述或分类..." style="height:40px;font-size:14px;">
    </div>
    <div class="category-bar" id="categoryBar"></div>
    <div id="historyToolbar" style="display:none;margin-bottom:var(--space-3);padding:var(--space-2);border:1px solid var(--color-border);border-radius:var(--radius-md);align-items:center;gap:8px;flex-wrap:wrap;">
      <button id="selectAllBtn" class="btn btn-secondary" style="height:36px;font-size:13px;min-width:auto;">全选</button>
      <button id="deselectAllBtn" class="btn btn-secondary" style="height:36px;font-size:13px;min-width:auto;">反选</button>
      <button id="deleteSelectedBtn" class="btn btn-secondary" style="height:36px;font-size:13px;min-width:auto;color:var(--color-error);border-color:var(--color-error);">删除所选</button>
      <button id="clearHistoryBtn" class="btn btn-secondary" style="height:36px;font-size:13px;min-width:auto;color:var(--color-error);border-color:var(--color-error);">清空全部记录</button>
      <span id="historySelectInfo" style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-left:auto;"></span>
    </div>
    <div class="tool-grid" id="toolGrid"></div>
  </main>
  <footer class="global-footer">
    <div>S-Jiffy · 保持简单</div>
  </footer>

        { name: 'Git 速查表', desc: '浏览搜索常用 Git 命令和参数', link: 'projects/git-cheatsheet/', cats: ['编程工具', '文档工具'] },
        { name: 'Nginx 配置生成', desc: '生成 Nginx 反向代理静态文件配置', link: 'projects/nginx-config/', cats: ['编程工具', '网络工具'] },

        { name: 'CSS Transform 生成器', desc: '可视化生成 CSS transform 变换代码', link: 'projects/css-transform/', cats: ['前端开发', '数据生成'] },
        { name: 'JSON 转 C# 类', desc: '将 JSON 数据转换为 C# 类定义代码', link: 'projects/json-to-csharp/', cats: ['格式转换', '编程工具'] },

        { name: '日期格式化器', desc: '将日期格式化为各种自定义格式', link: 'projects/date-formatter/', cats: ['日期时间', '格式转换'] },
        { name: '星座查询', desc: '根据生日查询星座和性格特点', link: 'projects/zodiac-query/', cats: ['生活', '网页工具'] },
        { name: '生肖年龄查询', desc: '查询出生年份生肖属相和年龄', link: 'projects/chinese-zodiac/', cats: ['生活', '日期时间'] },
        { name: '睡眠周期计算器', desc: '根据起床时间反推最佳入睡时间', link: 'projects/sleep-calculator/', cats: ['生活', '健康'] },
        { name: '目标心率计算器', desc: '计算运动时目标心率区间', link: 'projects/heart-rate-calculator/', cats: ['健康', '数学计算'] },
        { name: '理想体重计算器', desc: '根据身高性别计算标准体重范围', link: 'projects/ideal-weight/', cats: ['健康', '数学计算'] },
        { name: '彩虹文字生成器', desc: '生成彩虹色渐变文字效果', link: 'projects/rainbow-text/', cats: ['字符串', '数据生成'] },

        { name: '反应速度测试', desc: '测试视觉反应时间', link: 'projects/reaction-test/', cats: ['网页工具', '游戏'] },
        { name: '安全令牌生成器', desc: '生成加密安全的随机令牌和 API 密钥', link: 'projects/random-token/', cats: ['安全工具', '数据生成'] },
        { name: '记忆测试', desc: '数字记忆广度测试游戏', link: 'projects/memo-test/', cats: ['网页工具', '游戏'] },
        { name: '呼吸引导', desc: '4-7-8 呼吸法引导动画', link: 'projects/breathing-guide/', cats: ['健康', '网页工具'] },
        { name: '决策助手', desc: '随机决策和加权决策工具', link: 'projects/decision-maker/', cats: ['随机生成', '生活'] },
        { name: '简易待办清单', desc: '本地存储的待办事项管理', link: 'projects/todo-list/', cats: ['生活', '网页工具'] },
        { name: '体脂率估算', desc: '根据身体数据估算体脂百分比', link: 'projects/body-fat-calculator/', cats: ['健康', '数学计算'] },
        { name: '每日饮水计算', desc: '根据体重计算每日推荐饮水量', link: 'projects/water-intake/', cats: ['健康', '生活'] },
        { name: '预产期计算', desc: '根据末次月经计算预产期和孕周', link: 'projects/pregnancy-calculator/', cats: ['健康', '日期时间'] },
        { name: '血液酒精估算', desc: '估算血液酒精浓度 BAC', link: 'projects/blood-alcohol/', cats: ['健康', '生活'] },
        { name: '运动消耗计算', desc: '计算各类运动消耗的卡路里', link: 'projects/calorie-burn/', cats: ['健康', '数学计算'] },
        { name: '通用进制转换', desc: '2-36 进制任意数字互相转换', link: 'projects/number-base-converter-adv/', cats: ['进制转换', '数学计算'] }
      ];

      var activeCategory = null;
      var currentSection = 'all';
      var searchQuery = '';

      function getToolByName(name) {
        for (var i = 0; i < tools.length; i++) {
          if (tools[i].name === name) return tools[i];
        }
        return null;
      }

      function htmlEscape(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function getCurrentToolList() {
        if (currentSection === 'history') {
          var hist = getHistory(200);
          return hist.map(function (t) { return getToolByName(t.name); }).filter(function (t) { return t; });
        }
        if (currentSection === 'popular') {
          var popNames = [
            'Base64 编解码','JSON Formatter','URL 编解码','Hash 计算器','MD5 生成器',
            'QR 码生成器','UUID 生成器','时间戳转换','进制转换','密码生成器',
            '颜色转换','温度单位转换','正则测试器','命名风格转换','百分比计算器',
            'JWT 解析器','图片转 Base64','随机数生成器','Lorem Ipsum 生成器',
            'ASCII 文字画','JSON 转 CSV','YAML 转 JSON','RSA 密钥对生成器',
            'HSL 拾色器','Cron 表达式解析','IP 段计算器',
            'HTML 参考手册','Emoji 选择器','色盲模拟器',
            'HSL 颜色选择器','JSON 合并','JSON 校验器','SQL 格式化','HTML 净化器',
            'CSS 动画生成器','Flexbox 生成器','SVG 编辑器','ASCII 码表',
            'JSON Viewer','YAML Viewer','Base85 编解码','HMAC 生成器',
            '倒计时器','随机字符串','文本统计','长度单位转换','Base36 编解码',
            '校验和计算器','摩斯密码','数值取整工具',
            '工作日计算器','色环工具','加密工具','IP 定位查询',
            '图片颜色提取','随机选择器','文本对比',
            'CSS 选择器测试','HTML 编辑器','JS 格式化','XML Formatter',
            'Crontab 生成器','Markdown 预览','密码强度分析','OTP 生成器',
            'SVG 占位图','JSON 对比','Hash 识别','Gravatar 查询',
            'CSS Border 生成器','CSS 单位转换','HTML 转 Markdown',
            '颜色名称查询','数字格式化','本机 IP 查询','Crontab 校验器',
            'JSONPath 查询','序列生成器','SQL 查询构造器'
          ];
          return popNames.map(function (n) { return getToolByName(n); }).filter(function (t) { return t; });
        }
        return activeCategory
          ? tools.filter(function (t) { return t.cats.indexOf(activeCategory) !== -1; })
          : tools;
      }

      function renderCategories() {
        var bar = document.getElementById('categoryBar');
        bar.innerHTML = '';
        var currentTools = getCurrentToolList();
        var allBtn = document.createElement('button');
        allBtn.className = 'cat-tag' + (activeCategory === null ? ' active' : '');
        allBtn.textContent = '全部';
        allBtn.addEventListener('click', function () { activeCategory = null; renderCategories(); renderTools(); });
        bar.appendChild(allBtn);

        categories.forEach(function (cat) {
          var count = currentTools.filter(function (t) { return t && t.cats.indexOf(cat) !== -1; }).length;
          if (count === 0) return;
          var btn = document.createElement('button');
          btn.className = 'cat-tag' + (activeCategory === cat ? ' active' : '');
          btn.textContent = cat + ' ' + count;
          btn.addEventListener('click', function () {
            activeCategory = activeCategory === cat ? null : cat;
            renderCategories();
            renderTools();
          });
          bar.appendChild(btn);
        });
      }

      function getSearchRelevance(tool, query) {
        var q = query.toLowerCase();
        var name = tool.name.toLowerCase();
        var desc = tool.desc.toLowerCase();
        var cats = tool.cats.join(' ').toLowerCase();
        var score = 0;
        if (name === q) score += 100;
        if (name.indexOf(q) === 0) score += 50;
        if (name.indexOf(q) !== -1) score += 30;
        if (desc.indexOf(q) !== -1) score += 15;
        if (cats.indexOf(q) !== -1) score += 10;
        return score;
      }

      function renderTools() {
        updateBadge();
        var grid = document.getElementById('toolGrid');
        grid.innerHTML = '';
        var list = getCurrentToolList();

        if (searchQuery) {
          list = list.filter(function (t) { return t && getSearchRelevance(t, searchQuery) > 0; });
          list.sort(function (a, b) { return getSearchRelevance(b, searchQuery) - getSearchRelevance(a, searchQuery); });
          if (list.length === 0) {
            grid.innerHTML = '<p style="color:var(--color-text-disabled);padding:var(--space-4);">未找到与 "<strong>' + htmlEscape(searchQuery) + '</strong>" 相关的工具。</p>';
            return;
          }
        }

        if (currentSection !== 'all' && list.length === 0) {
          grid.innerHTML = '<p style="color:var(--color-text-disabled);padding:var(--space-4);">暂无数据，使用工具后会自动记录。</p>';
          return;
        }

        if (activeCategory) list = list.filter(function (t) { return t && t.cats.indexOf(activeCategory) !== -1; });

        var isHistory = (currentSection === 'history');
        var tb = document.getElementById('historyToolbar');
        if (tb) tb.style.display = isHistory && list.length > 0 ? 'flex' : 'none';

        list.forEach(function (tool) {
          if (!tool) return;
          var card = document.createElement('div');
          card.style.display = 'flex';
          card.style.alignItems = 'flex-start';
          card.style.gap = '8px';

          if (isHistory) {
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'history-cb';
            cb.dataset.name = tool.name;
            cb.style.marginTop = '16px';
            cb.style.flexShrink = '0';
            cb.addEventListener('change', updateHistoryInfo);
            card.appendChild(cb);
          }

          var link = document.createElement('a');
          link.href = tool.link;
          link.className = 'tool-card';
          link.style.flex = '1';
          link.style.minWidth = '0';
          var usage = getUsage();
          var info = usage[tool.name];
          var usageHtml = info ? '<span style="font-size:10px;color:var(--color-text-disabled);">使用 ' + info.count + ' 次</span>' : '';
          var tagsHtml = tool.cats.map(function (c) { return '<span>#' + c + '</span>'; }).join('');
          link.innerHTML = '<h2>' + tool.name + '</h2><p>' + tool.desc + '</p><div class="tags" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">' + tagsHtml + usageHtml + '</div>';
          card.appendChild(link);
          grid.appendChild(card);
        });
      }

      function updateHistoryInfo() {
        var cbs = document.querySelectorAll('.history-cb');
        var checked = 0;
        cbs.forEach(function (cb) { if (cb.checked) checked++; });
        var info = document.getElementById('historySelectInfo');
        if (info) info.textContent = '已选 ' + checked + ' / ' + cbs.length;
      }

      function setupHistoryToolbar() {
        document.getElementById('selectAllBtn').addEventListener('click', function () {
          document.querySelectorAll('.history-cb').forEach(function (cb) { cb.checked = true; });
          updateHistoryInfo();
        });
        document.getElementById('deselectAllBtn').addEventListener('click', function () {
          document.querySelectorAll('.history-cb').forEach(function (cb) { cb.checked = !cb.checked; });
          updateHistoryInfo();
        });
        document.getElementById('deleteSelectedBtn').addEventListener('click', function () {
          var usage = getUsage();
          var count = 0;
          document.querySelectorAll('.history-cb').forEach(function (cb) {
            if (cb.checked) { delete usage[cb.dataset.name]; count++; }
          });
          if (count === 0) { setStatus('请先选择要删除的记录', 'error'); return; }
          saveUsage(usage);
          setStatus('已删除 ' + count + ' 条记录');
          updateBadge();
          renderCategories();
          renderTools();
        });
        document.getElementById('clearHistoryBtn').addEventListener('click', function () {
          if (!confirm('确定要清空全部历史记录吗？')) return;
          savePreference('usage', {});
          setStatus('已清空全部历史记录');
          updateBadge();
          renderCategories();
          renderTools();
        });
      }

      function updateBadge() {
        var badge = document.getElementById('historyBadge');
        if (badge) badge.textContent = '(' + getHistoryCount() + ')';
      }

      function renderSectionTabs() {
        var tabs = document.querySelectorAll('.sec-tab');
        tabs.forEach(function (tab) {
          tab.addEventListener('click', function () {
            tabs.forEach(function (t) { t.className = 'sec-tab'; });
            this.className = 'sec-tab active';
            currentSection = this.dataset.section;
            activeCategory = null;
            searchQuery = '';
            document.getElementById('searchInput').value = '';
            renderCategories();
            renderTools();
          });
        });
        updateBadge();
      }

      /* ---- Search ---- */
      var searchTimer = null;
      document.getElementById('searchInput').addEventListener('input', function () {
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(function () {
          searchQuery = document.getElementById('searchInput').value.trim();
          activeCategory = null;
          renderCategories();
          renderTools();
        }, 200);
      });

      // style for section tabs
      var secStyle = document.createElement('style');
      secStyle.textContent = '.sec-tab{font-family:var(--font-mono);font-size:var(--font-size-sm);padding:6px 14px;border:1px solid var(--color-border);border-radius:9999px;background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s;letter-spacing:0.02em;}.sec-tab:hover{border-color:var(--color-text-primary);color:var(--color-text-primary);}.sec-tab.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary);}';
      document.head.appendChild(secStyle);

      setupHistoryToolbar();
      renderSectionTabs();
      renderCategories();
      renderTools();

      /* Refresh on bfcache restore (back button from tool page) */
      window.addEventListener('pageshow', function () {
        updateBadge();
        if (currentSection === 'history') { renderCategories(); renderTools(); }
      });
    })();
  </script>
