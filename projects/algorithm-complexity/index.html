<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>算法复杂度 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.search-bar{width:100%;height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;margin-bottom:var(--space-2)}.search-bar:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.algo-table{width:100%;border-collapse:collapse;font-size:13px}.algo-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--color-border);font-weight:600;position:sticky;top:0;background:var(--color-bg)}.algo-table td{padding:8px 12px;border-bottom:1px solid var(--color-border)}.algo-table tr:hover{background:var(--color-bg-soft)}.complexity-tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600}.ct-1{background:#e8f5e9;color:#2e7d32}.ct-logn{background:#e3f2fd;color:#1565c0}.ct-n{background:#fff3e0;color:#e65100}.ct-nlogn{background:#f3e5f5;color:#6a1b9a}.ct-n2{background:#ffebee;color:#c62828}.ct-n3{background:#fce4ec;color:#b71c1c}.ct-nk{background:#fce4ec;color:#880e4f}.ct-2n{background:#ffebee;color:#b71c1c}.cat-chip{font-size:11px;padding:2px 8px;background:var(--color-bg-soft);border-radius:999px;color:var(--color-text-secondary)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>算法复杂度</h1><p class="tool-desc">分析代码的时间和空间复杂度</p>
<div class="card"><input id="searchInput" class="search-bar js-focus-input" placeholder="搜索算法名称或复杂度值..."><div style="max-height:500px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius-md)"><table class="algo-table"><thead><tr><th>算法</th><th>时间复杂度</th><th>空间复杂度</th><th>类别</th><th>说明</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var searchInput=document.getElementById('searchInput'),tableBody=document.getElementById('tableBody'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var data=[{name:'冒泡排序',time:'O(n²)',space:'O(1)',cat:'排序',note:'相邻比较交换，稳定'},{name:'选择排序',time:'O(n²)',space:'O(1)',cat:'排序',note:'每次选最小，不稳定'},{name:'插入排序',time:'O(n²)',space:'O(1)',cat:'排序',note:'已排好时 O(n)'},{name:'希尔排序',time:'O(n log² n)',space:'O(1)',cat:'排序',note:'递减增量插入排序'},{name:'快速排序',time:'O(n log n)',space:'O(log n)',cat:'排序',note:'分治，最坏 O(n²)'},{name:'归并排序',time:'O(n log n)',space:'O(n)',cat:'排序',note:'分治合并，稳定'},{name:'堆排序',time:'O(n log n)',space:'O(1)',cat:'排序',note:'堆结构，不稳定'},{name:'计数排序',time:'O(n+k)',space:'O(k)',cat:'排序',note:'桶计数，整数排序'},{name:'基数排序',time:'O(nk)',space:'O(n+k)',cat:'排序',note:'按位桶分配'},{name:'桶排序',time:'O(n+k)',space:'O(n)',cat:'排序',note:'均匀分布最优'},{name:'线性搜索',time:'O(n)',space:'O(1)',cat:'搜索',note:'遍历查找'},{name:'二分搜索',time:'O(log n)',space:'O(1)',cat:'搜索',note:'有序数组'},{name:'BFS',time:'O(V+E)',space:'O(V)',cat:'图',note:'队列实现'},{name:'DFS',time:'O(V+E)',space:'O(V)',cat:'图',note:'栈/递归实现'},{name:'Dijkstra',time:'O((V+E)log V)',space:'O(V)',cat:'图',note:'非负权重'},{name:'Bellman-Ford',time:'O(VE)',space:'O(V)',cat:'图',note:'支持负权边'},{name:'Floyd-Warshall',time:'O(V³)',space:'O(V²)',cat:'图',note:'全源最短路'},{name:'Kruskal MST',time:'O(E log V)',space:'O(E+V)',cat:'图',note:'并查集'},{name:'Prim MST',time:'O(E log V)',space:'O(V)',cat:'图',note:'优先队列'},{name:'KMP',time:'O(n+m)',space:'O(m)',cat:'字符串',note:'线性字符串匹配'},{name:'Rabin-Karp',time:'O(n+m)',space:'O(1)',cat:'字符串',note:'滚动哈希'},{name:'Z 算法',time:'O(n+m)',space:'O(n+m)',cat:'字符串',note:'Z 数组匹配'},{name:'Manacher',time:'O(n)',space:'O(n)',cat:'字符串',note:'最长回文子串'},{name:'动态规划 (DP)',time:'视问题而定',space:'视问题而定',cat:'算法',note:'最优子结构+重叠子问题'},{name:'贪心算法',time:'视问题而定',space:'O(1)',cat:'算法',note:'局部最优→全局最优'},{name:'分治法',time:'视问题而定',space:'视问题而定',cat:'算法',note:'分解→求解→合并'},{name:'回溯法',time:'O(分支数^深度)',space:'O(深度)',cat:'算法',note:'剪枝优化'},{name:'FFT',time:'O(n log n)',space:'O(n)',cat:'数学',note:'快速傅里叶变换'},{name:'矩阵乘法 (朴素)',time:'O(n³)',space:'O(n²)',cat:'数学',note:'三重循环'},{name:'Strassen',time:'O(n^2.807)',space:'O(n²)',cat:'数学',note:'分治矩阵乘法'}];function ctClass(c){if(c==='O(1)')return'ct-1';if(c.indexOf('log')!==-1)return c.indexOf('n log')!==-1?'ct-nlogn':'ct-logn';if(c==='O(n)')return'ct-n';if(c.indexOf('n²')!==-1||c.indexOf('n^2')!==-1)return'ct-n2';if(c.indexOf('n³')!==-1||c.indexOf('n^3')!==-1)return'ct-n3';if(c.indexOf('n^k')!==-1)return'ct-nk';if(c.indexOf('2ⁿ')!==-1)return'ct-2n';if(c.indexOf('n!')!==-1)return'ct-2n';return'ct-1'}function render(filter){var html='';for(var i=0;i<data.length;i++){var d=data[i];var lf=filter.toLowerCase();if(filter&&d.name.toLowerCase().indexOf(lf)===-1&&d.time.indexOf(lf)===-1&&d.cat.indexOf(lf)===-1)continue;html+='<tr>';html+='<td><strong>'+htmlEscape(d.name)+'</strong></td>';html+='<td><span class="complexity-tag '+ctClass(d.time)+'">'+htmlEscape(d.time)+'</span></td>';html+='<td><span class="complexity-tag '+(d.space==='O(1)'?'ct-1':'ct-n')+'">'+htmlEscape(d.space)+'</span></td>';html+='<td><span class="cat-chip">'+htmlEscape(d.cat)+'</span></td>';html+='<td style="font-size:12px;color:var(--color-text-secondary)">'+htmlEscape(d.note)+'</td>';html+='</tr>'}tableBody.innerHTML=html;outputText.textContent='共显示 '+tableBody.querySelectorAll('tr').length+' 条'}searchInput.addEventListener('input',function(){render(this.value)});render('');copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
