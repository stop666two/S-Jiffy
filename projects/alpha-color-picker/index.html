<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>透明度取色器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>透明度取色器</h1><p class="tool-desc">选取带 Alpha 透明通道的颜色值。</p><div class="card"><div class="row"><div><label>颜色</label><input id="colorInput" class="input" type="color" value="#ff5722" style="width:60px;height:40px;padding:2px"></div><div><label>透明度</label><input id="alphaInput" class="input" type="range" min="0" max="1" step="0.01" value="0.6" style="width:150px"></div><span id="alphaVal">0.6</span></div>
<div style="height:60px;border-radius:8px;margin:12px 0;background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0" id="previewBg"><div id="previewBox" style="height:100%;border-radius:8px"></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var ci=document.getElementById("colorInput"),ai=document.getElementById("alphaInput"),av=document.getElementById("alphaVal"),pb=document.getElementById("previewBox"),o=document.getElementById("outputText");
function update(){var color=ci.value,a=parseFloat(ai.value);av.textContent=a;var r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
pb.style.background="rgba("+r+","+g+","+b+","+a+")";o.textContent="rgba("+r+", "+g+", "+b+", "+a+")\nhex: "+color+"\nalpha: "+a}
ci.addEventListener("input",update);ai.addEventListener("input",update);
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});update();})();</script></body></html>
