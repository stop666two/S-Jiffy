<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ANSI 转义码 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.filter-bar{width:100%;height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;margin-bottom:var(--space-2)}.filter-bar:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-2)}.cat-tab{padding:6px 14px;border:1px solid var(--color-border);border-radius:999px;background:var(--color-bg);cursor:pointer;font-size:12px;transition:all 0.1s}.cat-tab.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary)}.esc-table{width:100%;border-collapse:collapse;font-size:13px}.esc-table th{padding:8px 12px;border-bottom:2px solid var(--color-border);text-align:left;font-weight:600;background:var(--color-bg);position:sticky;top:0}.esc-table td{padding:6px 12px;border-bottom:1px solid var(--color-border)}.esc-table tr:hover{background:var(--color-bg-soft)}.color-preview{display:inline-block;width:28px;height:18px;border-radius:3px;vertical-align:middle;border:1px solid var(--color-border)}code{background:var(--color-bg-soft);padding:2px 6px;border-radius:3px;font-size:12px;font-family:var(--font-mono);border:1px solid var(--color-border)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>ANSI 转义码</h1><p class="tool-desc">查看和预览 ANSI 终端转义序列</p>
<div class="card"><input id="searchInput" class="filter-bar js-focus-input" placeholder="搜索转义序列或描述..."><div class="cat-tabs" id="catTabs"><button class="cat-tab active" data-cat="all">全部</button><button class="cat-tab" data-cat="color">颜色</button><button class="cat-tab" data-cat="style">样式</button><button class="cat-tab" data-cat="cursor">光标</button><button class="cat-tab" data-cat="erase">擦除</button><button class="cat-tab" data-cat="misc">其他</button></div>
<div style="max-height:560px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius-md)"><table class="esc-table"><thead><tr><th>转义序列</th><th>描述</th><th>类别</th><th>预览</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var searchInput=document.getElementById('searchInput'),tableBody=document.getElementById('tableBody'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var activeCat='all';var data=[{seq:'\\e[0m',desc:'重置所有属性',cat:'style',preview:function(){return'<span style="font-weight:400;opacity:1">Normal</span>'}},{seq:'\\e[1m',desc:'粗体/高亮度',cat:'style',preview:function(){return'<span style="font-weight:700">Bold</span>'}},{seq:'\\e[2m',desc:'暗淡/低亮度',cat:'style',preview:function(){return'<span style="opacity:0.5">Dim</span>'}},{seq:'\\e[3m',desc:'斜体',cat:'style',preview:function(){return'<span style="font-style:italic">Italic</span>'}},{seq:'\\e[4m',desc:'下划线',cat:'style',preview:function(){return'<span style="text-decoration:underline">Underline</span>'}},{seq:'\\e[5m',desc:'闪烁 (慢)',cat:'style',preview:function(){return'<span>Blink (slow)</span>'}},{seq:'\\e[7m',desc:'反色',cat:'style',preview:function(){return'<span style="background:#111;color:#fff">Inverse</span>'}},{seq:'\\e[8m',desc:'隐藏',cat:'style',preview:function(){return'<span style="color:transparent">Hidden</span>'}},{seq:'\\e[9m',desc:'删除线',cat:'style',preview:function(){return'<span style="text-decoration:line-through">Strikethrough</span>'}},{seq:'\\e[30m',desc:'黑色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#000"></span>'}},{seq:'\\e[31m',desc:'红色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#d00"></span>'}},{seq:'\\e[32m',desc:'绿色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#0d0"></span>'}},{seq:'\\e[33m',desc:'黄色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#dd0"></span>'}},{seq:'\\e[34m',desc:'蓝色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#00d"></span>'}},{seq:'\\e[35m',desc:'品红前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#d0d"></span>'}},{seq:'\\e[36m',desc:'青色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#0dd"></span>'}},{seq:'\\e[37m',desc:'白色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#eee;border-color:#999"></span>'}},{seq:'\\e[40-47m',desc:'背景色 (40=黑,41=红,...47=白)',cat:'color',preview:function(){return'<span class="color-preview" style="background:#d00"></span>&nbsp;<span class="color-preview" style="background:#0d0"></span>&nbsp;<span class="color-preview" style="background:#00d"></span>'}},{seq:'\\e[90-97m',desc:'亮色前景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#f88"></span>&nbsp;<span class="color-preview" style="background:#8f8"></span>&nbsp;<span class="color-preview" style="background:#88f"></span>'}},{seq:'\\e[100-107m',desc:'亮色背景',cat:'color',preview:function(){return'<span class="color-preview" style="background:#f88"></span>&nbsp;<span class="color-preview" style="background:#8f8"></span>&nbsp;<span class="color-preview" style="background:#88f"></span>'}},{seq:'\\e[38;5;Nm',desc:'256 色前景 (N=0-255)',cat:'color',preview:function(){var h='';for(var i=0;i<8;i++){h+='<span class="color-preview" style="background:'+ansi256Bg(i)+'"></span>'}return h}},{seq:'\\e[48;5;Nm',desc:'256 色背景 (N=0-255)',cat:'color',preview:function(){var h='';for(var i=0;i<8;i++){h+='<span class="color-preview" style="background:'+ansi256Bg(i+16)+'"></span>'}return h}},{seq:'\\e[H',desc:'光标移动到 (1,1)',cat:'cursor',preview:function(){return''}},{seq:'\\e[row;colH',desc:'光标移动到指定行/列',cat:'cursor',preview:function(){return''}},{seq:'\\e[A',desc:'光标上移一行',cat:'cursor',preview:function(){return'↑'}},{seq:'\\e[B',desc:'光标下移一行',cat:'cursor',preview:function(){return'↓'}},{seq:'\\e[C',desc:'光标右移一列',cat:'cursor',preview:function(){return'→'}},{seq:'\\e[D',desc:'光标左移一列',cat:'cursor',preview:function(){return'←'}},{seq:'\\e[s',desc:'保存光标位置',cat:'cursor',preview:function(){return''}},{seq:'\\e[u',desc:'恢复光标位置',cat:'cursor',preview:function(){return''}},{seq:'\\e[2J',desc:'清屏',cat:'erase',preview:function(){return'🧹'}},{seq:'\\e[K',desc:'清除行尾',cat:'erase',preview:function(){return''}},{seq:'\\e[2K',desc:'清除整行',cat:'erase',preview:function(){return''}},{seq:'\\e[J',desc:'清除屏幕 (光标以下)',cat:'erase',preview:function(){return''}},{seq:'\\e[?25l',desc:'隐藏光标',cat:'cursor',preview:function(){return''}},{seq:'\\e[?25h',desc:'显示光标',cat:'cursor',preview:function(){return''}},{seq:'\\e]0;title\\a',desc:'设置终端标题',cat:'misc',preview:function(){return''}},{seq:'\\e[6n',desc:'查询光标位置',cat:'cursor',preview:function(){return''}}];function ansi256Bg(n){var r,g,b;if(n<16){var colors=['000','d00','0d0','dd0','00d','d0d','0dd','eee','888','f44','4f4','ff4','44f','f4f','4ff','fff'];return'#'+colors[n]}else if(n<232){n-=16;r=Math.round(n/36)*51;g=Math.round((n%36)/6)*51;b=Math.round(n%6)*51;return'rgb('+r+','+g+','+b+')'}else{n-=232;var g=Math.round(n*10+8);return'rgb('+g+','+g+','+g+')'}}var catTabs=document.querySelectorAll('#catTabs .cat-tab');for(var i=0;i<catTabs.length;i++){(function(tab){tab.addEventListener('click',function(){for(var j=0;j<catTabs.length;j++)catTabs[j].classList.remove('active');tab.classList.add('active');activeCat=tab.getAttribute('data-cat');render()})})(catTabs[i])}function render(){var filter=searchInput.value.toLowerCase().trim();var html='';for(var i=0;i<data.length;i++){var d=data[i];if(activeCat!=='all'&&d.cat!==activeCat)continue;if(filter&&d.seq.indexOf(filter)===-1&&d.desc.indexOf(filter)===-1)continue;var preview='';if(typeof d.preview==='function')preview=d.preview();html+='<tr><td><code>'+htmlEscape(d.seq)+'</code></td><td>'+htmlEscape(d.desc)+'</td><td><span style="font-size:12px;color:var(--color-text-secondary)">'+d.cat+'</span></td><td>'+preview+'</td></tr>'}tableBody.innerHTML=html;outputText.textContent='共显示 '+tableBody.querySelectorAll('tr').length+' 条'}searchInput.addEventListener('input',render);render();copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
