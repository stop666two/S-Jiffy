<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面积单位转换 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .ar-grid { display:grid; gap:var(--space-3); }
    .ar-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
    .ar-row .field { flex:1; min-width:120px; }
    .ar-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>面积单位转换</h1>
    <p class="tool-desc">m² / km² / ha / acre / ft² / in² 互转。</p>
    <div class="card">
      <div class="ar-grid">
        <div class="ar-row">
          <div class="field"><label for="inputM2">平方米 (m²)</label><input id="inputM2" class="input" type="number" value="10000"></div>
          <div class="field"><label for="inputKm2">平方千米 (km²)</label><input id="inputKm2" class="input" type="number" value="0.01"></div>
        </div>
        <div class="ar-row">
          <div class="field"><label for="inputHa">公顷 (ha)</label><input id="inputHa" class="input" type="number" value="1"></div>
          <div class="field"><label for="inputAcre">英亩 (acre)</label><input id="inputAcre" class="input" type="number" value="2.47"></div>
        </div>
        <div class="ar-row">
          <div class="field"><label for="inputFt2">平方英尺 (ft²)</label><input id="inputFt2" class="input" type="number" value="107639"></div>
          <div class="field"><label for="inputIn2">平方英寸 (in²)</label><input id="inputIn2" class="input" type="number" value="15500031"></div>
        </div>
      </div>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputM2 = document.getElementById('inputM2');
      var inputKm2 = document.getElementById('inputKm2');
      var inputHa = document.getElementById('inputHa');
      var inputAcre = document.getElementById('inputAcre');
      var inputFt2 = document.getElementById('inputFt2');
      var inputIn2 = document.getElementById('inputIn2');
      var outputEl = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');
      var updating = false;

      function r(v) { return Math.round(v * 1e6) / 1e6; }

      function fromSqMeters(m2) {
        if (updating) return;
        updating = true;
        inputM2.value = m2;
        inputKm2.value = r(m2 / 1e6);
        inputHa.value = r(m2 / 10000);
        inputAcre.value = r(m2 / 4046.86);
        inputFt2.value = r(m2 * 10.7639);
        inputIn2.value = r(m2 * 1550.0031);
        outputEl.textContent = m2 + ' m² = ' + inputKm2.value + ' km² = ' + inputHa.value + ' ha = ' + inputAcre.value + ' acre';
        updating = false;
      }

      inputM2.addEventListener('input', function() { fromSqMeters(parseFloat(this.value) || 0); });
      inputKm2.addEventListener('input', function() { fromSqMeters((parseFloat(this.value) || 0) * 1e6); });
      inputHa.addEventListener('input', function() { fromSqMeters((parseFloat(this.value) || 0) * 10000); });
      inputAcre.addEventListener('input', function() { fromSqMeters((parseFloat(this.value) || 0) * 4046.86); });
      inputFt2.addEventListener('input', function() { fromSqMeters((parseFloat(this.value) || 0) / 10.7639); });
      inputIn2.addEventListener('input', function() { fromSqMeters((parseFloat(this.value) || 0) / 1550.0031); });

      copyBtn.addEventListener('click', function() {
        var text = outputEl.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });

      fromSqMeters(10000);
    })();
  </script>
</body>
</html>
