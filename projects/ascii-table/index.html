<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ASCII 表 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.ascii-tbl{width:100%;border-collapse:collapse;font-size:13px;font-family:var(--font-mono)}.ascii-tbl th,.ascii-tbl td{padding:5px 8px;text-align:center;border-bottom:1px solid var(--color-border)}.ascii-tbl th{position:sticky;top:0;background:var(--color-bg);font-size:var(--font-size-xs);color:var(--color-text-secondary)}.ascii-tbl tr:hover{background:var(--color-bg-soft)}.ascii-tbl .ctrl{color:var(--color-text-disabled)}.ctrl-info{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:var(--space-2)}.wrap-tbl{max-height:540px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius-md)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>ASCII 表</h1><p class="tool-desc">ASCII 标准表（0-127），显示字符、十进制、十六进制和二进制。</p>
<div class="card">
<div class="ctrl-info">控制字符显示为灰色，可点击复制十进制或十六进制值。</div>
<div class="wrap-tbl"><table class="ascii-tbl"><thead><tr><th>十进制</th><th>十六进制</th><th>二进制</th><th>字符</th><th>描述</th></tr></thead><tbody id="tblBody"></tbody></table></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var ctrlNames=['NUL','SOH','STX','ETX','EOT','ENQ','ACK','BEL','BS','HT','LF','VT','FF','CR','SO','SI','DLE','DC1','DC2','DC3','DC4','NAK','SYN','ETB','CAN','EM','SUB','ESC','FS','GS','RS','US'];var tbody=document.getElementById('tblBody'),out=document.getElementById('输出Text');var rows=[];for(var i=0;i<128;i++){var hex=i.toString(16).to大写().padStart(2,'0');var bin=i.toString(2).padStart(8,'0');var char,desc;if(i<32){char='';desc=ctrlNames[i]||'CTRL'}else if(i===32){char=' ';desc='SPACE'}else if(i===127){char='';desc='DEL'}else{char=String.fromCharCode(i);desc=''}rows.push({dec:i,hex:hex,bin:bin,char:char,desc:desc})}function render(){tbody.innerHTML='';for(var i=0;i<rows.length;i++){var r=rows[i];var tr=document.createElement('tr');if(i<32||i===127)tr.className='ctrl';var ch=r.char||'·';tr.innerHTML='<td>'+r.dec+'</td><td>'+r.hex+'</td><td>'+r.bin+'</td><td>'+ch+'</td><td>'+r.desc+'</td>';tr.addEventListener('click',function(){var dec=this.children[0].textContent;copyToClipboard(dec,document.getElementById('copyBtn'));setStatus('已复制: '+dec)});tbody.appendChild(tr)}out.textContent='共 128 个字符 (0-127)'}render();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
