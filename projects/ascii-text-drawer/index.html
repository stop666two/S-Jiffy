<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII 文字画 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <script src="https://cdn.jsdelivr.net/npm/figlet@1.7.0/lib/figlet.min.js"></script>
  <style>
    .ascii-输出 { font-family: 'Courier New', 'Geist Mono', 'SF Mono', monospace; font-size: 10px; line-height: 1.1; white-space: pre; background: #000; color: #0f0; padding: var(--space-3); border-radius: var(--radius-md); overflow: auto; min-height: 100px; }
    .font-select { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>ASCII 文字画</h1>
    <p class="tool-desc">将文本转换为 ASCII 艺术字，使用 figlet.js 标准库，6 种本地字体。</p>
    <div class="card font-select">
      <input id="inputText" class="input js-focus-input" type="text" placeholder="输入英文文本..." style="flex:1;min-width:150px;font-size:16px;letter-spacing:1px;">
      <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">字体</label>
      <select id="fontSelect" class="input" style="width:auto;min-width:120px;">
        <option value="Standard">Standard</option>
        <option value="Big">Big</option>
        <option value="Block">Block</option>
        <option value="Slant">Slant</option>
        <option value="Bubble">Bubble</option>
        <option value="Digital">Digital</option>
      </select>
      <button id="generateBtn" class="btn btn-primary">生成</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box" style="padding:0;">
      <pre class="ascii-输出" id="输出Text" style="padding-right:60px;"></pre>
      <button class="copy-btn" id="copyBtn" style="top:4px;right:4px;">复制</button>
    </div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var i=document.getElementById('inputText'),f=document.getElementById('fontSelect'),o=document.getElementById('输出Text');
    figlet.defaults({fontPath:'fonts'});
    function gen(){
      var t=i.value.trim();if(!t){setStatus('请输入文本','error');return;}
      figlet.text(t,{font:f.value},function(err,data){
        if(err){setStatus('字体加载失败','error');return;}
        o.textContent=data;setStatus('');
      });
    }
    document.getElementById('generateBtn').addEventListener('click',gen);
    i.addEventListener('keydown',function(e){if(e.key==='Enter')gen();});
    document.getElementById('clearBtn').addEventListener('click',function(){i.value='';o.textContent='';setStatus('');i.focus();});
    document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制');}});
  })();</script>
</body>
</html>
