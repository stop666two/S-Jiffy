<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>进制转换 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>进制转换</h1>
    <p class="tool-desc">二进制 / 八进制 / 十进制 / 十六进制互转。</p>

    <div class="card" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <input id="inputValue" class="input js-focus-input" placeholder="输入数值" style="width:200px;">
      <select id="fromBase" class="input" style="width:auto; min-width:80px;">
        <option value="2">二进制</option>
        <option value="8">八进制</option>
        <option value="10" selected>十进制</option>
        <option value="16">十六进制</option>
      </select>
      <span style="color:var(--color-text-secondary);">→</span>
      <select id="toBase" class="input" style="width:auto; min-width:80px;">
        <option value="2">二进制</option>
        <option value="8">八进制</option>
        <option value="10">十进制</option>
        <option value="16" selected>十六进制</option>
      </select>
      <button id="convertBtn" class="btn btn-primary">转换</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>

    <div class="output-box" id="outputContainer" style="min-height:60px;">
      <span id="outputText" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var v = document.getElementById('inputValue'), f = document.getElementById('fromBase'), t = document.getElementById('toBase'), o = document.getElementById('outputText');
      var baseNames = { 2: '二进制', 8: '八进制', 10: '十进制', 16: '十六进制' };
      document.getElementById('convertBtn').addEventListener('click', function () {
        var str = v.value.trim();
        if (!str) { setStatus('请输入数值', 'error'); return; }
        var dec = parseInt(str, parseInt(f.value));
        if (isNaN(dec)) { setStatus('输入与所选进制不匹配', 'error'); o.textContent = ''; return; }
        var to = parseInt(t.value);
        var result = dec.toString(to).toUpperCase();
        o.textContent = baseNames[to] + ': ' + result;
        setStatus('');
      });
      document.getElementById('clearBtn').addEventListener('click', function () { v.value = ''; o.textContent = ''; setStatus(''); v.focus(); });
      document.getElementById('copyBtn').addEventListener('click', function () { if (o.textContent) { copyToClipboard(o.textContent, this); setStatus('已复制'); } });
    })();
  </script>
</body>
</html>
