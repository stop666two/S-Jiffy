<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Base45 编解码 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>Base45 编解码</h1><p class="tool-desc">Base45 编码/解码（RFC 9285，用于 QR 码），字符串输入输出。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入要编码的文本或 Base45 字符串..." style="min-height:100px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin:var(--space-2) 0;flex-wrap:wrap;align-items:center;">
<button id="encodeBtn" class="btn btn-primary">编码</button>
<button id="decodeBtn" class="btn btn-secondary">解码</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;font-family:var(--font-mono);font-size:var(--font-size-sm);word-break:break-all;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('输出Text');
var encodeBtn=document.getElementById('encodeBtn');
var decodeBtn=document.getElementById('decodeBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
var alphabet='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:';
function encode(text){
var bytes=[];
for(var i=0;i<text.length;i++){
var code=text.charCodeAt(i);
bytes.push(code);
}
var r='';
for(var i=0;i<bytes.length;i+=2){
if(i+1<bytes.length){
var val=bytes[i]*256+bytes[i+1];
r+=alphabet[Math.floor(val/45/45)%45];
r+=alphabet[Math.floor(val/45)%45];
r+=alphabet[val%45];
}else{
var val=bytes[i];
r+=alphabet[Math.floor(val/45)%45];
r+=alphabet[val%45];
}
}
return r;
}
function decode(b45){
var chars=[];
for(var i=0;i<b45.length;i++){
var idx=alphabet.indexOf(b45[i]);
if(idx===-1)throw new Error('无效字符: '+b45[i]);
chars.push(idx);
}
var bytes=[];
for(var i=0;i<chars.length;i+=3){
if(i+2<chars.length){
var val=chars[i]*2025+chars[i+1]*45+chars[i+2];
bytes.push(val>>8);
bytes.push(val&255);
}else if(i+1<chars.length){
var val=chars[i]*45+chars[i+1];
bytes.push(val);
}else{
throw new Error('尾数长度错误');
}
}
var r='';
for(var i=0;i<bytes.length;i++){
r+=String.fromCharCode(bytes[i]);
}
return r;
}
encodeBtn.addEventListener('click',function(){
var t=inputEl.value;
if(!t){setStatus('请输入文本','error');return;}
try{
输出El.textContent=encode(t);
setStatus('');
}catch(e){setStatus('编码错误: '+e.message,'error');}
});
decodeBtn.addEventListener('click',function(){
var t=inputEl.value.trim();
if(!t){setStatus('请输入 Base45','error');return;}
try{
输出El.textContent=decode(t);
setStatus('');
}catch(e){setStatus('解码错误: '+e.message,'error');}
});
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
