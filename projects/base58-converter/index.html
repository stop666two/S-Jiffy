<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Base58 编解码 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.code-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:250px}@media(max-width:700px){.code-pair{grid-template-columns:1fr}}.code-pair textarea{height:250px;resize:vertical;font-family:var(--font-mono);font-size:13px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.code-pair textarea:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.note{font-size:12px;color:var(--color-text-secondary);margin-top:8px}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Base58 编解码</h1><p class="tool-desc">Base58（Bitcoin 风格）编码/解码。用于加密货币地址和简短标识符。</p>
<div class="card">
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
<button id="encodeBtn" class="btn btn-primary">编码</button>
<button id="decodeBtn" class="btn btn-secondary">解码</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="code-pair">
<textarea id="inputText" class="js-focus-input" placeholder="输入文本或 Base58 字符串...">Hello S-Jiffy</textarea>
<textarea id="输出Text" readonly placeholder="结果..." style="background:var(--color-bg-soft);"></textarea>
</div>
<div class="note">Base58 字母表: 123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz (不含 0、O、I、l)</div>
</div>
<div class="输出-box"><span id="statusText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var ALPHABET='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
var BASE=BigInt(58);

function stringToBytes(s){
var encoder=new TextEncoder();
return Array.from(encoder.encode(s));
}

function bytesToString(bytes){
var decoder=new TextDecoder();
return decoder.decode(new Uint8Array(bytes));
}

function bytesToBase58(bytes){
if(bytes.length===0)return '';
var num=BigInt(0);
for(var i=0;i<bytes.length;i++){
num=num*BigInt(256)+BigInt(bytes[i]);
}
var 结果='';
while(num>0){
var rem=num%BigInt(58);
结果=ALPHABET[Number(rem)]+结果;
num=num/BigInt(58);
}
for(var i=0;i<bytes.length&&bytes[i]===0;i++)结果='1'+结果;
return 结果;
}

function base58ToBytes(base58){
if(base58==='')return [];
var num=BigInt(0);
for(var i=0;i<base58.length;i++){
var idx=ALPHABET.indexOf(base58[i]);
if(idx===-1)continue;
num=num*BigInt(58)+BigInt(idx);
}
var bytes=[];
while(num>0){
var byteVal=Number(num%BigInt(256));
bytes.unshift(byteVal);
num=num/BigInt(256);
}
for(var i=0;i<base58.length&&base58[i]==='1';i++)bytes.unshift(0);
return bytes;
}

function encode(){
var text=inputEl.value;
if(!text){输出El.value='';statusText.textContent='';setStatus('请输入内容','error');return;}
try{
var bytes=stringToBytes(text);
var base58=bytesToBase58(bytes);
输出El.value=base58;
statusText.textContent='编码完成，'+base58.length+' 字符';
setStatus('');
}catch(e){setStatus('编码错误','error');}
}

function decode(){
var text=inputEl.value.trim();
if(!text){输出El.value='';statusText.textContent='';setStatus('请输入 Base58','error');return;}
try{
var bytes=base58ToBytes(text);
var decoded=bytesToString(bytes);
输出El.value=decoded;
statusText.textContent='解码完成，'+decoded.length+' 字符';
setStatus('');
}catch(e){setStatus('解码错误：Base58 格式无效','error');}
}

var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('输出Text');
var encodeBtn=document.getElementById('encodeBtn');
var decodeBtn=document.getElementById('decodeBtn');
var clearBtn=document.getElementById('clearBtn');
var statusText=document.getElementById('statusText');
var copyBtn=document.getElementById('copyBtn');

encodeBtn.addEventListener('click',encode);
decodeBtn.addEventListener('click',decode);
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.value='';statusText.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.value){copyToClipboard(输出El.value,copyBtn);setStatus('已复制');}});
})();</script></body></html>
