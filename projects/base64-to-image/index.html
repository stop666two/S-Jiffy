<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 转图片 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>Base64 转图片</h1>
    <p class="tool-desc">粘贴 Base64 数据 URL，预览并下载图片。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="粘贴 Base64 数据 URL (data:image/...)"></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:24px;">
      <button id="previewBtn" class="btn btn-primary">预览</button>
      <a id="downloadLink" class="btn btn-secondary" style="display:inline-flex;text-decoration:none;" download="image.png">下载图片</a>
    </div>
    <div id="imagePreview" style="display:none;margin-bottom:24px;">
      <img id="previewImg" style="max-width:100%;max-height:400px;border-radius:var(--radius-md);border:1px solid var(--color-border);">
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var previewBtn = document.getElementById('previewBtn');
      var downloadLink = document.getElementById('downloadLink');
      var previewImg = document.getElementById('previewImg');
      var imagePreview = document.getElementById('imagePreview');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');

      function process() {
        var dataUrl = inputEl.value.trim();
        if (!dataUrl) {
          setStatus('请输入 Base64 数据 URL', 'error');
          return;
        }
        if (dataUrl.indexOf('data:image/') !== 0) {
          setStatus('无效的数据 URL，应以 data:image/ 开头', 'error');
          return;
        }
        previewImg.src = dataUrl;
        imagePreview.style.display = 'block';
        downloadLink.href = dataUrl;
        var mime = dataUrl.split(';')[0].split(':')[1];
        var ext = mime.split('/')[1] || 'png';
        downloadLink.download = 'image.' + ext;
        输出El.textContent = '格式: ' + mime + ' | 大小: ' + Math.round(dataUrl.length * 3 / 4 / 1024) + ' KB';
        setStatus('预览成功');
      }

      previewBtn.addEventListener('click', process);

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent;
        if (text) {
          copyToClipboard(text, copyBtn);
          setStatus('已复制到剪贴板');
        }
      });

      inputEl.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') process();
      });
    })();
  </script>
</body>
</html>
