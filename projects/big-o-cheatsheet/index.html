<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Big-O 速查表 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.search-bar{width:100%;height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;margin-bottom:var(--space-2)}.search-bar:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.complexity-table{width:100%;border-collapse:collapse;font-size:13px}.complexity-table th{text-align:left;padding:10px 12px;background:var(--color-bg-soft);border-bottom:2px solid var(--color-border);font-weight:600;position:sticky;top:0;background:var(--color-bg)}.complexity-table td{padding:8px 12px;border-bottom:1px solid var(--color-border);vertical-align:top}.complexity-table tr:hover{background:var(--color-bg-soft)}.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}.badge-o1{background:#e8f5e9;color:#2e7d32}.badge-on{background:#fff3e0;color:#e65100}.badge-on2{background:#ffebee;color:#c62828}.badge-ologn{background:#e3f2fd;color:#1565c0}.badge-onlogn{background:#f3e5f5;color:#6a1b9a}.cat-tag{font-size:11px;color:var(--color-text-secondary);background:var(--color-bg-soft);padding:1px 6px;border-radius:4px;margin-right:4px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Big-O 速查表</h1><p class="tool-desc">常见算法和数据结构的复杂度速查</p>
<div class="card"><input id="searchInput" class="search-bar js-focus-input" placeholder="搜索算法、数据结构或复杂度..."><div style="max-height:480px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius-md)"><table class="complexity-table" id="dataTable"><thead><tr><th>名称</th><th>平均</th><th>最坏</th><th>空间</th><th>类别</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var searchInput=document.getElementById('searchInput'),tableBody=document.getElementById('tableBody'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var data=[{name:'数组访问 (Array Access)',avg:'O(1)',worst:'O(1)',space:'O(n)',cat:'数据结构'},{name:'数组搜索 (Array Search)',avg:'O(n)',worst:'O(n)',space:'O(1)',cat:'数据结构'},{name:'链表插入 (Linked List Insert)',avg:'O(1)',worst:'O(1)',space:'O(1)',cat:'数据结构'},{name:'链表查找 (Linked List Search)',avg:'O(n)',worst:'O(n)',space:'O(1)',cat:'数据结构'},{name:'哈希表插入 (Hash Insert)',avg:'O(1)',worst:'O(n)',space:'O(n)',cat:'数据结构'},{name:'哈希表查找 (Hash Search)',avg:'O(1)',worst:'O(n)',space:'O(n)',cat:'数据结构'},{name:'二叉树查找 (BST Search)',avg:'O(log n)',worst:'O(n)',space:'O(n)',cat:'数据结构'},{name:'平衡树查找',avg:'O(log n)',worst:'O(log n)',space:'O(n)',cat:'数据结构'},{name:'栈/队列 (Stack/Queue)',avg:'O(1)',worst:'O(1)',space:'O(n)',cat:'数据结构'},{name:'二叉堆插入/删除',avg:'O(log n)',worst:'O(log n)',space:'O(n)',cat:'数据结构'},{name:'冒泡排序',avg:'O(n²)',worst:'O(n²)',space:'O(1)',cat:'排序'},{name:'选择排序',avg:'O(n²)',worst:'O(n²)',space:'O(1)',cat:'排序'},{name:'插入排序',avg:'O(n²)',worst:'O(n²)',space:'O(1)',cat:'排序'},{name:'快速排序',avg:'O(n log n)',worst:'O(n²)',space:'O(log n)',cat:'排序'},{name:'归并排序',avg:'O(n log n)',worst:'O(n log n)',space:'O(n)',cat:'排序'},{name:'堆排序',avg:'O(n log n)',worst:'O(n log n)',space:'O(1)',cat:'排序'},{name:'计数排序',avg:'O(n+k)',worst:'O(n+k)',space:'O(k)',cat:'排序'},{name:'基数排序',avg:'O(nk)',worst:'O(nk)',space:'O(n+k)',cat:'排序'},{name:'桶排序',avg:'O(n+k)',worst:'O(n²)',space:'O(n)',cat:'排序'},{name:'线性搜索',avg:'O(n)',worst:'O(n)',space:'O(1)',cat:'搜索'},{name:'二分搜索',avg:'O(log n)',worst:'O(log n)',space:'O(1)',cat:'搜索'},{name:'广度优先 BFS',avg:'O(V+E)',worst:'O(V+E)',space:'O(V)',cat:'图算法'},{name:'深度优先 DFS',avg:'O(V+E)',worst:'O(V+E)',space:'O(V)',cat:'图算法'},{name:'Dijkstra 最短路径',avg:'O((V+E) log V)',worst:'O((V+E) log V)',space:'O(V)',cat:'图算法'},{name:'Bellman-Ford',avg:'O(VE)',worst:'O(VE)',space:'O(V)',cat:'图算法'},{name:'Floyd-Warshall',avg:'O(V³)',worst:'O(V³)',space:'O(V²)',cat:'图算法'},{name:'Kruskal MST',avg:'O(E log V)',worst:'O(E log V)',space:'O(E+V)',cat:'图算法'},{name:'Prim MST',avg:'O(E log V)',worst:'O(E log V)',space:'O(V)',cat:'图算法'},{name:'字符串匹配 (朴素)',avg:'O(n+m)',worst:'O(nm)',space:'O(1)',cat:'字符串'},{name:'KMP 匹配',avg:'O(n+m)',worst:'O(n+m)',space:'O(m)',cat:'字符串'},{name:'Rabin-Karp',avg:'O(n+m)',worst:'O(nm)',space:'O(1)',cat:'字符串'},{name:'矩阵乘法 (朴素)',avg:'O(n³)',worst:'O(n³)',space:'O(n²)',cat:'数学'},{name:'Strassen 矩阵乘法',avg:'O(n^2.807)',worst:'O(n^2.807)',space:'O(n²)',cat:'数学'},{name:'FFT (快速傅里叶)',avg:'O(n log n)',worst:'O(n log n)',space:'O(n)',cat:'数学'}];function badge(c){if(c==='O(1)')return'badge-o1';if(c==='O(log n)')return'badge-ologn';if(c==='O(n)')return'badge-on';if(c==='O(n log n)')return'badge-onlogn';if(c.indexOf('n²')!==-1||c.indexOf('n^2')!==-1)return'badge-on2';return''}function render(filter){var html='';for(var i=0;i<data.length;i++){var d=data[i];if(filter&&d.name.toLowerCase().indexOf(filter)===-1&&d.avg.indexOf(filter)===-1&&d.cat.indexOf(filter)===-1)continue;html+='<tr>';html+='<td><strong>'+htmlEscape(d.name)+'</strong></td>';html+='<td><span class="badge '+badge(d.avg)+'">'+htmlEscape(d.avg)+'</span></td>';html+='<td><span class="badge '+badge(d.worst)+'">'+htmlEscape(d.worst)+'</span></td>';html+='<td><span class="badge '+badge(d.space)+'">'+htmlEscape(d.space)+'</span></td>';html+='<td><span class="cat-tag">'+htmlEscape(d.cat)+'</span></td>';html+='</tr>'}tableBody.innerHTML=html;outputText.textContent='共显示 '+tableBody.querySelectorAll('tr').length+' 条记录'}searchInput.addEventListener('input',function(){render(this.value.toLowerCase().trim())});render('');copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
