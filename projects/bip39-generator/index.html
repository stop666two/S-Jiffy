        while ((datalen + pad.length) % 64 !== 56) { pad.push(0x00); }
        var bits = bitlen;
        for (var i = 7; i >= 0; i--) { pad.push((bits >>> (i * 8)) & 0xff); }
        var combined = data.concat(pad);
        for (var i = 0; i < combined.length; i += 64) { compress(combined.slice(i, i + 64)); }
        var out = [];
        for (var i = 0; i < 8; i++) {
          out.push((H[i] >>> 24) & 0xff);
          out.push((H[i] >>> 16) & 0xff);
          out.push((H[i] >>> 8) & 0xff);
          out.push(H[i] & 0xff);
        }
        return out;
      }
      return { update: update, array: array };
    }
    document.getElementById('generateBtn').addEventListener('click', function() {
      var hex = entropyEl.value.trim();
      if (!hex) { setStatus('请先输入熵值或点击"随机熵"', 'error'); return; }
      if (!/^[0-9a-fA-F]+$/.test(hex) || hex.length % 2 !== 0) { setStatus('熵值格式无效，请输入十六进制', 'error'); return; }
      if (hex.length < 32) { setStatus('熵值过短，至少 16 字节 (32 hex)', 'error'); return; }
      var words = entropyToMnemonic(hex.toLowerCase());
      输出El.textContent = words.join(' ');
      var chips = '';
      for (var i = 0; i < words.length; i++) { chips += '<span class="word-chip">' + (i + 1) + '. ' + words[i] + '</span>'; }
      gridEl.innerHTML = chips;
      setStatus('生成 ' + words.length + ' 个助记词');
    });
    document.getElementById('randomBtn').addEventListener('click', function() {
      var hex = generateEntropy(32);
      entropyEl.value = hex;
      setStatus('已生成随机熵值 (32 字节)');
    });
    document.getElementById('copyBtn').addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, this); setStatus('已复制'); } });
  })();</script>
