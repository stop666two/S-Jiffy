<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>位运算计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.calc-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.calc-grid .input{width:160px}.op-select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.op-select:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.result-row{display:flex;align-items:center;gap:12px;padding:var(--space-2);margin-bottom:6px;font-family:var(--font-mono);font-size:14px}.result-row .label{color:var(--color-text-secondary);font-size:13px;min-width:80px}.result-row .value{font-weight:600;word-break:break-all}.binary-display{font-size:12px;letter-spacing:2px;color:var(--color-text-secondary)}.bit-table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--font-mono);margin-top:var(--space-2)}.bit-table td{padding:4px 8px;border:1px solid var(--color-border);text-align:center}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>位运算计算器</h1><p class="tool-desc">进行按位与/或/异或/移位等运算</p>
<div class="card"><div class="calc-grid"><input id="numA" class="input js-focus-input" type="number" placeholder="整数 A" value="12"><select id="opSelect" class="op-select"><option value="AND">AND (&amp;)</option><option value="OR">OR (|)</option><option value="XOR">XOR (^)</option><option value="NOT">NOT (~)</option><option value="LSHIFT">LSHIFT (&lt;&lt;)</option><option value="RSHIFT">RSHIFT (&gt;&gt;)</option></select><input id="numB" class="input" type="number" placeholder="整数 B (或位移量)" value="5"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var numA=document.getElementById('numA'),numB=document.getElementById('numB'),opSelect=document.getElementById('opSelect'),calcBtn=document.getElementById('calcBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function toBin32(n){return(n>>>0).toString(2).padStart(32,'0')}function fmtBin(s){var parts=[];for(var i=0;i<32;i+=4)parts.push(s.slice(i,i+4));return parts.join(' ')}function calc(){var a=parseInt(numA.value,10);var b=parseInt(numB.value,10);if(isNaN(a)){setStatus('请输入有效的整数 A','error');return}var op=opSelect.value;var result,desc;var aBin=toBin32(a);if(op==='NOT'){result=~a;desc='按位取反 ~a';var html='<div class="result-row"><span class="label">运算:</span><span class="value">'+desc+'</span></div>';html+='<div class="result-row"><span class="label">十进制:</span><span class="value">'+result+'</span></div>';html+='<div class="result-row"><span class="label">十六进制:</span><span class="value">0x'+(result>>>0).toString(16).toUpperCase()+'</span></div>';html+='<div class="result-row"><span class="label">二进制:</span><span class="value" style="font-size:12px;letter-spacing:2px">'+fmtBin(toBin32(result))+'</span></div>';html+='<table class="bit-table"><tr><td>A</td>';for(var i=0;i<32;i++)html+='<td style="'+(aBin[i]==='1'?'font-weight:700':'color:#aaa')+'">'+aBin[i]+'</td>';html+='</tr><tr><td>~A</td>';var rBin=toBin32(result);for(var j=0;j<32;j++)html+='<td style="'+(rBin[j]==='1'?'font-weight:700':'color:#aaa')+'">'+rBin[j]+'</td>';html+='</tr></table>';outputText.innerHTML=html;setStatus('计算完成');return}if(isNaN(b)){setStatus('请输入有效的整数 B','error');return}var bBin=toBin32(b);if(op==='AND'){result=a&b;desc='a & b'}else if(op==='OR'){result=a|b;desc='a | b'}else if(op==='XOR'){result=a^b;desc='a ^ b'}else if(op==='LSHIFT'){result=a<<b;desc='a << b (左移)'}else if(op==='RSHIFT'){result=a>>b;desc='a >> b (算术右移)'}var rBin=toBin32(result);var html='<div class="result-row"><span class="label">运算:</span><span class="value">'+desc+'</span></div>';html+='<div class="result-row"><span class="label">十进制:</span><span class="value">'+result+'</span></div>';html+='<div class="result-row"><span class="label">十六进制:</span><span class="value">0x'+(result>>>0).toString(16).toUpperCase()+'</span></div>';html+='<table class="bit-table"><tr><td>A</td>';for(var k=0;k<32;k++)html+='<td style="'+(aBin[k]==='1'?'font-weight:700':'color:#aaa')+'">'+aBin[k]+'</td>';html+='</tr>';html+='<tr><td>B</td>';for(var l=0;l<32;l++)html+='<td style="'+(bBin[l]==='1'?'font-weight:700':'color:#aaa')+'">'+bBin[l]+'</td>';html+='</tr>';html+='<tr><td>结果</td>';for(var m=0;m<32;m++)html+='<td style="'+(rBin[m]==='1'?'font-weight:700':'color:#aaa')+'">'+rBin[m]+'</td>';html+='</tr></table>';outputText.innerHTML=html;setStatus('计算完成')}calcBtn.addEventListener('click',calc);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}});numA.addEventListener('keydown',function(e){if(e.key==='Enter')calc()});numB.addEventListener('keydown',function(e){if(e.key==='Enter')calc()})})();</script>
</body></html>
