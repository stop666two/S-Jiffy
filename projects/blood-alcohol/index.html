<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>血液酒精估算 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>血液酒精估算</h1><p class="tool-desc">估算血液酒精浓度 BAC。</p><div class="card"><div class="row"><div><label>性别</label><select id="gender" class="input" style="width:auto"><option value="male">男</option><option value="female">女</option></select></div><div><label>体重 (kg)</label><input id="weight" class="input" type="number" value="70" min="1"></div><div><label>饮酒量 (ml)</label><input id="volume" class="input" type="number" value="500" min="1"></div></div>
<div class="row"><div><label>酒精度 (%vol)</label><input id="abv" class="input" type="number" value="5" min="0.1" step="0.1"></div><div><label>饮酒时长 (小时)</label><input id="hours" class="input" type="number" value="2" min="0.1" step="0.5"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">估算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="bacVal">—</div><div class="l">BAC 浓度</div></div><div class="res-item"><div class="v" id="statusVal">—</div><div class="l">法律状态</div></div><div class="res-item"><div class="v" id="alcoholG">—</div><div class="l">纯酒精 (g)</div></div><div class="res-item"><div class="v" id="burnTime">—</div><div class="l">完全代谢 (h)</div></div></div>
<p style="font-size:12px;color:var(--color-text-disabled);margin-top:8px">⚠ 仅供参考。中国法定酒驾: ≥20mg/100ml, 醉驾: ≥80mg/100ml。</p></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var gen=document.getElementById("gender"),w=document.getElementById("weight"),vol=document.getElementById("volume"),abv=document.getElementById("abv"),hr=document.getElementById("hours"),bv=document.getElementById("bacVal"),sv=document.getElementById("statusVal"),ag=document.getElementById("alcoholG"),bt=document.getElementById("burnTime"),o=document.getElementById("输出Text");
document.getElementById("calcBtn").addEventListener("click",function(){var weight=parseFloat(w.value),volMl=parseFloat(vol.value),abvPct=parseFloat(abv.value),hours=parseFloat(hr.value);if(!weight||!volMl){setStatus("请输入数据","error");return}
var alcoholG=volMl*abvPct/100*0.789;var r=gen.value==="male"?0.68:0.55;var bac=alcoholG/(weight*r*10)-0.015*hours;bac=Math.max(0,bac);
bv.textContent=bac.toFixed(4)+"% ("+(bac*100).toFixed(2)+"mg/100ml)";var status=bac>=0.08?"醉驾":bac>=0.02?"酒驾":bac>0?"未超标":"无酒精";sv.textContent=status;sv.style.color=bac>=0.08?"var(--color-error)":bac>=0.02?"#FF9800":"var(--color-success)";
ag.textContent=alcoholG.toFixed(1)+" g";var burn=alcoholG/(weight*0.015);bt.textContent=burn.toFixed(1)+" h";
o.textContent="BAC: "+(bac*100).toFixed(2)+" mg/100ml | "+status+" | 代谢需 "+(burn).toFixed(1)+" 小时";setStatus("估算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
