<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>BMR 计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:120px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>BMR 计算器</h1><p class="tool-desc">计算基础代谢率和每日热量总消耗 TDEE。</p><div class="card"><div class="row"><div><label>年龄</label><input id="age" class="input" type="number" value="30" min="1" max="120"></div></div>
<div class="row"><div><label>性别</label><select id="gender" class="input" style="width:auto"><option value="male">男</option><option value="female">女</option></select></div><div><label>体重 (kg)</label><input id="weight" class="input" type="number" value="70" min="10" max="300"></div><div><label>身高 (cm)</label><input id="height" class="input" type="number" value="170" min="50" max="250"></div></div>
<div class="row"><div><label>活动水平</label><select id="activity" class="input" style="width:auto"><option value="1.2">久坐 (几乎不运动)</option><option value="1.375">轻度 (1-3天/周)</option><option value="1.55" selected>中度 (3-5天/周)</option><option value="1.725">活跃 (6-7天/周)</option><option value="1.9">极活跃 (高强度)</option></select></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="bmrVal">—</div><div class="l">基础代谢 (kcal)</div></div><div class="res-item"><div class="v" id="tdeeVal">—</div><div class="l">每日消耗 TDEE</div></div><div class="res-item"><div class="v" id="loseVal">—</div><div class="l">减脂摄入</div></div><div class="res-item"><div class="v" id="gainVal">—</div><div class="l">增肌摄入</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var a=document.getElementById('age'),g=document.getElementById('gender'),w=document.getElementById('weight'),h=document.getElementById('height'),ac=document.getElementById('activity');var bv=document.getElementById('bmrVal'),tv=document.getElementById('tdeeVal'),lv=document.getElementById('loseVal'),gv=document.getElementById('gainVal'),o=document.getElementById('outputText');
function calc(){var age=parseInt(a.value),weight=parseFloat(w.value),height=parseFloat(h.value),act=parseFloat(ac.value);if(!age||!weight||!height){setStatus('请输入完整信息','error');return}
var bmr=g.value==='male'?10*weight+6.25*height-5*age+5:10*weight+6.25*height-5*age-161;var tdee=bmr*act;
bv.textContent=Math.round(bmr);tv.textContent=Math.round(tdee);lv.textContent=Math.round(tdee-300)+' - '+Math.round(tdee-500);gv.textContent=Math.round(tdee+300)+' - '+Math.round(tdee+500);
o.textContent='BMR: '+Math.round(bmr)+' kcal | TDEE: '+Math.round(tdee)+' kcal | 减脂: '+Math.round(tdee-500)+'~'+Math.round(tdee-300)+' kcal | 增肌: '+Math.round(tdee+300)+'~'+Math.round(tdee+500)+' kcal';setStatus('计算完成')}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('clearBtn').addEventListener('click',function(){bv.textContent='—';tv.textContent='—';lv.textContent='—';gv.textContent='—';o.textContent='';setStatus('')});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制')}});calc();})();</script></body></html>
