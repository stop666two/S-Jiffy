<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>体脂率估算 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>体脂率估算</h1><p class="tool-desc">根据身体数据估算体脂百分比。</p><div class="card"><div class="row"><div><label>性别</label><select id="gender" class="input" style="width:auto"><option value="male">男</option><option value="female">女</option></select></div><div><label>体重 (kg)</label><input id="weight" class="input" type="number" value="70" min="1"></div><div><label>身高 (cm)</label><input id="height" class="input" type="number" value="170" min="1"></div></div>
<div class="row"><div><label>腰围 (cm)</label><input id="waist" class="input" type="number" value="80" min="1"></div><div><label>颈围 (cm)</label><input id="neck" class="input" type="number" value="38" min="1"></div><div><label>臀围 (cm,女)</label><input id="hip" class="input" type="number" value="95" min="1"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">估算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="bfVal">—</div><div class="l">体脂率</div></div><div class="res-item"><div class="v" id="bfCat">—</div><div class="l">分类</div></div><div class="res-item"><div class="v" id="fatMass">—</div><div class="l">脂肪量 (kg)</div></div><div class="res-item"><div class="v" id="leanMass">—</div><div class="l">去脂体重 (kg)</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var gen=document.getElementById("gender"),w=document.getElementById("weight"),h=document.getElementById("height"),wa=document.getElementById("waist"),ne=document.getElementById("neck"),hi=document.getElementById("hip"),bf=document.getElementById("bfVal"),bc=document.getElementById("bfCat"),fm=document.getElementById("fatMass"),lm=document.getElementById("leanMass"),o=document.getElementById("outputText");
document.getElementById("calcBtn").addEventListener("click",function(){var weight=parseFloat(w.value),height=parseFloat(h.value),waist=parseFloat(wa.value),neck=parseFloat(ne.value),hip=parseFloat(hi.value);if(!weight||!height||!waist||!neck){setStatus("请输入数据","error");return}
var bfp;if(gen.value==="male"){bfp=86.01*Math.log10(waist-neck)-70.041*Math.log10(height)+36.76}else{bfp=163.205*Math.log10(waist+hip-neck)-97.684*Math.log10(height)-78.387}
bfp=Math.max(4,Math.min(bfp,50));bf.textContent=bfp.toFixed(1)+"%";var cat=bfp<6?"Essential fat":bfp<14?"Athlete":bfp<18?"Fitness":bfp<25?"Average":"Obese";bc.textContent=cat;
var fat=weight*bfp/100;fm.textContent=fat.toFixed(1)+" kg";lm.textContent=(weight-fat).toFixed(1)+" kg";o.textContent="体脂率: "+bfp.toFixed(1)+"% | 脂肪: "+fat.toFixed(1)+" kg | 去脂: "+(weight-fat).toFixed(1)+" kg";setStatus("估算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
