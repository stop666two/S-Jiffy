<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>布尔表达式简化 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.expr-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.expr-row .input{width:320px;font-family:var(--font-mono)}.truth-table{width:100%;border-collapse:collapse;font-size:13px;font-family:var(--font-mono);margin-top:var(--space-2)}.truth-table th{padding:6px 8px;border:1px solid var(--color-border);background:var(--color-bg-soft);text-align:center;font-weight:600}.truth-table td{padding:4px 8px;border:1px solid var(--color-border);text-align:center}.truth-table .true-row{background:#e8f5e9}.truth-table .false-row{background:#fff3e0}.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:var(--space-2);font-size:13px;padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.legend code{background:#eee;padding:1px 6px;border-radius:3px;font-size:12px}.simplified{font-size:var(--font-size-lg);font-weight:600;text-align:center;padding:var(--space-2);color:var(--color-success);background:var(--color-bg-soft);border-radius:var(--radius-md);margin-top:var(--space-2)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>布尔表达式简化</h1><p class="tool-desc">简化布尔逻辑表达式并生成真值表</p>
<div class="card"><div class="legend"><span><code>&amp;</code> = AND</span><span><code>|</code> = OR</span><span><code>!</code> = NOT</span><span><code>^</code> = XOR</span><span>例如: <code>A&amp;B|C</code> 或 <code>!(A&amp;B)</code></span></div>
<div class="expr-row"><input id="exprInput" class="input js-focus-input" placeholder="输入布尔表达式 (如 A&B|C)" value="A&B|C"><button id="evalBtn" class="btn btn-primary">计算</button></div>
<div id="varsArea"></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var exprInput=document.getElementById('exprInput'),evalBtn=document.getElementById('evalBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn'),varsArea=document.getElementById('varsArea');function extractVars(expr){var vars=[];for(var i=0;i<expr.length;i++){var ch=expr[i];if(ch>='A'&&ch<='Z'&&vars.indexOf(ch)===-1)vars.push(ch)}return vars.sort()}function tokenize(expr){var tokens=[];for(var i=0;i<expr.length;i++){var ch=expr[i];if(ch==='&'||ch==='|'||ch==='!'||ch==='^'||ch==='('||ch===')'){tokens.push(ch)}else if(ch>='A'&&ch<='Z'){tokens.push(ch)}else if(ch!==' '){return null}}return tokens}function toPostfix(tokens){var output=[],stack=[];var prec={'!':3,'&':2,'^':2,'|':1};for(var i=0;i<tokens.length;i++){var t=tokens[i];if(t>='A'&&t<='Z'){output.push(t)}else if(t==='!'){stack.push(t)}else if(t==='('){stack.push(t)}else if(t===')'){while(stack.length&&stack[stack.length-1]!=='(')output.push(stack.pop());stack.pop()}else{while(stack.length&&stack[stack.length-1]!=='('&&prec[t]<=prec[stack[stack.length-1]])output.push(stack.pop());stack.push(t)}}while(stack.length)output.push(stack.pop());return output}function evalPostfix(postfix,vals){var stack=[];for(var i=0;i<postfix.length;i++){var t=postfix[i];if(t>='A'&&t<='Z'){stack.push(vals[t])}else if(t==='!'){stack.push(stack.pop()?0:1)}else if(t==='&'){var b=stack.pop(),a=stack.pop();stack.push(a&&b?1:0)}else if(t==='^'){var b=stack.pop(),a=stack.pop();stack.push(a!==b?1:0)}else if(t==='|'){var b=stack.pop(),a=stack.pop();stack.push(a||b?1:0)}}return stack[0]}function evaluate(){var raw=exprInput.value.trim().toUpperCase();if(!raw){setStatus('请输入布尔表达式','error');return}var tokens=tokenize(raw);if(!tokens||!tokens.length){outputText.innerHTML='<div style="color:var(--color-error);text-align:center">无效的表达式。支持的运算符: &amp; (AND), | (OR), ! (NOT), ^ (XOR), ( )</div>';return}var vars=extractVars(raw);if(!vars.length){setStatus('未检测到变量 (A-Z)','error');return}var postfix=toPostfix(tokens);var n=vars.length;var rows=[];for(var i=0;i<(1<<n);i++){var vals={};for(var j=0;j<n;j++){vals[vars[j]]=(i>>(n-1-j))&1}var result=evalPostfix(postfix,vals);rows.push({vals:vals,result:result})}var trueCount=0;for(var k=0;k<rows.length;k++){if(rows[k].result)trueCount++}var html='<div style="padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);margin-bottom:var(--space-2)">';html+='<strong>变量:</strong> '+vars.join(', ')+' | <strong>行数:</strong> '+rows.length+' | <strong>结果为真:</strong> '+trueCount+'/'+rows.length;html+='</div>';html+='<table class="truth-table"><thead><tr>';for(var l=0;l<vars.length;l++)html+='<th>'+vars[l]+'</th>';html+='<th style="background:var(--color-text-primary);color:#fff">结果</th></tr></thead><tbody>';for(var m=0;m<rows.length;m++){var cls=rows[m].result?'true-row':'false-row';html+='<tr class="'+cls+'">';for(var nv=0;nv<vars.length;nv++){html+='<td>'+rows[m].vals[vars[nv]]+'</td>'}html+='<td style="font-weight:700">'+rows[m].result+'</td></tr>'}html+='</tbody></table>';if(trueCount===rows.length){html+='<div class="simplified">结果: 永真 (Tautology)</div>'}else if(trueCount===0){html+='<div class="simplified">结果: 永假 (Contradiction)</div>'}else if(trueCount===1){var onlyRow;for(var p=0;p<rows.length;p++){if(rows[p].result){onlyRow=rows[p];break}}var terms=[];for(var q=0;q<vars.length;q++){terms.push((onlyRow.vals[vars[q]]?'':'!')+vars[q])}html+='<div class="simplified">简化: '+terms.join(' & ')+'</div>'}else if(trueCount===rows.length-1&&vars.length<=3){var falseRow;for(var r=0;r<rows.length;r++){if(!rows[r].result){falseRow=rows[r];break}}var terms=[];for(var s=0;s<vars.length;s++){terms.push((falseRow.vals[vars[s]]?'!':'')+vars[s])}html+='<div class="simplified">简化: !('+terms.join(' | ')+')</div>'}outputText.innerHTML=html;setStatus('计算完成')}evalBtn.addEventListener('click',evaluate);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}});exprInput.addEventListener('keydown',function(e){if(e.key==='Enter')evaluate()});evaluate()})();</script>
</body></html>
