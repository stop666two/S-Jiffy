<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Border 生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.demo-box{width:240px;height:160px;display:flex;align-items:center;justify-content:center;margin:var(--space-3) auto;background:var(--color-bg-soft);transition:border .2s;font-size:var(--font-size-sm);color:var(--color-text-secondary)}.row{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}.row label{width:80px;font-size:var(--font-size-sm);color:var(--color-text-secondary)}.row select{width:120px}.row input[type=color]{width:40px;height:40px;padding:0;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer}.row input[type=number]{width:80px}.side-tog label{font-size:var(--font-size-sm);display:flex;align-items:center;gap:4px;cursor:pointer;margin-right:12px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>Border 生成器</h1><p class="tool-desc">可视化 CSS border 属性构建器，支持样式/宽度/颜色/圆角。</p>
<div class="card">
<div class="demo-box" id="demoBox">边框预览</div>
<div class="row"><label>边框样式</label><select id="styleSelect" class="input" style="width:120px"><option value="solid">solid</option><option value="dashed">dashed</option><option value="dotted">dotted</option><option value="double">double</option><option value="groove">groove</option><option value="ridge">ridge</option><option value="inset">inset</option><option value="outset">outset</option><option value="none">none</option></select></div>
<div class="row"><label>宽度</label><input id="widthInput" class="input" type="number" value="2" min="0" max="20" style="width:80px"><span style="font-size:var(--font-size-sm)">px</span></div>
<div class="row"><label>颜色</label><input id="colorInput" type="color" value="#111111"></div>
<div class="row"><label>圆角</label><input id="radiusInput" class="input" type="number" value="0" min="0" max="50" style="width:80px"><span style="font-size:var(--font-size-sm)">px</span></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var demo=document.getElementById('demoBox'),out=document.getElementById('输出Text'),styleS=document.getElementById('styleSelect'),widthI=document.getElementById('widthInput'),colorI=document.getElementById('colorInput'),radiusI=document.getElementById('radiusInput');function render(){var s=styleS.value,w=widthI.value||0,c=colorI.value,r=radiusI.value||0;if(s==='none'){demo.style.border='none'}else{demo.style.border=w+'px '+s+' '+c}demo.style.borderRadius=r+'px';var css='border: '+w+'px '+s+' '+c+';';if(r>0)css+='\nborder-radius: '+r+'px;';out.textContent=css}styleS.addEventListener('change',render);widthI.addEventListener('input',render);colorI.addEventListener('input',render);radiusI.addEventListener('input',render);render();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
