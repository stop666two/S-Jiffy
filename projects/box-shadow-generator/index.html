<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Box Shadow 生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.demo-box{width:200px;height:200px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);margin:var(--space-3) auto;transition:box-shadow .2s}.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}.slider-row label{width:80px;font-size:var(--font-size-sm);color:var(--color-text-secondary)}.slider-row input[type=range]{flex:1;min-width:120px}.slider-row .val{width:50px;font-size:var(--font-size-sm);text-align:right;font-family:var(--font-mono)}.color-wrap{display:flex;align-items:center;gap:8px;margin-bottom:var(--space-2)}.color-wrap label{font-size:var(--font-size-sm)}.color-wrap input[type=color]{width:40px;height:40px;padding:0;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer}.inset-wrap{display:flex;align-items:center;gap:8px;margin-bottom:var(--space-2)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Box Shadow 生成器</h1><p class="tool-desc">可视化调整 box-shadow 参数，实时预览并复制 CSS。</p>
<div class="card">
<div class="demo-box" id="demoBox"></div>
<div class="slider-row"><label>X 偏移</label><input id="xSlider" type="range" min="-50" max="50" value="4"><span class="val" id="xVal">4px</span></div>
<div class="slider-row"><label>Y 偏移</label><input id="ySlider" type="range" min="-50" max="50" value="4"><span class="val" id="yVal">4px</span></div>
<div class="slider-row"><label>模糊</label><input id="blurSlider" type="range" min="0" max="100" value="10"><span class="val" id="blurVal">10px</span></div>
<div class="slider-row"><label>扩散</label><input id="spreadSlider" type="range" min="-20" max="50" value="0"><span class="val" id="spreadVal">0px</span></div>
<div class="color-wrap"><label>颜色</label><input id="shadowColor" type="color" value="#000000"><input id="opacityInput" class="input" type="number" min="0" max="100" value="40" style="width:70px"><span style="font-size:var(--font-size-sm)">%</span></div>
<div class="inset-wrap"><label><input id="insetCheck" type="checkbox"> inset</label></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var demo=document.getElementById('demoBox'),out=document.getElementById('输出Text'),xS=document.getElementById('xSlider'),yS=document.getElementById('ySlider'),bS=document.getElementById('blurSlider'),sS=document.getElementById('spreadSlider'),cInp=document.getElementById('shadowColor'),oInp=document.getElementById('opacityInput'),inset=document.getElementById('insetCheck');function hexToRgba(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgba('+r+','+g+','+b+','+(a/100)+')'}function render(){var x=parseInt(xS.value),y=parseInt(yS.value),b=parseInt(bS.value),s=parseInt(sS.value),o=parseFloat(oInp.value)||0,c=hexToRgba(cInp.value,o),ins=inset.checked?' inset':'';var css='box-shadow: '+x+'px '+y+'px '+b+'px '+s+'px '+c+ins+';';demo.style.boxShadow=x+'px '+y+'px '+b+'px '+s+'px '+c+(inset.checked?' inset':'');out.textContent=css}function updLabel(){document.getElementById('xVal').textContent=xS.value+'px';document.getElementById('yVal').textContent=yS.value+'px';document.getElementById('blurVal').textContent=bS.value+'px';document.getElementById('spreadVal').textContent=sS.value+'px';render()}xS.addEventListener('input',updLabel);yS.addEventListener('input',updLabel);bS.addEventListener('input',updLabel);sS.addEventListener('input',updLabel);cInp.addEventListener('input',render);oInp.addEventListener('input',render);inset.addEventListener('change',render);updLabel();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
