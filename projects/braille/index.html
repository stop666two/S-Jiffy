<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>盲文转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.braille-输出{font-size:var(--font-size-xxl);letter-spacing:2px;line-height:1.6}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>盲文转换</h1><p class="tool-desc">文本与 Unicode 盲文（Braille）互转，支持英文字母和数字。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入文本或盲文字符..." style="min-height:100px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin:var(--space-2) 0;flex-wrap:wrap;align-items:center;">
<button id="toBrailleBtn" class="btn btn-primary">→ 盲文</button>
<button id="fromBrailleBtn" class="btn btn-secondary">盲文 → 文本</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="输出-box"><span id="输出Text" class="braille-输出" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('输出Text');
var toBrailleBtn=document.getElementById('toBrailleBtn');
var fromBrailleBtn=document.getElementById('fromBrailleBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
var brailleBase=0x2800;
var brailleMap={};
var revBrailleMap={};
var alpha=' a1b\'k2l@cif/msp\"e3h9o6r^djg>ntq,*5<-u8v.%[$+x!&4:;z0)7?]w#y';
var alphaNum=' A1B\'K2L@CIF/MSP\"E3H9O6R^DJG>NTQ,*5<-U8V.%[$+X!&4:;Z0)7?]W#Y';
for(var i=0;i<alpha.length;i++){
var bits=0;
if(i<64){
var bin=i.toString(2);
while(bin.length<6)bin='0'+bin;
for(var b=0;b<6;b++){if(bin[b]==='1')bits|=1<<b;}
}
var brailleChar=String.fromCharCode(brailleBase+bits);
brailleMap[alpha[i]]=brailleChar;
revBrailleMap[brailleChar]=alpha[i];
}
function toBraille(text){
var r='';
for(var i=0;i<text.length;i++){
var ch=text[i].to小写();
if(ch===' '){r+=' ';continue;}
r+=brailleMap[ch]!==undefined?brailleMap[ch]:ch;
}
return r;
}
function fromBraille(text){
var r='';
for(var i=0;i<text.length;i++){
var ch=text[i];
var code=ch.charCodeAt(0);
if(code>=brailleBase&&code<brailleBase+64){
r+=revBrailleMap[ch]!==undefined?revBrailleMap[ch]:'?';
}else{r+=ch;}
}
return r;
}
toBrailleBtn.addEventListener('click',function(){var t=inputEl.value;if(!t){setStatus('请输入文本','error');return;}输出El.textContent=toBraille(t);setStatus('');});
fromBrailleBtn.addEventListener('click',function(){var t=inputEl.value;if(!t){setStatus('请输入盲文','error');return;}输出El.textContent=fromBraille(t);setStatus('');});
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
