<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>分支名生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.form-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.form-grid .input{width:200px}.branch-list{list-style:none;padding:0;margin:0}.branch-item{padding:var(--space-2);margin-bottom:8px;background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:13px;cursor:pointer;transition:all 0.1s;display:flex;justify-content:space-between;align-items:center}.branch-item:hover{border-color:var(--color-text-primary)}.branch-item .tag{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--color-text-primary);color:#fff}.type-label{margin-right:8px;font-weight:600}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>分支名生成</h1><p class="tool-desc">根据需求生成 Git 分支命名建议</p>
<div class="card"><div class="form-grid"><input id="issueInput" class="input js-focus-input" placeholder="Issue 编号 (如 #123 或 123)"><input id="descInput" class="input" placeholder="简短描述 (如 fix-login-bug)" style="width:280px"><button id="genBtn" class="btn btn-primary">生成</button></div></div>
<div class="output-box"><div id="branchList"><div style="color:var(--color-text-secondary);font-size:13px">输入 Issue 编号和描述后点击生成</div></div><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var issueInput=document.getElementById('issueInput'),descInput=document.getElementById('descInput'),genBtn=document.getElementById('genBtn'),branchList=document.getElementById('branchList'),copyBtn=document.getElementById('copyBtn'),outputText=document.createElement('span');outputText.id='outputText';outputText.style.display='none';branchList.parentElement.appendChild(outputText);function slugify(s){return s.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'')||'untitled'}function gen(){var issue=issueInput.value.trim();var desc=descInput.value.trim();if(!desc){setStatus('请输入描述','error');return}var slug=slugify(desc);var num=issue.replace(/^#/,'');var prefix=num?'-'+num:'';var types=['feat','fix','chore','refactor','docs','test'];var names=[];for(var i=0;i<types.length;i++){var suffix=slug;if(num)suffix=num+'/'+slug;names.push({type:types[i],name:types[i]+'/'+suffix})}var html='<ul class="branch-list">';for(var j=0;j<names.length;j++){html+='<li class="branch-item" data-text="'+htmlEscape(names[j].name)+'">';html+='<span><span class="type-label" style="color:'+({feat:'#346538',fix:'#9F2F2D',chore:'#787774',refactor:'#2563eb',docs:'#787774',test:'#9333ea'})[names[j].type]+'">'+names[j].type+'</span> <span>'+htmlEscape(names[j].name)+'</span></span>';html+='<span class="tag">点击复制</span></li>'}html+='</ul>';branchList.innerHTML=html;outputText.textContent=names[0].name;var items=branchList.querySelectorAll('.branch-item');for(var k=0;k<items.length;k++){(function(item){item.addEventListener('click',function(){var text=item.getAttribute('data-text');copyToClipboard(text,copyBtn);setStatus('已复制 '+text)})})(items[k])}setStatus('已生成 '+names.length+' 个分支名')}genBtn.addEventListener('click',gen);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}});descInput.addEventListener('keydown',function(e){if(e.key==='Enter')gen()});issueInput.addEventListener('keydown',function(e){if(e.key==='Enter')gen()})})();</script>
</body></html>
