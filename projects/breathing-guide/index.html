<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>呼吸引导 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.game-area{text-align:center;padding:24px 0}.game-btn{width:120px;height:120px;border-radius:50%;border:none;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s}.game-btn.ready{background:#4CAF50;color:#fff}.game-btn.waiting{background:#F44336;color:#fff}.game-btn:active{transform:scale(0.95)}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>呼吸引导</h1><p class="tool-desc">4-7-8 呼吸法引导动画。</p><div class="card"><div class="row" style="justify-content:center"><button id="startBtn" class="btn btn-primary">开始呼吸</button><button id="stopBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px" disabled>停止</button></div>
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 0">
<div id="breathCircle" style="width:150px;height:150px;border-radius:50%;background:var(--color-text-primary);display:flex;align-items:center;justify-content:center;transition:all 4s ease;margin-bottom:16px"><span id="breathText" style="color:#fff;font-size:16px;font-weight:600">准备</span></div>
<div id="phaseText" style="font-size:18px;color:var(--color-text-secondary)">点击「开始呼吸」</div>
<div class="res-grid" style="width:100%"><div class="res-item"><div class="v" id="countdown">0</div><div class="l">已完成呼吸</div></div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var bc=document.getElementById("breathCircle"),bt=document.getElementById("breathText"),pt=document.getElementById("phaseText"),cn=document.getElementById("countdown"),sb=document.getElementById("startBtn"),sp=document.getElementById("stopBtn"),o=document.getElementById("输出Text");var timer=null,count=0,phase=0,phases=["吸气","屏息","呼气","休息"],times=[4000,7000,8000,0],colors=["#4CAF50","#2196F3","#FF9800","#9E9E9E"];
function breathCycle(){if(phase>=phases.length){phase=0;count++;cn.textContent=count}
bt.textContent=phases[phase];pt.textContent=phases[phase]+"... ("+Math.round(times[phase]/1000)+"s)";bc.style.background=colors[phase];var t=times[phase];
if(phase===0){bc.style.transform="scale(1.4)";bc.style.borderRadius="50%"}else if(phase===1){bc.style.transform="scale(1.4)";bc.style.borderRadius="50%"}else if(phase===2){bc.style.transform="scale(1)";bc.style.borderRadius="50%"}else{bc.style.transform="scale(1)";bc.style.borderRadius="50%"}
phase++;if(phase<phases.length){timer=setTimeout(breathCycle,t)}else{timer=setTimeout(breathCycle,2000)}}
document.getElementById("startBtn").addEventListener("click",function(){sb.disabled=true;sp.disabled=false;phase=0;count=0;cn.textContent="0";if(timer)clearTimeout(timer);breathCycle();o.textContent="4-7-8 呼吸法进行中";setStatus("开始呼吸")});
document.getElementById("stopBtn").addEventListener("click",function(){clearTimeout(timer);sb.disabled=false;sp.disabled=true;bt.textContent="停止";pt.textContent="呼吸已暂停";bc.style.transform="scale(1)";bc.style.background="var(--color-text-primary)";o.textContent="呼吸 "+count+" 次";setStatus("已暂停")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
