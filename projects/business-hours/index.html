<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>工时计算 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.bh-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:var(--space-2);margin-top:var(--space-3)}.bh-card{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:var(--space-3);text-align:center}.bh-card .num{font-size:var(--font-size-xxl);font-weight:700;color:var(--color-primary);font-family:var(--font-mono)}.bh-card .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:4px}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>营业时间计算</h1><p class="tool-desc">计算净工作时间（扣除休息时间的实际工时）。</p>
<div class="card">
<div style="display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:center;">
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">上班时间</label><input id="startTime" type="time" class="input" value="09:00"></div>
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">下班时间</label><input id="endTime" type="time" class="input" value="18:00"></div>
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">休息(分钟)</label><input id="breakMin" type="number" class="input" value="60" min="0" style="width:80px;"></div>
<button id="calcBtn" class="btn btn-primary" style="margin-top:14px;">计算</button>
</div>
</div>
<div class="bh-grid">
<div class="bh-card"><div class="num" id="grossHours">-</div><div class="lbl">毛工时</div></div>
<div class="bh-card"><div class="num" id="breakHours">-</div><div class="lbl">休息时间</div></div>
<div class="bh-card"><div class="num" id="netHours">-</div><div class="lbl">净工时</div></div>
<div class="bh-card"><div class="num" id="netMin">-</div><div class="lbl">净分钟</div></div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var startTime=document.getElementById('startTime');
var endTime=document.getElementById('endTime');
var breakMin=document.getElementById('breakMin');
var calcBtn=document.getElementById('calcBtn');
var copyBtn=document.getElementById('copyBtn');
var grossHoursEl=document.getElementById('grossHours');
var breakHoursEl=document.getElementById('breakHours');
var netHoursEl=document.getElementById('netHours');
var netMinEl=document.getElementById('netMin');
var 输出El=document.getElementById('输出Text');
function calc(){
var s=startTime.value;
var e=endTime.value;
var br=parseFloat(breakMin.value)||0;
if(!s||!e){setStatus('请选择时间','error');return;}
var p=s.split(':').map(Number);
var q=e.split(':').map(Number);
var sMin=p[0]*60+p[1];
var eMin=q[0]*60+q[1];
var gross=eMin-sMin;
if(gross<0)gross+=1440;
var net=gross-br;
if(net<0){setStatus('休息时间超过工时','error');return;}
var gh=gross/60;
var nh=net/60;
grossHoursEl.textContent=gh.toFixed(2);
breakHoursEl.textContent=(br/60).toFixed(2);
netHoursEl.textContent=nh.toFixed(2);
netMinEl.textContent=net;
输出El.textContent='毛工时 '+gh.toFixed(2)+'h，休息 '+(br/60).toFixed(2)+'h，净工时 '+nh.toFixed(2)+'h';
setStatus('');
}
calcBtn.addEventListener('click',calc);
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
calc();
})();
</script></body></html>
