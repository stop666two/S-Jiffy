<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字节格式化 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .bf-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .bf-row .field { flex:1; min-width:160px; }
    .bf-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
    .bf-results { display:grid; gap:var(--space-2); }
    .bf-item { display:flex; justify-content:space-between; padding:var(--space-2); border:1px solid var(--color-border); border-radius:var(--radius-md); }
    .bf-item .key { color:var(--color-text-secondary); font-size:var(--font-size-sm); }
    .bf-item .val { font-weight:500; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>字节格式化</h1>
    <p class="tool-desc">将字节数转换为人类可读格式（1024 B → 1 KB）。支持 SI (1000) 和 IEC (1024) 标准。</p>
    <div class="card">
      <div class="bf-row">
        <div class="field">
          <label for="bytesInput">字节数</label>
          <input id="bytesInput" class="input js-focus-input" type="number" value="1048576" min="0">
        </div>
        <div style="display:flex;align-items:flex-end;gap:12px;">
          <button id="formatIecBtn" class="btn btn-primary">IEC (1024)</button>
          <button id="formatSiBtn" class="btn btn-secondary">SI (1000)</button>
        </div>
      </div>
      <div class="bf-results">
        <div class="bf-item"><span class="key">IEC 格式 (1024)</span><span class="val" id="iecResult">-</span></div>
        <div class="bf-item"><span class="key">SI 格式 (1000)</span><span class="val" id="siResult">-</span></div>
        <div class="bf-item"><span class="key">二进制 (bits)</span><span class="val" id="bitResult">-</span></div>
      </div>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var bytesInput = document.getElementById('bytesInput');
      var formatIecBtn = document.getElementById('formatIecBtn');
      var formatSiBtn = document.getElementById('formatSiBtn');
      var iecResult = document.getElementById('iecResult');
      var siResult = document.getElementById('siResult');
      var bitResult = document.getElementById('bitResult');
      var outputEl = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');

      function formatBytes(bytes, useSi) {
        var units = useSi
          ? ['B', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB']
          : ['B', 'KiB', 'MiB', 'GiB', 'TiB', 'PiB', 'EiB'];
        var base = useSi ? 1000 : 1024;
        if (bytes === 0) return '0 B';
        var i = Math.floor(Math.log(bytes) / Math.log(base));
        i = Math.min(i, units.length - 1);
        var val = bytes / Math.pow(base, i);
        return val.toFixed(i === 0 ? 0 : 2) + ' ' + units[i];
      }

      function formatAll() {
        var bytes = parseInt(bytesInput.value, 10);
        if (isNaN(bytes) || bytes < 0) { setStatus('请输入非负整数', 'error'); return; }
        iecResult.textContent = formatBytes(bytes, false);
        siResult.textContent = formatBytes(bytes, true);
        bitResult.textContent = (bytes * 8).toLocaleString() + ' bits';
        outputEl.textContent = bytes + ' B = ' + iecResult.textContent + ' = ' + siResult.textContent;
        setStatus('格式化完成');
      }

      formatIecBtn.addEventListener('click', formatAll);
      formatSiBtn.addEventListener('click', formatAll);
      bytesInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') formatAll(); });

      copyBtn.addEventListener('click', function() {
        var text = outputEl.textContent;
        if (text) {
          copyToClipboard(text, copyBtn);
          setStatus('已复制到剪贴板');
        }
      });

      formatAll();
    })();
  </script>
</body>
</html>
