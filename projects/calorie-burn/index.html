<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>运动消耗计算 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>运动消耗计算</h1><p class="tool-desc">计算各类运动消耗的卡路里。</p><div class="card"><div class="row"><div><label>运动类型</label><select id="activity" class="input" style="width:auto"><option value="6">跑步 (10km/h)</option><option value="8">跑步 (12km/h)</option><option value="4">步行 (5km/h)</option><option value="3">瑜伽</option><option value="5">骑行 (15km/h)</option><option value="5.5">游泳</option><option value="4.5">跳舞</option><option value="7">跳绳</option><option value="4">健身(中等)</option><option value="6">健身(高强度)</option></select></div><div><label>体重 (kg)</label><input id="weight" class="input" type="number" value="70" min="1"></div><div><label>时长 (分钟)</label><input id="duration" class="input" type="number" value="30" min="1"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="calVal">—</div><div class="l">消耗卡路里</div></div><div class="res-item"><div class="v" id="metVal">—</div><div class="l">MET 值</div></div><div class="res-item"><div class="v" id="fatBurn">—</div><div class="l">≈ 脂肪 (g)</div></div><div class="res-item"><div class="v" id="perMin">—</div><div class="l">每分钟消耗</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var act=document.getElementById("activity"),w=document.getElementById("weight"),dur=document.getElementById("duration"),cv=document.getElementById("calVal"),mv=document.getElementById("metVal"),fv=document.getElementById("fatBurn"),pm=document.getElementById("perMin"),o=document.getElementById("outputText");
document.getElementById("calcBtn").addEventListener("click",function(){var met=parseFloat(act.value),weight=parseFloat(w.value),min=parseFloat(dur.value);if(!weight||!min){setStatus("请输入数据","error");return}
var cal=met*weight*min/60;var perMin=cal/min;var fat=cal/7.7;
cv.textContent=Math.round(cal)+" kcal";mv.textContent=met;fv.textContent=fat.toFixed(1)+" g";pm.textContent=perMin.toFixed(1)+" kcal/min";
o.textContent="运动: "+act.options[act.selectedIndex].text+" | 消耗: "+Math.round(cal)+" kcal | 时长: "+min+" 分钟";setStatus("计算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
