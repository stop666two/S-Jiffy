<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Changelog 生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.form-row{display:flex;gap:12px;margin-bottom:var(--space-2);flex-wrap:wrap}.form-row .input{width:200px}.chk-group{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:var(--space-2)}.chk-group label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}.chk-group input[type=checkbox]{width:18px;height:18px;accent-color:var(--color-text-primary)}.entries-area{margin-bottom:var(--space-2)}.entry-row{display:flex;gap:8px;margin-bottom:6px;align-items:center}.entry-row select{height:36px;padding:0 8px;border:1px solid #ddd;border-radius:var(--radius-sm);font-size:13px}.entry-row input{flex:1;height:36px;padding:0 8px;border:1px solid #ddd;border-radius:var(--radius-sm);font-size:13px}.entry-row .del-btn{background:none;border:none;color:var(--color-error);cursor:pointer;font-size:18px;padding:0 4px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Changelog 生成</h1><p class="tool-desc">根据版本信息和变更条目生成 Markdown Changelog</p>
<div class="card"><div class="form-row"><input id="verInput" class="input js-focus-input" placeholder="1.0.0" value="1.0.0"><input id="dateInput" class="input" placeholder="2024-01-01" value=""><button id="todayBtn" class="btn btn-secondary">今天</button></div>
<div class="chk-group"><label><input type="checkbox" id="featChk" checked> feat ✨</label><label><input type="checkbox" id="fixChk" checked> fix 🐛</label><label><input type="checkbox" id="breakingChk"> breaking 💥</label><label><input type="checkbox" id="choreChk"> chore 🔧</label><label><input type="checkbox" id="docsChk"> docs 📝</label><label><input type="checkbox" id="perfChk"> perf ⚡</label></div>
<div class="entries-area" id="entriesArea"><div class="entry-row"><select><option value="feat">feat</option><option value="fix">fix</option><option value="breaking">breaking</option><option value="chore">chore</option><option value="docs">docs</option><option value="perf">perf</option></select><input class="entry-input" placeholder="变更描述"><button class="del-btn" title="删除">×</button></div></div>
<button id="addEntryBtn" class="btn btn-secondary" style="margin-right:8px">+ 添加条目</button>
<button id="genBtn" class="btn btn-primary">生成 Changelog</button></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var verInput=document.getElementById('verInput'),dateInput=document.getElementById('dateInput'),genBtn=document.getElementById('genBtn'),addEntryBtn=document.getElementById('addEntryBtn'),entriesArea=document.getElementById('entriesArea'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function addEntry(type,text){var row=document.createElement('div');row.className='entry-row';row.innerHTML='<select><option value="feat">feat</option><option value="fix">fix</option><option value="breaking">breaking</option><option value="chore">chore</option><option value="docs">docs</option><option value="perf">perf</option></select><input class="entry-input" placeholder="变更描述"><button class="del-btn" title="删除">×</button>';if(type)row.querySelector('select').value=type;if(text)row.querySelector('.entry-input').value=text;row.querySelector('.del-btn').addEventListener('click',function(){row.remove()});entriesArea.appendChild(row)}document.getElementById('todayBtn').addEventListener('click',function(){var d=new Date();dateInput.value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')});addEntryBtn.addEventListener('click',function(){addEntry('feat','')});entriesArea.querySelector('.del-btn').addEventListener('click',function(){this.parentElement.remove()});var entrySelects=entriesArea.querySelectorAll('select'),entryInputs=entriesArea.querySelectorAll('.entry-input');genBtn.addEventListener('click',function(){var ver=verInput.value.trim()||'1.0.0',date=dateInput.value.trim()||new Date().toISOString().slice(0,10);var lines=[];var rows=entriesArea.querySelectorAll('.entry-row');for(var i=0;i<rows.length;i++){var sel=rows[i].querySelector('select'),inp=rows[i].querySelector('.entry-input');if(inp.value.trim())lines.push('- '+sel.value+': '+inp.value.trim())}var header='## ['+ver+'] - '+date;if(document.getElementById('breakingChk').checked){lines.unshift('### 💥 Breaking Changes','');for(var j=0;j<rows.length;j++){if(rows[j].querySelector('select').value==='breaking'){lines.push('- '+rows[j].querySelector('.entry-input').value.trim())}}lines.unshift('')}var sections=[];if(document.getElementById('featChk').checked){var feats=[];for(var k=0;k<rows.length;k++){if(rows[k].querySelector('select').value==='feat'&&rows[k].querySelector('.entry-input').value.trim())feats.push('- ✨ '+rows[k].querySelector('.entry-input').value.trim())}if(feats.length){sections.push('### ✨ 新功能');sections=sections.concat(feats)}}if(document.getElementById('fixChk').checked){var fixes=[];for(var l=0;l<rows.length;l++){if(rows[l].querySelector('select').value==='fix'&&rows[l].querySelector('.entry-input').value.trim())fixes.push('- 🐛 '+rows[l].querySelector('.entry-input').value.trim())}if(fixes.length){sections.push('### 🐛 Bug 修复');sections=sections.concat(fixes)}}if(document.getElementById('choreChk').checked){var chores=[];for(var m=0;m<rows.length;m++){if(rows[m].querySelector('select').value==='chore'&&rows[m].querySelector('.entry-input').value.trim())chores.push('- 🔧 '+rows[m].querySelector('.entry-input').value.trim())}if(chores.length){sections.push('### 🔧 杂务');sections=sections.concat(chores)}}if(document.getElementById('docsChk').checked){var docs=[];for(var n=0;n<rows.length;n++){if(rows[n].querySelector('select').value==='docs'&&rows[n].querySelector('.entry-input').value.trim())docs.push('- 📝 '+rows[n].querySelector('.entry-input').value.trim())}if(docs.length){sections.push('### 📝 文档');sections=sections.concat(docs)}}if(document.getElementById('perfChk').checked){var perf=[];for(var p=0;p<rows.length;p++){if(rows[p].querySelector('select').value==='perf'&&rows[p].querySelector('.entry-input').value.trim())perf.push('- ⚡ '+rows[p].querySelector('.entry-input').value.trim())}if(perf.length){sections.push('### ⚡ 性能');sections=sections.concat(perf)}}var output=header+'\n\n'+sections.join('\n');if(output===header+'\n\n'){setStatus('请至少添加一条变更条目','error');return}outputText.textContent=output;setStatus('已生成')});copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
