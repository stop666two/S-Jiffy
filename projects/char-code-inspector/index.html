<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>字符码点查询 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.char-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:var(--space-2)}.char-table th{text-align:left;padding:8px 10px;background:var(--color-bg-soft);border-bottom:2px solid var(--color-border);font-weight:600;white-space:nowrap}.char-table td{padding:6px 10px;border-bottom:1px solid var(--color-border);font-family:var(--font-mono);font-size:12px;word-break:break-all}.char-table tr:hover{background:var(--color-bg-soft)}.char-display{font-size:28px;text-align:center;padding:var(--space-3);background:var(--color-bg-soft);border-radius:var(--radius-md);margin-bottom:var(--space-2)}.summary-line{font-size:13px;color:var(--color-text-secondary);margin-bottom:var(--space-2)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>字符码点查询</h1><p class="tool-desc">查询字符的 Unicode 码点和各进制编码</p>
<div class="card"><textarea id="textInput" class="input textarea" placeholder="输入要查询的文本..." style="min-height:80px">Hello 你好 🌟</textarea><button id="inspectBtn" class="btn btn-primary" style="margin-top:var(--space-2)">查询</button></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var textInput=document.getElementById('textInput'),inspectBtn=document.getElementById('inspectBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function hex(v,digits){var s=v.toString(16).toUpperCase();while(s.length<digits)s='0'+s;return s}function inspect(){var text=textInput.value;if(!text){setStatus('请输入文本','error');return}var chars=Array.from(text);var html='<div class="summary-line">共 '+chars.length+' 个字符</div>';html+='<div class="char-display">"'+htmlEscape(text)+'"</div>';html+='<table class="char-table"><thead><tr><th>#</th><th>字符</th><th>十进制</th><th>十六进制</th><th>二进制</th><th>HTML 实体</th><th>UTF-16</th></tr></thead><tbody>';for(var i=0;i<chars.length;i++){var ch=chars[i];var cp=ch.codePointAt(0);var hexStr=hex(cp,4);var binStr=cp.toString(2);var decStr=cp.toString(10);var htmlEntity;if(cp>0xFFFF&&cp<=0x10FFFF){var h=cp-0x10000;var hi=0xD800+((h>>10)&0x3FF);var lo=0xDC00+(h&0x3FF);htmlEntity='&#x'+hex(cp,4)+'; (&#x'+hex(hi,4)+'&#x'+hex(lo,4)+'; surr.)';}else{htmlEntity='&#'+cp+';'}if(ch===' ')htmlEntity='&amp;nbsp;';if(ch==='&')htmlEntity='&amp;amp;';if(ch==='"')htmlEntity='&amp;quot;';if(ch==="'")htmlEntity='&amp;apos;';if(ch==='<')htmlEntity='&amp;lt;';if(ch==='>')htmlEntity='&amp;gt;';var display=ch==='\n'?'⏎':ch==='\r'?'␍':ch==='\t'?'⇥':ch;html+='<tr><td>'+(i+1)+'</td><td style="font-size:18px;text-align:center">'+htmlEscape(display)+'</td><td>'+decStr+'</td><td>U+'+hexStr+'</td><td style="font-size:11px">'+binStr+'</td><td style="font-size:11px">'+htmlEntity+'</td><td>'+('0000'+cp.toString(16).toUpperCase()).slice(-4)+'</td></tr>'}html+='</tbody></table>';outputText.innerHTML=html;setStatus('查询完成')}inspectBtn.addEventListener('click',inspect);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
