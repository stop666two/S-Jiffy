<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>字符映射表 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.block-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-2);max-height:200px;overflow-y:auto;padding:4px 0}.block-tab{padding:4px 10px;font-size:12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap}.block-tab.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary)}.block-tab:hover:not(.active){background:var(--color-bg-soft)}.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:4px;max-height:400px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:8px}.char-cell{text-align:center;padding:6px 2px;border-radius:var(--radius-sm);cursor:pointer;font-size:18px;transition:all .1s;font-family:var(--font-mono)}.char-cell:hover{background:var(--color-text-primary);color:#fff;transform:scale(1.1)}.char-cell .cp{font-size:9px;color:var(--color-text-disabled);margin-top:2px;font-family:var(--font-mono)}.char-cell:hover .cp{color:rgba(255,255,255,.6)}.info-bar{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin:var(--space-2) 0}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>字符映射表</h1><p class="tool-desc">Unicode 区块字符可视化浏览，点击复制字符。</p>
<div class="card">
<div class="block-tabs" id="blockTabs"></div>
<div class="info-bar" id="infoBar">请选择一个 Unicode 区块</div>
<div class="char-grid" id="charGrid"></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var blocks=[{name:'Basic Latin',start:0x0000,end:0x007F},{name:'Latin-1 Supplement',start:0x0080,end:0x00FF},{name:'Latin Extended-A',start:0x0100,end:0x017F},{name:'Spacing Modifier',start:0x02B0,end:0x02FF},{name:'Greek and Coptic',start:0x0370,end:0x03FF},{name:'Cyrillic',start:0x0400,end:0x04FF},{name:'Hebrew',start:0x0590,end:0x05FF},{name:'Arabic',start:0x0600,end:0x06FF},{name:'Devanagari',start:0x0900,end:0x097F},{name:'Bengali',start:0x0980,end:0x09FF},{name:'Thai',start:0x0E00,end:0x0E7F},{name:'Hiragana',start:0x3040,end:0x309F},{name:'Katakana',start:0x30A0,end:0x30FF},{name:'Hangul Jamo',start:0x1100,end:0x11FF},{name:'CJK Radicals',start:0x2E80,end:0x2EFF},{name:'CJK 符号',start:0x3000,end:0x303F},{name:'CJK Strokes',start:0x31C0,end:0x31EF},{name:'Box Drawing',start:0x2500,end:0x257F},{name:'Block Elements',start:0x2580,end:0x259F},{name:'Geometric Shapes',start:0x25A0,end:0x25FF},{name:'Misc 符号',start:0x2600,end:0x26FF},{name:'Dingbats',start:0x2700,end:0x27BF},{name:'Arrows',start:0x2190,end:0x21FF},{name:'Math Operators',start:0x2200,end:0x22FF},{name:'Misc Technical',start:0x2300,end:0x23FF},{name:'Enclosed Alphanum',start:0x2460,end:0x24FF},{name:'Letterlike 符号',start:0x2100,end:0x214F},{name:'Number Forms',start:0x2150,end:0x218F},{name:'Currency 符号',start:0x20A0,end:0x20CF},{name:'Superscripts',start:0x2070,end:0x209F},{name:'Subscripts',start:0x2080,end:0x209F},{name:'Braille',start:0x2800,end:0x28FF},{name:'Misc Arrows',start:0x2B00,end:0x2BFF},{name:'Emoticons',start:0x1F600,end:0x1F64F},{name:'Transport 符号',start:0x1F680,end:0x1F6FF},{name:'Misc 符号 B',start:0x1F300,end:0x1F5FF}];var tabs=document.getElementById('blockTabs'),grid=document.getElementById('charGrid'),info=document.getElementById('infoBar'),out=document.getElementById('输出Text');function renderBlock(block){grid.innerHTML='';var html='';var count=0;for(var cp=block.start;cp<=block.end;cp++){count++;var ch;try{ch=String.fromCodePoint(cp)}catch(e){continue}if(cp<0x0020||(cp>=0x0080&&cp<=0x009F)){html+='<div class="char-cell" style="color:var(--color-text-disabled)">␀<div class="cp">U+'+cp.toString(16).to大写().padStart(4,'0')+'</div></div>';continue}var hex=cp.toString(16).to大写().padStart(4,'0');html+='<div class="char-cell" data-cp="U+'+hex+'" data-ch="'+ch+'">'+ch+'<div class="cp">U+'+hex+'</div></div>'}grid.innerHTML=html;info.textContent=block.name+' — U+'+block.start.toString(16).to大写().padStart(4,'0')+' ~ U+'+block.end.toString(16).to大写().padStart(4,'0')+' ('+count+' 个字符)';grid.querySelectorAll('.char-cell').forEach(function(cell){cell.addEventListener('click',function(){var ch=this.getAttribute('data-ch')||this.textContent.trim();var cp=this.getAttribute('data-cp')||'';copyToClipboard(ch,document.getElementById('copyBtn'));out.textContent=cp+' '+ch;setStatus('已复制: '+ch)})})}function buildTabs(){for(var i=0;i<blocks.length;i++){var tab=document.createElement('span');tab.className='block-tab'+(i===0?' active':'');tab.textContent=blocks[i].name;tab.dataset.idx=i;tab.addEventListener('click',function(){tabs.querySelectorAll('.block-tab').forEach(function(t){t.classList.remove('active')});this.classList.add('active');var idx=parseInt(this.dataset.idx);renderBlock(blocks[idx])});tabs.appendChild(tab)}renderBlock(blocks[0])}buildTabs();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
