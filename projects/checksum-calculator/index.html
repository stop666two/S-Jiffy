<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>校验和计算器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .drop-zone{border:2px dashed var(--color-border);border-radius:var(--radius-md);padding:var(--space-4);text-align:center;color:var(--color-text-secondary);font-size:var(--font-size-sm);cursor:pointer;transition:all .2s;margin-bottom:var(--space-3)}
    .drop-zone.dragover{border-color:var(--color-text-primary);background:var(--color-bg-soft)}
    .drop-zone .fname{font-size:var(--font-size-base);color:var(--color-text-primary);margin-top:8px;word-break:break-all}
    .checksum-grid{display:grid;gap:6px}
    .chk-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md)}
    .chk-row .lbl{width:80px;font-size:var(--font-size-sm);font-weight:600;flex-shrink:0}
    .chk-row .val{font-family:var(--font-mono);font-size:13px;word-break:break-all;flex:1;min-width:0}
    .chk-row .cpy{font-size:var(--font-size-xs);color:var(--color-text-secondary);cursor:pointer;flex-shrink:0;padding:2px 6px;border-radius:var(--radius-sm)}
    .chk-row .cpy:hover{background:rgba(0,0,0,.05)}
    .progress-row{margin-bottom:var(--space-2);display:flex;align-items:center;gap:12px;display:none}
    .progress-row .bar{flex:1;height:4px;background:var(--color-border);border-radius:2px;overflow:hidden}
    .progress-row .bar .fill{height:100%;background:var(--color-text-primary);width:0;transition:width .3s}
    .text-mode-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-3)}
    .text-mode-row .input{flex:1;min-width:200px}
    .chk-header{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:var(--space-1)}
    .chk-type-name{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:var(--space-2)}
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>校验和计算器</h1>
    <p class="tool-desc">计算文件或文本的 CRC16、CRC32、Adler-32、MD5、SHA-1、SHA-256 校验和，支持拖放文件。</p>
    <div class="card">
      <div class="text-mode-row">
        <input id="textInput" class="input js-focus-input" placeholder="输入文本计算校验和...">
        <button id="textCalcBtn" class="btn btn-secondary">计算</button>
        <button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px;">清空</button>
      </div>
      <div class="drop-zone" id="dropZone">
        拖放文件到此处，或点击选择文件
        <div class="fname" id="fileName"></div>
      </div>
      <input id="fileInput" type="file" style="display:none">
      <div class="progress-row" id="progressRow"><span style="font-size:var(--font-size-xs);color:var(--color-text-secondary)">计算中...</span><div class="bar"><div class="fill" id="progressFill"></div></div></div>
      <div class="chk-type-name" id="sourceLabel">计算结果显示在此</div>
      <div class="checksum-grid" id="checksumGrid"></div>
    </div>
    <div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制全部</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var textInp=document.getElementById('textInput');
      var textBtn=document.getElementById('textCalcBtn');
      var clearBtn=document.getElementById('clearBtn');
      var drop=document.getElementById('dropZone');
      var fname=document.getElementById('fileName');
      var fileInp=document.getElementById('fileInput');
      var prog=document.getElementById('progressRow');
      var progFill=document.getElementById('progressFill');
      var grid=document.getElementById('checksumGrid');
      var sourceLabel=document.getElementById('sourceLabel');
      var out=document.getElementById('outputText');
      var copyBtn=document.getElementById('copyBtn');

      var algos=[
        {id:'CRC16',name:'CRC-16'},
        {id:'CRC32',name:'CRC-32'},
        {id:'ADLER32',name:'Adler-32'},
        {id:'MD5',name:'MD5'},
        {id:'SHA-1',name:'SHA-1'},
        {id:'SHA-256',name:'SHA-256'},
        {id:'SHA-384',name:'SHA-384'},
        {id:'SHA-512',name:'SHA-512'}
      ];

      function crc16(str) {
        var crc = 0xFFFF;
        for (var i = 0; i < str.length; i++) {
          crc ^= str.charCodeAt(i);
          for (var j = 0; j < 8; j++) {
            crc = (crc & 1) ? (0x8408 ^ (crc >>> 1)) : (crc >>> 1);
          }
        }
        return (crc ^ 0xFFFF).toString(16).padStart(4,'0');
      }

      function crc32(str) {
        var crc = 0xFFFFFFFF;
        for (var i = 0; i < str.length; i++) {
          crc ^= str.charCodeAt(i);
          for (var j = 0; j < 8; j++) {
            crc = (crc & 1) ? (0xEDB88320 ^ (crc >>> 1)) : (crc >>> 1);
          }
        }
        return (crc >>> 0).toString(16).padStart(8,'0');
      }

      function adler32(str) {
        var a = 1, b = 0;
        for (var i = 0; i < str.length; i++) {
          a = (a + str.charCodeAt(i)) % 65521;
          b = (b + a) % 65521;
        }
        return ((b << 16) | a).toString(16).padStart(8,'0');
      }

      function showChecksums(hexValues) {
        grid.innerHTML = '';
        var allVals = [];
        for (var i = 0; i < algos.length; i++) {
          var row = document.createElement('div');
          row.className = 'chk-row';
          var val = hexValues[algos[i].id] || '—';
          allVals.push(algos[i].id + ': ' + val);
          row.innerHTML = '<span class="lbl">'+algos[i].name+'</span><span class="val">'+val+'</span><span class="cpy" data-val="'+val+'">复制</span>';
          grid.appendChild(row);
          row.querySelector('.cpy').addEventListener('click',function(){
            var v=this.getAttribute('data-val');
            if(v&&v!=='—'){copyToClipboard(v,document.getElementById('copyBtn'));setStatus('已复制 '+this.parentElement.querySelector('.lbl').textContent)}
          });
        }
        out.textContent = allVals.join('\n');
      }

      function computeText() {
        var t = textInp.value;
        if (!t) { setStatus('请输入文本','error'); return; }
        sourceLabel.textContent = '文本校验和';
        var vals = {};
        vals['CRC16'] = crc16(t);
        vals['CRC32'] = crc32(t);
        vals['ADLER32'] = adler32(t);
        prog.style.display = 'block';
        progFill.style.width = '30%';

        var encoder = new TextEncoder();
        var data = encoder.encode(t);
        var digests = [
          crypto.subtle.digest('MD5', data),
          crypto.subtle.digest('SHA-1', data),
          crypto.subtle.digest('SHA-256', data),
          crypto.subtle.digest('SHA-384', data),
          crypto.subtle.digest('SHA-512', data)
        ];
        Promise.all(digests).then(function(results) {
          var names = ['MD5','SHA-1','SHA-256','SHA-384','SHA-512'];
          for (var i = 0; i < results.length; i++) {
            vals[names[i]] = Array.from(new Uint8Array(results[i])).map(function(b){
              return b.toString(16).padStart(2,'0');
            }).join('');
          }
          progFill.style.width = '100%';
          showChecksums(vals);
          setTimeout(function(){ prog.style.display = 'none'; progFill.style.width = '0'; }, 500);
          setStatus('计算完成');
        });
      }

      function computeFile(file) {
        sourceLabel.textContent = '文件: ' + file.name;
        fname.textContent = file.name;
        prog.style.display = 'flex';
        progFill.style.width = '10%';

        var reader = new FileReader();
        reader.onprogress = function(e) {
          if (e.lengthComputable) {
            progFill.style.width = Math.min(30, (e.loaded / e.total * 30)) + '%';
          }
        };
        reader.onload = function(e) {
          var data = new Uint8Array(e.target.result);
          progFill.style.width = '35%';

          var text = '';
          for (var i = 0; i < data.length; i++) {
            text += String.fromCharCode(data[i]);
          }
          var vals = {};
          vals['CRC16'] = crc16(text);
          vals['CRC32'] = crc32(text);
          vals['ADLER32'] = adler32(text);
          progFill.style.width = '50%';

          var digests = [
            crypto.subtle.digest('MD5', data),
            crypto.subtle.digest('SHA-1', data),
            crypto.subtle.digest('SHA-256', data),
            crypto.subtle.digest('SHA-384', data),
            crypto.subtle.digest('SHA-512', data)
          ];
          Promise.all(digests).then(function(results) {
            var names = ['MD5','SHA-1','SHA-256','SHA-384','SHA-512'];
            for (var i = 0; i < results.length; i++) {
              vals[names[i]] = Array.from(new Uint8Array(results[i])).map(function(b){
                return b.toString(16).padStart(2,'0');
              }).join('');
            }
            progFill.style.width = '100%';
            showChecksums(vals);
            setTimeout(function(){ prog.style.display = 'none'; progFill.style.width = '0'; }, 500);
            setStatus('文件校验完成');
          });
        };
        reader.readAsArrayBuffer(file);
      }

      textBtn.addEventListener('click', computeText);
      textInp.addEventListener('keydown', function(e) { if (e.key === 'Enter') computeText(); });

      clearBtn.addEventListener('click', function() {
        textInp.value = '';
        fname.textContent = '';
        sourceLabel.textContent = '计算结果显示在此';
        grid.innerHTML = '';
        out.textContent = '';
        setStatus('已清空');
      });

      drop.addEventListener('click', function() { fileInp.click(); });
      drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('dragover'); });
      drop.addEventListener('dragleave', function() { drop.classList.remove('dragover'); });
      drop.addEventListener('drop', function(e) {
        e.preventDefault();
        drop.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
          computeFile(e.dataTransfer.files[0]);
        }
      });
      fileInp.addEventListener('change', function() {
        if (this.files.length > 0) {
          computeFile(this.files[0]);
        }
      });

      copyBtn.addEventListener('click', function() {
        var text = out.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制全部校验和'); }
      });
    })();
  </script>
</body>
</html>
