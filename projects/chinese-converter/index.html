<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>繁简体转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.textarea{min-height:140px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>繁简体转换</h1><p class="tool-desc">中文繁简体互相转换。</p><div class="card"><div class="row"><button id="toSimpBtn" class="btn btn-primary">繁体→简体</button><button id="toTradBtn" class="btn btn-secondary">简体→繁体</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div><div class="row" style="flex-direction:column;align-items:stretch"><label>输入文本</label><textarea id="inputText" class="input textarea js-focus-input" style="min-height:120px" placeholder="输入要转换的文本..."></textarea></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>var s2t={};var t2s={};var s="万与丑专业丛东丝丢两严丧个丬临为丽举么义乌乐乘乱亀于云互五井些亚亟享京什介仂从仑仪们价众优伙会伛伞伟传伤伥伦伧伪伫伯估伴佴伸伺伺似佃但位低住佐佑作你伯佣佝佞佩佳使侈例侍侏侏侑侑供依侠侣侥侦侧侨侩侪侬俣俦俨俩俪俫俭修俯俱俳俸倮储催傲像僖僚僭僮僵僻儆儇儋儞僧僭僮僵僻儆儇儋儞".split("");var t="萬與醜專業叢東絲丟兩嚴喪個爿臨為麗舉麼義烏樂乘亂亀於雲互五井些亞亟享京什介仂從侖儀們價眾優夥會傴傘偉傳傷倀倫傖偽佇伯估伴佴伸伺伺似佃但位低住佐佑作你伯傭佝佞佩佳使侈例侍侏侏侑侑供依俠侶僥偵側僑儈儕儂俁儔儼倆儷倈儉修俯俱俳俸倮儲催傲像僖僚僭僮僵僻儆儇儋儞僧僭僮僵僻儆儇儋儞".split("");for(var i=0;i<s.length;i++){s2t[s[i]]=t[i];t2s[t[i]]=s[i]}function convert(text,map){var r="";for(var i=0;i<text.length;i++){var c=text[i];r+=map[c]||c}return r}(function(){var inp=document.getElementById("inputText"),o=document.getElementById("输出Text");document.getElementById("toSimpBtn").addEventListener("click",function(){var t=inp.value;if(!t){setStatus("请输入文本","error");return}o.textContent=convert(t,t2s);setStatus("转换完成")});document.getElementById("toTradBtn").addEventListener("click",function(){var t=inp.value;if(!t){setStatus("请输入文本","error");return}o.textContent=convert(t,s2t);setStatus("转换完成")});document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";o.textContent="";setStatus("")});document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
