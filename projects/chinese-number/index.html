<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>中文数字转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>中文数字转换</h1><p class="tool-desc">阿拉伯数字与中文数字互相转换。</p><div class="card"><div class="row"><div style="flex:1"><label>输入数字</label><input id="inputNum" class="input" value="123456789" style="width:100%"></div></div>
<div class="row"><button id="toChineseBtn" class="btn btn-primary">转中文数字</button><button id="toNumBtn" class="btn btn-secondary">中文转数字</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputNum"),o=document.getElementById("outputText");
function numToChinese(n){if(isNaN(n)||n<0)return"";var u=["","十","百","千","万","十","百","千","亿"];var d=["零","一","二","三","四","五","六","七","八","九"];var s=Math.floor(n).toString();var r="";for(var i=0;i<s.length;i++){var c=parseInt(s[i]),p=s.length-1-i;if(c===0){if(r.slice(-1)==="零"||p%4===0&&r.length>0)continue;r+="零"}else{r+=d[c];if(p>0)r+=u[p]}}return r.replace(/^一十/,"十")}
function chineseToNum(c){var n={零:0,一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9},un={十:10,百:100,千:1000},big={万:10000,亿:100000000};var r=0,t=0;for(var i=0;i<c.length;i++){var ch=c[i];if(n[ch]!==undefined)t=n[ch];else if(un[ch]){t=t||1;t*=un[ch];r+=t;t=0}else if(big[ch]){r=(r+t)*big[ch];t=0}}return r+t}
document.getElementById("toChineseBtn").addEventListener("click",function(){var v=inp.value.trim();if(!v||isNaN(v)){setStatus("请输入有效数字","error");return}o.textContent=numToChinese(parseFloat(v));setStatus("转换完成")});
document.getElementById("toNumBtn").addEventListener("click",function(){var v=inp.value.trim();if(!v){setStatus("请输入中文数字","error");return}o.textContent=chineseToNum(v);setStatus("转换完成")});
document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
