<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>生肖年龄查询 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}.big-num{font-size:40px;font-weight:700;text-align:center}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>生肖年龄查询</h1><p class="tool-desc">查询出生年份的生肖属相和年龄。</p><div class="card"><div class="row"><div><label>出生年份</label><input id="birthYear" class="input" type="number" value="1990" min="1900" max="2100"></div><div style="display:flex;align-items:end;gap:8px"><button id="queryBtn" class="btn btn-primary">查询</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="animalVal">—</div><div class="l">生肖</div></div><div class="res-item"><div class="v" id="ageVal">—</div><div class="l">周岁</div></div><div class="res-item"><div class="v" id="elementVal">—</div><div class="l">五行</div></div><div class="res-item"><div class="v" id="yearVal">—</div><div class="l">干支纪年</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var by=document.getElementById("birthYear"),av=document.getElementById("animalVal"),age=document.getElementById("ageVal"),ev=document.getElementById("elementVal"),yv=document.getElementById("yearVal"),o=document.getElementById("outputText");
var animals=["猴","鸡","狗","猪","鼠","牛","虎","兔","龙","蛇","马","羊"];var elements=["金","水","木","火","土"];var stems=["庚","辛","壬","癸","甲","乙","丙","丁","戊","己"];var branches=["申","酉","戌","亥","子","丑","寅","卯","辰","巳","午","未"];
document.getElementById("queryBtn").addEventListener("click",function(){var y=parseInt(by.value);if(!y||y<1900||y>2100){setStatus("请输入有效年份","error");return}
var animal=animals[y%12];var age=new Date().getFullYear()-y;var element=elements[Math.floor((y-4)%10/2)];var stem=stems[y%10];var branch=branches[y%12];
av.textContent=animal;age.textContent=age;ev.textContent=element;yv.textContent=stem+branch+"年";o.textContent="出生: "+y+"年 | 生肖: "+animal+" | 年龄: "+age+" 岁 | 干支: "+stem+branch;setStatus("查询完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
