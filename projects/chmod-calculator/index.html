<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chmod Calculator - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .chmod-table { width:100%; border-collapse:collapse; margin-bottom:var(--space-3); }
    .chmod-table th,.chmod-table td { border:1px solid var(--color-border); padding:12px 16px; text-align:center; }
    .chmod-table th { background:var(--color-bg-soft); font-size:var(--font-size-sm); font-weight:600; }
    .chmod-table td { font-size:var(--font-size-base); }
    .chmod-table label { display:flex; align-items:center; justify-content:center; gap:6px; cursor:pointer; }
    .chmod-table input[type="checkbox"] { width:18px; height:18px; cursor:pointer; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>Chmod Calculator</h1>
    <p class="tool-desc">通过勾选权限位实时查看八进制与符号权限表示。</p>
    <div class="card">
      <table class="chmod-table">
        <thead>
          <tr><th></th><th>读 (r)</th><th>写 (w)</th><th>执行 (x)</th></tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Owner</strong></td>
            <td><label><input type="checkbox" id="ur" checked> 4</label></td>
            <td><label><input type="checkbox" id="uw" checked> 2</label></td>
            <td><label><input type="checkbox" id="ux" checked> 1</label></td>
          </tr>
          <tr>
            <td><strong>Group</strong></td>
            <td><label><input type="checkbox" id="gr" checked> 4</label></td>
            <td><label><input type="checkbox" id="gw"> 2</label></td>
            <td><label><input type="checkbox" id="gx"> 1</label></td>
          </tr>
          <tr>
            <td><strong>Public</strong></td>
            <td><label><input type="checkbox" id="or" checked> 4</label></td>
            <td><label><input type="checkbox" id="ow"> 2</label></td>
            <td><label><input type="checkbox" id="ox"> 1</label></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var checkboxes = {
        ur: document.getElementById('ur'),
        uw: document.getElementById('uw'),
        ux: document.getElementById('ux'),
        gr: document.getElementById('gr'),
        gw: document.getElementById('gw'),
        gx: document.getElementById('gx'),
        or: document.getElementById('or'),
        ow: document.getElementById('ow'),
        ox: document.getElementById('ox')
      };
      var outputEl = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');

      function update() {
        var u = (checkboxes.ur.checked ? 4 : 0) + (checkboxes.uw.checked ? 2 : 0) + (checkboxes.ux.checked ? 1 : 0);
        var g = (checkboxes.gr.checked ? 4 : 0) + (checkboxes.gw.checked ? 2 : 0) + (checkboxes.gx.checked ? 1 : 0);
        var o = (checkboxes.or.checked ? 4 : 0) + (checkboxes.ow.checked ? 2 : 0) + (checkboxes.ox.checked ? 1 : 0);

        var octal = '' + u + g + o;

        function toSymbol(val) {
          var s = '';
          s += (val & 4) ? 'r' : '-';
          s += (val & 2) ? 'w' : '-';
          s += (val & 1) ? 'x' : '-';
          return s;
        }

        var sym = toSymbol(u) + toSymbol(g) + toSymbol(o);
        outputEl.textContent = octal + ' (' + sym + ')';
        setStatus('chmod ' + octal + ' ' + sym);
      }

      for (var key in checkboxes) {
        if (checkboxes.hasOwnProperty(key)) {
          checkboxes[key].addEventListener('change', update);
        }
      }

      copyBtn.addEventListener('click', function () {
        var text = outputEl.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });

      update();
    })();
  </script>
</body>
</html>
