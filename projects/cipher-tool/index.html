<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vigenère 密码 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>Vigenère 密码</h1>
    <p class="tool-desc">使用密钥对文本进行维吉尼亚密码加密或解密（仅支持英文字母）。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="输入要处理的文本..." style="min-height:120px;"></textarea>
    </div>
    <div class="card" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <input id="keyInput" class="input" placeholder="密钥 (keyword)" style="width:200px;">
      <button id="encryptBtn" class="btn btn-primary">加密</button>
      <button id="decryptBtn" class="btn btn-secondary">解密</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var inputEl = document.getElementById('inputText');
      var keyEl = document.getElementById('keyInput');
      var 输出El = document.getElementById('输出Text');
      var encryptBtn = document.getElementById('encryptBtn');
      var decryptBtn = document.getElementById('decryptBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');

      function vigenere(text, key, mode) {
        var 结果 = '';
        var keyIndex = 0;
        var keyUpper = key.to大写().replace(/[^A-Z]/g, '');
        if (!keyUpper.length) return '错误：密钥必须包含至少一个字母';
        for (var i = 0; i < text.length; i++) {
          var ch = text[i];
          var code = ch.charCodeAt(0);
          if (code >= 65 && code <= 90) {
            var shift = keyUpper.charCodeAt(keyIndex % keyUpper.length) - 65;
            if (mode === 'decrypt') shift = 26 - shift;
            结果 += String.fromCharCode(65 + (code - 65 + shift) % 26);
            keyIndex++;
          } else if (code >= 97 && code <= 122) {
            var shift2 = keyUpper.charCodeAt(keyIndex % keyUpper.length) - 65;
            if (mode === 'decrypt') shift2 = 26 - shift2;
            结果 += String.fromCharCode(97 + (code - 97 + shift2) % 26);
            keyIndex++;
          } else {
            结果 += ch;
          }
        }
        return 结果;
      }

      encryptBtn.addEventListener('click', function () {
        var text = inputEl.value;
        var key = keyEl.value.trim();
        if (!text) { setStatus('请输入文本', 'error'); return; }
        if (!key) { setStatus('请输入密钥', 'error'); return; }
        输出El.textContent = vigenere(text, key, 'encrypt');
        setStatus('');
      });

      decryptBtn.addEventListener('click', function () {
        var text = inputEl.value;
        var key = keyEl.value.trim();
        if (!text) { setStatus('请输入文本', 'error'); return; }
        if (!key) { setStatus('请输入密钥', 'error'); return; }
        输出El.textContent = vigenere(text, key, 'decrypt');
        setStatus('');
      });

      clearBtn.addEventListener('click', function () { inputEl.value = ''; keyEl.value = ''; 输出El.textContent = ''; setStatus(''); inputEl.focus(); });
      copyBtn.addEventListener('click', function () { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
    })();
  </script>
</body>
</html>
