<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>点击劫持检测 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.status-card{padding:16px;border-radius:var(--radius-md);text-align:center;font-weight:600;margin-bottom:var(--space-2);}.status-protected{background:#e6f4ea;color:var(--color-success);}.status-vulnerable{background:#fce8e6;color:var(--color-error);}.status-unknown{background:#fef7e0;color:#e37400;}.detail-row{padding:6px 0;border-bottom:1px solid var(--color-border);font-size:var(--font-size-sm);display:flex;gap:8px;}.detail-row:last-child{border:none;}.detail-label{color:var(--color-text-secondary);min-width:140px;}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>点击劫持检测</h1><p class="tool-desc">检测网站是否配置了 X-Frame-Options 或 CSP frame-ancestors 防御点击劫持攻击</p>
<div class="card" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;"><input id="urlInput" class="input js-focus-input" placeholder="https://example.com" style="flex:1;"><button id="checkBtn" class="btn btn-primary">检测</button></div>
<div class="card" id="resultCard" style="display:none;"><div id="statusDisplay" class="status-card"></div><div id="detailsList"></div><div id="recommendation" style="margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px solid var(--color-border);font-size:var(--font-size-sm);color:var(--color-text-secondary);"></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var urlInput=document.getElementById('urlInput'),checkBtn=document.getElementById('checkBtn'),resultCard=document.getElementById('resultCard'),statusDisplay=document.getElementById('statusDisplay'),detailsList=document.getElementById('detailsList'),recommendation=document.getElementById('recommendation'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');
checkBtn.addEventListener('click',function(){
  var url=urlInput.value.trim();if(!url){setStatus('请输入 URL','error');return;}
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  resultCard.style.display='block';detailsList.innerHTML='<div style="padding:8px;color:var(--color-text-secondary);">检测中...</div>';
  statusDisplay.textContent='检测中...';statusDisplay.className='status-card status-unknown';
  fetch(url,{method:'GET',mode:'cors'}).then(function(resp){
    var xfo=resp.headers.get('X-Frame-Options');
    var csp=resp.headers.get('Content-Security-Policy');
    var frameAncestors=null;
    if(csp){var m=csp.match(/frame-ancestors\s+([^;]+)/i);if(m)frameAncestors=m[1].trim();}
    var details='';
    details+='<div class="detail-row"><span class="detail-label">X-Frame-Options</span><span>'+(xfo?'<span style="color:var(--color-success);font-weight:600;">'+htmlEscape(xfo)+'</span>':'<span style="color:var(--color-text-disabled);">未设置</span>')+'</span></div>';
    details+='<div class="detail-row"><span class="detail-label">CSP frame-ancestors</span><span>'+(frameAncestors?'<span style="color:var(--color-success);font-weight:600;">'+htmlEscape(frameAncestors)+'</span>':'<span style="color:var(--color-text-disabled);">未设置</span>')+'</span></div>';
    details+='<div class="detail-row"><span class="detail-label">状态码</span><span>'+resp.status+' '+htmlEscape(resp.statusText)+'</span></div>';
    details+='<div class="detail-row"><span class="detail-label">HTTP 版本</span><span>HTTP/1.1</span></div>';
    var protected=false;
    if(xfo){if(xfo.toUpperCase()==='DENY'||xfo.toUpperCase()==='SAMEORIGIN')protected=true;}
    if(frameAncestors){if(frameAncestors.indexOf("'none'")>=0||frameAncestors.indexOf("'self'")>=0)protected=true;}
    if(protected){
      statusDisplay.textContent='✅ 受保护';
      statusDisplay.className='status-card status-protected';
      recommendation.textContent='该网站已配置防点击劫持保护措施。';
    }else{
      statusDisplay.textContent='❌ 易受攻击';
      statusDisplay.className='status-card status-vulnerable';
      recommendation.innerHTML='<strong>建议：</strong>添加响应头 <code style="background:var(--color-bg-soft);padding:2px 4px;border-radius:3px;">X-Frame-Options: DENY</code> 或 <code style="background:var(--color-bg-soft);padding:2px 4px;border-radius:3px;">Content-Security-Policy: frame-ancestors \'none\'</code>';
    }
    detailsList.innerHTML=details;
    outputText.textContent=protected?'受保护':'易受攻击';
    setStatus('检测完成');
  }).catch(function(err){
    detailsList.innerHTML='<div style="color:var(--color-error);">请求失败: '+htmlEscape(err.message)+'<br><span style="font-size:12px;">注意：CORS 限制可能导致检测失败。建议在目标站点同源环境下测试。</span></div>';
    statusDisplay.textContent='检测失败';
    statusDisplay.className='status-card status-unknown';
    setStatus('检测失败','error');
  });
});
copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制');}});
urlInput.addEventListener('keydown',function(e){if(e.key==='Enter')checkBtn.click();});
})();</script>
</body></html>
