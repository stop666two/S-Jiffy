<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>代码注释去除 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-2)}.toolbar select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.stat-row{display:flex;gap:16px;font-size:13px;color:var(--color-text-secondary);margin-bottom:var(--space-2)}.stat-row span{background:var(--color-bg-soft);padding:4px 12px;border-radius:999px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>代码注释去除</h1><p class="tool-desc">移除源代码中的注释行</p>
<div class="card"><div class="toolbar"><select id="langSelect"><option value="js">JavaScript/TypeScript</option><option value="html">HTML</option><option value="css">CSS/SCSS</option><option value="python">Python</option><option value="java">Java/C/C++/C#</option><option value="php">PHP</option><option value="sql">SQL</option><option value="shell">Shell/Bash</option></select><button id="stripBtn" class="btn btn-primary">去除注释</button><button id="resetBtn" class="btn btn-secondary">重置</button></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><textarea id="inputCode" class="input textarea" placeholder="粘贴代码..." style="min-height:250px">// 这是一个单行注释
function greet(name) {
  /* 这是多行
     注释块 */
  console.log("Hello, " + name); // 行尾注释
}</textarea><textarea id="outputCode" class="input textarea" placeholder="去除注释后的代码..." style="min-height:250px;background:var(--color-bg-soft)" readonly></textarea></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var inputCode=document.getElementById('inputCode'),outputCode=document.getElementById('outputCode'),langSelect=document.getElementById('langSelect'),stripBtn=document.getElementById('stripBtn'),resetBtn=document.getElementById('resetBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var samples={'js':'/* * 工具函数库 */\nfunction add(a, b) {\n  // 返回两数之和\n  return a + b; // 加法结果\n}\n\n// 主函数\nfunction main() {\n  var x = 1; /* 初始化 x */\n  var y = 2; // 初始化 y\n  /* 复杂计算 block\n     需要多行 */\n  var z = add(x, y);\n  console.log(z);\n}','html':'<!-- 页面头部 -->\n<header>\n  <h1>我的网站</h1>\n  <!-- 导航菜单 -->\n  <nav>\n    <a href="/">首页</a>\n    <a href="/about">关于</a>\n  </nav>\n</header>\n<!-- 底部版权信息 -->\n<footer>\n  <p>版权所有</p>\n</footer>','css':'/* 全局重置 */\n* {\n  margin: 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\n/* 导航栏样式 */\n.navbar {\n  background: #333;\n  /* padding: 16px; */\n  display: flex;\n  /* border-bottom: 1px solid #ccc; */\n  color: white;\n}','python':'# 导入模块\nimport os\nimport sys\n\n# 配置常量\nDEBUG = True  # 调试模式\n\n# 主函数\ndef main():\n    \"\"\"文档字符串应该保留\"\"\"\n    # 打印欢迎\n    print(\"Hello World\")\n    # 返回值\n    return 0\n\nif __name__ == \"__main__\":\n    main()','java':'/*\n * 版权所有 (c) 2024\n * 许可证信息\n */\npackage com.example;\n\n/**\n * 工具类 - Javadoc 注释保留\n */\npublic class Util {\n    // 常量定义\n    public static final int MAX = 100;\n    \n    /**\n     * 计算方法 - Javadoc 保留\n     */\n    public int calc(int x) {\n        // 临时变量\n        int y = x * 2; /* 乘以2 */\n        return y; // 返回结果\n    }\n}','php':'<?php\n// 配置文件\nnamespace App\\Config;\n\n/* 数据库配置 */\nclass Database {\n    // 主机地址\n    public $host = \"localhost\";\n    \n    /*\n     * 连接数据库\n     */\n    public function connect() {\n        # 这也是 php 注释\n        echo \"Connecting...\"; // 输出信息\n    }\n}','sql':'-- 查询用户表\nSELECT \n  id, -- 用户ID\n  name, -- 用户名\n  email -- 邮箱地址\nFROM users\n/* 只查询活跃用户 */\nWHERE status = 1\n-- 按创建时间排序\nORDER BY created_at DESC;','shell':'#!/bin/bash\n# 脚本配置\nAPP_NAME=\"myapp\"  # 应用名称\n\n# 检查参数\nif [ -z \"$1\" ]; then\n    echo \"Usage: $0 <param>\"  # 用法提示\n    exit 1\nfi\n\n# 执行主逻辑\necho \"Running $APP_NAME...\"  # 运行提示'};var commentPatterns={'js':{singleLine:[/\/\/.*$/gm],multiLine:[/\/\*[\s\S]*?\*\//gm],preserve:[/\/\/\/\s*<reference.*\/>$/gm]},'html':{singleLine:[],multiLine:[/<!--[\s\S]*?-->/gm],preserve:[]},'css':{singleLine:[],multiLine:[/\/\*[\s\S]*?\*\//gm],preserve:[]},'python':{singleLine:[/#.*$/gm],multiLine:[]},'java':{singleLine:[/\/\/.*$/gm],multiLine:[/\/\*[\s\S]*?\*\//gm],preserve:[/\/\*\*[\s\S]*?\*\//gm]},'php':{singleLine:[/\/\/.*$/gm,/#.*$/gm],multiLine:[/\/\*[\s\S]*?\*\//gm],preserve:[]},'sql':{singleLine:[/--.*$/gm],multiLine:[/\/\*[\s\S]*?\*\//gm],preserve:[]},'shell':{singleLine:[/#.*$/gm],multiLine:[],preserve:[/\/\/.*$/gm]}};langSelect.addEventListener('change',function(){inputCode.value=samples[this.value]||'';strip()});function countMatches(code,patterns){var count=0;for(var i=0;i<patterns.length;i++){var m;while((m=patterns[i].exec(code))!==null)count++}return count}function strip(){var code=inputCode.value;var lang=langSelect.value;var pat=commentPatterns[lang];var original=code;var preserved=original;if(pat.preserve&&pat.preserve.length){for(var j=0;j<pat.preserve.length;j++){preserved=preserved.replace(pat.preserve[j],function(m){return'\0PLACEHOLDER'+j+'\0'})}}var stripped=preserved;if(pat.multiLine&&pat.multiLine.length){for(var k=0;k<pat.multiLine.length;k++){stripped=stripped.replace(pat.multiLine[k],'')}}if(pat.singleLine&&pat.singleLine.length){for(var l=0;l<pat.singleLine.length;l++){stripped=stripped.replace(pat.singleLine[l],'')}}if(pat.preserve&&pat.preserve.length){for(var m=0;m<pat.preserve.length;m++){stripped=stripped.replace(RegExp('\0PLACEHOLDER'+m+'\0','g'),function(){return pat.preserve[m].source})}}var origLines=original.split('\n').length;var strippedLines=stripped.split('\n').length;var commentLines=origLines-strippedLines;outputCode.value=stripped;var removed=original.length-stripped.length;outputText.innerHTML='原代码: '+origLines+' 行 | 去除注释后: '+strippedLines+' 行 | 减少 '+(origLines-strippedLines)+' 行 ('+removed+' 字符)'}stripBtn.addEventListener('click',strip);resetBtn.addEventListener('click',function(){inputCode.value=samples[langSelect.value]||'';strip()});copyBtn.addEventListener('click',function(){if(outputCode.value){copyToClipboard(outputCode.value,this);setStatus('已复制')}});inputCode.addEventListener('input',strip)})();</script>
</body></html>
