<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>色盲模拟器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.img-area{width:100%;min-height:200px;border:2px dashed var(--color-border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);overflow:hidden;position:relative;background:var(--color-bg-soft)}.img-area img{max-width:100%;max-height:400px;display:block}.img-area .placeholder{color:var(--color-text-secondary);font-size:var(--font-size-sm)}.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-3)}.filter-row label{font-size:var(--font-size-sm);display:flex;align-items:center;gap:4px;cursor:pointer;padding:6px 12px;border:1px solid var(--color-border);border-radius:var(--radius-md);transition:all .15s}.filter-row label.active{border-color:var(--color-text-primary);background:var(--color-text-primary);color:#fff}.filter-row label input{display:none}.sample-text{font-size:var(--font-size-lg);font-weight:600;text-align:center;padding:var(--space-2);margin-bottom:var(--space-2)}.sample-text .colors{display:flex;justify-content:center;gap:12px;margin-top:8px;font-size:var(--font-size-sm)}.sample-text .colors span{padding:4px 12px;border-radius:var(--radius-sm)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>色盲模拟器</h1><p class="tool-desc">上传图片或查看示例，通过 CSS 滤镜模拟不同色盲类型的视觉效果。</p>
<div class="card">
<div class="img-area" id="imgArea"><span class="placeholder" id="placeholder">点击下方按钮上传图片，或查看示例色块</span><img id="previewImg" style="display:none"></div>
<div class="filter-row" id="filterRow"><label class="active"><input type="radio" name="filter" value="none" checked> 正常</label><label><input type="radio" name="filter" value="protanopia"> 红色盲</label><label><input type="radio" name="filter" value="deuteranopia"> 绿色盲</label><label><input type="radio" name="filter" value="tritanopia"> 蓝色盲</label><label><input type="radio" name="filter" value="achromatopsia"> 全色盲</label></div>
<div style="display:flex;gap:8px;flex-wrap:wrap"><button id="uploadBtn" class="btn btn-secondary">上传图片</button><input id="fileInput" type="file" accept="image/*" style="display:none"><button id="resetImgBtn" class="btn btn-secondary">重置图片</button></div>
<div class="sample-text"><div>示例色块</div><div class="colors"><span style="background:#ff0000;color:#fff">红</span><span style="background:#00ff00;color:#000">绿</span><span style="background:#0000ff;color:#fff">蓝</span><span style="background:#ffff00;color:#000">黄</span><span style="background:#ff00ff;color:#fff">紫</span><span style="background:#00ffff;color:#000">青</span></div></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var imgArea=document.getElementById('imgArea'),imgEl=document.getElementById('previewImg'),placeholder=document.getElementById('placeholder'),fileInput=document.getElementById('fileInput'),uploadBtn=document.getElementById('uploadBtn'),resetBtn=document.getElementById('resetImgBtn'),filterLabels=document.querySelectorAll('#filterRow label'),out=document.getElementById('输出Text');var filters={none:'',protanopia:'url(#protanopia)',deuteranopia:'url(#deuteranopia)',tritanopia:'url(#tritanopia)',achromatopsia:'url(#achromatopsia)'};var svgFilters='<svg style="position:absolute;height:0;width:0"><defs><filter id="protanopia"><feColorMatrix type="matrix" values="0.567,0.433,0,0,0 0.558,0.442,0,0,0 0,0.242,0.758,0,0 0,0,0,1,0"/></filter><filter id="deuteranopia"><feColorMatrix type="matrix" values="0.625,0.375,0,0,0 0.7,0.3,0,0,0 0,0.3,0.7,0,0 0,0,0,1,0"/></filter><filter id="tritanopia"><feColorMatrix type="matrix" values="0.95,0.05,0,0,0 0,0.433,0.567,0,0 0,0.475,0.525,0,0 0,0,0,1,0"/></filter><filter id="achromatopsia"><feColorMatrix type="matrix" values="0.299,0.587,0.114,0,0 0.299,0.587,0.114,0,0 0.299,0.587,0.114,0,0 0,0,0,1,0"/></filter></defs></svg>';imgArea.insertAdjacentHTML('afterbegin',svgFilters);uploadBtn.addEventListener('click',function(){fileInput.click()});fileInput.addEventListener('change',function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){imgEl.src=ev.target.结果;imgEl.style.display='block';placeholder.style.display='none'};reader.readAsDataURL(file)});resetBtn.addEventListener('click',function(){imgEl.src='';imgEl.style.display='none';placeholder.style.display='block';fileInput.value=''});filterLabels.forEach(function(lbl){lbl.addEventListener('click',function(){filterLabels.forEach(function(l){l.classList.remove('active')});lbl.classList.add('active');var val=lbl.querySelector('input').value;var filter=val==='none'?'none':filters[val];imgEl.style.filter=filter||'none';imgArea.style.filter=filter||'none';out.textContent='当前滤镜: '+lbl.textContent.trim();setStatus('已切换为 '+lbl.textContent.trim())})});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
