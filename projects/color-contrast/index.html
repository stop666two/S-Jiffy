<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>色彩对比度 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.color-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-3)}.color-picker{flex:1;min-width:180px}.color-picker label{font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:4px}.color-picker .preview{height:60px;border-radius:var(--radius-md);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:4px;transition:background .15s}.color-picker input[type=color]{width:100%;height:40px;padding:0;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer}.result-big{text-align:center;padding:var(--space-3) 0}.result-big .ratio{font-size:48px;font-weight:600;font-family:var(--font-mono);letter-spacing:-1px}.result-big .label{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:4px}.badge-row{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin:var(--space-3) 0}.badge{text-align:center;padding:var(--space-2);border-radius:var(--radius-md);border:1px solid var(--color-border);flex:1;min-width:140px}.badge .pass{font-size:20px;font-weight:600}.badge .pass.yes{color:var(--color-success)}.badge .pass.no{color:var(--color-error)}.badge .l{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:4px}.sample-text{width:100%;padding:var(--space-4);border-radius:var(--radius-md);text-align:center;font-size:18px;margin-top:var(--space-2);transition:all .15s;border:1px solid var(--color-border)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>色彩对比度检测</h1><p class="tool-desc">检测两种颜色的 WCAG 对比度比率，确保可读性无障碍标准。</p>
<div class="card">
<div class="color-row">
<div class="color-picker"><label>前景色（文本）</label><input id="fgColor" type="color" value="#111111"><div class="preview" id="fgPreview" style="background:#111111;color:#fff">Aa</div></div>
<div class="color-picker"><label>背景色</label><input id="bgColor" type="color" value="#ffffff"><div class="preview" id="bgPreview" style="background:#ffffff;color:#111">Aa</div></div>
</div>
<div class="result-big"><div class="ratio" id="ratioDisplay">14.09:1</div><div class="label">对比度比率</div></div>
<div class="badge-row"><div class="badge"><div class="pass yes" id="aaNorm">✓</div><div class="l">AA 普通文本 (≥ 4.5:1)</div></div><div class="badge"><div class="pass yes" id="aaLarge">✓</div><div class="l">AA 大号文本 (≥ 3:1)</div></div><div class="badge"><div class="pass yes" id="aaaNorm">✓</div><div class="l">AAA 普通文本 (≥ 7:1)</div></div></div>
<div class="sample-text" id="sampleText" style="background:#ffffff;color:#111111">示例文本 The quick brown fox jumps over the lazy dog</div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var fg=document.getElementById('fgColor'),bg=document.getElementById('bgColor'),fgPrev=document.getElementById('fgPreview'),bgPrev=document.getElementById('bgPreview'),ratioD=document.getElementById('ratioDisplay'),sample=document.getElementById('sampleText'),aaN=document.getElementById('aaNorm'),aaL=document.getElementById('aaLarge'),aaaN=document.getElementById('aaaNorm'),out=document.getElementById('outputText');function luminance(r,g,b){var a=[r,g,b].map(function(v){v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4)});return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2]}function contrastRatio(hex1,hex2){var r1=parseInt(hex1.slice(1,3),16),g1=parseInt(hex1.slice(3,5),16),b1=parseInt(hex1.slice(5,7),16);var r2=parseInt(hex2.slice(1,3),16),g2=parseInt(hex2.slice(3,5),16),b2=parseInt(hex2.slice(5,7),16);var l1=luminance(r1,g1,b1),l2=luminance(r2,g2,b2);var lighter=Math.max(l1,l2),darker=Math.min(l1,l2);return(lighter+0.05)/(darker+0.05)}function render(){var f=fp=fg.value,b=bp=bg.value,ratio=contrastRatio(f,b);ratioD.textContent=ratio.toFixed(2)+':1';fgPrev.style.background=f;fgPrev.style.color=b;bgPrev.style.background=b;bgPrev.style.color=f;sample.style.background=b;sample.style.color=f;aaN.textContent=ratio>=4.5?'✓':'✗';aaN.className='pass '+(ratio>=4.5?'yes':'no');aaL.textContent=ratio>=3?'✓':'✗';aaL.className='pass '+(ratio>=3?'yes':'no');aaaN.textContent=ratio>=7?'✓':'✗';aaaN.className='pass '+(ratio>=7?'yes':'no');out.textContent='对比度: '+ratio.toFixed(2)+':1 | AA: '+(ratio>=4.5?'通过':'未通过')+' | AAA: '+(ratio>=7?'通过':'未通过')}fg.addEventListener('input',render);bg.addEventListener('input',render);render();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
