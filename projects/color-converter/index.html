<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Converter - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .color-preview-lg { width:100%;height:80px;border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:var(--space-3);transition:background .2s; }
    .color-grid { display:grid; gap:var(--space-1); }
    .color-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; padding:4px 0; border-bottom:1px solid var(--color-border); }
    .color-row:last-child { border-bottom:none; }
    .color-row label { font-size:var(--font-size-sm); color:var(--color-text-secondary); min-width:80px; font-family:var(--font-mono); }
    .color-row .val { font-family:var(--font-mono); font-size:var(--font-size-sm); color:var(--color-text-primary); min-width:180px; word-break:break-all; }
    .cb-section { margin-top:var(--space-2); padding-top:var(--space-2); border-top:1px solid var(--color-border); }
    .cb-section h3 { font-size:var(--font-size-sm); font-weight:600; margin-bottom:var(--space-1); color:var(--color-text-secondary); }
    .cb-swatches { display:flex; gap:6px; flex-wrap:wrap; }
    .cb-swatch { width:40px;height:40px;border-radius:var(--radius-sm);border:1px solid var(--color-border); }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>颜色转换</h1>
    <p class="tool-desc">HEX / RGB / HSL / CMYK / HSV / OKLCH / LAB / LCH / HSLA 互转，含色盲模拟。</p>
    <div class="card" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label style="font-size:var(--font-size-sm); color:var(--color-text-secondary);">输入</label>
      <input id="colorInput" class="input js-focus-input" placeholder="#1E6DF2 或 rgb(30,109,242)" style="width:320px;">
      <button id="convertBtn" class="btn btn-primary">转换</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div id="previewBox" class="color-preview-lg"></div>
    <div class="card">
      <div class="color-grid">
        <div class="color-row"><label>HEX</label><span class="val" id="valHex">—</span></div>
        <div class="color-row"><label>RGB</label><span class="val" id="valRgb">—</span></div>
        <div class="color-row"><label>HSL</label><span class="val" id="valHsl">—</span></div>
        <div class="color-row"><label>HSLA</label><span class="val" id="valHsla">—</span></div>
        <div class="color-row"><label>HSV</label><span class="val" id="valHsv">—</span></div>
        <div class="color-row"><label>CMYK</label><span class="val" id="valCmyk">—</span></div>
        <div class="color-row"><label>OKLCH</label><span class="val" id="valOklch">—</span></div>
        <div class="color-row"><label>LAB</label><span class="val" id="valLab">—</span></div>
        <div class="color-row"><label>LCH</label><span class="val" id="valLch">—</span></div>
      </div>
      <div class="cb-section"><h3>Colorblind Simulation</h3><div class="cb-swatches" id="cbSim"></div></div>
    </div>
    <div class="输出-box" id="输出Container" style="min-height:60px;">
      <span id="输出Text" style="display:block; padding-right:60px; white-space:pre-line;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var inputEl = document.getElementById('colorInput'), preview = document.getElementById('previewBox');
      var vHex = document.getElementById('valHex'), vRgb = document.getElementById('valRgb'), vHsl = document.getElementById('valHsl');
      var vHsla = document.getElementById('valHsla'), vHsv = document.getElementById('valHsv'), vCmyk = document.getElementById('valCmyk');
      var vOklch = document.getElementById('valOklch'), vLab = document.getElementById('valLab'), vLch = document.getElementById('valLch');
      var cbSim = document.getElementById('cbSim'), o = document.getElementById('输出Text');

      function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }
      function srgbTransfer(c) { c = c / 255; return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); }
      function srgbTransferInv(c) { c = c <= 0.0031308 ? 12.92 * c : 1.055 * Math.pow(c, 1 / 2.4) - 0.055; return Math.round(clamp(c * 255, 0, 255)); }

      function rgbToOklab(r, g, b) {
        var l = srgbTransfer(r), m = srgbTransfer(g), s = srgbTransfer(b);
        var l_ = 0.4122214708 * l + 0.5363325363 * m + 0.0514459929 * s;
        var m_ = 0.2119034982 * l + 0.6806995451 * m + 0.1073969566 * s;
        var s_ = 0.0883024619 * l + 0.2817188376 * m + 0.6299787005 * s;
        l_ = Math.cbrt(l_); m_ = Math.cbrt(m_); s_ = Math.cbrt(s_);
        return { L: 0.2104542553 * l_ + 0.7936177850 * m_ - 0.0040720468 * s_, a: 1.9779984951 * l_ - 2.4285922050 * m_ + 0.4505937099 * s_, b: 0.0259040371 * l_ + 0.7827717662 * m_ - 0.8086757660 * s_ };
      }
      function oklabToRgb(L, a, b) {
        var l_ = L + 0.3963377774 * a + 0.2158037573 * b;
        var m_ = L - 0.1055613458 * a - 0.0638541728 * b;
        var s_ = L - 0.0894841775 * a - 1.2914855480 * b;
        l_ = l_ * l_ * l_; m_ = m_ * m_ * m_; s_ = s_ * s_ * s_;
        return { r: srgbTransferInv(+4.0767416621 * l_ - 3.3077115913 * m_ + 0.2309699292 * s_), g: srgbTransferInv(-1.2684380046 * l_ + 2.6097574011 * m_ - 0.3413193965 * s_), b: srgbTransferInv(-0.0041960863 * l_ - 0.7034186147 * m_ + 1.7076147010 * s_) };
      }
      function oklabToOklch(L, a, b) { return { L: L, C: Math.sqrt(a * a + b * b), h: Math.atan2(b, a) * 180 / Math.PI }; }
      function oklchToOklab(L, C, h) { var hr = h * Math.PI / 180; return { L: L, a: C * Math.cos(hr), b: C * Math.sin(hr) }; }
      function rgbToLab(r, g, b) {
        var l = srgbTransfer(r), m = srgbTransfer(g), s = srgbTransfer(b);
        var x = 0.4124564 * l + 0.3575761 * m + 0.1804375 * s;
        var y = 0.2126729 * l + 0.7151522 * m + 0.0721750 * s;
        var z = 0.0193339 * l + 0.1191920 * m + 0.9503041 * s;
        var xn = 0.95047, yn = 1.0, zn = 1.08883;
        function f(t) { return t > 0.008856 ? Math.cbrt(t) : (7.787 * t + 16 / 116); }
        var fx = f(x / xn), fy = f(y / yn), fz = f(z / zn);
        return { L: Math.round(116 * fy - 16), a: Math.round(500 * (fx - fy)), b: Math.round(200 * (fy - fz)) };
      }
      function labToLch(L, a, b) { return { L: L, C: Math.round(Math.sqrt(a * a + b * b)), h: Math.round(Math.atan2(b, a) * 180 / Math.PI) }; }

      function parseHex(h) {
        h = h.replace('#', '');
        if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
        if (h.length === 8) return { r: parseInt(h.substr(0, 2), 16), g: parseInt(h.substr(2, 2), 16), b: parseInt(h.substr(4, 2), 16), a: Math.round((parseInt(h.substr(6, 2), 16) / 255) * 100) / 100 };
        if (h.length !== 6) return null;
        return { r: parseInt(h.substr(0, 2), 16), g: parseInt(h.substr(2, 2), 16), b: parseInt(h.substr(4, 2), 16), a: 1 };
      }
      function parseRgb(s) {
        var m = s.match(/rgba?\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([\d.]+))?\s*\)/);
        return m ? { r: +m[1], g: +m[2], b: +m[3], a: m[4] !== undefined ? +m[4] : 1 } : null;
      }
      function parseHsl(s) {
        var m = s.match(/hsla?\s*\(\s*([\d.]+)\s*,\s*([\d.]+)%\s*,\s*([\d.]+)%\s*(?:,\s*([\d.]+))?\s*\)/);
        if (!m) return null;
        return hslToRgb(+m[1], +m[2], +m[3], m[4] !== undefined ? +m[4] : 1);
      }
      function parseCmyk(s) {
        var m = s.match(/cmyk\s*\(\s*([\d.]+)%?\s*,\s*([\d.]+)%?\s*,\s*([\d.]+)%?\s*,\s*([\d.]+)%?\s*\)/);
        if (!m) return null;
        var c = +m[1] / 100, m2 = +m[2] / 100, y = +m[3] / 100, k = +m[4] / 100;
        return { r: Math.round(255 * (1 - c) * (1 - k)), g: Math.round(255 * (1 - m2) * (1 - k)), b: Math.round(255 * (1 - y) * (1 - k)), a: 1 };
      }

      function hslToRgb(h, s, l, a) {
        h = h / 360; s = s / 100; l = l / 100;
        var c2 = s * (1 - Math.abs(2 * l - 1));
        var x = c2 * (1 - Math.abs((h * 6) % 2 - 1));
        var m = l - c2 / 2;
        var r, g, b;
        if (h < 1 / 6) { r = c2; g = x; b = 0; }
        else if (h < 2 / 6) { r = x; g = c2; b = 0; }
        else if (h < 3 / 6) { r = 0; g = c2; b = x; }
        else if (h < 4 / 6) { r = 0; g = x; b = c2; }
        else if (h < 5 / 6) { r = x; g = 0; b = c2; }
        else { r = c2; g = 0; b = x; }
        return { r: Math.round((r + m) * 255), g: Math.round((g + m) * 255), b: Math.round((b + m) * 255), a: a !== undefined ? a : 1 };
      }

      function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        var max = Math.max(r, g, b), min = Math.min(r, g, b), l = (max + min) / 2, s = 0, h = 0;
        if (max !== min) {
          var d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          if (max === r) h = ((g - b) / d + (g < b ? 6 : 0));
          else if (max === g) h = ((b - r) / d + 2);
          else h = ((r - g) / d + 4);
          h = h * 60;
        }
        return { h: h, s: s * 100, l: l * 100 };
      }
      function rgbToHsv(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        var max = Math.max(r, g, b), min = Math.min(r, g, b);
        var h = 0, s = max === 0 ? 0 : (max - min) / max, v = max;
        if (max !== min) {
          var d = max - min;
          if (max === r) h = ((g - b) / d + (g < b ? 6 : 0));
          else if (max === g) h = ((b - r) / d + 2);
          else h = ((r - g) / d + 4);
          h = h * 60;
        }
        return { h: h, s: s * 100, v: v * 100 };
      }
      function rgbToCmyk(r, g, b) {
        var c = 1 - r / 255, m2 = 1 - g / 255, y = 1 - b / 255, k = Math.min(c, m2, y);
        if (k === 1) return { c: 0, m: 0, y: 0, k: 100 };
        return { c: Math.round(((c - k) / (1 - k)) * 100), m: Math.round(((m2 - k) / (1 - k)) * 100), y: Math.round(((y - k) / (1 - k)) * 100), k: Math.round(k * 100) };
      }

      function colorblindSim(r, g, b) {
        var cbTypes = {
          protanopia: { label: 'Protanopia', matrix: [0.567, 0.433, 0, 0.558, 0.442, 0, 0, 0.242, 0.758] },
          deuteranopia: { label: 'Deuteranopia', matrix: [0.625, 0.375, 0, 0.7, 0.3, 0, 0, 0.3, 0.7] },
          tritanopia: { label: 'Tritanopia', matrix: [0.95, 0.05, 0, 0, 0.433, 0.567, 0, 0.475, 0.525] }
        };
        var html = '';
        for (var k in cbTypes) {
          var m = cbTypes[k].matrix;
          var nr = clamp(Math.round(m[0] * r + m[1] * g + m[2] * b), 0, 255);
          var ng = clamp(Math.round(m[3] * r + m[4] * g + m[5] * b), 0, 255);
          var nb = clamp(Math.round(m[6] * r + m[7] * g + m[8] * b), 0, 255);
          var hex = '#' + [nr, ng, nb].map(function(v) { return v.toString(16).padStart(2, '0'); }).join('');
          html += '<div style="text-align:center;"><div class="cb-swatch" style="background:' + hex + '"></div><span style="font-size:10px;font-family:var(--font-mono);">' + cbTypes[k].label + '</span></div>';
        }
        return html;
      }

      function toHex(r, g, b) { return '#' + [r, g, b].map(function (v) { return v.toString(16).padStart(2, '0'); }).join('').to大写(); }
      function toRgbStr(r, g, b, a) { return a < 1 ? 'rgba(' + r + ', ' + g + ', ' + b + ', ' + a + ')' : 'rgb(' + r + ', ' + g + ', ' + b + ')'; }
      function toHslStr(r, g, b, a) { var hsl = rgbToHsl(r, g, b); return (a < 1 ? 'hsla(' : 'hsl(') + Math.round(hsl.h) + ', ' + Math.round(hsl.s) + '%, ' + Math.round(hsl.l) + '%' + (a < 1 ? ', ' + a + ')' : ')'); }

      function updateAll(rgb) {
        if (!rgb) return;
        var r = clamp(rgb.r, 0, 255), g = clamp(rgb.g, 0, 255), b = clamp(rgb.b, 0, 255), a = rgb.a !== undefined ? rgb.a : 1;
        preview.style.background = toRgbStr(r, g, b, a);
        vHex.textContent = toHex(r, g, b);
        vRgb.textContent = toRgbStr(r, g, b, a);
        vHsl.textContent = toHslStr(r, g, b, a);

        var hsl = rgbToHsl(r, g, b);
        vHsla.textContent = 'hsla(' + Math.round(hsl.h) + ', ' + Math.round(hsl.s) + '%, ' + Math.round(hsl.l) + '%, ' + a + ')';
        vHsv.textContent = 'hsv(' + Math.round(rgbToHsv(r, g, b).h) + ', ' + Math.round(rgbToHsv(r, g, b).s) + '%, ' + Math.round(rgbToHsv(r, g, b).v) + '%)';
        vCmyk.textContent = 'cmyk(' + rgbToCmyk(r, g, b).c + '%, ' + rgbToCmyk(r, g, b).m + '%, ' + rgbToCmyk(r, g, b).y + '%, ' + rgbToCmyk(r, g, b).k + '%)';

        var oklab = rgbToOklab(r, g, b);
        var oklch = oklabToOklch(oklab.L, oklab.a, oklab.b);
        vOklch.textContent = 'oklch(' + oklch.L.toFixed(3) + ' ' + oklch.C.toFixed(3) + ' ' + oklch.h.toFixed(1) + ')';

        var lab = rgbToLab(r, g, b);
        vLab.textContent = 'lab(' + lab.L + '% ' + lab.a + ' ' + lab.b + ')';
        var lch = labToLch(lab.L, lab.a, lab.b);
        vLch.textContent = 'lch(' + lch.L + '% ' + lch.C + ' ' + lch.h + ')';

        cbSim.innerHTML = colorblindSim(r, g, b);
        o.textContent = toHex(r, g, b) + '  ' + toRgbStr(r, g, b, a) + '  ' + toHslStr(r, g, b, a);
      }

      function detectAndConvert(v) {
        v = v.trim();
        if (!v) return null;
        return parseHex(v) || parseRgb(v) || parseHsl(v) || parseCmyk(v);
      }

      document.getElementById('convertBtn').addEventListener('click', function () {
        var v = inputEl.value.trim();
        if (!v) { setStatus('Enter a color value', 'error'); return; }
        var rgb = detectAndConvert(v);
        if (!rgb) { setStatus('Could not parse color', 'error'); preview.style.background = ''; o.textContent = ''; return; }
        updateAll(rgb);
        setStatus('');
      });
      inputEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('convertBtn').click(); });
      document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; o.textContent = ''; preview.style.background = ''; [vHex, vRgb, vHsl, vHsla, vHsv, vCmyk, vOklch, vLab, vLch].forEach(function (el) { el.textContent = '—'; }); cbSim.innerHTML = ''; setStatus(''); inputEl.focus(); });
      document.getElementById('copyBtn').addEventListener('click', function () { if (o.textContent) { copyToClipboard(o.textContent, this); setStatus('Copied'); } });
    })();
  </script>
</body>
</html>
