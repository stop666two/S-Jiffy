<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片取色器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .color-preview { width:40px; height:40px; border-radius:var(--radius-sm); border:1px solid var(--color-border); flex-shrink:0; }
    .color-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--color-border); }
    .color-row:last-child { border-bottom:none; }
    .color-hex { font-family:var(--font-mono); font-size:var(--font-size-sm); min-width:80px; }
    .color-pct { font-size:var(--font-size-xs); color:var(--color-text-secondary); min-width:50px; text-align:right; }
    .color-bar { height:16px; border-radius:2px; flex:1; min-width:60px; }
    .drop-zone { border:2px dashed var(--color-border); border-radius:var(--radius-md); padding:var(--space-5); text-align:center; cursor:pointer; transition:border-color 0.15s; }
    .drop-zone:hover, .drop-zone.dragover { border-color:var(--color-text-primary); }
    .drop-zone img { max-width:100%; max-height:300px; margin-top:var(--space-2); border-radius:var(--radius-sm); }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>图片颜色提取</h1>
    <p class="tool-desc">从图片中提取主要颜色。</p>

    <div class="card" id="dropZone" class="drop-zone">
      <div class="drop-zone" style="border:none;padding:0;">
        <p style="color:var(--color-text-secondary);">点击选择或拖拽图片到此处</p>
        <input id="fileInput" type="file" accept="image/*" style="display:none;">
        <canvas id="canvas" style="display:none;"></canvas>
      </div>
    </div>

    <div class="输出-box" id="结果Box" style="min-height:80px;">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var fileInput = document.getElementById('fileInput');
      var dropZone = document.getElementById('dropZone');
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');
      var o = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');

      function rgbToHex(r, g, b) {
        return '#' + [r, g, b].map(function (x) { return x.toString(16).padStart(2, '0'); }).join('');
      }

      function hexToRgb(hex) {
        var r = parseInt(hex.substring(1, 3), 16);
        var g = parseInt(hex.substring(3, 5), 16);
        var b = parseInt(hex.substring(5, 7), 16);
        return { r: r, g: g, b: b };
      }

      function colorDistance(a, b) {
        return Math.sqrt(Math.pow(a.r - b.r, 2) + Math.pow(a.g - b.g, 2) + Math.pow(a.b - b.b, 2));
      }

      function quantize(pixels, count) {
        var step = Math.max(1, Math.floor(pixels.length / 10000));
        var sampled = [];
        for (var i = 0; i < pixels.length; i += step * 4) {
          sampled.push({ r: pixels[i], g: pixels[i + 1], b: pixels[i + 2] });
        }
        if (!sampled.length) return [];

        var clusters = [];
        for (var k = 0; k < count; k++) {
          clusters.push(sampled[Math.floor(Math.random() * sampled.length)]);
        }

        for (var iter = 0; iter < 10; iter++) {
          var assignments = [];
          for (var i = 0; i < sampled.length; i++) {
            var minDist = Infinity, best = 0;
            for (var k = 0; k < clusters.length; k++) {
              var d = colorDistance(sampled[i], clusters[k]);
              if (d < minDist) { minDist = d; best = k; }
            }
            assignments.push(best);
          }
          var newClusters = [];
          for (var k = 0; k < clusters.length; k++) {
            var sumR = 0, sumG = 0, sumB = 0, cnt = 0;
            for (var i = 0; i < sampled.length; i++) {
              if (assignments[i] === k) { sumR += sampled[i].r; sumG += sampled[i].g; sumB += sampled[i].b; cnt++; }
            }
            if (cnt) newClusters.push({ r: Math.round(sumR / cnt), g: Math.round(sumG / cnt), b: Math.round(sumB / cnt) });
            else newClusters.push(clusters[k]);
          }
          clusters = newClusters;
        }

        var counts = [];
        for (var k = 0; k < clusters.length; k++) counts.push(0);
        for (var i = 0; i < sampled.length; i++) {
          var minDist = Infinity, best = 0;
          for (var k = 0; k < clusters.length; k++) {
            var d = colorDistance(sampled[i], clusters[k]);
            if (d < minDist) { minDist = d; best = k; }
          }
          counts[best]++;
        }
        var total = sampled.length;

        var sorted = clusters.map(function (c, i) { return { r: c.r, g: c.g, b: c.b, count: counts[i], pct: (counts[i] / total * 100).toFixed(1) }; });
        sorted.sort(function (a, b) { return b.count - a.count; });
        return sorted;
      }

      function processImage(img) {
        var w = Math.min(img.width, 200);
        var h = Math.round(img.height * w / img.width);
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        var imageData = ctx.getImageData(0, 0, w, h);
        var pixels = imageData.data;

        var colors = quantize(pixels, 10);
        var html = '';
        for (var i = 0; i < colors.length; i++) {
          var c = colors[i];
          var hex = rgbToHex(c.r, c.g, c.b);
          html += '<div class="color-row">';
          html += '<div class="color-preview" style="background:' + hex + '"></div>';
          html += '<span class="color-hex">' + hex.toUpperCase() + '</span>';
          html += '<div class="color-bar" style="background:' + hex + '"></div>';
          html += '<span class="color-pct">' + c.pct + '%</span>';
          html += '</div>';
        }
        o.innerHTML = html;
        setStatus('提取到 ' + colors.length + ' 种主要颜色');
      }

      dropZone.addEventListener('click', function () { fileInput.click(); });
      dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('dragover'); });
      dropZone.addEventListener('drop', function (e) {
        e.preventDefault(); dropZone.classList.remove('dragover');
        var file = e.dataTransfer.files[0];
        if (file && file.type.indexOf('image') !== -1) { loadFile(file); }
      });
      fileInput.addEventListener('change', function () {
        if (fileInput.files[0]) loadFile(fileInput.files[0]);
      });

      function loadFile(file) {
        var reader = new FileReader();
        reader.onload = function (e) {
          var img = new Image();
          img.onload = function () {
            var preview = dropZone.querySelector('img');
            if (!preview) { preview = document.createElement('img'); dropZone.querySelector('div').appendChild(preview); }
            preview.src = e.target.result;
            processImage(img);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      copyBtn.addEventListener('click', function () {
        var text = o.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制'); }
      });
    })();
  </script>
</body>
</html>
