<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Color Harmony - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.harm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-3);}
.harm-card{border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden;}
.harm-card h3{font-size:var(--font-size-sm);padding:var(--space-1) var(--space-2);background:var(--color-bg-soft);border-bottom:1px solid var(--color-border);}
.harm-swatches{display:flex;}
.harm-swatch{flex:1;height:60px;display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;font-family:var(--font-mono);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
.base-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:var(--space-3);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>色彩和谐搭配</h1><p class="tool-desc">Input a color, see 12 harmony types with preview swatches.</p>
<div class="card"><div class="base-row"><label style="font-size:var(--font-size-sm);">Base Color</label><input id="baseColor" type="color" value="#e74c3c"><span id="baseHex" style="font-family:var(--font-mono);font-size:var(--font-size-sm);">#e74c3c</span></div></div>
<div class="harm-grid" id="harmGrid"></div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var inp=document.getElementById('baseColor'),bh=document.getElementById('baseHex'),grid=document.getElementById('harmGrid'),o=document.getElementById('输出Text');

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(function(v){return Math.round(v).toString(16).padStart(2,'0');}).join('');}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2;if(mx===mn)return[0,0,Math.round(l*100)];
var d=mx-mn,s=l>.5?d/(2-mx-mn):d/(mx+mn);var hh;switch(mx){case r:hh=((g-b)/d+(g<b?6:0))*60;break;case g:hh=((b-r)/d+2)*60;break;case b:hh=((r-g)/d+4)*60;break;}
return[Math.round(hh),Math.round(s*100),Math.round(l*100)];}
function hslToRgb(h,s,l){s/=100;l/=100;var c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;var r,g,b;
if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}
return{r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};}
function hslToHex(h,s,l){var rgb=hslToRgb(h,s,l);return rgbToHex(rgb.r,rgb.g,rgb.b);}

var harmonies={monochromatic:{label:'Monochromatic',fn:function(h,s,l){var colors=[];for(var i=0;i<5;i++)colors.push(hslToHex(h,s,10+i*15));return colors;}},
complementary:{label:'Complementary',fn:function(h,s,l){return[hslToHex(h,s,l),hslToHex((h+180)%360,s,l),hslToHex((h+15)%360,s,l),hslToHex((h+165)%360,s,l),hslToHex((h+180)%360,Math.min(100,s+15),Math.min(100,l-10))];}},
analogous:{label:'Analogous',fn:function(h,s,l){return[hslToHex((h-30+360)%360,s,l),hslToHex((h-15+360)%360,s,l),hslToHex(h,s,l),hslToHex((h+15)%360,s,l),hslToHex((h+30)%360,s,l)];}},
triadic:{label:'Triadic',fn:function(h,s,l){return[hslToHex(h,s,l),hslToHex((h+120)%360,s,l),hslToHex((h+240)%360,s,l),hslToHex((h+60)%360,s,Math.min(100,l+12)),hslToHex((h+180)%360,s,Math.min(100,l+12))];}},
tetradic:{label:'Tetradic',fn:function(h,s,l){return[hslToHex(h,s,l),hslToHex((h+90)%360,s,l),hslToHex((h+180)%360,s,l),hslToHex((h+270)%360,s,l),hslToHex((h+45)%360,Math.min(100,s-10),Math.min(100,l+10))];}},
splitComplementary:{label:'Split Complementary',fn:function(h,s,l){return[hslToHex(h,s,l),hslToHex((h+150)%360,s,l),hslToHex((h+210)%360,s,l),hslToHex((h+150)%360,Math.min(100,s-15),Math.min(100,l+15)),hslToHex((h+210)%360,Math.min(100,s-15),Math.min(100,l+15))];}},
square:{label:'Square',fn:function(h,s,l){return[hslToHex(h,s,l),hslToHex((h+90)%360,s,l),hslToHex((h+180)%360,s,l),hslToHex((h+270)%360,s,l)];}},
compound:{label:'Compound',fn:function(h,s,l){return[hslToHex(h,s,l),hslToHex((h+180)%360,s,Math.min(100,l-15)),hslToHex((h-20+360)%360,Math.min(100,s-10),l),hslToHex((h+160)%360,Math.min(100,s-10),l),hslToHex((h+180)%360,s-20>0?s-20:0,Math.min(100,l+15))];}},
shades:{label:'Shades',fn:function(h,s,l){var c=[];for(var i=0;i<5;i++)c.push(hslToHex(h,s,Math.max(0,Math.min(100,l-20*i+20))));return c;}},
tints:{label:'Tints',fn:function(h,s,l){var c=[];for(var i=0;i<5;i++)c.push(hslToHex(h,Math.max(0,s-10*i),Math.min(100,l+10*i)));return c;}},
tones:{label:'Tones',fn:function(h,s,l){var c=[];for(var i=0;i<5;i++)c.push(hslToHex(h,Math.max(0,s-15*i),l+5));return c;}},
custom:{label:'Custom (30° steps)',fn:function(h,s,l){var c=[];for(var i=0;i<12;i++)c.push(hslToHex((h+i*30)%360,s,l));return c;}}};

function render(){var hex=inp.value;bh.textContent=hex;var rgb=hexToRgb(hex);var hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);var h=hsl[0],s=hsl[1],l=hsl[2];
var html='';var keys=Object.keys(harmonies);for(var i=0;i<keys.length;i++){var hh=harmonies[keys[i]];var cols=hh.fn(h,s,l);
html+='<div class="harm-card"><h3>'+hh.label+'</h3><div class="harm-swatches">';
for(var c=0;c<cols.length;c++){html+='<div class="harm-swatch" style="background:'+cols[c]+'">'+cols[c]+'</div>';}
html+='</div></div>';}
grid.innerHTML=html;
o.textContent=hex+' → '+keys.length+' harmonies';}

inp.addEventListener('input',render);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制');}});
render();})();
</script></body></html>
