<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Color Mixer - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.mix-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:var(--space-3);}
.mix-row label{font-size:var(--font-size-sm);color:var(--color-text-secondary);}
.mix-preview{width:100%;height:80px;border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:var(--space-2);transition:background .2s;}
.swatch-row{display:flex;gap:12px;align-items:center;}
.swatch-box{width:40px;height:40px;border-radius:var(--radius-sm);border:1px solid var(--color-border);}
.mix-结果-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.mix-结果-row .val{font-family:var(--font-mono);font-size:var(--font-size-sm);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>颜色混合器</h1><p class="tool-desc">Blend two colors by percentage, see the 结果 with live preview.</p>
<div class="card">
<div class="swatch-row"><label style="font-size:var(--font-size-sm);">Color A</label><input id="colorA" type="color" value="#e74c3c"><span id="hexA" style="font-family:var(--font-mono);font-size:var(--font-size-sm);">#e74c3c</span></div>
<div class="swatch-row"><label style="font-size:var(--font-size-sm);">Color B</label><input id="colorB" type="color" value="#3498db"><span id="hexB" style="font-family:var(--font-mono);font-size:var(--font-size-sm);">#3498db</span></div>
</div>
<div class="card">
<div class="mix-row"><label>Blend: Color A</label><input id="blendSlider" type="range" min="0" max="100" value="50" style="flex:1;"><span id="blendPct" style="font-family:var(--font-mono);font-size:var(--font-size-sm);">50%</span></div>
<div id="mixPreview" class="mix-preview"></div>
<div class="mix-结果-row"><span class="val" style="font-weight:600;">结果:</span><span class="val" id="结果Hex">—</span><span class="val" id="结果Rgb">—</span><span class="val" id="结果Hsl">—</span></div>
</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var cA=document.getElementById('colorA'),cB=document.getElementById('colorB'),hA=document.getElementById('hexA'),hB=document.getElementById('hexB');
var sl=document.getElementById('blendSlider'),bp=document.getElementById('blendPct'),mp=document.getElementById('mixPreview');
var rH=document.getElementById('结果Hex'),rR=document.getElementById('结果Rgb'),rHsl=document.getElementById('结果Hsl'),o=document.getElementById('outputText');

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(function(v){return Math.round(v).toString(16).padStart(2,'0');}).join('');}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2;if(mx===mn)return[0,0,Math.round(l*100)];
var d=mx-mn,s=l>.5?d/(2-mx-mn):d/(mx+mn);var hh;switch(mx){case r:hh=((g-b)/d+(g<b?6:0))*60;break;case g:hh=((b-r)/d+2)*60;break;case b:hh=((r-g)/d+4)*60;break;}
return[Math.round(hh),Math.round(s*100),Math.round(l*100)];}

function mix(){var ha=cA.value,hb=cB.value;hA.textContent=ha;hB.textContent=hb;var pct=parseInt(sl.value)/100;bp.textContent=sl.value+'%';
var rgbA=hexToRgb(ha),rgbB=hexToRgb(hb);
var r=Math.round(rgbA.r*(1-pct)+rgbB.r*pct);
var g=Math.round(rgbA.g*(1-pct)+rgbB.g*pct);
var b=Math.round(rgbA.b*(1-pct)+rgbB.b*pct);
var hex=rgbToHex(r,g,b);mp.style.background=hex;
rH.textContent=hex;rR.textContent='rgb('+r+','+g+','+b+')';
var hsl=rgbToHsl(r,g,b);rHsl.textContent='hsl('+hsl[0]+','+hsl[1]+'%,'+hsl[2]+'%)';
o.textContent=hex;}

cA.addEventListener('input',mix);cB.addEventListener('input',mix);
sl.addEventListener('input',mix);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制');}});
mix();})();
</script></body></html>
