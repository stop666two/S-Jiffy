<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Advanced Color Picker - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.picker-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:var(--space-3);}
.picker-main{flex:1;min-width:280px;}
.picker-main input[type=color]{width:100%;height:60px;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:2px;cursor:pointer;background:none;}
.color-detail{display:grid;gap:var(--space-1);}
.detail-row{display:flex;justify-content:space-between;padding:6px 8px;border:1px solid var(--color-border);border-radius:var(--radius-sm);font-size:var(--font-size-sm);font-family:var(--font-mono);}
.detail-row .key{color:var(--color-text-secondary);}
.history-grid{display:flex;gap:4px;flex-wrap:wrap;}
.hist-swatch{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--color-border);cursor:pointer;transition:transform .1s;}
.hist-swatch:hover{transform:scale(1.2);}
.export-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:var(--space-2);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>高级拾色器</h1><p class="tool-desc">Pick colors visually with history, saved palette export.</p>
<div class="card"><div class="picker-row"><div class="picker-main"><input id="colorPicker" type="color" value="#3498db"></div>
<div style="flex:1;min-width:200px;"><div class="color-detail" id="colorDetail"></div></div></div>
<div class="export-row">
<button id="saveBtn" class="btn btn-secondary">Save Color</button>
<button id="exportBtn" class="btn btn-secondary">Export Palette</button>
<button id="randomBtn" class="btn btn-secondary">随机</button>
<button id="clearHistoryBtn" class="btn btn-secondary">Clear History</button>
</div>
</div>
<div class="card"><h3 style="font-size:var(--font-size-sm);margin-bottom:var(--space-2);">Saved Colors</h3><div class="history-grid" id="historyGrid"><span style="font-size:var(--font-size-xs);color:var(--color-text-disabled);">No saved colors</span></div></div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var cp=document.getElementById('colorPicker'),cd=document.getElementById('colorDetail'),hg=document.getElementById('historyGrid'),o=document.getElementById('outputText');

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2;if(mx===mn)return[0,0,Math.round(l*100)];
var d=mx-mn,s=l>.5?d/(2-mx-mn):d/(mx+mn);var hh;switch(mx){case r:hh=((g-b)/d+(g<b?6:0))*60;break;case g:hh=((b-r)/d+2)*60;break;case b:hh=((r-g)/d+4)*60;break;}
return[Math.round(hh),Math.round(s*100),Math.round(l*100)];}
function rgbToCmyk(r,g,b){var c=1-r/255,m2=1-g/255,y=1-b/255,k=Math.min(c,m2,y);
if(k===1)return[0,0,0,100];return[Math.round((c-k)/(1-k)*100),Math.round((m2-k)/(1-k)*100),Math.round((y-k)/(1-k)*100),Math.round(k*100)];}

var saved=JSON.parse(localStorage.getItem('s-jiffy:colors')||'[]');

function renderDetail(){var hex=cp.value;var rgb=hexToRgb(hex);var hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);var cmyk=rgbToCmyk(rgb.r,rgb.g,rgb.b);
cd.innerHTML='<div class="detail-row"><span class="key">HEX</span><span>'+hex+'</span></div><div class="detail-row"><span class="key">RGB</span><span>'+rgb.r+', '+rgb.g+', '+rgb.b+'</span></div><div class="detail-row"><span class="key">HSL</span><span>'+hsl[0]+'°, '+hsl[1]+'%, '+hsl[2]+'%</span></div><div class="detail-row"><span class="key">CMYK</span><span>'+cmyk[0]+'%, '+cmyk[1]+'%, '+cmyk[2]+'%, '+cmyk[3]+'%</span></div>';
o.textContent=hex;}

function renderHistory(){if(saved.length===0){hg.innerHTML='<span style="font-size:var(--font-size-xs);color:var(--color-text-disabled);">No saved colors</span>';return;}
var html='';for(var i=0;i<saved.length;i++){          html+='<div class="hist-swatch" style="background:'+htmlEscape(saved[i])+'" data-color="'+htmlEscape(saved[i])+'"></div>';}
hg.innerHTML=html;var sw=hg.querySelectorAll('.hist-swatch');for(var j=0;j<sw.length;j++){sw[j].addEventListener('click',function(){cp.value=this.dataset.color;renderDetail();});}}

function save(){var hex=cp.value;if(saved.indexOf(hex)===-1){saved.unshift(hex);if(saved.length>20)saved.pop();localStorage.setItem('s-jiffy:colors',JSON.stringify(saved));renderHistory();setStatus('Saved '+hex);}}

function exportPalette(){if(saved.length===0){setStatus('No saved colors','error');return;}
var text=saved.join('\n');o.textContent=text;copyToClipboard(text,document.getElementById('copyBtn'));setStatus('Exported '+saved.length+' colors');}

function randomHex(){var h='#';for(var i=0;i<6;i++)h+=Math.floor(Math.random()*16).toString(16);cp.value=h;renderDetail();}

cp.addEventListener('input',renderDetail);
document.getElementById('saveBtn').addEventListener('click',save);
document.getElementById('exportBtn').addEventListener('click',exportPalette);
document.getElementById('randomBtn').addEventListener('click',randomHex);
document.getElementById('clearHistoryBtn').addEventListener('click',function(){saved=[];localStorage.setItem('s-jiffy:colors','[]');renderHistory();setStatus('Cleared');});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制');}});
renderDetail();renderHistory();})();
</script></body></html>
