<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>复利计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>复利计算器</h1><p class="tool-desc">复利投资收益和终值计算。</p><div class="card"><div class="row"><div><label>本金 (元)</label><input id="principal" class="input" type="number" value="100000" min="1"></div><div><label>年利率 (%)</label><input id="rate" class="input" type="number" value="8" min="0" step="0.1"></div><div><label>年限</label><input id="years" class="input" type="number" value="10" min="1" max="100"></div></div>
<div class="row"><div><label>复利频率</label><select id="freq" class="input" style="width:auto"><option value="1">每年</option><option value="2">每半年</option><option value="4">每季</option><option value="12" selected>每月</option><option value="365">每日</option></select></div><div><label>每月追加</label><input id="add" class="input" type="number" value="0" min="0"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="finalVal">—</div><div class="l">最终金额 (元)</div></div><div class="res-item"><div class="v" id="earnVal">—</div><div class="l">总收益 (元)</div></div><div class="res-item"><div class="v" id="totalInVal">—</div><div class="l">总投入 (元)</div></div><div class="res-item"><div class="v" id="annVal">—</div><div class="l">年化收益率</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var p=document.getElementById('principal'),r=document.getElementById('rate'),y=document.getElementById('years'),f=document.getElementById('freq'),ad=document.getElementById('add'),fv=document.getElementById('finalVal'),ev=document.getElementById('earnVal'),tv=document.getElementById('totalInVal'),av=document.getElementById('annVal'),o=document.getElementById('输出Text');
function calc(){var principal=parseFloat(p.value),rate=parseFloat(r.value)/100,years=parseInt(y.value),freq=parseInt(f.value),add=parseFloat(ad.value)||0;if(!principal||!years){setStatus('请输入有效数据','error');return}
var total=principal;var totalIn=principal;for(var i=0;i<years*freq;i++){total=total*(1+rate/freq);if(add>0&&i<years*freq-1){total+=add;totalIn+=add}}
var earn=total-totalIn;var ann=totalIn>0?(Math.pow(total/totalIn,1/years)-1)*100:0;
fv.textContent=total.toFixed(2);ev.textContent=earn.toFixed(2);tv.textContent=totalIn.toFixed(2);av.textContent=ann.toFixed(2)+'%';
o.textContent='终值: '+total.toFixed(2)+' | 总投入: '+totalIn.toFixed(2)+' | 收益: '+earn.toFixed(2)+' | 年化: '+ann.toFixed(2)+'%';setStatus('计算完成')}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制')}});calc();})();</script></body></html>
