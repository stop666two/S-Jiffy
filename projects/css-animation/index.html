<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS Animation Generator - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
@keyframes previewAnim{from{transform:translateX(0);opacity:1}to{transform:translateX(200px);opacity:.5}}
.anim-stage{width:100%;height:220px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-soft);position:relative;overflow:hidden;margin-bottom:var(--space-3)}
.anim-ball{width:60px;height:60px;background:var(--color-text-primary);border-radius:12px;position:absolute;top:80px;left:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600}
.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ctrl-group{border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}
.ctrl-group h3{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:8px}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.ctrl-row label{font-size:var(--font-size-sm);min-width:60px}
.ctrl-row input[type=number]{width:70px}
.ctrl-row select{min-width:110px}
.keyframe-list{margin:var(--space-2) 0;font-size:13px;font-family:var(--font-mono);background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:var(--space-2);max-height:200px;overflow:auto;white-space:pre-wrap}
.preset-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-2)}
.preset-btn{padding:4px 12px;font-size:var(--font-size-xs);border:1px solid var(--color-border);border-radius:var(--radius-sm);background:transparent;cursor:pointer}
.preset-btn:hover{background:var(--color-bg-soft)}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace">
<h1>CSS 动画生成器</h1>
<p class="tool-desc">Build custom keyframe animations with presets (fadeIn, fadeOut, slideIn, slideOut, bounce, bounceIn, rotate, pulse, shake, flip, zoom, swing).</p>
<div class="card">
<div class="anim-stage" id="animStage"><div class="anim-ball" id="animBall">Anim</div></div>
<div style="margin-bottom:var(--space-2);"><span style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-right:8px;">Presets:</span>
<div class="preset-grid" id="presetGrid">
<button class="preset-btn" data-preset="fadeIn">Fade In</button>
<button class="preset-btn" data-preset="fadeOut">Fade Out</button>
<button class="preset-btn" data-preset="slideIn">Slide In</button>
<button class="preset-btn" data-preset="slideOut">Slide Out</button>
<button class="preset-btn" data-preset="bounce">Bounce</button>
<button class="preset-btn" data-preset="bounceIn">Bounce In</button>
<button class="preset-btn" data-preset="rotate">Rotate</button>
<button class="preset-btn" data-preset="pulse">Pulse</button>
<button class="preset-btn" data-preset="shake">Shake</button>
<button class="preset-btn" data-preset="flip">Flip</button>
<button class="preset-btn" data-preset="zoom">Zoom</button>
<button class="preset-btn" data-preset="swing">Swing</button>
</div></div>
<div class="ctrl-grid">
<div class="ctrl-group"><h3>Animation Properties</h3>
<div class="ctrl-row"><label>Duration</label><input id="durInput" class="input" type="number" value="2" min="0.1" max="30" step="0.1"><span style="font-size:var(--font-size-sm)">s</span></div>
<div class="ctrl-row"><label>Delay</label><input id="delayInput" class="input" type="number" value="0" min="0" max="10" step="0.1"><span style="font-size:var(--font-size-sm)">s</span></div>
<div class="ctrl-row"><label>Easing</label><select id="easeSelect" class="input">
<option value="ease">ease</option><option value="linear">linear</option><option value="ease-in">ease-in</option><option value="ease-out">ease-out</option><option value="ease-in-out">ease-in-out</option>
<option value="cubic-bezier(0.68,-0.55,0.265,1.55)">bounce</option><option value="cubic-bezier(0.175,0.885,0.32,1.275)">spring</option>
<option value="cubic-bezier(0.6,-0.28,0.735,0.045)">snap</option><option value="cubic-bezier(0.22,1,0.36,1)">ease-out quint</option>
<option value="cubic-bezier(0.87,0,0.13,1)">ease-in-out quint</option><option value="cubic-bezier(0.34,1.56,0.64,1)">spring light</option></select></div>
<div class="ctrl-row"><label>Direction</label><select id="dirSelect" class="input"><option value="normal">normal</option><option value="reverse">reverse</option><option value="alternate">alternate</option><option value="alternate-reverse">alternate-reverse</option></select></div>
<div class="ctrl-row"><label>Iterations</label><select id="iterSelect" class="input"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="infinite">∞ infinite</option></select></div>
<div class="ctrl-row"><label>Fill Mode</label><select id="fillSelect" class="input"><option value="none">none</option><option value="forwards">forwards</option><option value="backwards">backwards</option><option value="both">both</option></select></div>
</div>
<div class="ctrl-group"><h3>Transform</h3>
<div class="ctrl-row"><label>X Move</label><input id="xInput" class="input" type="number" value="200" min="-500" max="500"><span style="font-size:var(--font-size-sm)">px</span></div>
<div class="ctrl-row"><label>Y Move</label><input id="yInput" class="input" type="number" value="0" min="-500" max="500"><span style="font-size:var(--font-size-sm)">px</span></div>
<div class="ctrl-row"><label>Rotation</label><input id="rotInput" class="input" type="number" value="360" min="-720" max="720"><span style="font-size:var(--font-size-sm)">deg</span></div>
<div class="ctrl-row"><label>Scale</label><input id="scaleInput" class="input" type="number" value="1.5" min="0.1" max="5" step="0.1"></div>
<div class="ctrl-row"><label>Opacity</label><input id="opacityInput" class="input" type="number" value="0.5" min="0" max="1" step="0.1"></div>
</div></div>
<div class="btn-play" style="display:flex;gap:8px;margin:var(--space-2) 0;flex-wrap:wrap;">
<button id="playBtn" class="btn btn-primary">播放</button>
<button id="pauseBtn" class="btn btn-secondary">暂停</button>
<button id="stopBtn" class="btn btn-secondary">停止</button></div>
<div class="keyframe-list" id="keyframeDisplay">@keyframes anim-helper { ... }</div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<style id="animStyle"></style>
<script>
(function(){
  var ball=document.getElementById('animBall'),animStyle=document.getElementById('animStyle');
  var playBtn=document.getElementById('playBtn'),pauseBtn=document.getElementById('pauseBtn'),stopBtn=document.getElementById('stopBtn');
  var durInp=document.getElementById('durInput'),delayInp=document.getElementById('delayInput'),easeSel=document.getElementById('easeSelect');
  var dirSel=document.getElementById('dirSelect'),iterSel=document.getElementById('iterSelect'),fillSel=document.getElementById('fillSelect');
  var xInp=document.getElementById('xInput'),yInp=document.getElementById('yInput'),rotInp=document.getElementById('rotInput');
  var scaleInp=document.getElementById('scaleInput'),opaInp=document.getElementById('opacityInput');
  var kfDisplay=document.getElementById('keyframeDisplay'),out=document.getElementById('outputText');
  var animName='anim_'+Date.now(),isPlaying=false;

  var presets={
    fadeIn:{x:0,y:0,rot:0,scale:1,opa:1,easing:'ease'},
    fadeOut:{x:0,y:0,rot:0,scale:1,opa:0,easing:'ease-in'},
    slideIn:{x:200,y:0,rot:0,scale:1,opa:1,easing:'ease-out'},
    slideOut:{x:-200,y:0,rot:0,scale:1,opa:0,easing:'ease-in'},
    bounce:{x:200,y:0,rot:0,scale:1,opa:1,easing:'cubic-bezier(0.68,-0.55,0.265,1.55)'},
    bounceIn:{x:0,y:0,rot:0,scale:0.3,opa:1,easing:'cubic-bezier(0.68,-0.55,0.265,1.55)'},
    rotate:{x:0,y:0,rot:360,scale:1,opa:1,easing:'linear'},
    pulse:{x:0,y:0,rot:0,scale:1.3,opa:1,easing:'ease-in-out'},
    shake:{x:5,y:0,rot:0,scale:1,opa:1,easing:'ease-in-out'},
    flip:{x:0,y:0,rot:360,scale:0.5,opa:1,easing:'ease-out'},
    zoom:{x:0,y:0,rot:0,scale:2,opa:1,easing:'ease-out'},
    swing:{x:0,y:0,rot:30,scale:1,opa:1,easing:'ease-in-out'}
  };

  function generateKeyframes(){
    var x=parseInt(xInp.value)||0,y=parseInt(yInp.value)||0,rot=parseInt(rotInp.value)||0,s=parseFloat(scaleInp.value)||1,o=parseFloat(opaInp.value)||0.5;
    var isShake=x<=10&&rot===0;
    var css;
    if(isShake&&x<=10){css='@keyframes '+animName+' {\n  0%, 100% { transform: translateX(0); }\n  10%, 30%, 50%, 70%, 90% { transform: translateX(-'+Math.max(1,Math.abs(x))+'px); }\n  20%, 40%, 60%, 80% { transform: translateX('+Math.max(1,Math.abs(x))+'px); }\n}';}
    else{css='@keyframes '+animName+' {\n  0% {\n    transform: translateX(0) translateY(0) rotate(0deg) scale(1);\n    opacity: 1;\n  }\n  100% {\n    transform: translateX('+x+'px) translateY('+y+'px) rotate('+rot+'deg) scale('+s+');\n    opacity: '+o+';\n  }\n}';}
    animStyle.textContent=css;
    kfDisplay.textContent=css;
    out.textContent=css;}

  function applyAnimation(){var dur=durInp.value||2,e=easeSel.value,d=dirSel.value,i=iterSel.value,f=fillSel.value,dl=delayInp.value||0;
    ball.style.animation=animName+' '+dur+'s '+e+' '+i+' '+d+' '+f+' '+dl+'s';isPlaying=true;}

  function loadPreset(name){var p=presets[name];if(!p)return;
    animName='anim_'+name+'_'+Date.now();xInp.value=p.x;yInp.value=p.y;rotInp.value=p.rot;scaleInp.value=p.scale;opaInp.value=p.opa;
    if(name==='shake'){xInp.value=5;rotInp.value=0;}
    easeSel.value=p.easing;generateKeyframes();if(isPlaying)applyAnimation();setStatus('Preset: '+name);}

  var presetBtns=document.querySelectorAll('.preset-btn');
  for(var i=0;i<presetBtns.length;i++){presetBtns[i].addEventListener('click',function(){loadPreset(this.getAttribute('data-preset'));});}
  generateKeyframes();
  playBtn.addEventListener('click',function(){ball.style.animationPlayState='running';if(!isPlaying)applyAnimation();isPlaying=true;setStatus('Playing');});
  pauseBtn.addEventListener('click',function(){ball.style.animationPlayState='paused';setStatus('Paused');});
  stopBtn.addEventListener('click',function(){ball.style.animation='none';void ball.offsetHeight;isPlaying=false;setStatus('Stopped');});
  function onChange(){generateKeyframes();if(isPlaying)applyAnimation();}
  durInp.addEventListener('change',onChange);delayInp.addEventListener('change',onChange);easeSel.addEventListener('change',onChange);
  dirSel.addEventListener('change',onChange);iterSel.addEventListener('change',onChange);fillSel.addEventListener('change',onChange);
  xInp.addEventListener('change',onChange);yInp.addEventListener('change',onChange);rotInp.addEventListener('change',onChange);
  scaleInp.addEventListener('change',onChange);opaInp.addEventListener('change',onChange);
  copyBtn.addEventListener('click',function(){var t=out.textContent;if(t){copyToClipboard(t,copyBtn);setStatus('Copied CSS');}});
})();
</script></body></html>
