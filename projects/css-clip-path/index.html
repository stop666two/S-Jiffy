<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Clip-Path 生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>Clip-Path 生成器</h1><p class="tool-desc">可视化生成 CSS clip-path 裁剪路径。</p><div class="card"><div class="row"><div><label>形状</label><select id="shape" class="input" style="width:auto"><option value="circle">圆形 circle()</option><option value="ellipse">椭圆 ellipse()</option><option value="inset">内嵌 inset()</option><option value="polygon" selected>多边形 polygon()</option></select></div><div style="display:flex;align-items:end;gap:8px"><button id="genBtn" class="btn btn-primary">生成</button></div></div>
<div style="height:160px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:8px;margin:12px 0;display:flex;align-items:center;justify-content:center" id="previewBox"><span style="color:#fff;font-weight:600">S-Jiffy</span></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var sh=document.getElementById("shape"),pb=document.getElementById("previewBox"),o=document.getElementById("outputText");
function gen(){var shapes={circle:"circle(50% at 50% 50%)",ellipse:"ellipse(40% 50% at 50% 50%)",inset:"inset(15% 10% 15% 10%)",polygon:"polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%)"};
var v=shapes[sh.value]||shapes.polygon;pb.style.clipPath=v;o.textContent="clip-path: "+v+";";setStatus("已生成")}
document.getElementById("genBtn").addEventListener("click",gen);document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});gen();})();</script></body></html>
