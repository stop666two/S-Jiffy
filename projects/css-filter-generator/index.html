<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS 滤镜生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>CSS 滤镜生成器</h1><p class="tool-desc">可视化调整 CSS filter 属性实时预览。</p><div class="card"><div class="row"><div><label>模糊</label><input id="blur" class="input" type="range" min="0" max="10" step="0.1" value="0" style="width:100px"></div><span id="blurVal">0</span></div>
<div class="row"><div><label>灰度</label><input id="gray" class="input" type="range" min="0" max="100" value="0" style="width:100px"></div><span id="grayVal">0%</span></div>
<div class="row"><div><label>亮度</label><input id="bright" class="input" type="range" min="0" max="200" value="100" style="width:100px"></div><span id="brightVal">100%</span></div>
<div class="row"><div><label>对比度</label><input id="contrast" class="input" type="range" min="0" max="200" value="100" style="width:100px"></div><span id="contrastVal">100%</span></div>
<div class="row"><div><label>色相旋转</label><input id="hue" class="input" type="range" min="0" max="360" value="0" style="width:100px"></div><span id="hueVal">0deg</span></div>
<div style="width:200px;height:120px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:8px;margin:12px auto;transition:filter .3s" id="previewBox"></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var b=document.getElementById("blur"),bv=document.getElementById("blurVal"),g=document.getElementById("gray"),gv=document.getElementById("grayVal"),br=document.getElementById("bright"),brv=document.getElementById("brightVal"),co=document.getElementById("contrast"),cov=document.getElementById("contrastVal"),h=document.getElementById("hue"),hv=document.getElementById("hueVal"),pb=document.getElementById("previewBox"),o=document.getElementById("输出Text");
function update(){var filter="";filter+="blur("+b.value+"px) ";filter+="grayscale("+g.value+"%) ";filter+="brightness("+br.value+"%) ";filter+="contrast("+co.value+"%) ";filter+="hue-rotate("+h.value+"deg)";
bv.textContent=b.value;gv.textContent=g.value+"%";brv.textContent=br.value+"%";cov.textContent=co.value+"%";hv.textContent=h.value+"deg";pb.style.filter=filter.trim();o.textContent="filter: "+filter.trim()+";"}
b.addEventListener("input",update);g.addEventListener("input",update);br.addEventListener("input",update);co.addEventListener("input",update);h.addEventListener("input",update);
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
