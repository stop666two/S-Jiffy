<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS Grid 生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>CSS Grid 生成器</h1><p class="tool-desc">可视化生成 CSS Grid 布局代码。</p><div class="card"><div class="row"><div><label>列数</label><input id="cols" class="input" type="number" value="3" min="1" max="12"></div><div><label>行数</label><input id="rows" class="input" type="number" value="3" min="1" max="12"></div><div><label>间距</label><input id="gap" class="input" type="number" value="10" min="0"></div><div style="display:flex;align-items:end;gap:8px"><button id="generateBtn" class="btn btn-primary">生成</button></div></div>
<div style="border:1px solid var(--color-border);border-radius:8px;padding:12px;margin-top:12px;overflow:auto;background:#fafafa" id="previewArea"></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var cols=document.getElementById("cols"),rows=document.getElementById("rows"),gap=document.getElementById("gap"),pa=document.getElementById("previewArea"),o=document.getElementById("outputText");
document.getElementById("generateBtn").addEventListener("click",function(){var c=parseInt(cols.value)||3,r=parseInt(rows.value)||3,g=parseInt(gap.value)||10;
var css="display: grid;\ngrid-template-columns: repeat("+c+", 1fr);\ngrid-template-rows: repeat("+r+", auto);\ngap: "+g+"px;";
var h="<div style=\""+css+"background:var(--color-bg);\">";for(var i=0;i<c*r;i++){h+="<div style=\"background:#e8e8e8;border-radius:4px;padding:16px;text-align:center;font-size:13px;color:#666\">Item "+(i+1)+"</div>"}h+="</div>"
pa.innerHTML=h;o.textContent=css;setStatus("已生成 "+c+"x"+r+" Grid")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
