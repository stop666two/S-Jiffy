<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS 压缩 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.code-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:300px}@media(max-width:700px){.code-pair{grid-template-columns:1fr}}.code-pair textarea{height:300px;resize:vertical;font-family:var(--font-mono);font-size:13px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.code-pair textarea:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.stats{display:flex;gap:16px;font-size:12px;color:var(--color-text-secondary);margin-top:8px;flex-wrap:wrap}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>CSS 压缩</h1><p class="tool-desc">压缩 CSS 代码：移除注释、多余空白、缩短颜色值。</p>
<div class="card">
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
<button id="minifyBtn" class="btn btn-primary">压缩</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="code-pair">
<textarea id="cssInput" class="js-focus-input" placeholder="粘贴 CSS 代码...">/* 这是个注释 */
body {
  background-color: #ffffff;
  color: #333333;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1200px;
  margin-left: auto;
  margin-right: auto;
}
</textarea>
<textarea id="css输出" readonly placeholder="压缩结果..." style="background:var(--color-bg-soft);"></textarea>
</div>
<div class="stats" id="stats"></div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var cssInput=document.getElementById('cssInput');
var css输出=document.getElementById('css输出');
var minifyBtn=document.getElementById('minifyBtn');
var clearBtn=document.getElementById('clearBtn');
var 输出El=document.getElementById('输出Text');
var copyBtn=document.getElementById('copyBtn');
var stats=document.getElementById('stats');

function minify(){
var css=cssInput.value;
if(!css.trim()){css输出.value='';stats.textContent='';输出El.textContent='';setStatus('请输入 CSS','error');return;}
var 结果=css;
结果=结果.replace(/\/\*[\s\S]*?\*\//g,'');
结果=结果.replace(/\s+/g,' ');
结果=结果.replace(/\s*\/\s*/g,'/');
结果=结果.replace(/\s*:\s*/g,':');
结果=结果.replace(/\s*;\s*/g,';');
结果=结果.replace(/\s*\{\s*/g,'{');
结果=结果.replace(/\s*\}\s*/g,'}');
结果=结果.replace(/\s*,\s*/g,',');
结果=结果.replace(/\s*>\s*/g,'>');
结果=结果.replace(/\s*\+\s*/g,'+');
结果=结果.replace(/\s*~\s*/g,'~');
结果=结果.replace(/;\}/g,'}');
结果=结果.replace(/  +/g,' ');
结果=结果.replace(/^\s+|\s+$/g,'');
结果=结果.replace(/#([0-9a-f])\1([0-9a-f])\2([0-9a-f])\3/gi,'#$1$2$3');
结果=结果.replace(/#([0-9a-f])\1([0-9a-f])\2([0-9a-f])\3([0-9a-f])\4/gi,'#$1$2$3$4');
css输出.value=结果;
var inputSize=css.length;
var 输出Size=结果.length;
var saved=inputSize-输出Size;
var pct=inputSize>0?((saved/inputSize)*100).toFixed(1):0;
stats.innerHTML='<span>原始: '+inputSize+' 字节</span><span>压缩: '+输出Size+' 字节</span><span>节省: '+saved+' 字节 ('+pct+'%)</span>';
输出El.textContent='压缩完成';
setStatus('');
}

clearBtn.addEventListener('click',function(){cssInput.value='';css输出.value='';stats.textContent='';输出El.textContent='';setStatus('');cssInput.focus();});
minifyBtn.addEventListener('click',minify);
copyBtn.addEventListener('click',function(){if(css输出.value){copyToClipboard(css输出.value,copyBtn);setStatus('已复制');}});
cssInput.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')minify();});
})();</script></body></html>
