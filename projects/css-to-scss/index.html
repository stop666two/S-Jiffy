<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS → SCSS - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.output-box { font-family: var(--font-mono); font-size: 13px; }</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>CSS → SCSS</h1><p class="tool-desc">将 CSS 代码转换为 SCSS/Sass 嵌套语法</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="nav { background: #333; }\nnav ul { list-style: none; }\nnav ul li { display: inline; }\nnav ul li a { color: white; }\nnav ul li a:hover { color: #ccc; }" style="min-height:200px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;"><button id="convertBtn" class="btn btn-primary">转换</button><button id="clearBtn" class="btn btn-secondary">清空</button></div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function () {
  var inputEl = document.getElementById('inputText');
  var outputEl = document.getElementById('outputText');

  function parseRules(css) {
    var rules = [];
    var ruleRegex = /([^{]+)\{([^}]*)\}/g;
    var match;
    while ((match = ruleRegex.exec(css)) !== null) {
      var selector = match[1].trim();
      var body = match[2].trim();
      var props = [];
      var propLines = body.split(';');
      for (var i = 0; i < propLines.length; i++) {
        var pl = propLines[i].trim();
        if (!pl) continue;
        var colonIdx = pl.indexOf(':');
        if (colonIdx === -1) continue;
        props.push({ property: pl.substring(0, colonIdx).trim(), value: pl.substring(colonIdx + 1).trim() });
      }
      rules.push({ selector: selector, properties: props });
    }
    return rules;
  }

  function buildNested(rules) {
    var tree = { children: {}, props: [] };

    for (var i = 0; i < rules.length; i++) {
      var selector = rules[i].selector;
      var parts = selector.split(/\s+/);
      var node = tree;
      for (var j = 0; j < parts.length; j++) {
        var p = parts[j];
        if (!node.children[p]) node.children[p] = { children: {}, props: [] };
        node = node.children[p];
      }
      node.props = rules[i].properties;
    }
    return tree;
  }

  function renderTree(node, indent, result) {
    var keys = Object.keys(node.children);
    for (var i = 0; i < keys.length; i++) {
      var key = keys[i];
      var child = node.children[key];
      var isPseudo = key.indexOf(':') === 0 || key.indexOf('&') === 0;
      var isCombinator = key.indexOf('>') >= 0 || key.indexOf('+') >= 0 || key.indexOf('~') >= 0;

      if (!isPseudo && !isCombinator) {
        result.push(indent + key + ' {');
      } else if (isPseudo) {
        result.push(indent + '&' + key + ' {');
      } else {
        result.push(indent + key + ' {');
      }

      for (var j = 0; j < child.props.length; j++) {
        var p = child.props[j];
        result.push(indent + '  ' + p.property + ': ' + p.value + ';');
      }

      if (Object.keys(child.children).length > 0) {
        renderTree(child, indent + '  ', result);
      }

      result.push(indent + '}');
    }
  }

  function css2scss(css) {
    var rules = parseRules(css);
    if (rules.length === 0) return css;
    var tree = buildNested(rules);
    var result = [];
    renderTree(tree, '', result);
    return result.join('\n');
  }

  function convert() {
    var text = inputEl.value.trim();
    if (!text) { setStatus('请输入 CSS', 'error'); return; }
    try {
      var result = css2scss(text);
      outputEl.textContent = result;
      setStatus('转换成功');
    } catch (e) {
      outputEl.textContent = '';
      setStatus('转换出错: ' + e.message, 'error');
    }
  }

  document.getElementById('convertBtn').addEventListener('click', convert);
  document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; outputEl.textContent = ''; setStatus(''); inputEl.focus(); });
  document.getElementById('copyBtn').addEventListener('click', function () { if (outputEl.textContent) { copyToClipboard(outputEl.textContent, this); setStatus('已复制到剪贴板'); } });
})();
</script></body></html>
