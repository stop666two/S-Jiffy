<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS Transform 生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>CSS Transform 生成器</h1><p class="tool-desc">可视化生成 CSS transform 变换代码。</p><div class="card"><div class="row"><div><label>旋转 (deg)</label><input id="rotate" class="input" type="range" min="-180" max="180" value="0" style="width:120px"><span id="rotateVal">0</span></div></div>
<div class="row"><div><label>缩放</label><input id="scale" class="input" type="range" min="0.1" max="3" step="0.1" value="1" style="width:120px"><span id="scaleVal">1</span></div></div>
<div class="row"><div><label>X 偏移 (px)</label><input id="tx" class="input" type="range" min="-100" max="100" value="0" style="width:120px"><span id="txVal">0</span></div></div>
<div class="row"><div><label>Y 偏移 (px)</label><input id="ty" class="input" type="range" min="-100" max="100" value="0" style="width:120px"><span id="tyVal">0</span></div></div>
<div style="height:100px;background:var(--color-bg-soft);border-radius:8px;margin-top:12px;display:flex;align-items:center;justify-content:center"><div id="previewBox" style="width:60px;height:60px;background:var(--color-text-primary);border-radius:8px;transition:transform .3s"></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var rot=document.getElementById("rotate"),rv=document.getElementById("rotateVal"),sc=document.getElementById("scale"),sv=document.getElementById("scaleVal"),tx=document.getElementById("tx"),txv=document.getElementById("txVal"),ty=document.getElementById("ty"),tyv=document.getElementById("tyVal"),pb=document.getElementById("previewBox"),o=document.getElementById("outputText");
function update(){var r=rot.value,s=sc.value,x=tx.value,y=ty.value;rv.textContent=r+"deg";sv.textContent=s;txv.textContent=x;tyv.textContent=y;
pb.style.transform="translate("+x+"px,"+y+"px) scale("+s+") rotate("+r+"deg)";o.textContent="transform: translate("+x+"px, "+y+"px) scale("+s+") rotate("+r+"deg);"}
rot.addEventListener("input",update);sc.addEventListener("input",update);tx.addEventListener("input",update);ty.addEventListener("input",update);
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
