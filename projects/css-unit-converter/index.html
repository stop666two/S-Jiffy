<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS 单位转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.conv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.conv-card{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}.conv-card .val{font-family:var(--font-mono);font-size:var(--font-size-lg);text-align:center;padding:8px 0}.conv-card .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary);text-align:center}.base-row{display:flex;align-items:center;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap}.base-row label{font-size:var(--font-size-sm)}.base-row .input{width:80px}.inp-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-3)}.inp-row select{width:120px}.inp-row .input{flex:1;min-width:150px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>CSS 单位转换</h1><p class="tool-desc">px ↔ em ↔ rem ↔ % ↔ vw/vh 相互转换，基于参考基准值。</p>
<div class="card">
<div class="base-row"><label>基础字号 (1rem = 1em)</label><input id="baseFontSize" class="input" type="number" value="16" min="1" style="width:80px"><span style="font-size:var(--font-size-sm)">px</span></div>
<div class="base-row" style="margin-top:-8px"><label>视口宽度</label><input id="viewportW" class="input" type="number" value="1920" min="320" style="width:80px"><span style="font-size:var(--font-size-sm)">px</span><label style="margin-left:12px">视口高度</label><input id="viewportH" class="input" type="number" value="1080" min="320" style="width:80px"><span style="font-size:var(--font-size-sm)">px</span></div>
<div class="inp-row"><input id="valueInput" class="input" type="number" value="16" placeholder="数值"><select id="fromUnit" class="input" style="width:100px"><option value="px">px</option><option value="em">em</option><option value="rem">rem</option><option value="percent">%</option><option value="vw">vw</option><option value="vh">vh</option></select><span style="display:flex;align-items:center;font-size:var(--font-size-sm)">→</span></div>
<div class="conv-grid"><div class="conv-card"><div class="lbl">px</div><div class="val" id="rpx">16</div></div><div class="conv-card"><div class="lbl">em</div><div class="val" id="rem">1</div></div><div class="conv-card"><div class="lbl">rem</div><div class="val" id="rrem">1</div></div><div class="conv-card"><div class="lbl">%</div><div class="val" id="rpct">100</div></div><div class="conv-card"><div class="lbl">vw</div><div class="val" id="rvw">0.833</div></div><div class="conv-card"><div class="lbl">vh</div><div class="val" id="rvh">1.481</div></div></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var valInp=document.getElementById('valueInput'),fromUnit=document.getElementById('fromUnit'),bfs=document.getElementById('baseFontSize'),vpw=document.getElementById('viewportW'),vph=document.getElementById('viewportH'),rpx=document.getElementById('rpx'),remEl=document.getElementById('rem'),rrem=document.getElementById('rrem'),rpct=document.getElementById('rpct'),rvw=document.getElementById('rvw'),rvh=document.getElementById('rvh'),out=document.getElementById('输出Text');function convert(){var v=parseFloat(valInp.value)||0,f=fromUnit.value,fs=parseFloat(bfs.value)||16,w=parseFloat(vpw.value)||1920,h=parseFloat(vph.value)||1080;var px;switch(f){case'px':px=v;break;case'em':case'rem':px=v*fs;break;case'percent':px=v*fs/100;break;case'vw':px=v*w/100;break;case'vh':px=v*h/100;break;default:px=0}rpx.textContent=px.toFixed(2)+'px';remEl.textContent=(px/fs).toFixed(4)+'em';rrem.textContent=(px/fs).toFixed(4)+'rem';rpct.textContent=((px/fs)*100).toFixed(2)+'%';rvw.textContent=((px/w)*100).toFixed(4)+'vw';rvh.textContent=((px/h)*100).toFixed(4)+'vh';out.textContent=v+fromUnit.value+' = '+px.toFixed(2)+'px'}valInp.addEventListener('input',convert);fromUnit.addEventListener('change',convert);bfs.addEventListener('input',convert);vpw.addEventListener('input',convert);vph.addEventListener('input',convert);convert();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
