<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Data URI 生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.uri-controls{display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap;align-items:center;}
.uri-preview{word-break:break-all;font-size:12px;line-height:1.4;max-height:120px;overflow-y:auto;}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Data URI 生成</h1><p class="tool-desc">将文本或 JSON 数据转换为 data:text/plain 或 data:application/json URI。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入文本或 JSON 数据..." style="min-height:120px;"></textarea></div>
<div class="uri-controls">
<select id="mimeType" class="input" style="width:auto;min-width:140px;">
  <option value="text/plain">text/plain</option>
  <option value="text/html">text/html</option>
  <option value="text/css">text/css</option>
  <option value="application/json">application/json</option>
  <option value="application/javascript">application/javascript</option>
  <option value="text/csv">text/csv</option>
  <option value="image/svg+xml">image/svg+xml</option>
</select>
<label style="font-size:var(--font-size-sm);display:flex;align-items:center;gap:4px;"><input id="base64Encode" type="checkbox"> Base64</label>
<button id="generateBtn" class="btn btn-primary">生成 URI</button>
</div>
<div class="output-box"><span id="outputText" class="uri-preview"></span><button class="copy-btn" id="copyBtn">复制</button></div>
<div class="output-box" style="margin-top:var(--space-2);min-height:40px;"><span id="decodedPreview"></span></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var i=document.getElementById('inputText'),o=document.getElementById('outputText'),dp=document.getElementById('decodedPreview');
var mime=document.getElementById('mimeType'),b64=document.getElementById('base64Encode');
document.getElementById('generateBtn').addEventListener('click',function(){
  var text=i.value;if(!text){setStatus('请输入内容','error');return;}
  var mt=mime.value;
  try{JSON.parse(text);mt='application/json';}catch(e){}
  var uri;
  if(b64.checked){
    var encoded=btoa(unescape(encodeURIComponent(text)));
    uri='data:'+mt+';base64,'+encoded;
  }else{
    uri='data:'+mt+','+encodeURIComponent(text);
  }
  o.textContent=uri;
  dp.textContent='解码预览: '+text.substring(0,100)+(text.length>100?'...':'');
  setStatus('Data URI 已生成 ('+uri.length+' 字符)');
});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
})();</script>
</body></html>
