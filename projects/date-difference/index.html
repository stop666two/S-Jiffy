<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日期差计算 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .dd-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
    .dd-row .field { flex:1; min-width:160px; }
    .dd-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>日期差计算</h1>
    <p class="tool-desc">两个日期之间的天数、周数、月数、年数。</p>
    <div class="card" style="display:flex;flex-direction:column;gap:16px;">
      <div class="dd-row">
        <div class="field"><label for="date1">起始日期</label><input id="date1" class="input" type="date"></div>
        <div class="field"><label for="date2">结束日期</label><input id="date2" class="input" type="date"></div>
      </div>
      <div><button id="calcBtn" class="btn btn-primary">计算差值</button></div>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var date1El = document.getElementById('date1');
      var date2El = document.getElementById('date2');
      var calcBtn = document.getElementById('calcBtn');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');

      function todayStr() {
        var d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }

      date1El.value = todayStr();
      date2El.value = todayStr();

      function calc() {
        var s1 = date1El.value;
        var s2 = date2El.value;
        if (!s1 || !s2) { setStatus('请选择两个日期', 'error'); return; }
        var d1 = new Date(s1);
        var d2 = new Date(s2);
        var diff = Math.abs(d2 - d1);
        var days = Math.round(diff / (1000 * 60 * 60 * 24));
        var weeks = (days / 7).toFixed(1);
        var months = 0;
        var years = 0;

        var start = d1 < d2 ? d1 : d2;
        var end = d1 < d2 ? d2 : d1;
        years = end.getFullYear() - start.getFullYear();
        months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
        if (end.getDate() < start.getDate()) months--;

        var label = d1 < d2 ? '相差' : '相差（绝对值）';
        输出El.textContent = label + ' ' + days + ' 天 = ' + weeks + ' 周 = ' + months + ' 个月 ≈ ' + years + ' 年';
        setStatus('计算完成');
      }

      calcBtn.addEventListener('click', calc);

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent;
        if (text) {
          copyToClipboard(text, copyBtn);
          setStatus('已复制到剪贴板');
        }
      });
    })();
  </script>
</body>
</html>
