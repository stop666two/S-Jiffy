<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>日期格式化器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>日期格式化器</h1><p class="tool-desc">将日期格式化为各种自定义格式。</p><div class="card"><div class="row"><div><label>选择日期</label><input id="datePicker" class="input" type="date" style="width:auto"></div><div><label>预设格式</label><select id="formatPreset" class="input" style="width:auto"><option value="YYYY-MM-DD">YYYY-MM-DD</option><option value="YYYY/MM/DD">YYYY/MM/DD</option><option value="DD/MM/YYYY">DD/MM/YYYY</option><option value="MM/DD/YYYY">MM/DD/YYYY</option><option value="YYYY年MM月DD日">YYYY年MM月DD日</option><option value="YYYY-MM-DD HH:mm:ss">完整时间</option><option value="dddd">星期几</option><option value="custom">自定义</option></select></div></div>
<div class="row"><div style="flex:1"><label>自定义格式</label><input id="customFormat" class="input" value="YYYY/MM/DD HH:mm" style="width:100%" disabled></div><div style="display:flex;align-items:end;gap:8px"><button id="formatBtn" class="btn btn-primary">格式化</button></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var dp=document.getElementById("datePicker"),fp=document.getElementById("formatPreset"),cf=document.getElementById("customFormat"),o=document.getElementById("输出Text");
dp.valueAsDate=new Date();fp.addEventListener("change",function(){cf.disabled=fp.value!=="custom"});
document.getElementById("formatBtn").addEventListener("click",function(){var d=dp.valueAsDate||new Date(),fmt=fp.value;if(fmt==="custom")fmt=cf.value||"YYYY-MM-DD";var y=d.getFullYear(),m=d.getMonth()+1,d2=d.getDate(),h=d.getHours(),mi=d.getMinutes(),s=d.getSeconds(),w=d.getDay(),wn=["日","一","二","三","四","五","六"];
fmt=fmt.replace("YYYY",y).replace("MM",String(m).padStart(2,"0")).replace("DD",String(d2).padStart(2,"0")).replace("HH",String(h).padStart(2,"0")).replace("mm",String(mi).padStart(2,"0")).replace("ss",String(s).padStart(2,"0")).replace("dddd","星期"+wn[w]);o.textContent=fmt;setStatus("格式化完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
