<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>日期纪年 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.doy-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:var(--space-2);margin-top:var(--space-3)}.doy-card{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:var(--space-3);text-align:center}.doy-card .num{font-size:var(--font-size-xxl);font-weight:700;color:var(--color-primary);font-family:var(--font-mono)}.doy-card .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:4px}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>年中第几天</h1><p class="tool-desc">计算指定日期是当年的第几天、第几周，以及当年剩余天数。</p>
<div class="card"><input id="dateInput" type="date" class="input" style="width:200px;">
<div style="display:flex;gap:12px;margin-top:var(--space-2);flex-wrap:wrap;"><button id="calcBtn" class="btn btn-primary">计算</button><button id="todayBtn" class="btn btn-secondary">今天</button><button id="clearBtn" class="btn btn-secondary">清空</button></div>
</div>
<div class="doy-grid">
<div class="doy-card"><div class="num" id="dayNum">-</div><div class="lbl">第几天</div></div>
<div class="doy-card"><div class="num" id="weekNum">-</div><div class="lbl">第几周</div></div>
<div class="doy-card"><div class="num" id="daysLeft">-</div><div class="lbl">剩余天数</div></div>
<div class="doy-card"><div class="num" id="totalDays">-</div><div class="lbl">全年天数</div></div>
</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var dateInput=document.getElementById('dateInput');
var calcBtn=document.getElementById('calcBtn');
var todayBtn=document.getElementById('todayBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
var dayNum=document.getElementById('dayNum');
var weekNum=document.getElementById('weekNum');
var daysLeft=document.getElementById('daysLeft');
var totalDays=document.getElementById('totalDays');
var 输出El=document.getElementById('outputText');
function calc(dateStr){
if(!dateStr){setStatus('请选择日期','error');return;}
var d=new Date(dateStr);
var y=d.getFullYear();
var start=new Date(y,0,1);
var end=new Date(y+1,0,1);
var total=Math.round((end-start)/86400000);
var doy=Math.round((d-start)/86400000)+1;
dayNum.textContent=doy;
totalDays.textContent=total;
daysLeft.textContent=total-doy;
var weekStart=new Date(d);
weekStart.setDate(weekStart.getDate()+1-(weekStart.getDay()||7));
var wn=Math.ceil((((weekStart-start)/86400000)+start.getDay()+1)/7);
weekNum.textContent=wn;
输出El.textContent=y+'年第'+doy+'天，第'+wn+'周，剩余'+(total-doy)+'天';
setStatus('');
}
function setToday(){
var d=new Date();
var m=(d.getMonth()+1).toString().padStart(2,'0');
var day=d.getDate().toString().padStart(2,'0');
dateInput.value=d.getFullYear()+'-'+m+'-'+day;
calc(dateInput.value);
}
dateInput.addEventListener('keydown',function(e){if(e.key==='Enter')calc(dateInput.value);});
calcBtn.addEventListener('click',function(){calc(dateInput.value);});
todayBtn.addEventListener('click',setToday);
clearBtn.addEventListener('click',function(){dateInput.value='';dayNum.textContent='-';weekNum.textContent='-';daysLeft.textContent='-';totalDays.textContent='-';输出El.textContent='';setStatus('');});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
