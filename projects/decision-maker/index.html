<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>决策助手 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.game-area{text-align:center;padding:24px 0}.game-btn{width:120px;height:120px;border-radius:50%;border:none;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s}.game-btn.ready{background:#4CAF50;color:#fff}.game-btn.waiting{background:#F44336;color:#fff}.game-btn:active{transform:scale(0.95)}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>决策助手</h1><p class="tool-desc">随机决策和加权决策工具。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><label>选项（每行一个）</label><textarea id="options" class="input textarea js-focus-input" style="min-height:100px" placeholder="选项 A&#10;选项 B&#10;选项 C">吃饭&#10;看电影&#10;散步&#10;读书</textarea></div>
<div class="row"><div><label>选择数量</label><input id="pickCount" class="input" type="number" value="1" min="1" max="10"></div><div style="display:flex;align-items:end;gap:8px"><button id="decideBtn" class="btn btn-primary">帮我决定!</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var opts=document.getElementById("options"),pc=document.getElementById("pickCount"),o=document.getElementById("输出Text");
document.getElementById("decideBtn").addEventListener("click",function(){var lines=opts.value.split("\n").filter(function(l){return l.trim()}),n=parseInt(pc.value)||1;if(lines.length===0){setStatus("请至少输入一个选项","error");return}
if(n>lines.length)n=lines.length;var shuffled=lines.slice();for(var i=shuffled.length-1;i>0;i--){var j=Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256*(i+1));var tmp=shuffled[i];shuffled[i]=shuffled[j];shuffled[j]=tmp}
var picked=shuffled.slice(0,n);o.textContent=picked.join("\n");setStatus("已决定! "+picked.join(", "))});
document.getElementById("clearBtn").addEventListener("click",function(){opts.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
