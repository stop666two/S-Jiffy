<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备信息 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .info-grid { display:grid; grid-template-columns:auto 1fr; gap:8px 16px; font-size:var(--font-size-sm); }
    .info-label { color:var(--color-text-secondary); white-space:nowrap; }
    .info-value { word-break:break-all; }
    .info-section { margin-bottom:24px; }
    .info-section h2 { font-size:var(--font-size-base); font-weight:600; margin-bottom:12px; border-bottom:1px solid var(--color-border); padding-bottom:8px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>设备信息</h1>
    <p class="tool-desc">查看浏览器、操作系统、屏幕、网络等设备环境信息。</p>
    <div class="action-bar" style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
      <button id="refreshBtn" class="btn btn-primary">刷新信息</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box" id="输出Container">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');
      var clearBtn = document.getElementById('clearBtn');

      function gatherInfo() {
        var lines = [];
        var nav = navigator;
        var scr = screen;
        var loc = location;
        var d = document;

        lines.push('═══════ 浏览器 ═══════');
        lines.push('User Agent:         ' + nav.userAgent);
        lines.push('语言:               ' + nav.language);
        lines.push('在线状态:           ' + (nav.onLine ? '在线' : '离线'));
        lines.push('Cookie 启用:        ' + (nav.cookieEnabled ? '是' : '否'));
        lines.push('硬件并发数:         ' + nav.hardwareConcurrency + ' 核');
        lines.push('设备内存:           ' + (nav.deviceMemory || '未知') + ' GB');
        lines.push('最大触控点数:       ' + nav.maxTouchPoints);
        lines.push('Platform:           ' + nav.platform);
        lines.push('Vendor:             ' + nav.vendor);
        lines.push('Do Not Track:       ' + (navigator.doNotTrack || '未设置'));
        lines.push('');

        lines.push('═══════ 窗口 / 屏幕 ═══════');
        lines.push('屏幕分辨率:         ' + scr.width + ' x ' + scr.height);
        lines.push('可用屏幕:           ' + scr.availWidth + ' x ' + scr.availHeight);
        lines.push('颜色深度:           ' + scr.colorDepth + ' bit');
        lines.push('像素比:             ' + window.devicePixelRatio);
        lines.push('窗口大小:           ' + window.innerWidth + ' x ' + window.innerHeight);
        lines.push('文档大小:           ' + d.documentElement.scrollWidth + ' x ' + d.documentElement.scrollHeight);
        lines.push('');

        lines.push('═══════ 日期 / 时区 ═══════');
        var now = new Date();
        lines.push('本地时间:           ' + now.toLocaleString());
        lines.push('UTC 时间:           ' + now.toUTCString());
        lines.push('时区:               ' + Intl.DateTimeFormat().resolvedOptions().timeZone);
        lines.push('时间偏移:           UTC' + (now.getTimezoneOffset() > 0 ? '-' : '+') + Math.abs(now.getTimezoneOffset() / 60));
        lines.push('');

        lines.push('═══════ 网络 ═══════');
        lines.push('当前 URL:           ' + loc.href);
        lines.push('主机名:             ' + loc.hostname);
        lines.push('协议:               ' + loc.protocol);
        if ('connection' in nav) {
          var conn = nav.connection;
          lines.push('连接类型:           ' + (conn.effectiveType || '未知'));
          lines.push('下行速度:           ' + (conn.downlink || '?') + ' Mbps');
          lines.push('RTT:                ' + (conn.rtt || '?') + ' ms');
        }
        lines.push('');

        lines.push('═══════ 存储 ═══════');
        lines.push('LocalStorage:       ' + (typeof(Storage) !== 'undefined' ? '支持' : '不支持'));
        lines.push('SessionStorage:     ' + (typeof(Storage) !== 'undefined' ? '支持' : '不支持'));
        lines.push('Cookie 数量:        ' + d.cookie.split(';').filter(function(c) { return c.trim(); }).length);
        lines.push('');

        lines.push('═══════ 特性检测 ═══════');
        lines.push('WebGL:              ' + (function() { try { var c = d.createElement('canvas'); return !!c.getContext('webgl'); } catch(e) { return false; } }() ? '支持' : '不支持'));
        lines.push('Web Worker:         ' + (typeof(Worker) !== 'undefined' ? '支持' : '不支持'));
        lines.push('WebSocket:          ' + (typeof(WebSocket) !== 'undefined' ? '支持' : '不支持'));
        lines.push('Service Worker:     ' + ('serviceWorker' in nav ? '支持' : '不支持'));
        lines.push('Geolocation:        ' + ('geolocation' in nav ? '支持' : '不支持'));
        lines.push('WebUSB:             ' + ('usb' in nav ? '支持' : '不支持'));
        lines.push('WebBluetooth:       ' + ('bluetooth' in nav ? '支持' : '不支持'));
        lines.push('WebRTC:             ' + ('RTCPeerConnection' in window ? '支持' : '不支持'));
        lines.push('Canvas:             ' + (function() { try { var c = d.createElement('canvas'); return !!(c.getContext && c.getContext('2d')); } catch(e) { return false; } }() ? '支持' : '不支持'));

        return lines.join('\n');
      }

      document.getElementById('refreshBtn').addEventListener('click', function() {
        输出El.textContent = gatherInfo();
        setStatus('信息已刷新');
      });

      clearBtn.addEventListener('click', function() {
        输出El.textContent = '';
        setStatus('');
      });

      copyBtn.addEventListener('click', function() {
        if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); }
      });

      // Auto-refresh on load
      输出El.textContent = gatherInfo();
    })();
  </script>
</body>
</html>
