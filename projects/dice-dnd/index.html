<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D 骰子 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .dd-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .dd-row .field { flex:1; min-width:80px; }
    .dd-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
    .dice-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .dice-btn { width:56px;height:56px;border-radius:var(--radius-md);border:2px solid var(--color-text-primary);background:var(--color-bg);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.15s; }
    .dice-btn:hover { background:var(--color-text-primary);color:#fff; }
    .dice-btn.adv { border-color:#27ae60; }
    .dice-btn.dis { border-color:#e74c3c; }
    .dice-结果 { font-size:48px;font-weight:700;text-align:center;margin:var(--space-3) 0; }
    .dice-detail { font-size:14px;color:var(--color-text-secondary);text-align:center; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>DND 骰子</h1>
    <p class="tool-desc">龙与地下城全套骰子（D4-D100），支持优势/劣势投掷。</p>
    <div class="card">
      <div class="dd-row">
        <div class="field"><label for="diceCount">骰子数量</label><input id="diceCount" class="input" type="number" value="1" min="1" max="20"></div>
      </div>
      <div class="dice-btns">
        <button class="dice-btn" data-sides="4">D4</button>
        <button class="dice-btn" data-sides="6">D6</button>
        <button class="dice-btn" data-sides="8">D8</button>
        <button class="dice-btn" data-sides="10">D10</button>
        <button class="dice-btn" data-sides="12">D12</button>
        <button class="dice-btn" data-sides="20">D20</button>
        <button class="dice-btn" data-sides="100">D100</button>
        <button class="dice-btn adv" data-sides="20" data-adv="1">D20 优势</button>
        <button class="dice-btn dis" data-sides="20" data-adv="-1">D20 劣势</button>
      </div>
      <div class="dice-结果" id="dice结果">-</div>
      <div class="dice-detail" id="diceDetail"></div>
    </div>
    <div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var countEl = document.getElementById('diceCount');
    var dice结果 = document.getElementById('dice结果');
    var diceDetail = document.getElementById('diceDetail');
    var 输出El = document.getElementById('outputText');
    var copyBtn = document.getElementById('copyBtn');

    function rollDie(sides) {
      var b = new Uint32Array(1);
      crypto.getRandomValues(b);
      return (b[0] % sides) + 1;
    }

    var btnHandler = function() {
      var sides = parseInt(this.getAttribute('data-sides'), 10);
      var adv = parseInt(this.getAttribute('data-adv'), 10) || 0;
      var count = parseInt(countEl.value, 10) || 1;
      if (count < 1) count = 1;
      if (count > 20) count = 20;

      if (adv !== 0) count = 1;
      var allRolls = [];
      for (var i = 0; i < count; i++) {
        if (adv > 0) {
          var r1 = rollDie(sides), r2 = rollDie(sides);
          allRolls.push(Math.max(r1, r2));
        } else if (adv < 0) {
          var r1 = rollDie(sides), r2 = rollDie(sides);
          allRolls.push(Math.min(r1, r2));
        } else {
          allRolls.push(rollDie(sides));
        }
      }
      var sum = 0;
      for (var i = 0; i < allRolls.length; i++) sum += allRolls[i];
      dice结果.textContent = sum;
      var label = adv > 0 ? '(优势) ' : adv < 0 ? '(劣势) ' : '';
      diceDetail.textContent = label + allRolls.join('\n');
      输出El.textContent = 'D' + sides + ': ' + allRolls.join(', ') + ' | 总和: ' + sum;
      setStatus('已掷骰');
    };

    var btns = document.querySelectorAll('.dice-btn');
    for (var i = 0; i < btns.length; i++) btns[i].addEventListener('click', btnHandler);

    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
