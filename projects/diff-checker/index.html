<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本差异对比 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .diff-container { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2); }
    .diff-panel textarea { width:100%; min-height:240px; border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-2); font-family:var(--font-mono); font-size:13px; resize:vertical; outline:none; }
    .diff-panel textarea:focus { border-color:var(--color-text-primary); box-shadow:var(--shadow-focus); }
    .diff-panel label { display:block; font-size:var(--font-size-xs); color:var(--color-text-secondary); margin-bottom:var(--space-1); }
    .diff-输出 { font-family:var(--font-mono); font-size:13px; line-height:1.6; }
    .diff-add { background:#e6ffec; color:#1a7f37; }
    .diff-del { background:#ffebe9; color:#cf222e; }
    .diff-eq { color:var(--color-text-disabled); }
    .diff-line-num { display:inline-block; width:32px; text-align:right; color:#999; margin-right:8px; user-select:none; }
    @media (max-width:700px) { .diff-container { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>文本差异对比</h1>
    <p class="tool-desc">两段文本逐行对比，高亮显示差异。</p>
    <div class="diff-container">
      <div class="diff-panel">
        <label>原始文本 (A)</label>
        <textarea id="textA" class="js-focus-input" placeholder="第一段文本..."></textarea>
      </div>
      <div class="diff-panel">
        <label>新文本 (B)</label>
        <textarea id="textB" placeholder="第二段文本..."></textarea>
      </div>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin:var(--space-2) 0;">
      <button id="diffBtn" class="btn btn-primary">对比 Diff</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box">
      <div id="输出Text" class="diff-输出" style="display:block;padding-right:60px;"></div>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var textA = document.getElementById('textA');
      var textB = document.getElementById('textB');
      var 输出El = document.getElementById('输出Text');
      var diffBtn = document.getElementById('diffBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');

      function computeLCS(a, b) {
        var m = a.length, n = b.length;
        var dp = [];
        for (var i = 0; i <= m; i++) { dp[i] = []; for (var j = 0; j <= n; j++) dp[i][j] = 0; }
        for (var i2 = 1; i2 <= m; i2++) {
          for (var j2 = 1; j2 <= n; j2++) {
            if (a[i2 - 1] === b[j2 - 1]) dp[i2][j2] = dp[i2 - 1][j2 - 1] + 1;
            else dp[i2][j2] = Math.max(dp[i2 - 1][j2], dp[i2][j2 - 1]);
          }
        }
        return dp;
      }

      function backtrack(dp, a, b, i, j) {
        if (i === 0 && j === 0) return [];
        if (i > 0 && j > 0 && a[i - 1] === b[j - 1]) {
          var r = backtrack(dp, a, b, i - 1, j - 1);
          r.push({ type: 'eq', text: a[i - 1] });
          return r;
        }
        if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
          var r2 = backtrack(dp, a, b, i, j - 1);
          r2.push({ type: 'add', text: b[j - 1] });
          return r2;
        }
        if (i > 0) {
          var r3 = backtrack(dp, a, b, i - 1, j);
          r3.push({ type: 'del', text: a[i - 1] });
          return r3;
        }
        return [];
      }

      function diffTexts() {
        var linesA = textA.value.split('\n');
        var linesB = textB.value.split('\n');
        var dp = computeLCS(linesA, linesB);
        var ops = backtrack(dp, linesA, linesB, linesA.length, linesB.length);
        var html = '';
        var addCount = 0, delCount = 0;

        for (var i = 0; i < ops.length; i++) {
          var op = ops[i];
          var cls = op.type === 'add' ? 'diff-add' : op.type === 'del' ? 'diff-del' : 'diff-eq';
          var prefix = op.type === 'add' ? '+' : op.type === 'del' ? '-' : ' ';
          if (op.type === 'add') addCount++;
          if (op.type === 'del') delCount++;
          html += '<div class="' + cls + '"><span class="diff-line-num">' + (i + 1) + '</span>' + prefix + ' ' + escapeHtml(op.text) + '</div>';
        }

        setStatus('+ ' + addCount + ' 行  - ' + delCount + ' 行  = ' + ops.length + ' 行');
        输出El.innerHTML = html;
      }

      function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      diffBtn.addEventListener('click', diffTexts);
      clearBtn.addEventListener('click', function () { textA.value = ''; textB.value = ''; 输出El.innerHTML = ''; setStatus(''); textA.focus(); });
      copyBtn.addEventListener('click', function () {
        var text = 输出El.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制'); }
      });
    })();
  </script>
</body>
</html>
