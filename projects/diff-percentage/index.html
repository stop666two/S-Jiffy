<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>差异百分比 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-bottom:var(--space-2);}
.stat-row{display:flex;gap:var(--space-2);margin-bottom:var(--space-3);flex-wrap:wrap;}
.stat-item{padding:var(--space-2);border:1px solid var(--color-border);border-radius:var(--radius-md);text-align:center;flex:1;min-width:100px;}
.stat-item .stat-value{font-size:var(--font-size-xl);font-weight:600;display:block;}
.stat-item .stat-label{font-size:var(--font-size-xs);color:var(--color-text-secondary);}
@media(max-width:600px){.two-cols{grid-template-columns:1fr;}}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>差异百分比</h1><p class="tool-desc">计算两段文本的字符级差异百分比与相似度评估。</p>
<div class="two-cols"><div class="card" style="margin-bottom:0;"><textarea id="textA" class="input textarea js-focus-input" placeholder="文本 A..." style="min-height:120px;"></textarea></div>
<div class="card" style="margin-bottom:0;"><textarea id="textB" class="input textarea" placeholder="文本 B..." style="min-height:120px;"></textarea></div></div>
<div class="stat-row"><div class="stat-item"><span class="stat-value" id="diffPct">—</span><span class="stat-label">差异百分比</span></div>
<div class="stat-item"><span class="stat-value" id="simPct">—</span><span class="stat-label">相似度</span></div>
<div class="stat-item"><span class="stat-value" id="sameChars">—</span><span class="stat-label">相同字符数</span></div>
<div class="stat-item"><span class="stat-value" id="diffChars">—</span><span class="stat-label">差异字符数</span></div>
<div class="stat-item"><span class="stat-value" id="lenDiff">—</span><span class="stat-label">长度差</span></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var ta=document.getElementById('textA'),tb=document.getElementById('textB');
var dpEl=document.getElementById('diffPct'),spEl=document.getElementById('simPct');
var scEl=document.getElementById('sameChars'),dcEl=document.getElementById('diffChars'),ldEl=document.getElementById('lenDiff');
var o=document.getElementById('outputText');
function compute(){
  var a=ta.value,b=tb.value;
  var maxLen=Math.max(a.length,b.length);
  if(maxLen===0){dpEl.textContent='—';spEl.textContent='—';scEl.textContent='—';dcEl.textContent='—';ldEl.textContent='—';o.textContent='';return;}
  var same=0;var minLen=Math.min(a.length,b.length);
  for(var i=0;i<minLen;i++){if(a[i]===b[i])same++;}
  var diffCharsVal=maxLen-same;
  var diffPct=Math.round(diffCharsVal/maxLen*10000)/100;
  var simPct=Math.round(same/maxLen*10000)/100;
  dpEl.textContent=diffPct+'%';
  spEl.textContent=simPct+'%';
  scEl.textContent=same;
  dcEl.textContent=diffCharsVal;
  ldEl.textContent=Math.abs(a.length-b.length);
  o.textContent='差异: '+diffPct+'% | 相似: '+simPct+'% | 相同: '+same+' | 差异: '+diffCharsVal+' | 长度差: '+Math.abs(a.length-b.length);
}
ta.addEventListener('input',compute);tb.addEventListener('input',compute);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
compute();
})();</script>
</body></html>
