<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>折扣计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>折扣计算器</h1><p class="tool-desc">计算打折后价格和节省金额。</p><div class="card"><div class="row"><div><label>原价 (元)</label><input id="original" class="input" type="number" value="299" min="0.01" step="0.01"></div><div><label>折扣 (%)</label><input id="discount" class="input" type="number" value="20" min="0" max="100" step="0.1"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="finalVal">—</div><div class="l">折后价 (元)</div></div><div class="res-item"><div class="v" id="savedVal">—</div><div class="l">节省金额 (元)</div></div><div class="res-item"><div class="v" id="pctVal">—</div><div class="l">节省比例</div></div><div class="res-item"><div class="v" id="payPctVal">—</div><div class="l">支付比例</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var o=document.getElementById('original'),d=document.getElementById('discount'),fv=document.getElementById('finalVal'),sv=document.getElementById('savedVal'),pv=document.getElementById('pctVal'),pp=document.getElementById('payPctVal'),ot=document.getElementById('outputText');
function calc(){var orig=parseFloat(o.value),disc=parseFloat(d.value);if(!orig||orig<0){setStatus('请输入有效原价','error');return}
var final=orig*(1-disc/100);var saved=orig-final;
fv.textContent=final.toFixed(2);sv.textContent=saved.toFixed(2);pv.textContent=disc+'%';pp.textContent=(100-disc)+'%';
ot.textContent='原价: '+orig.toFixed(2)+' | 折扣: '+disc+'% | 折后: '+final.toFixed(2)+' | 节省: '+saved.toFixed(2);setStatus('计算完成')}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('copyBtn').addEventListener('click',function(){if(ot.textContent){copyToClipboard(ot.textContent,this);setStatus('已复制')}});calc();})();</script></body></html>
