<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DNA 工具 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.inp-row{margin-bottom:var(--space-3)}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-3)}.btn-row .btn{font-size:13px;min-width:auto}.result-box{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2);margin-top:var(--space-2);font-family:var(--font-mono);font-size:13px;word-break:break-all}.result-box .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:4px}.result-box .val{line-height:1.7}.stats{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:var(--space-2)}.compl-map{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:400px;margin:var(--space-2) 0;font-size:var(--font-size-sm)}.compl-map div{text-align:center;padding:4px;background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-sm)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>DNA 工具</h1><p class="tool-desc">DNA 序列处理：反向、互补、反向互补、翻译为 RNA。</p>
<div class="card">
<div class="inp-row"><textarea id="seqInput" class="input textarea" placeholder="输入 DNA 序列，如 ATGCCTAGCTAGCTAGCTAG" style="min-height:80px"></textarea></div>
<div class="btn-row"><button id="revBtn" class="btn btn-secondary">反向</button><button id="compBtn" class="btn btn-secondary">互补</button><button id="revCompBtn" class="btn btn-primary">反向互补</button><button id="rnaBtn" class="btn btn-secondary">转 RNA</button><button id="clearBtn" class="btn btn-secondary">清空</button></div>
<div class="result-box"><div class="lbl">原序列 (5' → 3')</div><div class="val" id="origSeq">—</div></div>
<div class="result-box"><div class="lbl">结果</div><div class="val" id="resultSeq" style="font-size:15px;font-weight:600">—</div></div>
<div class="stats" id="statsEl">GC 含量: — | 长度: — | A:— T:— G:— C:—</div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById('seqInput'),orig=document.getElementById('origSeq'),result=document.getElementById('resultSeq'),stats=document.getElementById('statsEl'),out=document.getElementById('outputText');var compMap={A:'T',T:'A',G:'C',C:'G',a:'t',t:'a',g:'c',c:'g'};var rnaMap={A:'A',T:'U',G:'G',C:'C',a:'a',t:'u',g:'g',c:'c'};function updateStats(s){var counts={A:0,T:0,G:0,C:0,other:0};var upper=s.toUpperCase();for(var i=0;i<upper.length;i++){var c=upper[i];if(counts[c]!==undefined)counts[c]++;else counts.other++}var total=upper.length;var gc=total>0?((counts.G+counts.C)/total*100).toFixed(1):0;stats.textContent='GC 含量: '+gc+'% | 长度: '+total+' bp | A:'+counts.A+' T:'+counts.T+' G:'+counts.G+' C:'+counts.C+(counts.other?' N:'+counts.other:'')}function filterSeq(s){return s.replace(/[^ATCGatcg]/g,'').toUpperCase()}function doOperation(op){var raw=inp.value.trim();if(!raw){setStatus('请输入 DNA 序列','error');return}var upper=raw.replace(/[^ATCGatcg]/g,'').toUpperCase();if(!upper){setStatus('未找到有效碱基 (A/T/G/C)','error');return}orig.textContent=upper;var res;switch(op){case'rev':res=upper.split('').reverse().join('');setStatus('已反向');break;case'comp':res='';for(var i=0;i<upper.length;i++)res+=compMap[upper[i]]||upper[i];setStatus('已求互补');break;case'revcomp':res='';for(var i=upper.length-1;i>=0;i--)res+=compMap[upper[i]]||upper[i];setStatus('已求反向互补');break;case'rna':res='';for(var i=0;i<upper.length;i++)res+=rnaMap[upper[i]]||upper[i];setStatus('已转为 RNA');break}result.textContent=res;out.textContent=res;updateStats(upper)}document.getElementById('revBtn').addEventListener('click',function(){doOperation('rev')});document.getElementById('compBtn').addEventListener('click',function(){doOperation('comp')});document.getElementById('revCompBtn').addEventListener('click',function(){doOperation('revcomp')});document.getElementById('rnaBtn').addEventListener('click',function(){doOperation('rna')});document.getElementById('clearBtn').addEventListener('click',function(){inp.value='';orig.textContent='—';result.textContent='—';stats.textContent='GC 含量: — | 长度: — | A:— T:— G:— C:—';out.textContent='';setStatus('')});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
