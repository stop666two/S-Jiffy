<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dockerfile 生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-bottom:var(--space-3);}
.form-grid .card{margin-bottom:0;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Dockerfile 生成</h1><p class="tool-desc">根据基础镜像、安装包和运行命令生成 Dockerfile。</p>
<div class="form-grid">
<div class="card"><label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">基础镜像</label>
<select id="baseImage" class="input">
  <option value="node:20-alpine">node:20-alpine</option>
  <option value="node:20-slim">node:20-slim</option>
  <option value="python:3.12-slim">python:3.12-slim</option>
  <option value="python:3.12-alpine">python:3.12-alpine</option>
  <option value="golang:1.22-alpine">golang:1.22-alpine</option>
  <option value="openjdk:21-slim">openjdk:21-slim</option>
  <option value="rust:1.78-slim">rust:1.78-slim</option>
  <option value="nginx:alpine">nginx:alpine</option>
  <option value="ubuntu:24.04">ubuntu:24.04</option>
  <option value="alpine:3.20">alpine:3.20</option>
</select></div>
<div class="card"><label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">工作目录</label>
<input id="workDir" class="input" value="/app" placeholder="/app"></div>
<div class="card"><label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">安装包（逗号分隔）</label>
<input id="packages" class="input" value="" placeholder="curl, git, vim"></div>
<div class="card"><label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">监听端口</label>
<input id="exposePort" class="input" type="number" value="3000" placeholder="3000"></div>
<div class="card" style="grid-column:1/-1;"><label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">运行命令</label>
<input id="runCmd" class="input" value="npm start" placeholder="npm start"></div>
<div class="card" style="grid-column:1/-1;"><label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">额外 RUN 命令（每行一条）</label>
<textarea id="extraRuns" class="input textarea" placeholder="npm ci&#10;npm run build" style="min-height:60px;"></textarea></div></div>
<button id="generateBtn" class="btn btn-primary" style="margin-bottom:var(--space-3);">生成 Dockerfile</button>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var bi=document.getElementById('baseImage'),wd=document.getElementById('workDir'),pkg=document.getElementById('packages');
var ep=document.getElementById('exposePort'),rc=document.getElementById('runCmd'),er=document.getElementById('extraRuns'),o=document.getElementById('outputText');
document.getElementById('generateBtn').addEventListener('click',function(){
  var lines=['# Dockerfile generated by S-Jiffy\nFROM '+bi.value];
  var pkgs=pkg.value.trim();if(pkgs){var isAlpine=bi.value.indexOf('alpine')!==-1;lines.push('RUN '+(!isAlpine?'apt-get update && apt-get install -y ':'apk add --no-cache ')+pkgs.replace(/,\s*/g,' ')+(!isAlpine?' && rm -rf /var/lib/apt/lists/*':''));}
  lines.push('WORKDIR '+wd.value);
  var extra=er.value.trim();if(extra){var erLines=extra.split('\n').filter(function(l){return l.trim();});erLines.forEach(function(l){lines.push('RUN '+l.trim());});}
  lines.push('COPY . .');
  var port=parseInt(ep.value);if(port&&port>0&&port<65536)lines.push('EXPOSE '+port);
  lines.push('CMD ["'+rc.value.replace(/"/g,'\\"').split(' ').join('","')+'"]');
  o.textContent=lines.join('\n');
  setStatus('Dockerfile 已生成');
});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
})();</script>
</body></html>
