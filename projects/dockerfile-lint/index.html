<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dockerfile 检查 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.issue{padding:8px 12px;margin-bottom:6px;border-radius:var(--radius-sm);font-size:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}.issue-error{background:#ffebee;border-left:3px solid var(--color-error)}.issue-warn{background:#fff8e1;border-left:3px solid #f9a825}.issue-info{background:#e3f2fd;border-left:3px solid #1976d2}.issue-pass{background:#e8f5e9;border-left:3px solid var(--color-success)}.issue .icon{font-size:16px;flex-shrink:0;margin-top:1px}.summary{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.summary-item{text-align:center;min-width:60px}.summary-item .num{font-size:var(--font-size-lg);font-weight:700}.summary-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Dockerfile 检查</h1><p class="tool-desc">检查 Dockerfile 常见问题和最佳实践</p>
<div class="card"><textarea id="dfInput" class="input textarea" placeholder="粘贴 Dockerfile 内容">FROM node:latest
WORKDIR /app
COPY . .
RUN npm install
EXPOSE 3000
CMD ["npm", "start"]</textarea><button id="lintBtn" class="btn btn-primary" style="margin-top:var(--space-2)">检查</button></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var dfInput=document.getElementById('dfInput'),lintBtn=document.getElementById('lintBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function lint(){var raw=dfInput.value;if(!raw.trim()){setStatus('请输入 Dockerfile 内容','error');return}var lines=raw.split('\n');var issues=[];var hasFrom=false,hasWorkdir=false,hasCopy=false,hasUser=false,hasExpose=false,hasCmd=false;var baseImages=[];for(var i=0;i<lines.length;i++){var line=lines[i].trim();var lineNum=i+1;if(line.startsWith('#'))continue;if(line.startsWith('FROM')){hasFrom=true;var parts=line.split(/\s+/);if(parts.length>=2){var img=parts[1];baseImages.push(img);if(img==='node:latest'||img==='python:latest'||img==='ubuntu:latest'||img.endsWith(':latest')){issues.push({type:'warn',msg:'第 '+lineNum+' 行: 使用 "latest" 标签可能导致不可重复构建。建议固定版本如 '+img.replace(':latest','')+':18'})}else if(!img.includes(':')){issues.push({type:'warn',msg:'第 '+lineNum+' 行: 未指定镜像标签，默认使用 latest。建议固定版本'})}if(img==='ubuntu'||img.startsWith('ubuntu:')){issues.push({type:'info',msg:'第 '+lineNum+' 行: Ubuntu 镜像建议添加 DEBIAN_FRONTEND=noninteractive'})}}if(parts.length>=4&&parts[2]==='AS'){issues.push({type:'info',msg:'第 '+lineNum+' 行: 使用多阶段构建 (AS '+parts[3]+')'})}}else if(line.startsWith('WORKDIR')){hasWorkdir=true}else if(line.startsWith('COPY')){hasCopy=true;if(line.indexOf('--chown')===-1&&!hasUser){issues.push({type:'info',msg:'第 '+lineNum+' 行: COPY 建议使用 --chown 参数指定文件所有者'})}}else if(line.startsWith('RUN')){if(line.indexOf('apt-get')!==-1&&line.indexOf('--no-install-recommends')===-1){issues.push({type:'warn',msg:'第 '+lineNum+' 行: apt-get 建议添加 --no-install-recommends 参数减少体积'})}if(line.indexOf('&&')===-1&&line.indexOf('apt-get')!==-1){issues.push({type:'info',msg:'第 '+lineNum+' 行: 多个 RUN 命令建议用 && 合并以减少层数'})}}else if(line.startsWith('USER')){hasUser=true}else if(line.startsWith('EXPOSE')){hasExpose=true}else if(line.startsWith('CMD')||line.startsWith('ENTRYPOINT')){hasCmd=true}}if(!hasFrom)issues.push({type:'error',msg:'缺少 FROM 指令'});if(!hasCmd)issues.push({type:'warn',msg:'缺少 CMD 或 ENTRYPOINT 指令'});if(hasCopy&&!hasWorkdir)issues.push({type:'info',msg:'COPY 前建议设置 WORKDIR'});if(!hasUser&&hasExpose)issues.push({type:'info',msg:'暴露端口 (EXPOSE) 前建议创建非 root 用户并使用 USER 切换'});var errCount=0,warnCount=0,infoCount=0;for(var j=0;j<issues.length;j++){if(issues[j].type==='error')errCount++;else if(issues[j].type==='warn')warnCount++;else infoCount++}var html='<div class="summary"><div class="summary-item"><div class="num">'+issues.length+'</div><div class="lbl">总计</div></div><div class="summary-item"><div class="num" style="color:var(--color-error)">'+errCount+'</div><div class="lbl">错误</div></div><div class="summary-item"><div class="num" style="color:#f9a825">'+warnCount+'</div><div class="lbl">警告</div></div><div class="summary-item"><div class="num" style="color:#1976d2">'+infoCount+'</div><div class="lbl">建议</div></div></div>';if(!issues.length){html+='<div class="issue issue-pass"><span class="icon">✓</span><span>未发现问题，Dockerfile 遵循基本最佳实践</span></div>'}else{for(var k=0;k<issues.length;k++){var cls='issue-'+issues[k].type;var icon=issues[k].type==='error'?'✗':issues[k].type==='warn'?'⚠':'ℹ';html+='<div class="issue '+cls+'"><span class="icon">'+icon+'</span><span>'+htmlEscape(issues[k].msg)+'</span></div>'}}outputText.innerHTML=html;setStatus('检查完成')}lintBtn.addEventListener('click',lint);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
