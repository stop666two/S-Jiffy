<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>缓动函数预览 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>缓动函数预览</h1><p class="tool-desc">预览和对比 CSS/JS 缓动函数曲线。</p><div class="card"><div class="row"><div><label>缓动函数</label><select id="easing" class="input" style="width:200px">
<option value="cubic-bezier(0.25,0.1,0.25,1)">ease</option>
<option value="cubic-bezier(0.42,0,1,1)">ease-in</option>
<option value="cubic-bezier(0,0,0.58,1)">ease-out</option>
<option value="cubic-bezier(0.42,0,0.58,1)">ease-in-out</option>
<option value="cubic-bezier(0,1.0,1,0)">ease-in-out(sharp)</option>
<option value="cubic-bezier(0.68,-0.55,0.27,1.55)">bounce</option>
<option value="cubic-bezier(0.6,-0.28,0.74,0.05)">back-in</option>
<option value="cubic-bezier(0.6,0.04,0.98,0.34)">back-out</option>
</select></div><div><label>时长 (ms)</label><input id="duration" class="input" type="number" value="1000" min="100" max="5000" style="width:100px"></div><div style="display:flex;align-items:end;gap:8px"><button id="animateBtn" class="btn btn-primary">播放</button></div></div>
<div style="height:120px;background:var(--color-bg-soft);border-radius:8px;margin-top:12px;position:relative;overflow:hidden" id="animContainer"><div id="animBall" style="position:absolute;left:0;top:40px;width:32px;height:32px;background:var(--color-text-primary);border-radius:50%"></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var e=document.getElementById("easing"),d=document.getElementById("duration"),b=document.getElementById("animBall"),c=document.getElementById("animContainer"),o=document.getElementById("输出Text");
document.getElementById("animateBtn").addEventListener("click",function(){var easing=e.value,ms=parseInt(d.value)||1000;var w=c.offsetWidth-32;b.style.transition="none";b.style.left="0px";void b.offsetHeight;
b.style.transition="left "+ms+"ms "+easing;b.style.left=w+"px";o.textContent="animation: 1s "+easing+" ("+ms+"ms)";setStatus("动画播放中")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
