<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>电费计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>电费计算器</h1><p class="tool-desc">根据电器功率和时长计算电费。</p><div class="card"><div class="row"><div><label>电器功率 (W)</label><input id="power" class="input" type="number" value="1000" min="1"></div><div><label>使用时长 (小时/天)</label><input id="hours" class="input" type="number" value="8" min="0.1" step="0.5"></div><div><label>电价 (元/度)</label><input id="rate" class="input" type="number" value="0.6" min="0.01" step="0.01"></div></div>
<div class="row"><div><label>电器数量</label><input id="count" class="input" type="number" value="1" min="1"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="dailyKwh">—</div><div class="l">日用电 (度)</div></div><div class="res-item"><div class="v" id="dailyCost">—</div><div class="l">每日电费</div></div><div class="res-item"><div class="v" id="monthlyCost">—</div><div class="l">每月电费</div></div><div class="res-item"><div class="v" id="yearlyCost">—</div><div class="l">每年电费</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var pw=document.getElementById("power"),hr=document.getElementById("hours"),rt=document.getElementById("rate"),ct=document.getElementById("count"),dk=document.getElementById("dailyKwh"),dc=document.getElementById("dailyCost"),mc=document.getElementById("monthlyCost"),yc=document.getElementById("yearlyCost"),o=document.getElementById("输出Text");
document.getElementById("calcBtn").addEventListener("click",function(){var p=parseFloat(pw.value),h=parseFloat(hr.value),r=parseFloat(rt.value),c=parseInt(ct.value)||1;if(!p||!h){setStatus("请输入有效数据","error");return}
var kwh=p*h/1000*c;dk.textContent=kwh.toFixed(2);dc.textContent=(kwh*r).toFixed(2)+" 元";mc.textContent=(kwh*r*30).toFixed(2)+" 元";yc.textContent=(kwh*r*365).toFixed(2)+" 元";
o.textContent="功率: "+p+"W | 日用电: "+kwh.toFixed(2)+" 度 | 日费: "+(kwh*r).toFixed(2)+" 元";setStatus("计算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
