<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji 选择器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .emoji-search { width:100%; height:48px; padding:0 var(--space-2); font-size:var(--font-size-base); border:1px solid #ddd; border-radius:var(--radius-md); outline:none; margin-bottom:16px; }
    .emoji-search:focus { border-color:var(--color-text-primary); box-shadow:var(--shadow-focus); }
    .emoji-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:4px; }
    .emoji-cell { display:flex; align-items:center; justify-content:center; width:52px; height:52px; font-size:28px; cursor:pointer; border-radius:var(--radius-sm); transition:background 0.1s; }
    .emoji-cell:hover { background:var(--color-bg-soft); }
    .emoji-preview { display:flex; align-items:center; gap:12px; padding:12px 0; margin-bottom:12px; border-bottom:1px solid var(--color-border); }
    .emoji-preview .big { font-size:48px; }
    .emoji-preview .label { font-size:var(--font-size-sm); color:var(--color-text-secondary); }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>Emoji 选择器</h1>
    <p class="tool-desc">搜索并点击复制 emoji，支持中文和英文搜索。</p>
    <input id="searchInput" class="emoji-search js-focus-input" placeholder="搜索 emoji (如: 笑脸 / smile / 心 / heart)..." autocomplete="off">
    <div class="emoji-preview" id="previewArea" style="display:none;">
      <span class="big" id="previewEmoji"></span>
      <div>
        <div id="previewName"></div>
        <div class="label" id="previewCode"></div>
      </div>
    </div>
    <div class="输出-box" id="输出Container">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
    <div class="card" style="margin-top:16px;">
      <div id="emojiGrid" class="emoji-grid"></div>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>

      var searchEl = document.getElementById('searchInput');
      var gridEl = document.getElementById('emojiGrid');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');
      var previewArea = document.getElementById('previewArea');
      var previewEmoji = document.getElementById('previewEmoji');
      var previewName = document.getElementById('previewName');
      var previewCode = document.getElementById('previewCode');
      var lastClicked = '';

      function renderEmojis(query) {
        gridEl.innerHTML = '';
        query = query.toLowerCase().trim();
        var filtered = emojis;
        if (query) {
          var keywords = query.split(/\s+/);
          filtered = emojis.filter(function(e) {
            var text = (e.n + ' ' + e.k).toLowerCase();
            for (var i = 0; i < keywords.length; i++) {
              if (text.indexOf(keywords[i]) === -1) return false;
            }
            return true;
          });
        }
        filtered.forEach(function(e) {
          var cell = document.createElement('div');
          cell.className = 'emoji-cell';
          cell.textContent = e.e;
          cell.title = e.n.trim();
          cell.addEventListener('click', function() {
            lastClicked = e.e;
            输出El.textContent = e.e;
            previewArea.style.display = 'flex';
            previewEmoji.textContent = e.e;
            previewName.textContent = e.n.trim();
            previewCode.textContent = 'U+' + e.e.codePointAt(0).toString(16).toUpperCase();
            setStatus('已选中: ' + e.e);
          });
          gridEl.appendChild(cell);
        });
        if (filtered.length === 0) {
          gridEl.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--color-text-disabled);font-size:var(--font-size-sm);">没有找到匹配的 emoji</div>';
        }
      }

      searchEl.addEventListener('input', function() {
        renderEmojis(searchEl.value);
      });

      copyBtn.addEventListener('click', function() {
        if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); }
      });

      renderEmojis('');
    })();
