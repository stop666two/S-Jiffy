var activeCategory='';

var categories=[];
var catMap={};
for(var i=0;i<emojis.length;i++){

if(!catMap[cat]){catMap[cat]=true;categories.push(cat);}

function renderPills(){
var html='<span class="pill'+(activeCategory===''?' active':'')+'" data-cat="">全部</span>';
for(var i=0;i<categories.length;i++){
html+='<span class="pill'+(activeCategory===categories[i]?' active':'')+'" data-cat="'+categories[i]+'">'+categories[i]+'</span>';
}
pills.innerHTML=html;
var allPills=pills.querySelectorAll('.pill');
for(var i=0;i<allPills.length;i++){
(function(el){
el.addEventListener('click',function(){
activeCategory=this.getAttribute('data-cat');
renderPills();
renderGrid();
});
})(allPills[i]);
}
}

function renderGrid(){
var q=searchInput.value.toLowerCase();
var html='';
var count=0;
for(var i=0;i<emojis.length;i++){
var e=emojis[i];
if(activeCategory&&e[2]!==activeCategory)continue;
if(q&&e[0].indexOf(q)===-1&&e[1].toLowerCase().indexOf(q)===-1)continue;
count++;
html+='<div class="emoji-item" data-emoji="'+e[0]+'" data-name="'+e[1]+'">'+e[0]+'<span class="label">'+e[1]+'</span></div>';
}
emojiGrid.innerHTML=html||'<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--color-text-disabled)">未找到匹配</div>';
输出El.textContent='共 '+count+' 个 Emoji';
var items=emojiGrid.querySelectorAll('.emoji-item');
for(var i=0;i<items.length;i++){
(function(el){
el.addEventListener('click',function(){
var emoji=this.getAttribute('data-emoji');
var name=this.getAttribute('data-name');
copyToClipboard(emoji,copyBtn);
setStatus('已复制 '+emoji+' ('+name+')');
});
})(items[i]);
}
}

searchInput.addEventListener('input',renderGrid);
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(emojiGrid.textContent.replace(/\s+/g,' '),copyBtn);}});
renderPills();
renderGrid();
})();</script></body></html>
