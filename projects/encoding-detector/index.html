<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>编码检测 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.enc-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-top:var(--space-2)}.enc-box{padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.enc-box .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.enc-box .val{font-size:var(--font-size-base);font-weight:600}.enc-box .match{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;margin-top:4px;background:var(--color-success);color:#fff}.enc-box .partial{background:#f9a825}.enc-box .no{background:var(--color-text-disabled)}.byte-grid{font-family:var(--font-mono);font-size:11px;line-height:1.6;word-break:break-all;margin-top:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);max-height:200px;overflow-y:auto}.byte-grid .hi{color:var(--color-error)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>编码检测</h1><p class="tool-desc">检测文本的字符编码格式</p>
<div class="card"><textarea id="textInput" class="input textarea" placeholder="粘贴文本（支持二进制/十六进制输入）" style="min-height:120px">�Hello 你好</textarea><button id="detectBtn" class="btn btn-primary" style="margin-top:var(--space-2)">检测编码</button></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var textInput=document.getElementById('textInput'),detectBtn=document.getElementById('detectBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function getBytes(str){var bytes=[];for(var i=0;i<str.length;i++){var cp=str.charCodeAt(i);if(cp<=0x7F){bytes.push(cp)}else if(cp<=0x7FF){bytes.push(0xC0|(cp>>6));bytes.push(0x80|(cp&0x3F))}else{bytes.push(0xE0|(cp>>12));bytes.push(0x80|((cp>>6)&0x3F));bytes.push(0x80|(cp&0x3F))}}return bytes}function isUTF8(bytes){var i=0;while(i<bytes.length){var b=bytes[i];if(b<0x80){i++;continue}else if(b>=0xC2&&b<=0xDF){if(i+1>=bytes.length||(bytes[i+1]&0xC0)!==0x80)return false;i+=2}else if(b>=0xE0&&b<=0xEF){if(i+2>=bytes.length||(bytes[i+1]&0xC0)!==0x80||(bytes[i+2]&0xC0)!==0x80)return false;i+=3}else if(b>=0xF0&&b<=0xF4){if(i+3>=bytes.length||(bytes[i+1]&0xC0)!==0x80||(bytes[i+2]&0xC0)!==0x80||(bytes[i+3]&0xC0)!==0x80)return false;i+=4}else{return false}}return true}function isLatin1(bytes){for(var i=0;i<bytes.length;i++){if(bytes[i]>0xFF)return false}return true}function hasNull(bytes){for(var i=0;i<bytes.length;i++){if(bytes[i]===0)return true}return false}function countHighBytes(bytes){var count=0;for(var i=0;i<bytes.length;i++){if(bytes[i]>=0x80)count++}return count}function detect(){var raw=textInput.value;if(!raw){setStatus('请输入文本','error');return}var bytes=getBytes(raw);var total=bytes.length;var highBytes=countHighBytes(bytes);var utf8Valid=isUTF8(bytes);var latin1Valid=isLatin1(bytes);var hasZero=hasNull(bytes);var asciiOnly=highBytes===0;var results=[];if(asciiOnly){results.push({enc:'ASCII/UTF-8',conf:'100%',match:'match',note:'纯 ASCII 文本，兼容所有编码'})}else{if(utf8Valid){var utf8Conf=Math.round((1-highBytes/total)*100);results.push({enc:'UTF-8',conf:utf8Conf+'%',match:'match',note:'有效的 UTF-8 序列'})}else{results.push({enc:'UTF-8',conf:'0%',match:'no',note:'无效的 UTF-8 序列'})}if(latin1Valid){var latinConf=Math.round((1-highBytes/total)*70+30);results.push({enc:'Latin-1 (ISO 8859-1)',conf:latinConf+'%',match:'partial',note:'所有字节在 0-255 范围内'})}else{results.push({enc:'Latin-1',conf:'0%',match:'no',note:'存在超出 0xFF 的字节'})}if(highBytes>0){var shiftJisConf=Math.round((1-highBytes/total)*50);if(shiftJisConf>20){results.push({enc:'Shift-JIS (推测)',conf:shiftJisConf+'%',match:'partial',note:'存在高位字节'})}}if(hasZero){results.push({enc:'UTF-16 (推测)',conf:'30%',match:'partial',note:'包含空字节，可能为 UTF-16'})}}var html='<div class="enc-grid">';for(var i=0;i<results.length;i++){var r=results[i];html+='<div class="enc-box">';html+='<div class="lbl">'+htmlEscape(r.enc)+'</div>';html+='<div class="val">'+htmlEscape(r.conf)+'</div>';html+='<span class="'+r.match+'">'+({match:'✓ 匹配',partial:'~ 可能',no:'✗ 不匹配'})[r.match]+'</span>';html+='<div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">'+htmlEscape(r.note)+'</div>';html+='</div>'}html+='</div>';html+='<div class="byte-grid"><strong>字节分析:</strong> 共 '+total+' 字节，高位字节: '+highBytes+' ('+Math.round(highBytes/total*100)+'%)<br>';var hexParts=[];for(var j=0;j<Math.min(bytes.length,128);j++){var h=bytes[j].toString(16).toUpperCase().padStart(2,'0');hexParts.push(bytes[j]>=0x80?'<span class="hi">'+h+'</span>':h)}html+=hexParts.join(' ')+(bytes.length>128?'... (截断)':'')+'</div>';outputText.innerHTML=html;setStatus('检测完成')}detectBtn.addEventListener('click',detect);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
