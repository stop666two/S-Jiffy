<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encryption - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>加密工具</h1>
    <p class="tool-desc">Caesar / ROT13 / ROT47 / Atbash / XOR with custom key, browser-side only.</p>
    <div class="card" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">模式</label>
      <select id="modeSelect" class="input" style="width:auto;min-width:90px;">
        <option value="encrypt">加密</option>
        <option value="decrypt">解密</option>
      </select>
      <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">算法</label>
      <select id="algoSelect" class="input" style="width:auto;min-width:100px;">
        <option value="caesar">Caesar</option>
        <option value="rot13">ROT13</option>
        <option value="rot47">ROT47</option>
        <option value="atbash">Atbash</option>
        <option value="xor">XOR</option>
      </select>
      <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">Shift/Key</label>
      <input id="shiftInput" class="input" type="number" value="3" min="1" max="25" style="width:70px;">
      <input id="xorKeyInput" class="input" placeholder="XOR key" style="width:100px;display:none;">
    </div>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="Enter text to process..." style="min-height:120px;"></textarea>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-3);">
      <button id="processBtn" class="btn btn-primary">Execute</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var modeEl = document.getElementById('modeSelect');
    var algoEl = document.getElementById('algoSelect');
    var shiftEl = document.getElementById('shiftInput');
    var xorKeyEl = document.getElementById('xorKeyInput');
    var inputEl = document.getElementById('inputText');
    var 输出El = document.getElementById('outputText');

    function caesarShift(text, shift, decrypt) {
      if (decrypt) shift = -shift;
      return text.split('').map(function(ch) {
        var code = ch.charCodeAt(0);
        if (code >= 65 && code <= 90) return String.fromCharCode(((code - 65 + shift + 26) % 26) + 65);
        if (code >= 97 && code <= 122) return String.fromCharCode(((code - 97 + shift + 26) % 26) + 97);
        return ch;
      }).join('');
    }
    function rot13(text) {
      return text.split('').map(function(ch) {
        var code = ch.charCodeAt(0);
        if (code >= 65 && code <= 90) return String.fromCharCode(((code - 65 + 13) % 26) + 65);
        if (code >= 97 && code <= 122) return String.fromCharCode(((code - 97 + 13) % 26) + 97);
        return ch;
      }).join('');
    }
    function rot47(text) {
      return text.split('').map(function(ch) {
        var code = ch.charCodeAt(0);
        if (code >= 33 && code <= 126) return String.fromCharCode(33 + ((code - 33 + 47) % 94));
        return ch;
      }).join('');
    }
    function atbash(text) {
      return text.split('').map(function(ch) {
        var code = ch.charCodeAt(0);
        if (code >= 65 && code <= 90) return String.fromCharCode(90 - (code - 65));
        if (code >= 97 && code <= 122) return String.fromCharCode(122 - (code - 97));
        return ch;
      }).join('');
    }
    function xorCipher(text, key) {
      if (!key) return text;
      return text.split('').map(function(ch, i) {
        return String.fromCharCode(ch.charCodeAt(0) ^ key.charCodeAt(i % key.length));
      }).join('');
    }

    document.getElementById('processBtn').addEventListener('click', function() {
      var text = inputEl.value;
      if (!text) { setStatus('请输入文本', 'error'); return; }
      var algo = algoEl.value;
      var decrypt = modeEl.value === 'decrypt';
      var 结果;
      switch(algo) {
        case 'rot13': 结果 = rot13(text); break;
        case 'rot47': 结果 = rot47(text); break;
        case 'atbash': 结果 = atbash(text); break;
        case 'xor':
          var key = xorKeyEl.value || 'key';
          结果 = xorCipher(text, key);
          break;
        default:
          var shift = parseInt(shiftEl.value) || 3;
          结果 = caesarShift(text, shift, decrypt);
      }
      输出El.textContent = 结果;
      setStatus((decrypt ? 'Decrypt' : 'Encrypt') + 'ion complete');
    });
    document.getElementById('clearBtn').addEventListener('click', function() { inputEl.value = ''; 输出El.textContent = ''; setStatus(''); inputEl.focus(); });
    document.getElementById('copyBtn').addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, this); setStatus('已复制'); } });
    algoEl.addEventListener('change', function() {
      shiftEl.style.display = (algoEl.value === 'caesar') ? 'inline-block' : 'none';
      xorKeyEl.style.display = (algoEl.value === 'xor') ? 'inline-block' : 'none';
    });
    shiftEl.style.display = 'inline-block'; xorKeyEl.style.display = 'none';
  })();</script>
  </body>
</html>
