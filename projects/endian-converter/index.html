<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>字节序转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.conv-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.conv-grid .input{width:240px;font-family:var(--font-mono)}.conv-grid select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.size-btns{display:flex;gap:8px;margin-bottom:var(--space-2)}.size-btn{padding:6px 14px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);cursor:pointer;font-size:13px;font-family:var(--font-mono);transition:all 0.1s}.size-btn.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary)}.hex-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-top:var(--space-2)}.hex-box{padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.hex-box .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.hex-box .val{font-family:var(--font-mono);font-size:14px;font-weight:600;word-break:break-all}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>字节序转换</h1><p class="tool-desc">在大端序和小端序之间转换数值</p>
<div class="card"><div class="size-btns" id="sizeBtns"><button class="size-btn active" data-size="16">16-bit</button><button class="size-btn" data-size="32">32-bit</button><button class="size-btn" data-size="64">64-bit</button></div>
<div class="conv-grid"><input id="hexInput" class="input js-focus-input" placeholder="十六进制值 (如 0x1234 或 1234)" value="0x1234"><select id="inputEndian"><option value="big">大端序 (Big-Endian)</option><option value="little">小端序 (Little-Endian)</option></select><button id="convertBtn" class="btn btn-primary">转换</button><button id="swapBtn" class="btn btn-secondary">⇄ 互换</button></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var hexInput=document.getElementById('hexInput'),inputEndian=document.getElementById('inputEndian'),convertBtn=document.getElementById('convertBtn'),swapBtn=document.getElementById('swapBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var selectedSize=16;var sizeBtns=document.querySelectorAll('#sizeBtns .size-btn');for(var i=0;i<sizeBtns.length;i++){(function(btn){btn.addEventListener('click',function(){for(var j=0;j<sizeBtns.length;j++)sizeBtns[j].classList.remove('active');btn.classList.add('active');selectedSize=parseInt(btn.getAttribute('data-size'),10)})})(sizeBtns[i])}function padHex(s,bytes){s=s.replace(/^0x/i,'');if(!s)return'0'.repeat(bytes*2);return s.padStart(bytes*2,'0').slice(-bytes*2)}function convert(){var raw=hexInput.value.trim();if(!raw){setStatus('请输入十六进制值','error');return}var hex=raw.replace(/^0x/i,'');if(!/^[0-9a-fA-F]+$/.test(hex)){setStatus('无效的十六进制值','error');return}var bytes=selectedSize/2;hex=padHex(hex,bytes);var isBig=inputEndian.value==='big';var pairs=[];for(var i=0;i<hex.length;i+=2)pairs.push(hex.slice(i,i+2));var lePairs=[];for(var j=pairs.length-1;j>=0;j--)lePairs.push(pairs[j]);var leHex=lePairs.join('');var beHex=pairs.join('');var leVal=parseInt(leHex,16);var beVal=parseInt(beHex,16);var inputHex=isBig?beHex:leHex;var outputHex=isBig?leHex:beHex;var outputVal=isBig?leVal:beVal;var html='<div class="hex-grid">';html+='<div class="hex-box"><div class="lbl">大端序 (Big-Endian)</div><div class="val" style="'+(isBig?'font-weight:700;color:var(--color-success)':'')+'">0x'+beHex.toUpperCase()+'</div><div style="font-size:12px;color:var(--color-text-secondary)">十进制: '+beVal+'</div></div>';html+='<div class="hex-box"><div class="lbl">小端序 (Little-Endian)</div><div class="val" style="'+(isBig?'':'font-weight:700;color:var(--color-success)')+'">0x'+leHex.toUpperCase()+'</div><div style="font-size:12px;color:var(--color-text-secondary)">十进制: '+leVal+'</div></div>';html+='</div>';html+='<div style="margin-top:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);font-size:13px">';html+='<div><strong>字节排列:</strong> ';var inputPairs=isBig?pairs:lePairs;var outputPairs=isBig?lePairs:pairs;html+='输入: <span style="font-family:var(--font-mono)">['+inputPairs.join(', ')+']</span> → ';html+='输出: <span style="font-family:var(--font-mono)">['+outputPairs.join(', ')+']</span>';html+='</div></div>';outputText.innerHTML=html;setStatus('转换完成')}convertBtn.addEventListener('click',convert);swapBtn.addEventListener('click',function(){inputEndian.value=inputEndian.value==='big'?'little':'big';convert()});copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
