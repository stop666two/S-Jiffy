<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>环境变量转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.conv-toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-2)}.conv-toolbar select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.edit-area{display:grid;grid-template-columns:1fr 1fr;gap:12px}textarea{font-family:var(--font-mono)!important;font-size:13px!important;line-height:1.5!important}.stat-note{font-size:13px;color:var(--color-text-secondary);margin-top:var(--space-1)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>环境变量转换</h1><p class="tool-desc">在 .env/JSON/YAML 环境变量格式之间互相转换</p>
<div class="card"><div class="conv-toolbar"><select id="fromFormat"><option value="env">.env 格式</option><option value="json">JSON 格式</option><option value="yaml">YAML 格式</option></select><span style="font-size:13px;color:var(--color-text-secondary)">→</span><select id="toFormat"><option value="json">JSON 格式</option><option value="env">.env 格式</option><option value="yaml">YAML 格式</option></select><button id="convertBtn" class="btn btn-primary">转换</button><button id="swapBtn" class="btn btn-secondary">⇄ 互换</button></div>
<div class="edit-area"><textarea id="inputText" class="input textarea" placeholder="输入源格式" style="min-height:280px">DATABASE_URL=postgres://localhost:5432/db
API_KEY=sk-abc123
DEBUG=true
PORT=3000
NODE_ENV=production</textarea><textarea id="outputTextArea" class="input textarea" placeholder="转换结果" style="min-height:280px;background:var(--color-bg-soft)" readonly></textarea></div>
<div id="statNote" class="stat-note"></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var inputText=document.getElementById('inputText'),outputTextArea=document.getElementById('outputTextArea'),fromFormat=document.getElementById('fromFormat'),toFormat=document.getElementById('toFormat'),convertBtn=document.getElementById('convertBtn'),swapBtn=document.getElementById('swapBtn'),copyBtn=document.getElementById('copyBtn'),outputText=document.getElementById('outputText'),statNote=document.getElementById('statNote');function parseEnv(text){var vars={};var lines=text.split('\n');for(var i=0;i<lines.length;i++){var line=lines[i].trim();if(!line||line.startsWith('#'))continue;var eqIdx=line.indexOf('=');if(eqIdx===-1)continue;var key=line.slice(0,eqIdx).trim();var val=line.slice(eqIdx+1).trim();if((val.startsWith('"')&&val.endsWith('"'))||(val.startsWith("'")&&val.endsWith("'"))){val=val.slice(1,-1)}vars[key]=val}return vars}function toEnv(obj){var lines=[];for(var key in obj){if(obj.hasOwnProperty(key)){var val=String(obj[key]);if(val.indexOf(' ')!==-1||val.indexOf('#')!==-1){val='"'+val+'"'}lines.push(key+'='+val)}}return lines.join('\n')}function toJson(obj){return JSON.stringify(obj,null,2)}function toYaml(obj){var lines=[];for(var key in obj){if(obj.hasOwnProperty(key)){var val=obj[key];if(typeof val==='string'&&(val.indexOf(':')!==-1||val.indexOf('#')!==-1||val==='')){val='"'+val.replace(/"/g,'\\"')+'"'}lines.push(key+': '+val)}}return lines.join('\n')}function parseJson(text){try{var obj=JSON.parse(text);var result={};for(var key in obj){if(obj.hasOwnProperty(key)){result[key]=String(obj[key])}}return result}catch(e){return null}}function parseYaml(text){var obj={};var lines=text.split('\n');for(var i=0;i<lines.length;i++){var line=lines[i];if(!line.trim()||line.trim().startsWith('#'))continue;var colonIdx=line.indexOf(':');if(colonIdx===-1)continue;var key=line.slice(0,colonIdx).trim();var val=line.slice(colonIdx+1).trim();if(val==='null'||val==='~')val='';if(val==='true')val='true';if(val==='false')val='false';obj[key]=val}return obj}function convert(){var src=inputText.value;if(!src.trim()){setStatus('请输入数据','error');return}var from=fromFormat.value;var to=toFormat.value;var obj;if(from==='env'){obj=parseEnv(src)}else if(from==='json'){obj=parseJson(src)}else if(from==='yaml'){obj=parseYaml(src)}if(!obj||Object.keys(obj).length===0){outputTextArea.value='';statNote.textContent='转换失败：无法解析输入数据';setStatus('转换失败','error');return}var result;if(to==='env'){result=toEnv(obj)}else if(to==='json'){result=toJson(obj)}else if(to==='yaml'){result=toYaml(obj)}outputTextArea.value=result;var count=Object.keys(obj).length;statNote.textContent='成功转换 '+count+' 个变量';outputText.innerHTML='转换完成 | '+count+' 个变量';setStatus('转换完成')}convertBtn.addEventListener('click',convert);swapBtn.addEventListener('click',function(){var tmp=fromFormat.value;fromFormat.value=toFormat.value;toFormat.value=tmp;convert()});copyBtn.addEventListener('click',function(){if(outputTextArea.value){copyToClipboard(outputTextArea.value,this);setStatus('已复制')}})})();</script>
</body></html>
