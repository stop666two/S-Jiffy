<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Epoch Converter - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.conv-section{margin-bottom:var(--space-3);}
.conv-section h2{font-size:var(--font-size-base);font-weight:600;margin-bottom:var(--space-2);}
.结果-line{font-size:var(--font-size-sm);margin-top:var(--space-1);font-family:var(--font-mono);word-break:break-all;}
.epoch-clock{font-size:36px;font-weight:600;font-family:var(--font-mono);text-align:center;padding:var(--space-3);background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:var(--space-2);}
.epoch-clock .sub{font-size:var(--font-size-sm);font-weight:400;color:var(--color-text-secondary);}
.tz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--space-2);margin-top:var(--space-2);}
.tz-card{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2);}
.tz-card .tz-name{font-size:var(--font-size-xs);color:var(--color-text-secondary);}
.tz-card .tz-time{font-size:var(--font-size-base);font-weight:500;}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace">
<h1>Epoch 时间戳</h1>
<p class="tool-desc">Unix timestamp ↔ date, real-time clock, week of year, quarter, day of year.</p>
<div class="card">
<h2>⏱ Real-time Epoch Clock</h2>
<div class="epoch-clock"><div id="currentEpoch">0</div><div class="sub" id="currentMs">ms: 0</div></div>
<div class="tz-grid" id="tzGrid"></div>
</div>
<div class="card conv-section">
<h2>Timestamp → Date</h2>
<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
<input id="tsInput" class="input js-focus-input" placeholder="Enter timestamp e.g. 1712345678" style="width:260px;">
<select id="tsUnit" class="input" style="width:auto;"><option value="auto">Auto-detect</option><option value="seconds">Seconds</option><option value="milliseconds">Milliseconds</option></select>
<button id="tsToDateBtn" class="btn btn-primary">转换</button></div>
<div id="ts结果" class="结果-line"></div>
<div id="extraDateInfo" style="display:none;margin-top:var(--space-2);">
<div class="tz-card" style="display:inline-block;margin-right:8px;"><span class="tz-name">Week of Year</span><div id="weekOfYear" style="font-weight:600;">—</div></div>
<div class="tz-card" style="display:inline-block;margin-right:8px;"><span class="tz-name">Quarter</span><div id="quarter" style="font-weight:600;">—</div></div>
<div class="tz-card" style="display:inline-block;"><span class="tz-name">Day of Year</span><div id="dayOfYear" style="font-weight:600;">—</div></div>
</div>
</div>
<div class="card conv-section">
<h2>Date → Timestamp</h2>
<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
<input id="dateInput" type="datetime-local" class="input" style="width:260px;"><button id="dateToTsBtn" class="btn btn-primary">转换</button></div>
<div id="date结果" class="结果-line"></div></div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){
  var tsInput=document.getElementById('tsInput'),ts结果=document.getElementById('ts结果'),date结果=document.getElementById('date结果');
  var currentEpoch=document.getElementById('currentEpoch'),currentMs=document.getElementById('currentMs'),tzGrid=document.getElementById('tzGrid');
  var weekEl=document.getElementById('weekOfYear'),quarterEl=document.getElementById('quarter'),doyEl=document.getElementById('dayOfYear'),extraInfo=document.getElementById('extraDateInfo');
  var tzList=[{name:'UTC',zone:'UTC'},{name:'Local',zone:null},{name:'New York (EST)',zone:'America/New_York'},{name:'London (GMT)',zone:'Europe/London'},{name:'Tokyo (JST)',zone:'Asia/Tokyo'},{name:'Shanghai (CST)',zone:'Asia/Shanghai'}];

  function formatDate(d,tz){var opts={timeZone:tz||undefined,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false};return d.toLocaleString('zh-CN',opts);}

  function getWeekOfYear(d){var t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);var w1=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-w1)/86400000-3+(w1.getDay()+6)%7)/7);}
  function getQuarter(d){return Math.floor(d.getMonth()/3)+1;}
  function getDayOfYear(d){var start=new Date(d.getFullYear(),0,0);return Math.floor((d-start)/86400000);}

  function updateClock(){
    var now=Date.now();currentEpoch.textContent=Math.floor(now/1000);currentMs.textContent='ms: '+now;
    var d=new Date(now);var html='';
    for(var i=0;i<tzList.length;i++){html+='<div class="tz-card"><div class="tz-name">'+tzList[i].name+'</div><div class="tz-time">'+formatDate(d,tzList[i].zone)+'</div><div class="tz-name">sec: '+Math.floor(d.getTime()/1000)+'</div></div>';}
    tzGrid.innerHTML=html;}

  function getDateFromTs(val,unit){var num=parseFloat(val);if(isNaN(num))return null;return unit==='auto'?(num>1e12?new Date(num):new Date(num*1000)):(unit==='milliseconds'?new Date(num):new Date(num*1000));}

  document.getElementById('tsToDateBtn').addEventListener('click',function(){
    var raw=tsInput.value.trim();if(!raw){ts结果.textContent='Enter timestamp';extraInfo.style.display='none';return;}
    var d=getDateFromTs(raw,tsUnit.value);if(!d||isNaN(d.getTime())){ts结果.textContent='Invalid timestamp';extraInfo.style.display='none';return;}
    ts结果.textContent=formatDate(d,'Asia/Shanghai')+' (CST) | '+d.toISOString()+' (UTC)';
    weekEl.textContent=getWeekOfYear(d);quarterEl.textContent='Q'+getQuarter(d);doyEl.textContent=getDayOfYear(d);extraInfo.style.display='block';
    setStatus('Converted');});

  document.getElementById('dateToTsBtn').addEventListener('click',function(){
    var val=dateInput.value;if(!val){date结果.textContent='Select date/time';return;}
    var d=new Date(val);if(isNaN(d.getTime())){date结果.textContent='Invalid date';return;}
    date结果.textContent='Seconds: '+Math.floor(d.getTime()/1000)+' | Milliseconds: '+d.getTime()+' | Week: '+getWeekOfYear(d)+' | Q'+getQuarter(d)+' | DOY: '+getDayOfYear(d);});

  tsInput.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('tsToDateBtn').click();});
  updateClock();setInterval(updateClock,1000);
  document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('Copied');}});
  var o=document.getElementById('输出Text');
  setInterval(function(){var now=Date.now();o.textContent=Math.floor(now/1000);},1000);
})();
</script></body></html>
