<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时间戳转换 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .conv-section { margin-bottom:var(--space-3); }
    .conv-section h2 { font-size:var(--font-size-base); font-weight:600; margin-bottom:var(--space-2); }
    .result-line { font-size:var(--font-size-sm); margin-top:var(--space-1); font-family:var(--font-mono); word-break:break-all; }
    .epoch-clock { font-size:36px; font-weight:600; font-family:var(--font-mono); text-align:center; padding:var(--space-3); background:var(--color-bg-soft); border:1px solid var(--color-border); border-radius:var(--radius-md); margin-bottom:var(--space-2); }
    .epoch-clock .sub { font-size:var(--font-size-sm); font-weight:400; color:var(--color-text-secondary); }
    .tz-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:var(--space-2); margin-top:var(--space-2); }
    .tz-card { background:var(--color-bg-soft); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-2); }
    .tz-card .tz-name { font-size:var(--font-size-xs); color:var(--color-text-secondary); }
    .tz-card .tz-time { font-size:var(--font-size-base); font-weight:500; }
    .tz-card .tz-date { font-size:var(--font-size-sm); color:var(--color-text-secondary); }
    .format-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:var(--space-2); }
    .format-row label { font-size:var(--font-size-sm); color:var(--color-text-secondary); min-width:80px; }
    .format-row .val { font-family:var(--font-mono); font-size:var(--font-size-sm); }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>时间戳转换</h1>
    <p class="tool-desc">Unix 纪元时间戳与人类可读日期互转，实时时钟，多时区，多种日期格式。</p>

    <div class="card">
      <h2>⏱ 当前 Epoch 实时时钟</h2>
      <div class="epoch-clock">
        <div id="currentEpoch">0</div>
        <div class="sub" id="currentMs">毫秒: 0</div>
      </div>
      <div class="tz-grid" id="tzGrid"></div>
    </div>

    <div class="card conv-section">
      <h2>时间戳 → 日期</h2>
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <input id="tsInput" class="input js-focus-input" placeholder="输入时间戳，如 1712345678" style="width:260px;">
        <select id="tsUnit" class="input" style="width:auto;">
          <option value="auto">自动检测</option>
          <option value="seconds">秒</option>
          <option value="milliseconds">毫秒</option>
        </select>
        <button id="tsToDateBtn" class="btn btn-primary">转换</button>
      </div>
      <div id="tsResult" class="result-line" style="color:var(--color-text-secondary);"></div>
      <div class="format-row" id="tsFormats" style="display:none;">
        <label>ISO 8601:</label><span class="val" id="fmtIso">-</span><br>
        <label>RFC 2822:</label><span class="val" id="fmtRfc">-</span><br>
        <label>本地格式:</label><span class="val" id="fmtLocale">-</span>
      </div>
    </div>

    <div class="card conv-section">
      <h2>日期 → 时间戳</h2>
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <input id="dateInput" type="datetime-local" class="input" style="width:260px;">
        <button id="dateToTsBtn" class="btn btn-primary">转换</button>
      </div>
      <div id="dateResult" class="result-line" style="color:var(--color-text-secondary);"></div>
    </div>

    <div class="card conv-section">
      <h2>自定义时区偏移</h2>
      <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
        <input id="customTzInput" class="input" placeholder="如 UTC+8, UTC-5, Asia/Shanghai" style="width:260px;">
        <input id="customTsInput" class="input" placeholder="时间戳（留空用当前时间）" style="width:200px;">
        <button id="customTzBtn" class="btn btn-primary">显示</button>
      </div>
      <div id="customTzResult" class="result-line" style="color:var(--color-text-secondary);"></div>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var tsInput = document.getElementById('tsInput');
      var tsUnit = document.getElementById('tsUnit');
      var dateInput = document.getElementById('dateInput');
      var tsResult = document.getElementById('tsResult');
      var dateResult = document.getElementById('dateResult');
      var tsFormats = document.getElementById('tsFormats');
      var fmtIso = document.getElementById('fmtIso');
      var fmtRfc = document.getElementById('fmtRfc');
      var fmtLocale = document.getElementById('fmtLocale');
      var currentEpoch = document.getElementById('currentEpoch');
      var currentMs = document.getElementById('currentMs');
      var tzGrid = document.getElementById('tzGrid');
      var customTzInput = document.getElementById('customTzInput');
      var customTsInput = document.getElementById('customTsInput');
      var customTzResult = document.getElementById('customTzResult');

      var tzList = [
        { name: 'UTC', zone: 'UTC' },
        { name: '本地时间', zone: null },
        { name: '纽约 (EST)', zone: 'America/New_York' },
        { name: '伦敦 (GMT)', zone: 'Europe/London' },
        { name: '东京 (JST)', zone: 'Asia/Tokyo' },
        { name: '上海 (CST)', zone: 'Asia/Shanghai' },
        { name: '悉尼 (AEDT)', zone: 'Australia/Sydney' }
      ];

      function formatDate(d, tz) {
        var opts = { timeZone: tz || undefined, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        return d.toLocaleString('zh-CN', opts);
      }

      function updateClock() {
        var now = Date.now();
        currentEpoch.textContent = Math.floor(now / 1000);
        currentMs.textContent = '毫秒: ' + now;

        var d = new Date(now);
        var html = '';
        for (var i = 0; i < tzList.length; i++) {
          html += '<div class="tz-card"><div class="tz-name">' + tzList[i].name + '</div>';
          html += '<div class="tz-time">' + formatDate(d, tzList[i].zone) + '</div>';
          html += '<div class="tz-date">秒: ' + Math.floor(d.getTime() / 1000) + '</div></div>';
        }
        tzGrid.innerHTML = html;
      }

      function getDateFromTs(val, unit) {
        var num = parseFloat(val);
        if (isNaN(num)) return null;
        if (unit === 'auto') {
          return num > 1e12 ? new Date(num) : new Date(num * 1000);
        }
        return unit === 'milliseconds' ? new Date(num) : new Date(num * 1000);
      }

      document.getElementById('tsToDateBtn').addEventListener('click', function () {
        var raw = tsInput.value.trim();
        if (!raw) { tsResult.textContent = '请输入时间戳'; tsFormats.style.display = 'none'; return; }
        var d = getDateFromTs(raw, tsUnit.value);
        if (!d || isNaN(d.getTime())) { tsResult.textContent = '无效时间戳'; tsFormats.style.display = 'none'; return; }
        tsResult.textContent = formatDate(d, 'Asia/Shanghai') + ' (CST) | ' + d.toISOString() + ' (UTC)';
        tsFormats.style.display = 'block';
        fmtIso.textContent = d.toISOString();
        fmtRfc.textContent = d.toUTCString().replace('GMT', 'UTC') + ' (' + d.toDateString() + ' ' + d.toTimeString().slice(0,8) + ')';
        fmtLocale.textContent = d.toLocaleString('zh-CN');
        setStatus('转换完成');
      });

      document.getElementById('dateToTsBtn').addEventListener('click', function () {
        var val = dateInput.value;
        if (!val) { dateResult.textContent = '请选择日期时间'; return; }
        var d = new Date(val);
        if (isNaN(d.getTime())) { dateResult.textContent = '无效日期'; return; }
        dateResult.textContent = '秒: ' + Math.floor(d.getTime() / 1000) + ' | 毫秒: ' + d.getTime();
        setStatus('转换完成');
      });

      document.getElementById('customTzBtn').addEventListener('click', function () {
        var tz = customTzInput.value.trim();
        var tsVal = customTsInput.value.trim();
        if (!tz) { customTzResult.textContent = '请输入时区'; return; }
        var d = tsVal ? getDateFromTs(tsVal, 'auto') : new Date();
        if (!d || isNaN(d.getTime())) { customTzResult.textContent = '无效时间戳'; return; }

        var resolvedTz = tz;
        if (/^UTC[+-]/.test(tz)) {
          var offset = parseInt(tz.replace('UTC', ''), 10);
          if (!isNaN(offset)) {
            var utc = d.getTime() + d.getTimezoneOffset() * 60000;
            var local = new Date(utc + offset * 3600000);
            customTzResult.textContent = tz + ': ' + local.toISOString().replace('Z', '') + ' | 秒: ' + Math.floor(local.getTime() / 1000);
            return;
          }
        }
        try {
          customTzResult.textContent = tz + ': ' + formatDate(d, resolvedTz) + ' | 秒: ' + Math.floor(d.getTime() / 1000);
        } catch(e) {
          customTzResult.textContent = '无效时区: ' + tz;
        }
      });

      tsInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('tsToDateBtn').click(); });

      updateClock();
      setInterval(updateClock, 1000);
    })();
  </script>
</body>
</html>
