<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斐波那契数列生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .fg-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .fg-row .field { flex:1; min-width:100px; }
    .fg-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>斐波那契数列生成器</h1>
    <p class="tool-desc">生成斐波那契数列，可自定义起始值和显示 F(n) 表示法。</p>
    <div class="card">
      <div class="fg-row">
        <div class="field"><label for="countVal">生成项数</label><input id="countVal" class="input" type="number" value="10" min="1" max="100"></div>
        <div class="field"><label for="f0Val">F(0)</label><input id="f0Val" class="input" type="number" value="0"></div>
        <div class="field"><label for="f1Val">F(1)</label><input id="f1Val" class="input" type="number" value="1"></div>
      </div>
      <div class="fg-row">
        <label style="display:flex;align-items:center;gap:8px;"><input id="notationChk" type="checkbox" checked> 显示 F(n) 表示法</label>
        <label style="display:flex;align-items:center;gap:8px;"><input id="reverseChk" type="checkbox"> 倒序显示</label>
      </div>
      <div><button id="genBtn" class="btn btn-primary">生成</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var countEl = document.getElementById('countVal');
    var f0El = document.getElementById('f0Val');
    var f1El = document.getElementById('f1Val');
    var notationChk = document.getElementById('notationChk');
    var reverseChk = document.getElementById('reverseChk');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function generate() {
      var count = parseInt(countEl.value, 10) || 10;
      if (count < 1) count = 1;
      if (count > 100) count = 100;
      var f0 = parseInt(f0El.value, 10) || 0;
      var f1 = parseInt(f1El.value, 10) || 1;
      var showNotation = notationChk.checked;
      var reverse = reverseChk.checked;

      var seq = [f0, f1];
      for (var i = 2; i < count; i++) {
        seq.push(seq[i - 1] + seq[i - 2]);
      }
      if (seq.length > count) seq = seq.slice(0, count);

      var lines = [];
      for (var i = 0; i < seq.length; i++) {
        if (showNotation) {
          lines.push('F(' + i + ') = ' + seq[i]);
        } else {
          lines.push('' + seq[i]);
        }
      }
      if (reverse) lines.reverse();
      输出El.textContent = lines.join('\n');
      setStatus('已生成 ' + count + ' 项');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
