<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>文件魔术签名 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.search-bar{display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap;align-items:center;}
.sig-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:var(--space-2);}
.sig-table th,.sig-table td{padding:6px 10px;border:1px solid var(--color-border);text-align:left;}
.sig-table th{background:var(--color-bg-soft);font-weight:600;position:sticky;top:0;}
.sig-table tr:hover{background:var(--color-bg-soft);}

<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>文件魔术签名</h1><p class="tool-desc">查询常见文件类型的文件头魔术数字（Magic Bytes / File Signatures）。</p>
<div class="search-bar card" style="margin-bottom:var(--space-3);">
<input id="searchInput" class="input js-focus-input" placeholder="搜索文件类型或扩展名，如 PDF、JPEG、PNG..." style="flex:1;min-width:200px;">
<select id="categoryFilter" class="input" style="width:auto;min-width:120px;">
  <option value="">全部类别</option>
  <option value="image">图片</option>
  <option value="document">文档</option>
  <option value="archive">压缩包</option>
  <option value="media">媒体</option>
  <option value="executable">可执行文件</option>
  <option value="other">其他</option>
</select>
</div>
<div style="overflow-x:auto;max-height:400px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius-md);" id="tableWrap">
<table class="sig-table" id="sigTable"><thead><tr><th>扩展名</th><th>文件类型</th><th>魔术字节 (Hex)</th><th>ASCII</th><th>偏移</th></tr></thead><tbody id="sigBody"></tbody></table></div>
<div class="output-box" style="margin-top:var(--space-2);"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>

];
var si=document.getElementById('searchInput'),cf=document.getElementById('categoryFilter'),sb=document.getElementById('sigBody'),o=document.getElementById('outputText');
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(filter,category){
  var filtered=signatures.filter(function(s){
    if(category&&s.cat!==category)return false;
    if(!filter)return true;
    var f=filter.toLowerCase();
    return s.ext.toLowerCase().indexOf(f)!==-1||s.type.toLowerCase().indexOf(f)!==-1||s.hex.indexOf(f)!==-1;
  });
  if(filtered.length===0){sb.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--color-text-disabled);padding:24px;">未找到匹配的签名</td></tr>';o.textContent='';return;}
  sb.innerHTML=filtered.map(function(s){return'<tr><td>'+esc(s.ext)+'</td><td>'+esc(s.type)+'</td><td class="hex-bytes">'+esc(s.hex)+'</td><td style="font-size:11px;">'+esc(s.ascii)+'</td><td>'+s.offset+'</td></tr>';}).join('');
  o.textContent='共 '+filtered.length+' 条签名';
}
function update(){render(si.value.trim(),cf.value);}
si.addEventListener('input',update);cf.addEventListener('change',update);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
update();
