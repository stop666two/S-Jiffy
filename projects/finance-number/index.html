<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>中文大写金额 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>中文大写金额</h1><p class="tool-desc">阿拉伯数字金额转换为中文大写（财务用）。</p><div class="card"><div class="row"><div style="flex:1"><label>输入金额 (元)</label><input id="inputAmt" class="input" value="12345.67" style="width:100%"></div></div>
<div class="row"><button id="convertBtn" class="btn btn-primary">转换为大写</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputAmt"),o=document.getElementById("outputText");
function toFinance(n){if(isNaN(n))return"无效金额";var negative=n<0;n=Math.abs(n);var numStr=Math.round(n*100).toString();var intPart=numStr.slice(0,-2)||"0";var decPart=numStr.slice(-2);var digits=["零","壹","贰","叁","肆","伍","陆","柒","捌","玖"];var radices=["","拾","佰","仟"];var bigRadices=["","万","亿","万亿"];var result="";if(parseInt(intPart)===0){result="零"}else{var zeroCount=0;var intLen=intPart.length;for(var i=0;i<intLen;i++){var p=intLen-1-i;var d=parseInt(intPart[i]);var segment=p%4;if(d===0){zeroCount++}else{if(zeroCount>0){result+="零";zeroCount=0}result+=digits[d];if(segment>0)result+=radices[segment]}if(segment===0&&zeroCount<4){result+=bigRadices[Math.floor(p/4)];zeroCount=0}}}
result+="元";if(decPart==="00"){result+="整"}else{if(decPart[0]!=="0"){result+=digits[parseInt(decPart[0])]+"角"}if(decPart[1]!=="0"){result+=digits[parseInt(decPart[1])]+"分"}}return negative?"负"+result:result}
document.getElementById("convertBtn").addEventListener("click",function(){var v=parseFloat(inp.value);if(isNaN(v)){setStatus("请输入有效金额","error");return}o.textContent=toFinance(v);setStatus("转换完成")});
document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
