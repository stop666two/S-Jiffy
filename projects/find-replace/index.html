<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>查找替换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>查找替换</h1><p class="tool-desc">批量查找替换文本中的字符串。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><label>输入文本</label><textarea id="inputText" class="input textarea js-focus-input" style="min-height:100px" placeholder="输入要处理的文本..."></textarea></div>
<div class="row"><div style="flex:1"><label>查找</label><input id="findText" class="input" placeholder="查找内容" style="width:100%"></div><div style="flex:1"><label>替换为</label><input id="replaceText" class="input" placeholder="替换内容" style="width:100%"></div></div>
<div class="row"><button id="replaceBtn" class="btn btn-primary">替换</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputText"),find=document.getElementById("findText"),rep=document.getElementById("replaceText"),o=document.getElementById("outputText");
document.getElementById("replaceBtn").addEventListener("click",function(){var t=inp.value,f=find.value,r=rep.value;if(!t||!f){setStatus("请输入文本和查找内容","error");return}
var re=new RegExp(f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");var res=t.replace(re,r);var cnt=(t.match(re)||[]).length;o.textContent=res;setStatus("完成 "+cnt+" 处替换")});
document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";find.value="";rep.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
