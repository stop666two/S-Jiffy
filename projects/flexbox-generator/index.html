<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Flexbox 生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.flex-stage{width:100%;min-height:200px;border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;padding:8px;gap:8px;margin-bottom:var(--space-3);transition:all .3s;background:var(--color-bg-soft)}.flex-item{background:var(--color-text-primary);color:#fff;border-radius:var(--radius-sm);padding:16px;font-size:14px;min-width:40px;text-align:center;flex:none}.flex-item:nth-child(2){background:var(--color-text-secondary)}.flex-item:nth-child(3){background:var(--color-accent-hover)}.ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2)}.ctrl-group{border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}.ctrl-group h3{font-size:var(--font-size-sm);margin-bottom:8px;color:var(--color-text-secondary)}.ctrl-group label{display:flex;align-items:center;gap:6px;font-size:var(--font-size-sm);margin-bottom:4px;cursor:pointer}.ctrl-group select{width:100%;margin-top:4px}.out-box pre{font-family:var(--font-mono);font-size:13px;white-space:pre-wrap}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Flexbox 生成器</h1><p class="tool-desc">交互式 Flexbox 布局游乐场，切换属性并实时查看效果与 CSS 代码。</p>
<div class="card">
<div class="flex-stage" id="flexStage"><div class="flex-item">1</div><div class="flex-item">2</div><div class="flex-item">3</div></div>
<div class="ctrl-grid">
<div class="ctrl-group"><h3>容器 (container)</h3><label>flex-direction <select id="fdSelect" class="input" style="width:100%"><option value="row">row</option><option value="row-reverse">row-reverse</option><option value="column">column</option><option value="column-reverse">column-reverse</option></select></label><label>flex-wrap <select id="fwSelect" class="input" style="width:100%"><option value="nowrap">nowrap</option><option value="wrap">wrap</option><option value="wrap-reverse">wrap-reverse</option></select></label><label>justify-content <select id="jcSelect" class="input" style="width:100%"><option value="flex-start">flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="space-between">space-between</option><option value="space-around">space-around</option><option value="space-evenly">space-evenly</option></select></label><label>align-items <select id="aiSelect" class="input" style="width:100%"><option value="stretch">stretch</option><option value="flex-start">flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="baseline">baseline</option></select></label><label>align-content <select id="acSelect" class="input" style="width:100%"><option value="stretch">stretch</option><option value="flex-start">flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="space-between">space-between</option><option value="space-around">space-around</option></select></label></div>
<div class="ctrl-group"><h3>子项 (items)</h3><label><input id="growCheck" type="checkbox"> flex-grow: 1</label><label><input id="shrinkCheck" type="checkbox" checked> flex-shrink: 1</label><label>flex-basis <select id="fbSelect" class="input" style="width:100%"><option value="auto">auto</option><option value="0">0</option><option value="100px">100px</option><option value="200px">200px</option></select></label><label>align-self <select id="asSelect" class="input" style="width:100%"><option value="auto">auto</option><option value="flex-start">flex-start</option><option value="flex-end">flex-end</option><option value="center">center</option><option value="stretch">stretch</option></select></label></div>
</div>
</div>
<div class="output-box" style="min-height:80px"><span id="outputText" class="out-box" style="display:block;padding-right:60px"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var stage=document.getElementById('flexStage'),out=document.getElementById('outputText'),items=stage.querySelectorAll('.flex-item'),fd=document.getElementById('fdSelect'),fw=document.getElementById('fwSelect'),jc=document.getElementById('jcSelect'),ai=document.getElementById('aiSelect'),ac=document.getElementById('acSelect'),grow=document.getElementById('growCheck'),shrink=document.getElementById('shrinkCheck'),fb=document.getElementById('fbSelect'),asEl=document.getElementById('asSelect');function render(){stage.style.flexDirection=fd.value;stage.style.flexWrap=fw.value;stage.style.justifyContent=jc.value;stage.style.alignItems=ai.value;stage.style.alignContent=ac.value;for(var i=0;i<items.length;i++){items[i].style.flexGrow=grow.checked?'1':'';items[i].style.flexShrink=shrink.checked?'1':'';items[i].style.flexBasis=fb.value}if(asEl.value!=='auto'){items[0].style.alignSelf=asEl.value}else{items[0].style.alignSelf=''}var css='display: flex;\nflex-direction: '+fd.value+';\nflex-wrap: '+fw.value+';\njustify-content: '+jc.value+';\nalign-items: '+ai.value+';\nalign-content: '+ac.value+';';if(grow.checked||shrink.checked||fb.value!=='auto'){css+='\n\n/* items */\n'}if(grow.checked)css+='flex-grow: 1;\n';if(shrink.checked)css+='flex-shrink: 1;\n';if(fb.value!=='auto')css+='flex-basis: '+fb.value+';';out.textContent=css}fd.addEventListener('change',render);fw.addEventListener('change',render);jc.addEventListener('change',render);ai.addEventListener('change',render);ac.addEventListener('change',render);grow.addEventListener('change',render);shrink.addEventListener('change',render);fb.addEventListener('change',render);asEl.addEventListener('change',render);render();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
