<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>油耗计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>油耗计算器</h1><p class="tool-desc">计算汽车油耗和油费。</p><div class="card"><div class="row"><div><label>行驶里程 (km)</label><input id="distance" class="input" type="number" value="500" min="1"></div><div><label>耗油量 (L)</label><input id="fuelUsed" class="input" type="number" value="40" min="0.1" step="0.1"></div><div><label>油价 (元/L)</label><input id="price" class="input" type="number" value="8.0" min="0.01" step="0.01"></div></div>
<div class="row"><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="consumption">—</div><div class="l">百公里油耗 (L)</div></div><div class="res-item"><div class="v" id="costPerKm">—</div><div class="l">每公里油费</div></div><div class="res-item"><div class="v" id="totalCost">—</div><div class="l">总油费 (元)</div></div><div class="res-item"><div class="v" id="rangeVal">—</div><div class="l">每升可行驶 (km)</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var d=document.getElementById("distance"),f=document.getElementById("fuelUsed"),p=document.getElementById("price"),con=document.getElementById("consumption"),cpk=document.getElementById("costPerKm"),tc=document.getElementById("totalCost"),rv=document.getElementById("rangeVal"),o=document.getElementById("输出Text");
document.getElementById("calcBtn").addEventListener("click",function(){var dist=parseFloat(d.value),fuel=parseFloat(f.value),price=parseFloat(p.value);if(!dist||!fuel){setStatus("请输入有效数据","error");return}
var per100=fuel/dist*100;con.textContent=per100.toFixed(2);cpk.textContent=(per100/100*price).toFixed(2)+" 元";tc.textContent=(fuel*price).toFixed(2)+" 元";rv.textContent=(dist/fuel).toFixed(1);
o.textContent="里程: "+dist+" km | 油耗: "+per100.toFixed(2)+" L/100km | 油费: "+(fuel*price).toFixed(2)+" 元";setStatus("计算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
