<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>全角半角转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>全角半角转换</h1><p class="tool-desc">全角（ＡＢＣ）与半角（ABC）字符互转，支持字母、数字、符号。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入文本..." style="min-height:100px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin:var(--space-2) 0;flex-wrap:wrap;align-items:center;">
<button id="toFullBtn" class="btn btn-primary">→ 全角</button>
<button id="toHalfBtn" class="btn btn-secondary">→ 半角</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('输出Text');
var toFullBtn=document.getElementById('toFullBtn');
var toHalfBtn=document.getElementById('toHalfBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
function toFullwidth(text){
var r='';
for(var i=0;i<text.length;i++){
var code=text.charCodeAt(i);
if(code===32){r+='\u3000';}
else if(code>=33&&code<=126){r+=String.fromCharCode(code+65248);}
else{r+=text[i];}
}
return r;
}
function toHalfwidth(text){
var r='';
for(var i=0;i<text.length;i++){
var code=text.charCodeAt(i);
if(code===0x3000){r+=' ';}
else if(code>=0xFF01&&code<=0xFF5E){r+=String.fromCharCode(code-65248);}
else{r+=text[i];}
}
return r;
}
toFullBtn.addEventListener('click',function(){var t=inputEl.value;if(!t){setStatus('请输入文本','error');return;}输出El.textContent=toFullwidth(t);setStatus('');});
toHalfBtn.addEventListener('click',function(){var t=inputEl.value;if(!t){setStatus('请输入文本','error');return;}输出El.textContent=toHalfwidth(t);setStatus('');});
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
