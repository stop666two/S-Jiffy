<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GCD/LCM 计算器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .gl-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .gl-row .field { flex:1; min-width:100px; }
    .gl-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>GCD/LCM 计算器</h1>
    <p class="tool-desc">计算多个数的最大公约数和最小公倍数，并显示质因数分解。</p>
    <div class="card">
      <div class="gl-row">
        <div class="field" style="flex:2;"><label for="inputVal">输入数字（逗号或空格分隔）</label><input id="inputVal" class="input" type="text" value="12, 18, 24" placeholder="例如 12, 18, 24"></div>
      </div>
      <div><button id="genBtn" class="btn btn-primary">计算</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputVal');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b) { var t = b; b = a % b; a = t; }
      return a;
    }

    function lcm(a, b) {
      return (a * b) / gcd(a, b);
    }

    function primeFactors(n) {
      n = Math.abs(n);
      if (n < 2) return [];
      var factors = [];
      var d = 2;
      while (n > 1) {
        while (n % d === 0) {
          factors.push(d);
          n = n / d;
        }
        d++;
        if (d * d > n) {
          if (n > 1) factors.push(n);
          break;
        }
      }
      return factors;
    }

    function factorCount(arr) {
      var map = {};
      for (var i = 0; i < arr.length; i++) {
        var f = arr[i];
        map[f] = (map[f] || 0) + 1;
      }
      return map;
    }

    function generate() {
      var raw = inputEl.value.trim();
      if (!raw) { setStatus('请输入数字', 'error'); return; }
      var parts = raw.split(/[,，\s]+/).filter(function(s) { return s !== ''; });
      var nums = [];
      for (var i = 0; i < parts.length; i++) {
        var n = parseInt(parts[i], 10);
        if (isNaN(n) || n <= 0) { setStatus('"' + parts[i] + '" 不是有效的正整数', 'error'); return; }
        nums.push(n);
      }
      if (nums.length < 2) { setStatus('请至少输入两个数字', 'error'); return; }

      var g = nums[0];
      var l = nums[0];
      for (var i = 1; i < nums.length; i++) {
        g = gcd(g, nums[i]);
        l = lcm(l, nums[i]);
      }

      var 输出 = '数字: ' + nums.join(', ') + '\n';
      输出 += '共 ' + nums.length + ' 个数字\n';
      输出 += '\n最大公约数 (GCD): ' + g + '\n';
      输出 += '最小公倍数 (LCM): ' + l + '\n';

      输出 += '\n--- 质因数分解 ---\n';
      for (var i = 0; i < nums.length; i++) {
        var pf = primeFactors(nums[i]);
        if (pf.length === 0) {
          输出 += nums[i] + ' = ' + nums[i] + ' (质数)\n';
        } else {
          var fc = factorCount(pf);
          var partsArr = [];
          var keys = Object.keys(fc).sort(function(a,b){return parseInt(a)-parseInt(b);});
          for (var k = 0; k < keys.length; k++) {
            partsArr.push(keys[k] + (fc[keys[k]] > 1 ? '^' + fc[keys[k]] : ''));
          }
          输出 += nums[i] + ' = ' + partsArr.join(' × ') + '\n';
        }
      }

      输出El.textContent = 输出;
      setStatus('计算完成');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
