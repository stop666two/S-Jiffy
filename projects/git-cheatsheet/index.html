<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Git 速查表 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>Git 速查表</h1><p class="tool-desc">浏览搜索常用 Git 命令和参数。</p><div class="card"><div class="row"><div style="flex:1"><input id="searchInput" class="input" placeholder="搜索 Git 命令..." style="width:100%"></div></div>
<div id="cmdList" style="font-family:var(--font-mono);font-size:13px"></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var si=document.getElementById("searchInput"),cl=document.getElementById("cmdList"),o=document.getElementById("输出Text");
var cmds=[{cmd:"git init",desc:"初始化仓库"},{cmd:"git clone <url>",desc:"克隆远程仓库"},{cmd:"git add .",desc:"暂存所有变更"},{cmd:"git add <file>",desc:"暂存指定文件"},{cmd:"git commit -m <msg>",desc:"提交暂存区"},{cmd:"git commit -am <msg>",desc:"暂存并提交"},{cmd:"git status",desc:"查看工作区状态"},{cmd:"git diff",desc:"查看未暂存差异"},{cmd:"git diff --staged",desc:"查看已暂存差异"},{cmd:"git log",desc:"查看提交历史"},{cmd:"git log --oneline",desc:"简洁历史"},{cmd:"git branch",desc:"列出本地分支"},{cmd:"git branch <name>",desc:"创建分支"},{cmd:"git checkout <name>",desc:"切换分支"},{cmd:"git checkout -b <name>",desc:"创建并切换"},{cmd:"git merge <name>",desc:"合并分支"},{cmd:"git pull",desc:"拉取远程更新"},{cmd:"git push",desc:"推送到远程"},{cmd:"git push origin <name>",desc:"推送分支"},{cmd:"git remote -v",desc:"查看远程仓库"},{cmd:"git stash",desc:"暂存工作进度"},{cmd:"git stash pop",desc:"恢复暂存"},{cmd:"git reset HEAD <file>",desc:"取消暂存"},{cmd:"git reset --soft HEAD^",desc:"撤销提交保留更改"},{cmd:"git reset --hard HEAD^",desc:"撤销提交丢弃更改"},{cmd:"git revert <commit>",desc:"安全撤销提交"},{cmd:"git tag <name>",desc:"创建标签"},{cmd:"git fetch",desc:"获取远程更新"},{cmd:"git rebase <branch>",desc:"变基"},{cmd:"git rm <file>",desc:"删除文件"},{cmd:"git mv <old> <new>",desc:"重命名文件"}];
function render(q){cl.innerHTML="";var f=q?cmds.filter(function(c){return c.cmd.indexOf(q)!==-1||c.desc.indexOf(q)!==-1}):cmds;f.forEach(function(c){var d=document.createElement("div");d.style.cssText="padding:8px 12px;border-bottom:1px solid var(--color-border);cursor:pointer;display:flex;gap:16px;align-items:center";d.innerHTML='<code style="color:var(--color-text-primary);font-family:var(--font-mono)">'+c.cmd+'</code><span style="color:var(--color-text-secondary);font-size:12px">'+c.desc+'</span>';d.addEventListener("click",function(){copyToClipboard(c.cmd,document.getElementById("copyBtn"));setStatus("已复制: "+c.cmd)});cl.appendChild(d)});o.textContent="共 "+f.length+" 条命令"}
si.addEventListener("input",function(){render(si.value.trim())});render("");document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
