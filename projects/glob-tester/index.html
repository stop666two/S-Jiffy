<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Glob 模式匹配 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.glob-controls{display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap;align-items:center;}
.test-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--color-border);font-size:13px;}
.match-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.match-yes{background:#e6f4ea;color:#137333;}
.match-no{background:#fce8e6;color:#c5221f;}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Glob 模式匹配</h1><p class="tool-desc">测试 glob 通配符模式（如 *.js, src/**/*.ts）是否匹配指定路径。</p>
<div class="card" style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-2);">
<input id="patternInput" class="input js-focus-input" placeholder="glob 模式，如 **/*.txt" style="flex:1;min-width:200px;">
<input id="testPathInput" class="input" placeholder="测试路径，如 src/data/file.txt" style="flex:1;min-width:200px;">
</div>
<div class="action-bar" style="display:flex;gap:8px;margin-bottom:var(--space-3);flex-wrap:wrap;">
<button id="testBtn" class="btn btn-primary">测试匹配</button>
<button id="addToListBtn" class="btn btn-secondary">添加到列表</button>
<button id="clearBtn" class="btn btn-secondary">清空列表</button>
</div>
<div id="testResult" style="margin-bottom:var(--space-2);"></div>
<div id="testList"></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var pat=document.getElementById('patternInput'),tp=document.getElementById('testPathInput');
var tr=document.getElementById('testResult'),tl=document.getElementById('testList'),o=document.getElementById('outputText');
var tests=[];
function globMatch(pattern,path){
  var p=pattern.replace(/[.+^${}()|\\]/g,'\\$&').replace(/\*/g,'[^/]*').replace(/\?/g,'[^/]').replace(/\[!/g,'[^').replace(/\[/g,'[');
  p=p.replace(/\*\*/g,'.+');
  return new RegExp('^'+p+'$').test(path);
}
function renderTest(pattern,path,result){
  var badge=result?'<span class="match-badge match-yes">✓ 匹配</span>':'<span class="match-badge match-no">✗ 不匹配</span>';
  return '<div class="test-row"><span style="min-width:120px;font-family:var(--font-mono);font-size:12px;">'+htmlEscape(pattern)+'</span><span style="flex:1;font-family:var(--font-mono);font-size:12px;">'+htmlEscape(path)+'</span>'+badge+'</div>';
}
document.getElementById('testBtn').addEventListener('click',function(){
  var p=pat.value.trim(),pt=tp.value.trim();
  if(!p||!pt){setStatus('请输入模式和路径','error');return;}
  var matched=globMatch(p,pt);
  tr.innerHTML=renderTest(p,pt,matched);
  tests.push({pattern:p,path:pt,matched:matched});
  o.textContent='模式: '+p+' | 路径: '+pt+' | '+(matched?'匹配':'不匹配');
  setStatus(matched?'匹配成功':'不匹配');
});
document.getElementById('addToListBtn').addEventListener('click',function(){
  var p=pat.value.trim(),pt=tp.value.trim();
  if(!p||!pt){setStatus('请输入模式和路径','error');return;}
  tests.push({pattern:p,path:pt,matched:globMatch(p,pt)});
  tl.innerHTML='<div style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:4px;">测试列表:</div>'+tests.map(function(t){return renderTest(t.pattern,t.path,t.matched);}).join('');
  setStatus('已添加，共 '+tests.length+' 项');
});
document.getElementById('clearBtn').addEventListener('click',function(){tests=[];tl.innerHTML='';tr.innerHTML='';o.textContent='';setStatus('');});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
})();</script>
</body></html>
