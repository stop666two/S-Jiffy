<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>渐变生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.gradient-box{width:100%;height:200px;border-radius:var(--radius-md);margin-bottom:var(--space-3);border:1px solid var(--color-border)}.stop-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}.stop-row input[type=color]{width:40px;height:40px;padding:0;border:1px solid var(--color-border);border-radius:var(--radius-sm);cursor:pointer}.stop-row input[type=number]{width:70px}.stop-row .btn{height:32px;min-width:auto;padding:0 12px}.angle-row{display:flex;gap:12px;align-items:center;margin-bottom:var(--space-2);flex-wrap:wrap}.pre{font-family:var(--font-mono);font-size:13px;white-space:pre-wrap;word-break:break-all}.type-row{display:flex;gap:8px;margin-bottom:var(--space-2)}.type-row label{font-size:var(--font-size-sm);display:flex;align-items:center;gap:4px;cursor:pointer}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>渐变生成器</h1><p class="tool-desc">交互式 CSS 渐变生成器，支持线性/径向渐变、多色标，实时预览并复制 CSS。</p>
<div class="card">
<div class="gradient-box" id="previewBox"></div>
<div class="type-row"><label><input type="radio" name="gradType" value="linear" checked> 线性</label><label><input type="radio" name="gradType" value="radial"> 径向</label></div>
<div class="angle-row"><label style="font-size:var(--font-size-sm)">角度</label><input id="angleInput" class="input" type="number" value="90" min="0" max="360" style="width:80px"><span style="font-size:var(--font-size-sm)">deg</span></div>
<div id="stopsContainer"><div class="stop-row"><input type="color" value="#ff6b6b"><input class="input" type="number" value="0" min="0" max="100" style="width:70px"><span style="font-size:var(--font-size-sm)">%</span><button class="btn btn-secondary removeStop" style="height:32px;min-width:auto;padding:0 10px">×</button></div><div class="stop-row"><input type="color" value="#4ecdc4"><input class="input" type="number" value="100" min="0" max="100" style="width:70px"><span style="font-size:var(--font-size-sm)">%</span><button class="btn btn-secondary removeStop" style="height:32px;min-width:auto;padding:0 10px">×</button></div></div>
<button id="addStopBtn" class="btn btn-secondary" style="height:36px;min-width:auto;padding:0 16px;margin-top:4px">+ 添加色标</button>
</div>
<div class="output-box"><span id="outputText" class="pre"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var preview=document.getElementById('previewBox'),输出=document.getElementById('outputText'),angleInp=document.getElementById('angleInput'),stopsEl=document.getElementById('stopsContainer'),addBtn=document.getElementById('addStopBtn');function render(){var type=document.querySelector('input[name="gradType"]:checked').value,angle=angleInp.value||90,stops=stopsEl.querySelectorAll('.stop-row'),parts=[];for(var i=0;i<stops.length;i++){var color=stops[i].querySelector('input[type=color]').value,pos=stops[i].querySelector('input[type=number]').value||0;parts.push(color+' '+pos+'%')}var css;if(type==='linear')css='linear-gradient('+angle+'deg, '+parts.join(', ')+')';else css='radial-gradient(circle, '+parts.join(', ')+')';preview.style.background=css;输出.textContent='background: '+css+';'}render();angleInp.addEventListener('input',render);document.querySelectorAll('input[name="gradType"]').forEach(function(r){r.addEventListener('change',render)});stopsEl.addEventListener('input',function(e){if(e.target.tagName==='INPUT')render()});addBtn.addEventListener('click',function(){var div=document.createElement('div');div.className='stop-row';div.innerHTML='<input type="color" value="#cccccc"><input class="input" type="number" value="50" min="0" max="100" style="width:70px"><span style="font-size:var(--font-size-sm)">%</span><button class="btn btn-secondary removeStop" style="height:32px;min-width:auto;padding:0 10px">×</button>';stopsEl.appendChild(div);div.querySelector('.removeStop').addEventListener('click',function(){if(stopsEl.children.length>2){div.remove();render()}else{setStatus('至少需要两个色标','error')}});render()});stopsEl.querySelectorAll('.removeStop').forEach(function(btn){btn.addEventListener('click',function(){var row=btn.closest('.stop-row');if(stopsEl.children.length>2){row.remove();render()}else{setStatus('至少需要两个色标','error')}})});document.getElementById('copyBtn').addEventListener('click',function(){if(输出.textContent){copyToClipboard(输出.textContent,this);setStatus('已复制')}})})();</script></body></html>
