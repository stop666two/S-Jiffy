<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Gravatar Generator - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.grav-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:var(--space-3);}
.grav-row label{display:block;font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:4px;}
.grav-row .field{flex:1;min-width:200px;}
.grav-preview{text-align:center;padding:var(--space-3);}
.grav-preview img{border-radius:var(--radius-md);border:1px solid var(--color-border);}
.opt-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:var(--space-2);font-size:var(--font-size-sm);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Gravatar 查询</h1><p class="tool-desc">Email → MD5 hash → Gravatar URL with preview.</p>
<div class="card">
<div class="grav-row"><div class="field"><label>邮箱</label><input id="emailInput" class="input js-focus-input" type="email" placeholder="you@example.com" value="user@example.com"></div>
<button id="generateBtn" class="btn btn-primary">生成</button></div>
</div>
<div class="card">
<div class="grav-row"><strong style="font-size:var(--font-size-sm);">MD5 Hash:</strong><span id="md5Hash" style="font-family:var(--font-mono);font-size:var(--font-size-sm);word-break:break-all;">—</span></div>
<div class="grav-row">
<label>尺寸</label><select id="sizeSelect" class="input" style="width:auto;"><option value="40">40</option><option value="80" selected>80</option><option value="120">120</option><option value="200">200</option><option value="400">400</option></select>
<label>Default</label><select id="defaultSelect" class="input" style="width:auto;"><option value="mp">Mystery Person</option><option value="identicon">Identicon</option><option value="monsterid">Monster</option><option value="wavatar">Wavatar</option><option value="retro">Retro</option><option value="robohash">Robohash</option><option value="blank">Blank</option></select>
<label>Rating</label><select id="ratingSelect" class="input" style="width:auto;"><option value="g">G</option><option value="pg">PG</option><option value="r">R</option><option value="x">X</option></select>
</div>
<div class="grav-preview" id="previewArea"></div>
<div class="grav-row"><strong style="font-size:var(--font-size-sm);">Gravatar URL:</strong><span id="gravUrl" style="font-family:var(--font-mono);font-size:var(--font-size-sm);word-break:break-all;">—</span></div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">Copy URL</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var el=document.getElementById('emailInput'),mh=document.getElementById('md5Hash'),pa=document.getElementById('previewArea'),gu=document.getElementById('gravUrl'),o=document.getElementById('输出Text');

function md5(str){var hash=0;if(str.length===0)return hash;for(var i=0;i<str.length;i++){var ch=str.charCodeAt(i);hash=((hash<<5)-hash)+ch;hash=hash&hash;}
return(Math.abs(hash)>>>0).toString(16).padStart(32,'0');}
function md5Real(s){function rotateLeft(n,b){return(n<<b)|(n>>>(32-b));}
function toHex(n){var h='';for(var i=7;i>=0;i--)h+=((n>>>(i*4))&15).toString(16);return h;}
function strToBytes(s){var b=[];for(var i=0;i<s.length;i++)b.push(s.charCodeAt(i));return b;}
var msg=strToBytes(unescape(encodeURIComponent(s)));var origLen=msg.length*8;msg.push(0x80);
while(msg.length%64!==56)msg.push(0);
for(var i=0;i<8;i++)msg.push((origLen>>>(i*8))&255);
var h0=0x67452301,h1=0xEFCDAB89,h2=0x98BADCFE,h3=0x10325476;
var sTab=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
var K=[];for(var i=1;i<=64;i++)K.push(Math.floor(Math.abs(Math.sin(i))*Math.pow(2,32)));
for(var chunk=0;chunk<msg.length/64;chunk++){var block=msg.slice(chunk*64,chunk*64+64);
var words=[];for(var i=0;i<16;i++)words[i]=block[i*4]|(block[i*4+1]<<8)|(block[i*4+2]<<16)|(block[i*4+3]<<24);
for(var i=16;i<80;i++)words[i]=rotateLeft(words[i-3]^words[i-8]^words[i-14]^words[i-16],1);
var a=h0,b=h1,c=h2,d=h3;
for(var i=0;i<64;i++){var f,g;if(i<16){f=(b&c)|((~b)&d);g=i;}else if(i<32){f=(d&b)|((~d)&c);g=(5*i+1)%16;}else if(i<48){f=b^c^d;g=(3*i+5)%16;}else{f=c^(b|(~d));g=(7*i)%16;}
var temp=d+rotateLeft(a, sTab[i])+K[i]+words[g];d=c;c=b;b=a;a=temp;}
h0=(h0+a)&0xFFFFFFFF;h1=(h1+b)&0xFFFFFFFF;h2=(h2+c)&0xFFFFFFFF;h3=(h3+d)&0xFFFFFFFF;}
return toHex(h0)+toHex(h1)+toHex(h2)+toHex(h3);}

function generate(){var email=el.value.trim().toLowerCase();if(!email){setStatus('Enter email','error');return;}
var hash=md5Real(email);mh.textContent=hash;
var size=document.getElementById('sizeSelect').value;
var def=document.getElementById('defaultSelect').value;
var rating=document.getElementById('ratingSelect').value;
var url='https://www.gravatar.com/avatar/'+hash+'?s='+size+'&d='+def+'&r='+rating;
gu.textContent=url;pa.innerHTML='<img src="'+url+'" alt="Gravatar" width="'+size+'" height="'+size+'">';
o.textContent=url;setStatus('Gravatar generated');}

document.getElementById('generateBtn').addEventListener('click',generate);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('URL copied');}});
generate();})();
</script></body></html>
