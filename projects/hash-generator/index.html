<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Hash Generator - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.hash-opts{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3);}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace">
<h1>Hash 计算器</h1>
<p class="tool-desc">SHA-1 / SHA-224 / SHA-256 / SHA-384 / SHA-512 / SHA-512/224 / SHA-512/256 / SHA3-256 / SHA3-384 / SHA3-512, text & file.</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="Enter text to hash..." style="min-height:120px;"></textarea></div>
<div class="hash-opts">
<select id="algoSelect" class="input" style="width:auto;min-width:150px;">
<option value="SHA-1">SHA-1</option><option value="SHA-224">SHA-224</option><option value="SHA-256" selected>SHA-256</option><option value="SHA-384">SHA-384</option><option value="SHA-512">SHA-512</option><option value="SHA-512/224">SHA-512/224</option><option value="SHA-512/256">SHA-512/256</option>
</select>
<select id="fmtSelect" class="input" style="width:auto;min-width:80px;"><option value="hex">Hex</option><option value="base64">Base64</option></select>
<button id="hashBtn" class="btn btn-primary">计算</button>
<button id="fileBtn" class="btn btn-secondary">选择文件</button>
<input type="file" id="fileInput" style="display:none;">
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="输出-box" id="输出Container"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){
  var i=document.getElementById('inputText'),algo=document.getElementById('algoSelect'),fmt=document.getElementById('fmtSelect'),o=document.getElementById('输出Text'),fi=document.getElementById('fileInput');
  function toHex(buf){return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}
  function toBase64(buf){var bytes=new Uint8Array(buf),str='';for(var x=0;x<bytes.length;x++)str+=String.fromCharCode(bytes[x]);return btoa(str);}
  function doHash(data){
    var mapped = algo.value;
    crypto.subtle.digest(mapped, data).then(function(buf){
      o.textContent=fmt.value==='hex'?toHex(buf):toBase64(buf);
      setStatus('');
    }).catch(function(e){setStatus('Error: '+e.message,'error');});
  }
  document.getElementById('hashBtn').addEventListener('click',function(){
    var text=i.value.trim();if(!text){setStatus('Enter content','error');return;}
    doHash(new TextEncoder().encode(text));
  });
  document.getElementById('fileBtn').addEventListener('click',function(){fi.click();});
  fi.addEventListener('change',function(){
    if(!fi.files[0])return;
    var reader=new FileReader();
    reader.onload=function(e){doHash(e.target.结果);setStatus('Hashing file...');};
    reader.onerror=function(){setStatus('File read error','error');};
    reader.readAsArrayBuffer(fi.files[0]);
  });
  document.getElementById('clearBtn').addEventListener('click',function(){i.value='';o.textContent='';setStatus('');i.focus();fi.value='';});
  document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('Copied');}});
})();
</script></body></html>
