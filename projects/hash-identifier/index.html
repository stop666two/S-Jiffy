<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Hash 识别器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.inp-row{margin-bottom:var(--space-3)}.result-card{border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);margin-bottom:var(--space-2)}.result-card h3{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:8px}.result-card .hash-type{font-size:var(--font-size-lg);font-weight:600;margin-bottom:4px}.result-card .hash-detail{font-size:var(--font-size-sm);color:var(--color-text-secondary)}.match-list{list-style:none;padding:0;margin:8px 0 0;font-size:var(--font-size-sm)}.match-list li{padding:4px 8px;margin-bottom:4px;background:var(--color-bg-soft);border-radius:var(--radius-sm);border-left:3px solid var(--color-text-primary)}.match-list li .nm{font-weight:600}.match-list li .len{color:var(--color-text-secondary);margin-left:8px}.props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:var(--space-2)}.prop-item{background:var(--color-bg-soft);border-radius:var(--radius-sm);padding:6px 10px;font-size:var(--font-size-sm)}.prop-item .l{color:var(--color-text-secondary)}.prop-item .v{font-family:var(--font-mono)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>Hash 识别器</h1><p class="tool-desc">通过长度、字符格式等特征识别常见的哈希类型。</p>
<div class="card">
<div class="inp-row"><input id="hashInput" class="input" placeholder="输入要识别的哈希字符串..." style="font-family:var(--font-mono)"></div>
<div id="resultArea"></div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById('hashInput'),area=document.getElementById('resultArea'),out=document.getElementById('outputText');var hashDB=[{name:'MD5',len:32,pattern:/^[0-9a-f]{32}$/i,desc:'Message Digest 5, 128 bits'},{name:'SHA-1',len:40,pattern:/^[0-9a-f]{40}$/i,desc:'Secure Hash Algorithm 1, 160 bits'},{name:'SHA-224',len:56,pattern:/^[0-9a-f]{56}$/i,desc:'SHA-224, 224 bits'},{name:'SHA-256',len:64,pattern:/^[0-9a-f]{64}$/i,desc:'SHA-256, 256 bits'},{name:'SHA-384',len:96,pattern:/^[0-9a-f]{96}$/i,desc:'SHA-384, 384 bits'},{name:'SHA-512',len:128,pattern:/^[0-9a-f]{128}$/i,desc:'SHA-512, 512 bits'},{name:'SHA-512/224',len:56,pattern:/^[0-9a-f]{56}$/i,desc:'SHA-512/224, 224 bits'},{name:'SHA-512/256',len:64,pattern:/^[0-9a-f]{64}$/i,desc:'SHA-512/256, 256 bits'},{name:'RIPEMD-128',len:32,pattern:/^[0-9a-f]{32}$/i,desc:'RIPEMD-128, 128 bits'},{name:'RIPEMD-160',len:40,pattern:/^[0-9a-f]{40}$/i,desc:'RIPEMD-160, 160 bits'},{name:'RIPEMD-256',len:64,pattern:/^[0-9a-f]{64}$/i,desc:'RIPEMD-256, 256 bits'},{name:'RIPEMD-320',len:80,pattern:/^[0-9a-f]{80}$/i,desc:'RIPEMD-320, 320 bits'},{name:'Whirlpool',len:128,pattern:/^[0-9a-f]{128}$/i,desc:'Whirlpool, 512 bits'},{name:'CRC32',len:8,pattern:/^[0-9a-f]{8}$/i,desc:'Cyclic Redundancy Check, 32 bits'},{name:'CRC64',len:16,pattern:/^[0-9a-f]{16}$/i,desc:'Cyclic Redundancy Check, 64 bits'},{name:'NTLM',len:32,pattern:/^[0-9a-f]{32}$/i,desc:'Windows NT LAN Manager, 128 bits'},{name:'LM Hash',len:32,pattern:/^[0-9a-f]{32}$/i,desc:'LAN Manager Hash (split into two 16-char halves)',note:'通常包含大写十六进制'},{name:'MySQL < 4.1',len:16,pattern:/^[0-9a-f]{16}$/i,desc:'Old MySQL password hash'},{name:'MySQL 5',len:40,pattern:/^[0-9a-f]{40}$/i,desc:'MySQL 5.x password hash'},{name:'SHA-256 (base64)',len:44,pattern:/^[A-Za-z0-9+/]{43}=$|^[A-Za-z0-9+/]{43}[A-Za-z0-9+/=]$/,desc:'SHA-256 in base64'},{name:'SHA-1 (base64)',len:27,pattern:/^[A-Za-z0-9+/]{27}=$/,desc:'SHA-1 in base64'},{name:'bcrypt',len:60,pattern:/^\$2[abxy]?\$[\d]{2}\$[A-Za-z0-9./]{53}$/,desc:'bcrypt password hash'},{name:'SHA-512 (Unix)',len:106,pattern:/^\$6\$[A-Za-z0-9./]+\$[A-Za-z0-9./]+$/,desc:'Unix SHA-512 crypt hash'},{name:'SHA-256 (Unix)',len:63,pattern:/^\$5\$[A-Za-z0-9./]+\$[A-Za-z0-9./]+$/,desc:'Unix SHA-256 crypt hash'},{name:'MD5 (Unix)',len:34,pattern:/^\$1\$[A-Za-z0-9./]+\$[A-Za-z0-9./]+$/,desc:'Unix MD5 crypt hash'},{name:'Base64 (generic)',len:0,pattern:/^[A-Za-z0-9+/]+={0,2}$/,desc:'Base64 编码字符串'},{name:'Base32 (generic)',len:0,pattern:/^[A-Z2-7]+={0,6}$/i,desc:'Base32 编码字符串'},{name:'Decimal',len:0,pattern:/^\d+$/,desc:'纯十进制数字'}];function identify(){var h=inp.value.trim();if(!h){area.innerHTML='';out.textContent='';return}var len=h.length;var isHex=/^[0-9a-f]+$/i.test(h);var isAlphaNum=/^[a-z0-9]+$/i.test(h);var html='<div class="result-card"><h3>属性</h3><div class="props-grid"><div class="prop-item"><span class="l">长度: </span><span class="v">'+len+'</span></div><div class="prop-item"><span class="l">十六进制: </span><span class="v">'+(isHex?'是':'否')+'</span></div><div class="prop-item"><span class="l">字母数字: </span><span class="v">'+(isAlphaNum?'是':'否')+'</span></div></div></div>';var matches=[];for(var i=0;i<hashDB.length;i++){var entry=hashDB[i];if(entry.len>0&&len!==entry.len)continue;if(entry.pattern.test(h)){matches.push(entry)}}if(matches.length>0){html+='<div class="result-card"><h3>可能的哈希类型 ('+matches.length+' 个匹配)</h3><ul class="match-list">';for(var i=0;i<matches.length;i++){html+='<li><span class="nm">'+matches[i].name+'</span> <span class="len">('+matches[i].len+' 字符)</span><br><span style="color:var(--color-text-secondary);font-size:12px">'+matches[i].desc+'</span>'+(matches[i].note?'<br><span style="color:var(--color-text-secondary);font-size:12px">提示: '+matches[i].note+'</span>':'')+'</li>'}html+='</ul></div>'}else{html+='<div class="result-card"><h3>无匹配</h3><p style="font-size:var(--font-size-sm);color:var(--color-text-secondary)">未识别出已知哈希类型。可能是自定义哈希、加密数据或未知格式。</p></div>'}area.innerHTML=html;out.textContent=matches.length>0?matches[0].name+'(可能性较高)':'未识别';setStatus(matches.length>0?'识别到 '+matches.length+' 个匹配':'未识别到匹配')}inp.addEventListener('input',identify);document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
