<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>目标心率计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}.big-num{font-size:40px;font-weight:700;text-align:center}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>目标心率计算器</h1><p class="tool-desc">计算运动时的目标心率区间。</p><div class="card"><div class="row"><div><label>年龄</label><input id="age" class="input" type="number" value="30" min="1" max="120"></div><div><label>静息心率</label><input id="restHr" class="input" type="number" value="70" min="30" max="120"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="maxHr">—</div><div class="l">最大心率 (bpm)</div></div><div class="res-item"><div class="v" id="zone1">—</div><div class="l">热身 50-60%</div></div><div class="res-item"><div class="v" id="zone2">—</div><div class="l">燃脂 60-70%</div></div><div class="res-item"><div class="v" id="zone3">—</div><div class="l">有氧 70-80%</div></div><div class="res-item"><div class="v" id="zone4">—</div><div class="l">无氧 80-90%</div></div><div class="res-item"><div class="v" id="zone5">—</div><div class="l">极限 90-100%</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var a=document.getElementById("age"),r=document.getElementById("restHr"),mh=document.getElementById("maxHr"),z1=document.getElementById("zone1"),z2=document.getElementById("zone2"),z3=document.getElementById("zone3"),z4=document.getElementById("zone4"),z5=document.getElementById("zone5"),o=document.getElementById("outputText");
document.getElementById("calcBtn").addEventListener("click",function(){var age=parseInt(a.value),rest=parseInt(r.value);if(!age){setStatus("请输入年龄","error");return}
var max=220-age,heartRateReserve=max-rest;mh.textContent=max;var zones=[[0.5,0.6],[0.6,0.7],[0.7,0.8],[0.8,0.9],[0.9,1.0]];var els=[z1,z2,z3,z4,z5];var labels=["热身","燃脂","有氧","无氧","极限"];
zones.forEach(function(zo,i){var lo=Math.round(rest+heartRateReserve*zo[0]),hi=Math.round(rest+heartRateReserve*zo[1]);els[i].textContent=lo+"-"+hi+" bpm"});setStatus("计算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});
document.getElementById("calcBtn").click();})();</script></body></html>
