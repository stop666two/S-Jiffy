<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex RGB Decimal 转换 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .color-preview { width:100%; height:48px; border-radius:var(--radius-md); border:1px solid var(--color-border); margin-top:var(--space-2); }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>Hex RGB Decimal 转换</h1>
    <p class="tool-desc">十六进制、RGB 与十进制颜色值互转。</p>
    <div class="card" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <input id="hexInput" class="input js-focus-input" placeholder="#FF6600" style="width:140px;">
      <input id="rInput" class="input" placeholder="R" style="width:60px;">
      <input id="gInput" class="input" placeholder="G" style="width:60px;">
      <input id="bInput" class="input" placeholder="B" style="width:60px;">
      <button id="toHexBtn" class="btn btn-primary">→ Hex</button>
      <button id="toRgbBtn" class="btn btn-secondary">→ RGB</button>
      <button id="toDecBtn" class="btn btn-secondary">→ Decimal</button>
    </div>
    <div id="colorPreview" class="color-preview"></div>
    <div class="输出-box" style="margin-top:var(--space-2);">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var hexInput = document.getElementById('hexInput');
      var rInput = document.getElementById('rInput');
      var gInput = document.getElementById('gInput');
      var bInput = document.getElementById('bInput');
      var 输出El = document.getElementById('输出Text');
      var preview = document.getElementById('colorPreview');
      var copyBtn = document.getElementById('copyBtn');

      function setPreview(r, g, b) {
        preview.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';
      }

      function hexToRgb(hex) {
        var h = hex.replace('#', '');
        if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
        if (h.length !== 6) return null;
        var num = parseInt(h, 16);
        if (isNaN(num)) return null;
        return { r: (num >> 16) & 0xFF, g: (num >> 8) & 0xFF, b: num & 0xFF };
      }

      document.getElementById('toHexBtn').addEventListener('click', function () {
        var r = parseInt(rInput.value), g = parseInt(gInput.value), b = parseInt(bInput.value);
        if (isNaN(r) || isNaN(g) || isNaN(b) || r < 0 || r > 255 || g < 0 || g > 255 || b < 0 || b > 255) {
          setStatus('请输入 0-255 的 RGB 值', 'error'); return;
        }
        var hex = '#' + [r, g, b].map(function (v) { return v.toString(16).padStart(2, '0'); }).join('');
        hexInput.value = hex;
        输出El.textContent = hex;
        setPreview(r, g, b);
        setStatus('');
      });

      document.getElementById('toRgbBtn').addEventListener('click', function () {
        var hex = hexInput.value.trim();
        var rgb = hexToRgb(hex);
        if (!rgb) { setStatus('无效 Hex 值', 'error'); return; }
        rInput.value = rgb.r; gInput.value = rgb.g; bInput.value = rgb.b;
        var text = 'rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')';
        输出El.textContent = text;
        setPreview(rgb.r, rgb.g, rgb.b);
        setStatus('');
      });

      document.getElementById('toDecBtn').addEventListener('click', function () {
        var hex = hexInput.value.trim();
        var rgb = hexToRgb(hex);
        if (!rgb) { setStatus('无效 Hex 值', 'error'); return; }
        var dec = (rgb.r << 16) | (rgb.g << 8) | rgb.b;
        输出El.textContent = 'Decimal: ' + dec + ' | Hex: #' + dec.toString(16).padStart(6, '0').to大写() + ' | RGB: (' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')';
        setPreview(rgb.r, rgb.g, rgb.b);
        setStatus('');
      });

      copyBtn.addEventListener('click', function () { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
    })();
  </script>
</body>
</html>
