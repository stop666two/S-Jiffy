<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HEX 转 HSL - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.color-preview{width:100%;height:60px;border-radius:var(--radius-md);border:1px solid var(--color-border);margin-bottom:16px;transition:background .2s}.input-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}.input-row input{width:180px;font-family:var(--font-mono);font-size:18px}.结果-group{display:flex;gap:24px;font-family:var(--font-mono);font-size:16px;flex-wrap:wrap;margin-bottom:8px}.结果-item{display:flex;align-items:center;gap:8px}.结果-item .val{font-weight:600;font-size:20px}.chip{display:inline-block;width:24px;height:24px;border-radius:3px;border:1px solid var(--color-border);vertical-align:middle}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>HEX 转 HSL</h1><p class="tool-desc">将十六进制颜色值转换为 HSL（色相、饱和度、亮度）格式。</p>
<div class="card">
<div class="color-preview" id="colorPreview"></div>
<div class="input-row">
<input id="hexInput" class="input js-focus-input" placeholder="#RRGGBB" value="#E74C3C">
<button id="convertBtn" class="btn btn-primary">转换</button>
</div>
<div class="结果-group">
<div><span class="chip" id="colorChip"></span>HSL: <span class="val" id="hsl结果">6°, 78%, 57%</span></div>
</div>
<div class="结果-group" style="font-size:14px;">
<div>H: <b id="hVal">6</b>°</div>
<div>S: <b id="sVal">78</b>%</div>
<div>L: <b id="lVal">57</b>%</div>
</div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var hexInput=document.getElementById('hexInput');
var convertBtn=document.getElementById('convertBtn');
var colorPreview=document.getElementById('colorPreview');
var colorChip=document.getElementById('colorChip');
var hsl结果=document.getElementById('hsl结果');
var hVal=document.getElementById('hVal');
var sVal=document.getElementById('sVal');
var lVal=document.getElementById('lVal');
var 输出El=document.getElementById('输出Text');
var copyBtn=document.getElementById('copyBtn');

function rgbToHsl(r,g,b){
r/=255;g/=255;b/=255;
var max=Math.max(r,g,b),min=Math.min(r,g,b);
var h,s,l=(max+min)/2;
if(max===min){
h=0;s=0;
}else{
var d=max-min;
s=l>0.5?d/(2-max-min):d/(max+min);
switch(max){
case r:h=(g-b)/d+(g<b?6:0);break;
case g:h=(b-r)/d+2;break;
case b:h=(r-g)/d+4;break;
}
h/=6;
}
return{
h:Math.round(h*360),
s:Math.round(s*100),
l:Math.round(l*100)
};
}

function convert(){
var hex=hexInput.value.trim();
if(hex.startsWith('#'))hex=hex.slice(1);
if(hex.length===3){
hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
}
if(!/^[0-9a-fA-F]{6}$/.test(hex)){
输出El.textContent='无效的 HEX 颜色值';
setStatus('输入错误','error');
return;
}
var r=parseInt(hex.slice(0,2),16);
var g=parseInt(hex.slice(2,4),16);
var b=parseInt(hex.slice(4,6),16);
var c='#'+hex;
colorPreview.style.background=c;
colorChip.style.background=c;
var hsl=rgbToHsl(r,g,b);
hVal.textContent=hsl.h;
sVal.textContent=hsl.s;
lVal.textContent=hsl.l;
hsl结果.textContent=hsl.h+'°, '+hsl.s+'%, '+hsl.l+'%';
输出El.textContent=c+' = HSL('+hsl.h+','+hsl.s+'%,'+hsl.l+'%)';
setStatus('');
}

hexInput.addEventListener('keydown',function(e){if(e.key==='Enter')convert();});
convertBtn.addEventListener('click',convert);
copyBtn.addEventListener('click',function(){
var txt='HSL('+hVal.textContent+'°, '+sVal.textContent+'%, '+lVal.textContent+'%)';
if(hVal.textContent!==''){copyToClipboard(txt,copyBtn);setStatus('已复制');}
});
convert();
})();</script></body></html>
