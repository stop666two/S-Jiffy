<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HMAC Verify - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.hrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:var(--space-3);}
.hrow label{font-size:var(--font-size-sm);color:var(--color-text-secondary);}
.结果-badge{padding:4px 16px;border-radius:9999px;font-size:var(--font-size-sm);font-weight:600;}
.结果-badge.ok{background:#e8f5e9;color:#2e7d32;}
.结果-badge.fail{background:#ffebee;color:#c62828;}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>HMAC 验证器</h1><p class="tool-desc">Verify HMAC signatures of text using SHA-256/SHA-384/SHA-512 with a secret key.<span id="httpsWarning" style="display:none;font-size:var(--font-size-xs);color:var(--color-error);margin-top:4px;">⚠ 需 HTTPS/localhost 环境</span></p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="Enter the message text..." style="min-height:100px;"></textarea></div>
<div class="card">
<div class="hrow"><label>Secret Key</label><input id="keyInput" class="input" type="password" placeholder="HMAC secret key" style="flex:1;min-width:150px;"></div>
<div class="hrow">
<label>算法</label><select id="algoSelect" class="input" style="width:auto;"><option value="SHA-256">SHA-256</option><option value="SHA-384">SHA-384</option><option value="SHA-512">SHA-512</option><option value="SHA-1">SHA-1</option></select>
<label>格式化</label><select id="fmtSelect" class="input" style="width:auto;"><option value="hex">Hex</option><option value="base64">Base64</option></select>
<button id="calcBtn" class="btn btn-primary">Compute HMAC</button>
</div>
</div>
<div class="card">
<div class="hrow"><label>Expected HMAC</label><input id="expectedInput" class="input" placeholder="Paste the expected HMAC to verify" style="flex:1;min-width:200px;"></div>
<div style="text-align:center;margin-top:var(--space-2);"><span id="verifyBadge" class="结果-badge" style="display:none;"></span></div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var i=document.getElementById('inputText'),ki=document.getElementById('keyInput'),al=document.getElementById('algoSelect'),fm=document.getElementById('fmtSelect');
var ei=document.getElementById('expectedInput'),vb=document.getElementById('verifyBadge'),o=document.getElementById('输出Text');

function hex(buf){return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}
function b64(buf){var b=new Uint8Array(buf),s='';for(var x=0;x<b.length;x++)s+=String.fromCharCode(b[x]);return btoa(s);}

function compute(){var text=i.value.trim(),key=ki.value;if(!text||!key){setStatus('Enter message and key','error');return;}
var algo={algo:al.value};
crypto.subtle.importKey('raw',new TextEncoder().encode(key),{name:'HMAC',hash:algo},false,['sign']).then(function(k){
return crypto.subtle.sign('HMAC',k,new TextEncoder().encode(text));}).then(function(sig){var computed=fm.value==='hex'?hex(sig):b64(sig);
o.textContent=computed;
var expected=ei.value.trim();if(expected){var match=computed.toLowerCase()===expected.toLowerCase();
vb.style.display='inline-block';vb.textContent=match?'VERIFIED ✓':'FAILED ✗';vb.className='结果-badge '+(match?'ok':'fail');
setStatus(match?'Verified!':'Verification failed');}else{vb.style.display='none';setStatus('HMAC computed');}}).catch(function(e){setStatus('错误: '+e.message,'error');});}

document.getElementById('calcBtn').addEventListener('click',compute);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制');}});
})();
if(!isSecureContext()){var w=document.getElementById('httpsWarning');if(w)w.style.display='block';}</script></body></html>
