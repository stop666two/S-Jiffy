<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HSL 取色器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.color-preview{width:100%;height:120px;border-radius:var(--radius-md);margin-bottom:var(--space-3);border:1px solid var(--color-border);transition:background .15s}.slider-group{margin-bottom:8px}.slider-group label{font-size:var(--font-size-sm);color:var(--color-text-secondary);display:flex;justify-content:space-between}.slider-group input[type=range]{width:100%;margin-top:4px}.value-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:var(--space-2)}.value-box{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-1) var(--space-2);text-align:center}.value-box .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.value-box .val{font-family:var(--font-mono);font-size:var(--font-size-sm);word-break:break-all;margin-top:2px;cursor:pointer}.value-box .val:hover{color:var(--color-accent)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>HSL 取色器</h1><p class="tool-desc">通过 HSL 滑块调整颜色，实时查看 Hex、RGB、HSL 值。</p>
<div class="card">
<div class="color-preview" id="previewBox"></div>
<div class="slider-group"><label><span>色相 (H)</span><span id="hVal">0°</span></label><input id="hSlider" type="range" min="0" max="360" value="0"></div>
<div class="slider-group"><label><span>饱和度 (S)</span><span id="sVal">100%</span></label><input id="sSlider" type="range" min="0" max="100" value="100"></div>
<div class="slider-group"><label><span>明度 (L)</span><span id="lVal">50%</span></label><input id="lSlider" type="range" min="0" max="100" value="50"></div>
<div class="value-row"><div class="value-box"><div class="lbl">HEX</div><div class="val" id="hexVal">#ff0000</div></div><div class="value-box"><div class="lbl">RGB</div><div class="val" id="rgbVal">rgb(255,0,0)</div></div><div class="value-box"><div class="lbl">HSL</div><div class="val" id="hslVal">hsl(0,100%,50%)</div></div></div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var preview=document.getElementById('previewBox'),hS=document.getElementById('hSlider'),sS=document.getElementById('sSlider'),lS=document.getElementById('lSlider'),hV=document.getElementById('hVal'),sV=document.getElementById('sVal'),lV=document.getElementById('lVal'),hexV=document.getElementById('hexVal'),rgbV=document.getElementById('rgbVal'),hslV=document.getElementById('hslVal'),out=document.getElementById('outputText');function hslToRgb(h,s,l){s/=100;l/=100;var c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;var r,g,b;if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)]}function rgbToHex(r,g,b){return'#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0')}).join('')}function render(){var h=parseInt(hS.value),s=parseInt(sS.value),l=parseInt(lS.value);var rgb=hslToRgb(h,s,l);var hex=rgbToHex(rgb[0],rgb[1],rgb[2]);preview.style.background='hsl('+h+','+s+'%,'+l+'%)';hV.textContent=h+'°';sV.textContent=s+'%';lV.textContent=l+'%';hexV.textContent=hex;rgbV.textContent='rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')';hslV.textContent='hsl('+h+','+s+'%,'+l+'%)';out.textContent='HEX: '+hex+' | RGB: '+rgb[0]+','+rgb[1]+','+rgb[2]}hS.addEventListener('input',render);sS.addEventListener('input',render);lS.addEventListener('input',render);render();[hexV,rgbV,hslV].forEach(function(el){el.addEventListener('click',function(){var txt=this.textContent;copyToClipboard(txt,document.getElementById('copyBtn'));setStatus('已复制 '+txt)})});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
