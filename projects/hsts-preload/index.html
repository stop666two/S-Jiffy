<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HSTS Preload 检查 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.check-row{padding:6px 0;border-bottom:1px solid var(--color-border);font-size:var(--font-size-sm);display:flex;gap:8px;align-items:center;}.check-row:last-child{border:none;}.check-name{color:var(--color-text-secondary);min-width:160px;}.check-pass{color:var(--color-success);font-weight:600;}.check-fail{color:var(--color-error);font-weight:600;}.check-na{color:var(--color-text-disabled);}.hsts-header-box{background:var(--color-bg-soft);padding:10px;border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:13px;word-break:break-all;}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>HSTS Preload 检查</h1><p class="tool-desc">检查域名的 HSTS 头部配置和是否符合 HSTS preload 列表提交条件</p>
<div class="card" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;"><input id="domainInput" class="input js-focus-input" placeholder="example.com" style="flex:1;max-width:300px;"><button id="checkBtn" class="btn btn-primary">检查</button></div>
<div class="card" id="resultCard" style="display:none;"><div id="hstsHeader"></div><div id="preflightChecks" style="margin-top:var(--space-2);"></div><div id="preloadStatus" style="margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px solid var(--color-border);"></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var domainInput=document.getElementById('domainInput'),checkBtn=document.getElementById('checkBtn'),resultCard=document.getElementById('resultCard'),hstsHeader=document.getElementById('hstsHeader'),preflightChecks=document.getElementById('preflightChecks'),preloadStatus=document.getElementById('preloadStatus'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');
checkBtn.addEventListener('click',function(){
  var domain=domainInput.value.trim();if(!domain){setStatus('请输入域名','error');return;}
  if(domain.indexOf('://')>=0)domain=domain.replace(/^https?:\/\//,'').split('/')[0];
  resultCard.style.display='block';hstsHeader.innerHTML='<div style="color:var(--color-text-secondary);">检查中...</div>';preflightChecks.innerHTML='';preloadStatus.innerHTML='';
  var url='https://'+domain;
  fetch(url,{method:'HEAD',mode:'cors'}).then(function(resp){
    var hsts=resp.headers.get('Strict-Transport-Security');
    hstsHeader.innerHTML='<div style="font-size:var(--font-size-sm);font-weight:600;margin-bottom:4px;">Strict-Transport-Security</div><div class="hsts-header-box">'+htmlEscape(hsts||'未设置')+'</div>';
    if(!hsts){
      preflightChecks.innerHTML='<div style="color:var(--color-error);font-weight:600;">❌ 未设置 HSTS 头部</div>';
      preloadStatus.innerHTML='<div style="color:var(--color-text-secondary);">不符合 preload 条件：需要先配置 HSTS 头部。</div>';
      outputText.textContent='HSTS: 未设置';
      setStatus('检查完成');return;
    }
    var hasMaxAge=hsts.match(/max-age=(\d+)/i);var maxAge=hasMaxAge?parseInt(hasMaxAge[1]):0;
    var hasIncludeSub=hsts.match(/includeSubDomains/i)!==null;
    var hasPreload=hsts.match(/preload/i)!==null;
    var checks='';var allPass=true;
    checks+='<div class="check-row"><span class="check-name">max-age >= 10886400 (31536000)</span><span class="'+(maxAge>=31536000?'check-pass':'check-fail')+'">'+(maxAge>=31536000?'✓ 是 ('+maxAge+'s)':'✗ 当前 '+maxAge+'s，需要 ≥31536000')+'</span></div>';
    if(!hasMaxAge)allPass=false;
    checks+='<div class="check-row"><span class="check-name">includeSubDomains</span><span class="'+(hasIncludeSub?'check-pass':'check-fail')+'">'+(hasIncludeSub?'✓ 已设置':'✗ 未设置')+'</span></div>';
    if(!hasIncludeSub)allPass=false;
    checks+='<div class="check-row"><span class="check-name">preload 标记</span><span class="'+(hasPreload?'check-pass':'check-fail')+'">'+(hasPreload?'✓ 已设置':'✗ 未设置')+'</span></div>';
    if(!hasPreload)allPass=false;
    checks+='<div class="check-row"><span class="check-name">HTTPS 可用</span><span class="check-pass">✓ 是</span></div>';
    preflightChecks.innerHTML='<div style="font-size:var(--font-size-sm);font-weight:600;margin-bottom:6px;">Preload 条件检查</div>'+checks;
    if(allPass&&maxAge>=31536000&&hasIncludeSub&&hasPreload){
      preloadStatus.innerHTML='<div style="color:var(--color-success);font-weight:600;font-size:var(--font-size-base);padding:8px 0;">✅ 符合 HSTS preload 提交条件</div><div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">可提交至 <a href="https://hstspreload.org/" target="_blank" style="color:var(--color-accent);">https://hstspreload.org/</a></div>';
      outputText.textContent='HSTS: 符合 preload 条件';
    }else{
      preloadStatus.innerHTML='<div style="color:#e37400;font-weight:600;font-size:var(--font-size-base);padding:8px 0;">⚠️ 尚不符合 preload 条件</div><div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">修复以上问题后再提交至 hstspreload.org。</div>';
      outputText.textContent='HSTS: 不符合 preload 条件';
    }
    setStatus('检查完成');
  }).catch(function(err){
    hstsHeader.innerHTML='<div style="color:var(--color-error);">请求失败: '+htmlEscape(err.message)+'</div>';
    preflightChecks.innerHTML='<div style="color:var(--color-text-secondary);">由于 CORS 限制无法完整检查。可以尝试直接访问 hstspreload.org 检查。</div>';
    setStatus('检查失败','error');
  });
});
copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制');}});
domainInput.addEventListener('keydown',function(e){if(e.key==='Enter')checkBtn.click();});
})();</script>
</body></html>
