<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Entities - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>HTML Entities</h1>
    <p class="tool-desc">对 HTML 特殊字符进行转义（escape）与反转义（unescape）。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="输入 HTML 文本..."></textarea>
    </div>
    <div style="display:flex; gap:12px; margin-bottom:24px;">
      <button id="escapeBtn" class="btn btn-primary">转义 (Escape)</button>
      <button id="unescapeBtn" class="btn btn-secondary">反转义 (Unescape)</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var outputEl = document.getElementById('outputText');
      var escapeBtn = document.getElementById('escapeBtn');
      var unescapeBtn = document.getElementById('unescapeBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');

      function escapeHtml(str) {
        var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
        return str.replace(/[&<>"']/g, function(m) { return map[m]; });
      }

      function unescapeHtml(str) {
        var doc = document.createElement('textarea');
        doc.innerHTML = str;
        return doc.value;
      }

      escapeBtn.addEventListener('click', function () {
        var text = inputEl.value;
        if (!text) { setStatus('请输入内容', 'error'); return; }
        outputEl.textContent = escapeHtml(text);
        setStatus('');
      });

      unescapeBtn.addEventListener('click', function () {
        var text = inputEl.value;
        if (!text) { setStatus('请输入内容', 'error'); return; }
        outputEl.textContent = unescapeHtml(text);
        setStatus('');
      });

      clearBtn.addEventListener('click', function () {
        inputEl.value = '';
        outputEl.textContent = '';
        setStatus('');
        inputEl.focus();
      });

      copyBtn.addEventListener('click', function () {
        var text = outputEl.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });
    })();
  </script>
</body>
</html>
