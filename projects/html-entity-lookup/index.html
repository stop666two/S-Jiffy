<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HTML 实体查询 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>HTML 实体查询</h1><p class="tool-desc">查询 HTML 字符实体编码和 Unicode。</p><div class="card"><div class="row"><div style="flex:1"><label>输入字符或实体名</label><input id="searchInput" class="input" placeholder='如 "&amp;" "©" "&lt;" 或字符' style="width:100%"></div><div style="display:flex;align-items:end;gap:8px"><button id="lookupBtn" class="btn btn-primary">查询</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="charDisplay">—</div><div class="l">显示字符</div></div><div class="res-item"><div class="v" id="entityVal">—</div><div class="l">HTML 实体</div></div><div class="res-item"><div class="v" id="unicodeVal">—</div><div class="l">Unicode 码点</div></div><div class="res-item"><div class="v" id="hexVal">—</div><div class="l">十六进制</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var s=document.getElementById("searchInput"),cd=document.getElementById("charDisplay"),ev=document.getElementById("entityVal"),uv=document.getElementById("unicodeVal"),hv=document.getElementById("hexVal"),o=document.getElementById("输出Text");
document.getElementById("lookupBtn").addEventListener("click",function(){var v=s.value.trim();if(!v){setStatus("请输入字符或实体","error");return}
var ch=v;if(v.charAt(0)==="&"&&v.charAt(v.length-1)===";"){var div=document.createElement("div");div.innerHTML=v;ch=div.textContent||div.innerText||""}
if(ch.length===0){setStatus("无效输入","error");return}var cp=ch.charCodeAt(0);cd.textContent=ch;ev.textContent="&#"+cp+";";uv.textContent="U+"+cp.toString(16).toUpperCase().padStart(4,"0");hv.textContent="0x"+cp.toString(16).toUpperCase();
o.textContent="字符: "+ch+" | 实体: &#"+cp+"; | Unicode: U+"+cp.toString(16).toUpperCase();setStatus("查询完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
