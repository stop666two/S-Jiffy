<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML 净化器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .tag-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:var(--space-3); }
    .tag-grid label { display:flex; align-items:center; gap:4px; font-size:13px; cursor:pointer; padding:4px 10px; border:1px solid var(--color-border); border-radius:var(--radius-sm); transition:background 0.1s; }
    .tag-grid label:hover { background:var(--color-bg-soft); }
    .tag-grid input[type="checkbox"] { accent-color:var(--color-text-primary); }
    .sanitize-layout { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3); }
    @media(max-width:700px){ .sanitize-layout{grid-template-columns:1fr;} }
    .sanitize-layout .card { margin-bottom:0; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>HTML 净化器</h1>
    <p class="tool-desc">移除 HTML 中的危险标签和属性</p>

    <div class="card">
      <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:8px;">允许的标签</label>
      <div class="tag-grid" id="tagGrid">
        <label><input type="checkbox" value="p" checked> &lt;p&gt;</label>
        <label><input type="checkbox" value="a" checked> &lt;a&gt;</label>
        <label><input type="checkbox" value="img" checked> &lt;img&gt;</label>
        <label><input type="checkbox" value="ul" checked> &lt;ul&gt;</label>
        <label><input type="checkbox" value="ol" checked> &lt;ol&gt;</label>
        <label><input type="checkbox" value="li" checked> &lt;li&gt;</label>
        <label><input type="checkbox" value="strong" checked> &lt;strong&gt;</label>
        <label><input type="checkbox" value="em" checked> &lt;em&gt;</label>
        <label><input type="checkbox" value="table" checked> &lt;table&gt;</label>
        <label><input type="checkbox" value="thead"> &lt;thead&gt;</label>
        <label><input type="checkbox" value="tbody"> &lt;tbody&gt;</label>
        <label><input type="checkbox" value="tr" checked> &lt;tr&gt;</label>
        <label><input type="checkbox" value="th" checked> &lt;th&gt;</label>
        <label><input type="checkbox" value="td" checked> &lt;td&gt;</label>
        <label><input type="checkbox" value="h1"> &lt;h1&gt;</label>
        <label><input type="checkbox" value="h2"> &lt;h2&gt;</label>
        <label><input type="checkbox" value="h3"> &lt;h3&gt;</label>
        <label><input type="checkbox" value="h4"> &lt;h4&gt;</label>
        <label><input type="checkbox" value="h5"> &lt;h5&gt;</label>
        <label><input type="checkbox" value="h6"> &lt;h6&gt;</label>
        <label><input type="checkbox" value="blockquote"> &lt;blockquote&gt;</label>
        <label><input type="checkbox" value="pre"> &lt;pre&gt;</label>
        <label><input type="checkbox" value="code"> &lt;code&gt;</label>
        <label><input type="checkbox" value="br" checked> &lt;br&gt;</label>
        <label><input type="checkbox" value="hr"> &lt;hr&gt;</label>
        <label><input type="checkbox" value="div"> &lt;div&gt;</label>
        <label><input type="checkbox" value="span"> &lt;span&gt;</label>
        <label><input type="checkbox" value="sub"> &lt;sub&gt;</label>
        <label><input type="checkbox" value="sup"> &lt;sup&gt;</label>
        <label><input type="checkbox" value="dl"> &lt;dl&gt;</label>
        <label><input type="checkbox" value="dt"> &lt;dt&gt;</label>
        <label><input type="checkbox" value="dd"> &lt;dd&gt;</label>
      </div>
      <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:8px;">
        额外安全选项:
      </label>
      <div class="tag-grid">
        <label><input type="checkbox" id="stripAttrs"> 移除所有属性</label>
        <label><input type="checkbox" id="stripComments"> 移除 HTML 注释</label>
      </div>
    </div>

    <div class="sanitize-layout">
      <div class="card">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">原始 HTML</label>
        <textarea id="dirtyInput" class="input textarea js-focus-input" placeholder="粘贴需要净化的 HTML..." style="min-height:250px;font-family:var(--font-mono);font-size:13px;"></textarea>
      </div>
      <div class="card">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:6px;">净化后的 HTML</label>
        <div class="输出-box" style="min-height:250px;">
          <span id="输出Text" style="display:block;padding-right:60px;font-size:13px;"></span>
          <button class="copy-btn" id="copyBtn">复制</button>
        </div>
      </div>
    </div>

    <div style="display:flex; gap:12px; margin-top:var(--space-3);">
      <button id="sanitizeBtn" class="btn btn-primary">净化</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var dirtyInput = document.getElementById('dirtyInput');
      var 输出Text = document.getElementById('输出Text');
      var sanitizeBtn = document.getElementById('sanitizeBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');
      var stripAttrs = document.getElementById('stripAttrs');
      var stripComments = document.getElementById('stripComments');

      function getAllowedTags() {
        var checkboxes = document.querySelectorAll('#tagGrid input[type="checkbox"]:checked');
        var tags = {};
        for (var i = 0; i < checkboxes.length; i++) {
          tags[checkboxes[i].value] = true;
        }
        return tags;
      }

      function sanitizeHTML(dirty, allowed, noAttrs, noComments) {
        if (noComments) {
          dirty = dirty.replace(/<!--[\s\S]*?-->/g, '');
        }
        var parser = new DOMParser();
        var doc = parser.parseFromString('<!DOCTYPE html><html><body>' + dirty + '</body></html>', 'text/html');
        var body = doc.body;

        function cleanNode(node) {
          if (node.nodeType === 3) return node.cloneNode(false);
          if (node.nodeType !== 1) return null;
          var tag = node.tagName.to小写();
          if (!allowed[tag]) return null;
          var clone = document.createElement(tag);
          if (!noAttrs) {
            var safeAttrs = {};
            if (tag === 'a') safeAttrs['href'] = true;
            if (tag === 'img') { safeAttrs['src'] = true; safeAttrs['alt'] = true; }
            safeAttrs['class'] = true;
            safeAttrs['id'] = true;
            safeAttrs['style'] = true;
            safeAttrs['title'] = true;
            for (var j = 0; j < node.attributes.length; j++) {
              var attr = node.attributes[j];
              if (safeAttrs[attr.name]) {
                clone.setAttribute(attr.name, attr.value);
              }
            }
          }
          for (var i = 0; i < node.childNodes.length; i++) {
            var child = cleanNode(node.childNodes[i]);
            if (child) clone.appendChild(child);
          }
          return clone;
        }

        var fragment = document.createDocumentFragment();
        for (var i = 0; i < body.childNodes.length; i++) {
          var cleaned = cleanNode(body.childNodes[i]);
          if (cleaned) fragment.appendChild(cleaned);
        }
        return fragment;
      }

      sanitizeBtn.addEventListener('click', function () {
        var html = dirtyInput.value;
        if (!html.trim()) { setStatus('请输入 HTML', 'error'); return; }

        var allowed = getAllowedTags();
        var noAttrs = stripAttrs.checked;
        var noComments = stripComments.checked;

        var 结果 = sanitizeHTML(html, allowed, noAttrs, noComments);

        var container = document.createElement('div');
        container.appendChild(结果.cloneNode(true));
        var 输出 = container.innerHTML;

        if (!输出.trim()) {
          输出Text.textContent = '(净化后无内容 - 所有标签均被过滤)';
        } else {
          输出Text.textContent = 输出;
        }
        setStatus('净化完成');
      });

      clearBtn.addEventListener('click', function () {
        dirtyInput.value = '';
        输出Text.textContent = '';
        setStatus('');
        dirtyInput.focus();
      });

      copyBtn.addEventListener('click', function () {
        if (输出Text.textContent.trim()) { copyToClipboard(输出Text.textContent, this); setStatus('已复制'); }
      });
    })();
  </script>
</body>
</html>
