<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>HTML 转 Markdown - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.split-pane{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:300px}@media(max-width:700px){.split-pane{grid-template-columns:1fr}}.split-pane textarea{height:300px;resize:vertical;font-family:var(--font-mono);font-size:13px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.split-pane textarea:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>HTML 转 Markdown</h1><p class="tool-desc">将 HTML 转换为 Markdown 格式文本，支持常用块级和行内元素。</p>
<div class="card">
<div style="display:flex;gap:8px;margin-bottom:12px;">
<button id="convertBtn" class="btn btn-primary">转换为 Markdown</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="split-pane">
<textarea id="htmlInput" class="js-focus-input" placeholder="在此粘贴 HTML 源码..."><h1>标题</h1><p><strong>加粗</strong> 和 <em>斜体</em></p><ul><li>列表项 1</li><li>列表项 2</li></ul><a href="https://example.com">链接</a></textarea>
<textarea id="md输出" readonly placeholder="转换后的 Markdown 将显示在此..." style="background:var(--color-bg-soft);"></textarea>
</div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var htmlInput=document.getElementById('htmlInput');
var md输出=document.getElementById('md输出');
var convertBtn=document.getElementById('convertBtn');
var clearBtn=document.getElementById('clearBtn');
var 输出El=document.getElementById('输出Text');
var copyBtn=document.getElementById('copyBtn');

function htmlToMd(html){
var text=html;
text=text.replace(/<\/h([1-6])>/g,'\n');
text=text.replace(/<h([1-6])>/g,function(m,l){var n=parseInt(l);return new Array(n+1).join('#')+' ';});
text=text.replace(/<\/p>/g,'\n\n');
text=text.replace(/<p>/g,'');
text=text.replace(/<br\s*\/?>/g,'\n');
text=text.replace(/<\/li>/g,'\n');
text=text.replace(/<li>/g,'- ');
text=text.replace(/<\/ul>/g,'\n');
text=text.replace(/<ul>/g,'');
text=text.replace(/<\/ol>/g,'\n');
text=text.replace(/<ol>/g,'');
text=text.replace(/<strong>/g,'**');
text=text.replace(/<\/strong>/g,'**');
text=text.replace(/<b>/g,'**');
text=text.replace(/<\/b>/g,'**');
text=text.replace(/<em>/g,'*');
text=text.replace(/<\/em>/g,'*');
text=text.replace(/<i>/g,'*');
text=text.replace(/<\/i>/g,'*');
text=text.replace(/<code>/g,'`');
text=text.replace(/<\/code>/g,'`');
text=text.replace(/<pre>/g,'```\n');
text=text.replace(/<\/pre>/g,'\n```');
text=text.replace(/<blockquote>/g,'> ');
text=text.replace(/<\/blockquote>/g,'\n');
text=text.replace(/<hr\s*\/?>/g,'\n---\n');
text=text.replace(/<a\s+[^>]*href="([^"]*)"[^>]*>/g,'[$1](');
text=text.replace(/<\/a>/g,')');
text=text.replace(/<img\s+[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*\/?>/g,'![$2]($1)');
text=text.replace(/<img\s+[^>]*src="([^"]*)"[^>]*\/?>/g,'![]($1)');
text=text.replace(/<[^>]+>/g,'');
text=text.replace(/\n{3,}/g,'\n\n');
text=text.trim();
return text;
}

function convert(){
var html=htmlInput.value;
if(!html){md输出.value='';输出El.textContent='';setStatus('请输入 HTML','error');return;}
var md=htmlToMd(html);
md输出.value=md;
输出El.textContent='转换完成，共 '+md.length+' 字符';
setStatus('');
}

convertBtn.addEventListener('click',convert);
clearBtn.addEventListener('click',function(){htmlInput.value='';md输出.value='';输出El.textContent='';setStatus('');htmlInput.focus();});
copyBtn.addEventListener('click',function(){if(md输出.value){copyToClipboard(md输出.value,copyBtn);setStatus('已复制');}});
htmlInput.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')convert();});
})();</script></body></html>
