<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP 状态码 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .status-search { width:100%; height:48px; padding:0 var(--space-2); font-size:var(--font-size-base); border:1px solid #ddd; border-radius:var(--radius-md); outline:none; margin-bottom:16px; }
    .status-search:focus { border-color:var(--color-text-primary); box-shadow:var(--shadow-focus); }
    .status-list { display:grid; gap:2px; }
    .status-row { display:flex; padding:8px 12px; border-radius:var(--radius-sm); font-size:var(--font-size-sm); align-items:flex-start; }
    .status-row:hover { background:var(--color-bg-soft); }
    .status-code { font-weight:600; min-width:60px; }
    .status-name { min-width:180px; color:var(--color-text-secondary); }
    .status-desc { color:var(--color-text-primary); }
    .status-1xx .status-code { color:#4a90d9; }
    .status-2xx .status-code { color:#27ae60; }
    .status-3xx .status-code { color:#f39c12; }
    .status-4xx .status-code { color:#e74c3c; }
    .status-5xx .status-code { color:#c0392b; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>HTTP 状态码</h1>
    <p class="tool-desc">浏览和搜索 HTTP 状态码及其含义。</p>
    <input id="searchInput" class="status-search js-focus-input" placeholder="搜索状态码或描述... 如 404, not found, redirect..." autocomplete="off">
    <div class="输出-box" id="输出Container">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var statusCodes = [
        { code: 100, name: 'Continue', desc: '服务器收到请求头，客户端应继续发送请求体。' },
        { code: 101, name: 'Switching Protocols', desc: '服务器同意切换协议（如 WebSocket）。' },
        { code: 102, name: 'Processing', desc: 'WebDAV 请求正在处理。' },
        { code: 103, name: 'Early Hints', desc: '服务器提前返回部分响应头以加速预加载。' },
        { code: 200, name: 'OK', desc: '请求成功，正常返回数据。' },
        { code: 201, name: 'Created', desc: '请求已成功处理，新资源已创建。' },
        { code: 202, name: 'Accepted', desc: '请求已被接受，但尚未完成处理。' },
        { code: 203, name: 'Non-Authoritative Information', desc: '返回的元信息来自第三方副本而非原始服务器。' },
        { code: 204, name: 'No Content', desc: '请求成功，但无返回内容（如 DELETE）。' },
        { code: 205, name: 'Reset Content', desc: '请求成功，客户端应重置文档视图。' },
        { code: 206, name: 'Partial Content', desc: '服务器返回部分内容（支持 Range 请求）。' },
        { code: 207, name: 'Multi-Status', desc: 'WebDAV 多状态响应。' },
        { code: 300, name: 'Multiple Choices', desc: '请求有多个可能的响应，客户端应选择。' },
        { code: 301, name: 'Moved Permanently', desc: '资源已永久移动到新 URL。' },
        { code: 302, name: 'Found', desc: '资源临时移动到新 URL（临时重定向）。' },
        { code: 303, name: 'See Other', desc: '重定向到其他 URL，应使用 GET 获取。' },
        { code: 304, name: 'Not Modified', desc: '资源未修改，可使用缓存版本。' },
        { code: 305, name: 'Use Proxy', desc: '请求必须通过指定代理访问（已弃用）。' },
        { code: 307, name: 'Temporary Redirect', desc: '临时重定向，请求方法不改变。' },
        { code: 308, name: 'Permanent Redirect', desc: '永久重定向，请求方法不改变。' },
        { code: 400, name: 'Bad Request', desc: '请求语法错误，服务器无法理解。' },
        { code: 401, name: 'Unauthorized', desc: '未授权，需要身份验证。' },
        { code: 402, name: 'Payment Required', desc: '支付要求（预留，未广泛使用）。' },
        { code: 403, name: 'Forbidden', desc: '服务器拒绝请求，无权限访问。' },
        { code: 404, name: 'Not Found', desc: '请求的资源不存在。' },
        { code: 405, name: 'Method Not Allowed', desc: '请求方法不允许。' },
        { code: 406, name: 'Not Acceptable', desc: '服务器无法生成客户端 Accept 头要求的内容。' },
        { code: 407, name: 'Proxy Authentication Required', desc: '需要代理身份验证。' },
        { code: 408, name: 'Request Timeout', desc: '请求超时，服务器等待过久。' },
        { code: 409, name: 'Conflict', desc: '请求与资源当前状态冲突。' },
        { code: 410, name: 'Gone', desc: '请求的资源已永久删除。' },
        { code: 411, name: 'Length Required', desc: '缺少 Content-Length 头。' },
        { code: 412, name: 'Precondition Failed', desc: '请求头条件不满足。' },
        { code: 413, name: 'Content Too Large', desc: '请求体过大，超出服务器限制。' },
        { code: 414, name: 'URI Too Long', desc: '请求 URI 过长。' },
        { code: 415, name: 'Unsupported Media Type', desc: '不支持的媒体类型。' },
        { code: 416, name: 'Range Not Satisfiable', desc: 'Range 请求头范围不满足。' },
        { code: 417, name: 'Expectation Failed', desc: 'Expect 请求头无法满足。' },
        { code: 418, name: 'I\'m a Teapot', desc: '超文本咖啡壶控制协议：我是茶壶。' },
        { code: 421, name: 'Misdirected Request', desc: '请求被发送到无法处理响应的服务器。' },
        { code: 422, name: 'Unprocessable Content', desc: '请求格式正确，但语义错误（如 WebDAV）。' },
        { code: 423, name: 'Locked', desc: '资源被锁定（WebDAV）。' },
        { code: 424, name: 'Failed Dependency', desc: '前置条件失败（WebDAV）。' },
        { code: 425, name: 'Too Early', desc: '服务器不愿处理可能重放的请求。' },
        { code: 426, name: 'Upgrade Required', desc: '客户端应升级协议。' },
        { code: 428, name: 'Precondition Required', desc: '请求必须包含条件头。' },
        { code: 429, name: 'Too Many Requests', desc: '请求频率过高，触发限流。' },
        { code: 431, name: 'Request Header Fields Too Large', desc: '请求头字段过大。' },
        { code: 451, name: 'Unavailable For Legal Reasons', desc: '因法律原因不可用。' },
        { code: 500, name: 'Internal Server Error', desc: '服务器内部错误。' },
        { code: 501, name: 'Not Implemented', desc: '服务器不支持该功能。' },
        { code: 502, name: 'Bad Gateway', desc: '网关或代理收到上游无效响应。' },
        { code: 503, name: 'Service Unavailable', desc: '服务暂时不可用（过载或维护）。' },
        { code: 504, name: 'Gateway Timeout', desc: '网关或代理请求上游超时。' },
        { code: 505, name: 'HTTP Version Not Supported', desc: 'HTTP 协议版本不支持。' },
        { code: 506, name: 'Variant Also Negotiates', desc: '服务器配置错误（透明协商循环）。' },
        { code: 507, name: 'Insufficient Storage', desc: '存储空间不足（WebDAV）。' },
        { code: 508, name: 'Loop Detected', desc: '请求处理检测到无限循环。' },
        { code: 510, name: 'Not Extended', desc: '请求需要进一步扩展。' },
        { code: 511, name: 'Network Authentication Required', desc: '需要网络身份验证（如认证 portal）。' }
      ];

      var searchEl = document.getElementById('searchInput');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');

      function render(query) {
        query = (query || '').to小写().trim();
        var filtered = statusCodes;
        if (query) {
          filtered = statusCodes.filter(function(s) {
            return String(s.code).indexOf(query) !== -1
              || s.name.to小写().indexOf(query) !== -1
              || s.desc.indexOf(query) !== -1;
          });
        }
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
          var s = filtered[i];
          var cls = 'status-row status-' + Math.floor(s.code / 100) + 'xx';
          html += '<div class="' + cls + '">'
            + '<span class="status-code">' + s.code + '</span>'
            + '<span class="status-name">' + s.name + '</span>'
            + '<span class="status-desc">' + s.desc + '</span>'
            + '</div>';
        }
        输出El.innerHTML = html;
        setStatus('显示 ' + filtered.length + ' 个状态码');
      }

      searchEl.addEventListener('input', function() {
        render(searchEl.value);
      });

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent || 输出El.innerText;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制'); }
      });

      render('');
    })();
  </script>
</body>
</html>
