<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>理想体重计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}.big-num{font-size:40px;font-weight:700;text-align:center}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>理想体重计算器</h1><p class="tool-desc">根据身高性别计算标准体重范围。</p><div class="card"><div class="row"><div><label>性别</label><select id="gender" class="input" style="width:auto"><option value="male">男</option><option value="female">女</option></select></div><div><label>身高 (cm)</label><input id="height" class="input" type="number" value="170" min="50" max="250"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="brocaVal">—</div><div class="l">Broca 标准</div></div><div class="res-item"><div class="v" id="devinVal">—</div><div class="l">Devin 公式</div></div><div class="res-item"><div class="v" id="bmiLow">—</div><div class="l">BMI 正常下限</div></div><div class="res-item"><div class="v" id="bmiHigh">—</div><div class="l">BMI 正常上限</div></div><div class="res-item" style="grid-column:1/3"><div class="v" id="rangeVal" style="font-size:16px">—</div><div class="l">健康体重范围</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var g=document.getElementById("gender"),h=document.getElementById("height"),bv=document.getElementById("brocaVal"),dv=document.getElementById("devinVal"),bl=document.getElementById("bmiLow"),bh=document.getElementById("bmiHigh"),rv=document.getElementById("rangeVal"),o=document.getElementById("outputText");
document.getElementById("calcBtn").addEventListener("click",function(){var ht=parseFloat(h.value),gen=g.value;if(!ht){setStatus("请输入身高","error");return}
var broca=gen==="male"?ht-105:ht-110;var devin=gen==="male"?50+0.91*(ht-152.4):45.5+0.91*(ht-152.4);var hM=ht/100;var lowBmi=18.5*hM*hM,highBmi=24*hM*hM;
bv.textContent=broca.toFixed(1)+" kg";dv.textContent=devin.toFixed(1)+" kg";bl.textContent=lowBmi.toFixed(1)+" kg";bh.textContent=highBmi.toFixed(1)+" kg";rv.textContent=lowBmi.toFixed(1)+" ~ "+highBmi.toFixed(1)+" kg";
o.textContent="身高: "+ht+" cm | 标准: "+broca.toFixed(1)+" ~ "+devin.toFixed(1)+" kg | 健康范围: "+lowBmi.toFixed(1)+" ~ "+highBmi.toFixed(1)+" kg";setStatus("计算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
