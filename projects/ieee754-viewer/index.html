<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>IEEE 754 浮点数 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.input-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.input-row .input{width:220px;font-family:var(--font-mono)}.bits-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-top:var(--space-2)}.bits-card{padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.bits-card .title{font-size:13px;font-weight:600;margin-bottom:8px}.bits-card .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.bits-card .val{font-size:14px;font-weight:600;font-family:var(--font-mono);word-break:break-all}.bit-row{display:flex;gap:2px;font-family:var(--font-mono);font-size:12px;margin:6px 0;flex-wrap:wrap}.bit{width:20px;text-align:center;padding:2px 0;border-radius:2px;font-size:11px}.bit-sign{background:#ffcdd2;color:#c62828}.bit-exp{background:#bbdefb;color:#1565c0}.bit-mant{background:#c8e6c9;color:#2e7d32}.legend-bar{display:flex;gap:var(--space-3);font-size:12px;margin-top:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);flex-wrap:wrap}.legend-bar span{display:flex;align-items:center;gap:4px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>IEEE 754 浮点数</h1><p class="tool-desc">查看浮点数的 IEEE 754 二进制表示</p>
<div class="card"><div class="input-row"><input id="floatInput" class="input js-focus-input" type="number" step="any" placeholder="输入浮点数" value="3.14"><button id="viewBtn" class="btn btn-primary">查看</button></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var floatInput=document.getElementById('floatInput'),viewBtn=document.getElementById('viewBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var floatBuf=new ArrayBuffer(8);var floatView=new Float64Array(floatBuf);var intView=new Uint32Array(floatBuf);function getFloat32Bits(f){var buf=new ArrayBuffer(4);(new Float32Array(buf))[0]=f;return(new Uint32Array(buf))[0]}function getFloat64Parts(f){floatView[0]=f;var hi=intView[1],lo=intView[0];var sign=(hi>>31)&1;var exp=((hi>>20)&0x7FF);var mantHi=hi&0xFFFFF;var mantLo=lo;return{sign:sign,exp:exp,mantHi:mantHi,mantLo:mantLo,signBit:sign,expBits:exp.toString(2).padStart(11,'0'),mantBits:mantHi.toString(2).padStart(20,'0')+mantLo.toString(2).padStart(32,'0'),hex:'0x'+hi.toString(16).toUpperCase().padStart(8,'0')+lo.toString(16).toUpperCase().padStart(8,'0')}}function getFloat32Parts(f){var bits=getFloat32Bits(f);var sign=(bits>>31)&1;var exp=(bits>>23)&0xFF;var mant=bits&0x7FFFFF;return{sign:sign,exp:exp,mant:mant,signBit:sign,expBits:exp.toString(2).padStart(8,'0'),mantBits:mant.toString(2).padStart(23,'0'),hex:'0x'+bits.toString(16).toUpperCase().padStart(8,'0')}}function viewFloat(){var val=parseFloat(floatInput.value);if(isNaN(val)){setStatus('请输入有效数字','error');return}var f32=getFloat32Parts(val);var f64=getFloat64Parts(val);var html='<div class="legend-bar"><span><span style="display:inline-block;width:16px;height:16px;border-radius:2px;background:#ffcdd2"></span> 符号位</span><span><span style="display:inline-block;width:16px;height:16px;border-radius:2px;background:#bbdefb"></span> 指数</span><span><span style="display:inline-block;width:16px;height:16px;border-radius:2px;background:#c8e6c9"></span> 尾数</span></div>';html+='<div class="bits-grid"><div class="bits-card"><div class="title">单精度 (32-bit)</div>';html+='<div class="lbl">完整十六进制</div><div class="val">'+f32.hex+'</div>';html+='<div class="lbl" style="margin-top:8px">位布局</div>';html+='<div class="bit-row"><span class="bit bit-sign">S</span>';for(var i=0;i<8;i++)html+='<span class="bit bit-exp">'+f32.expBits[i]+'</span>';for(var j=0;j<23;j++)html+='<span class="bit bit-mant">'+f32.mantBits[j]+'</span>';html+='</div>';html+='<div class="lbl" style="margin-top:6px">符号</div><div class="val">'+(f32.sign?'1 (负数)':'0 (正数)')+'</div>';html+='<div class="lbl">指数 (含偏移 127)</div><div class="val">'+f32.expBits+' = '+parseInt(f32.expBits,2)+' (实际值: '+(parseInt(f32.expBits,2)-127)+')</div>';html+='<div class="lbl">尾数</div><div class="val" style="font-size:11px">1.'+f32.mantBits+'</div>';html+='</div>';html+='<div class="bits-card"><div class="title">双精度 (64-bit)</div>';html+='<div class="lbl">完整十六进制</div><div class="val">'+f64.hex+'</div>';html+='<div class="lbl" style="margin-top:8px">位布局</div>';html+='<div class="bit-row"><span class="bit bit-sign">S</span>';for(var k=0;k<11;k++)html+='<span class="bit bit-exp">'+f64.expBits[k]+'</span>';for(var l=0;l<20;l++)html+='<span class="bit bit-mant">'+f64.mantBits[l]+'</span>';html+='</div><div class="bit-row" style="margin-left:0">';for(var m=20;m<52;m++)html+='<span class="bit bit-mant">'+f64.mantBits[m]+'</span>';html+='</div>';html+='<div class="lbl" style="margin-top:6px">符号</div><div class="val">'+(f64.sign?'1 (负数)':'0 (正数)')+'</div>';html+='<div class="lbl">指数 (含偏移 1023)</div><div class="val">'+f64.expBits+' = '+parseInt(f64.expBits,2)+' (实际值: '+(parseInt(f64.expBits,2)-1023)+')</div>';html+='<div class="lbl">尾数</div><div class="val" style="font-size:11px">1.'+f64.mantBits+'</div>';html+='</div></div>';html+='<div style="margin-top:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);font-size:13px">';html+='<strong>值:</strong> '+val+' | <strong>NaN:</strong> '+(isNaN(val)?'是':'否')+' | <strong>Infinity:</strong> '+(!isFinite(val)?'是':'否');html+='</div>';outputText.innerHTML=html;setStatus('已生成')}viewBtn.addEventListener('click',viewFloat);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}});floatInput.addEventListener('keydown',function(e){if(e.key==='Enter')viewFloat()});viewFloat()})();</script>
</body></html>
