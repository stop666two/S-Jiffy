<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>缩进转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.conv-toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-2)}.conv-toolbar select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.conv-toolbar .btn{margin-right:0}textarea{font-family:var(--font-mono)!important;font-size:13px!important;line-height:1.5!important}.stat-note{font-size:13px;color:var(--color-text-secondary);margin-top:var(--space-1)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>缩进转换</h1><p class="tool-desc">在空格缩进和 Tab 缩进之间转换</p>
<div class="card"><div class="conv-toolbar"><select id="fromStyle"><option value="space">空格 (猜测)</option><option value="tab">Tab</option></select><span style="font-size:13px;color:var(--color-text-secondary)">→</span><select id="toStyle"><option value="2">2 空格</option><option value="4" selected>4 空格</option><option value="8">8 空格</option><option value="tab">Tab</option></select><button id="convertBtn" class="btn btn-primary">转换</button></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><textarea id="inputCode" class="input textarea" placeholder="粘贴代码（自动检测缩进）" style="min-height:280px">function hello() {
    var name = "world";
    if (name) {
        console.log(name);
    }
}</textarea><textarea id="outputCode" class="input textarea" placeholder="转换结果" style="min-height:280px;background:var(--color-bg-soft)" readonly></textarea></div>
<div id="detectInfo" class="stat-note"></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var inputCode=document.getElementById('inputCode'),outputCode=document.getElementById('outputCode'),fromStyle=document.getElementById('fromStyle'),toStyle=document.getElementById('toStyle'),convertBtn=document.getElementById('convertBtn'),copyBtn=document.getElementById('copyBtn'),outputText=document.getElementById('outputText'),detectInfo=document.getElementById('detectInfo');function detectIndent(text){var lines=text.split('\n');var spaceCounts={};var tabLines=0;for(var i=0;i<lines.length;i++){var line=lines[i];if(line.length===0)continue;if(line[0]==='\t'){tabLines++;continue}var m=line.match(/^ +/);if(m){var len=m[0].length;if(spaceCounts[len])spaceCounts[len]++;else spaceCounts[len]=1}}var totalIndented=tabLines+Object.values(spaceCounts).reduce(function(a,b){return a+b},0);if(tabLines>0&&totalIndented===tabLines)return{style:'tab',size:1,confidence:'高'};var bestLen=0,bestCount=0;for(var k in spaceCounts){if(spaceCounts[k]>bestCount&&k>0){bestCount=spaceCounts[k];bestLen=parseInt(k,10)}}if(bestLen===0)return{style:'none',size:0,confidence:'无'};var gcd=function(a,b){return b?gcd(b,a%b):a};var sizes=Object.keys(spaceCounts).map(Number);if(sizes.length>1){var g=sizes[0];for(var j=1;j<sizes.length;j++)g=gcd(g,sizes[j]);return{style:'space',size:g,confidence:g<=8?'高':'低'}}return{style:'space',size:bestLen,confidence:'一般'}}function detectAndConvert(){var code=inputCode.value;if(!code){setStatus('请输入代码','error');return}var detected=detectIndent(code);var info='检测: ';if(detected.style==='tab')info+='Tab 缩进';else if(detected.style==='space')info+='空格缩进 (步长 '+detected.size+')';else info+='无法检测';info+=' | 置信度: '+detected.confidence;detectInfo.textContent=info;var target=toStyle.value;var converted;if(detected.style==='space'&&detected.size>0){var lines=code.split('\n');var newLines=[];for(var k=0;k<lines.length;k++){var line=lines[k];var m=line.match(/^ +/);if(!m){newLines.push(line);continue}var indent=m[0].length;var indentLevel=indent/detected.size;if(Math.abs(indentLevel-Math.round(indentLevel))>0.01){newLines.push(line);continue}var level=Math.round(indentLevel);if(target==='tab'){newLines.push('\t'.repeat(level)+line.slice(indent))}else{var targetSize=parseInt(target,10);newLines.push(' '.repeat(level*targetSize)+line.slice(indent))}}converted=newLines.join('\n')}else if(detected.style==='tab'){var lines=code.split('\n');var newLines=[];for(var l=0;l<lines.length;l++){var line=lines[l];var m=line.match(/^\t*/);if(!m){newLines.push(line);continue}var level=m[0].length;if(target==='tab'){newLines.push(line);continue}else{var targetSize=parseInt(target,10);newLines.push(' '.repeat(level*targetSize)+line.slice(level))}}converted=newLines.join('\n')}else{var lines=code.split('\n');var newLines=[];for(var m=0;m<lines.length;m++){var line=lines[m];var initialMatch=line.match(/^[\t ]+/);if(initialMatch){var indentStr=initialMatch[0];var content=line.slice(indentStr.length);if(target==='tab'){newLines.push('\t'+content)}else{var targetSize=parseInt(target,10);newLines.push(' '.repeat(targetSize)+content)}}else{newLines.push(line)}}converted=newLines.join('\n')}outputCode.value=converted;var origLines=code.split('\n').length;var convLines=converted.split('\n').length;outputText.textContent='转换完成 | '+origLines+' 行 → '+convLines+' 行';setStatus('转换完成')}convertBtn.addEventListener('click',detectAndConvert);copyBtn.addEventListener('click',function(){if(outputCode.value){copyToClipboard(outputCode.value,this);setStatus('已复制')}});inputCode.addEventListener('input',function(){if(outputCode.value)detectAndConvert()})})();</script>
</body></html>
