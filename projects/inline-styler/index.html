<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>CSS 内联样式转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.output-box { font-family: var(--font-mono); font-size: 13px; }</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>CSS 内联样式转换</h1><p class="tool-desc">将 CSS 类选择器转换为内联 style 属性</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder=".btn {\n  display: inline-flex;\n  padding: 8px 16px;\n  background-color: #3b82f6;\n  color: white;\n  border: none;\n  border-radius: 4px;\n  cursor: pointer;\n}" style="min-height:200px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;"><button id="convertBtn" class="btn btn-primary">转换</button><button id="clearBtn" class="btn btn-secondary">清空</button></div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function () {
  var inputEl = document.getElementById('inputText');
  var outputEl = document.getElementById('outputText');

  function parseCSS(css) {
    var rules = [];
    var ruleRegex = /([^{]+)\{([^}]*)\}/g;
    var match;
    while ((match = ruleRegex.exec(css)) !== null) {
      var selector = match[1].trim();
      var body = match[2].trim();
      var props = [];
      var propLines = body.split(';');
      for (var i = 0; i < propLines.length; i++) {
        var pl = propLines[i].trim();
        if (!pl) continue;
        var colonIdx = pl.indexOf(':');
        if (colonIdx === -1) continue;
        var prop = pl.substring(0, colonIdx).trim();
        var val = pl.substring(colonIdx + 1).trim();
        if (prop && val) {
          props.push({ property: prop, value: val });
        }
      }
      rules.push({ selector: selector, properties: props });
    }
    return rules;
  }

  function propsToInline(props) {
    var pairs = [];
    for (var i = 0; i < props.length; i++) {
      var p = props[i];
      var jsProp = p.property.replace(/-([a-z])/g, function (_, c) { return c.toUpperCase(); });
      pairs.push(jsProp + ': "' + p.value.replace(/"/g, '\\"') + '"');
    }
    return '{ ' + pairs.join(', ') + ' }';
  }

  function convert() {
    var text = inputEl.value.trim();
    if (!text) { setStatus('请输入 CSS', 'error'); return; }
    try {
      var rules = parseCSS(text);
      if (rules.length === 0) { setStatus('未找到 CSS 规则', 'error'); return; }
      var result = '';
      for (var i = 0; i < rules.length; i++) {
        if (result) result += '\n\n';
        result += '/* ' + rules[i].selector + ' */\n';
        result += 'style={' + propsToInline(rules[i].properties) + '}';
      }
      outputEl.textContent = result;
      setStatus('转换完成，共 ' + rules.length + ' 条规则');
    } catch (e) {
      outputEl.textContent = '';
      setStatus('解析出错: ' + e.message, 'error');
    }
  }

  document.getElementById('convertBtn').addEventListener('click', convert);
  document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; outputEl.textContent = ''; setStatus(''); inputEl.focus(); });
  document.getElementById('copyBtn').addEventListener('click', function () { if (outputEl.textContent) { copyToClipboard(outputEl.textContent, this); setStatus('已复制到剪贴板'); } });
})();
</script></body></html>
