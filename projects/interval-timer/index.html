<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Interval Timer - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.time-display{font-size:64px;font-weight:600;font-family:var(--font-mono);text-align:center;padding:var(--space-2);}
.phase-label{text-align:center;font-size:var(--font-size-lg);font-weight:600;padding:var(--space-2);border-radius:var(--radius-md);margin-bottom:var(--space-2);}
.phase-label.work{background:#e8f5e9;color:#2e7d32;}
.phase-label.rest{background:#fff3e0;color:#e65100;}
.phase-label.done{background:#e3f2fd;color:#1565c0;}
.ctrl-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:var(--space-3);}
.ctrl-row label{font-size:var(--font-size-sm);color:var(--color-text-secondary);}
.ctrl-row .field{min-width:80px;}
.ctrl-row input{width:70px;}
.round-info{text-align:center;font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:var(--space-2);}
.time-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:var(--space-3);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>间歇计时器</h1><p class="tool-desc">Work/rest intervals with rounds and beep notification.</p>
<div class="card">
<div class="ctrl-row">
<div class="field"><label>Work (sec)</label><input id="workInput" class="input" type="number" value="30" min="1" max="600"></div>
<div class="field"><label>Rest (sec)</label><input id="restInput" class="input" type="number" value="10" min="1" max="600"></div>
<div class="field"><label>轮数</label><input id="roundsInput" class="input" type="number" value="8" min="1" max="99"></div>
<div class="field"><label>Prep (sec)</label><input id="prepInput" class="input" type="number" value="5" min="0" max="60"></div>
</div>
<div class="phase-label" id="phaseLabel">准备</div>
<div class="time-display" id="display">00:00</div>
<div class="round-info" id="roundInfo">Round 0 / 0</div>
<div class="time-btns">
<button id="startBtn" class="btn btn-primary">开始</button>
<button id="pauseBtn" class="btn btn-secondary">暂停</button>
<button id="resetBtn" class="btn btn-secondary">重置</button>
</div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var pl=document.getElementById('phaseLabel'),dp=document.getElementById('display'),ri=document.getElementById('roundInfo'),o=document.getElementById('输出Text');
var wi=document.getElementById('workInput'),ri2=document.getElementById('restInput'),ru=document.getElementById('roundsInput'),pr=document.getElementById('prepInput');
var running=false,paused=false,curPhase='prep',curSec=0,curRound=0,totalRounds=0,timerId=null;

function beep(){try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var osc=ctx.createOscillator();osc.frequency.value=880;osc.type='sine';var gain=ctx.createGain();gain.gain.setValueAtTime(0.3,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.3);osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.3);}catch(e){}}

function tick(){if(!running||paused)return;
curSec--;
if(curSec<=0){beep();nextPhase();}
updateDisplay();}

function nextPhase(){if(curPhase==='prep'){curPhase='work';curSec=parseInt(wi.value)||30;curRound=1;}
else if(curPhase==='work'){curPhase='rest';curSec=parseInt(ri2.value)||10;}
else if(curPhase==='rest'){if(curRound>=totalRounds){curPhase='done';curSec=0;running=false;pl.textContent='Complete!';pl.className='phase-label done';dp.textContent='00:00';ri.textContent='All rounds complete';setStatus('Workout complete!');clearInterval(timerId);return;}
curRound++;curPhase='work';curSec=parseInt(wi.value)||30;}
updateDisplay();}

function updateDisplay(){var m=Math.floor(curSec/60);var s=curSec%60;dp.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
pl.textContent=curPhase==='prep'?'Get Ready':curPhase==='work'?'Work!':'Rest';pl.className='phase-label '+(curPhase==='work'?'work':'rest');
ri.textContent=curRound+' / '+totalRounds+' rounds';o.textContent=curPhase+' '+dp.textContent;}

function startTimer(){if(running&&!paused)return;
if(!running){var prep=parseInt(pr.value)||0;if(prep>0){curPhase='prep';curSec=prep;curRound=0;}else{curPhase='work';curSec=parseInt(wi.value)||30;curRound=1;}
totalRounds=parseInt(ru.value)||1;running=true;paused=false;clearInterval(timerId);timerId=setInterval(tick,1000);updateDisplay();}
else{paused=false;setStatus('Resumed');}}

function pauseTimer(){if(!running)return;paused=true;setStatus('Paused');}
function resetTimer(){running=false;paused=false;clearInterval(timerId);curPhase='prep';curSec=0;curRound=0;dp.textContent='00:00';pl.textContent='Ready';pl.className='phase-label';ri.textContent='0 / 0';o.textContent='';setStatus('');}

document.getElementById('startBtn').addEventListener('click',startTimer);
document.getElementById('pauseBtn').addEventListener('click',pauseTimer);
document.getElementById('resetBtn').addEventListener('click',resetTimer);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('Copied');}});
})();
</script></body></html>
