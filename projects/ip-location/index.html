<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>IP 地理定位 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.inp-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-3)}.inp-row .input{flex:1;min-width:200px}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.info-item{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}.info-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.info-item .val{font-family:var(--font-mono);font-size:var(--font-size-base);margin-top:4px;word-break:break-all}.loading{text-align:center;padding:var(--space-3);color:var(--color-text-secondary)}.map-placeholder{width:100%;height:200px;background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-disabled);font-size:var(--font-size-sm);margin-top:var(--space-3)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>IP 定位查询</h1><p class="tool-desc">查询 IP 地址的地理位置信息，通过 ip-api.com 获取。</p>
<div class="card">
<div class="inp-row"><input id="ipInput" class="input" placeholder="输入 IP 地址（留空查询本机）"><button id="lookupBtn" class="btn btn-primary">查询</button></div>
<div id="结果Area"><div class="loading">输入 IP 地址并点击查询</div></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById('ipInput'),btn=document.getElementById('lookupBtn'),area=document.getElementById('结果Area'),out=document.getElementById('输出Text');function lookup(){var ip=inp.value.trim()||'';area.innerHTML='<div class="loading">查询中...</div>';btn.disabled=true;var url=ip?'https://ip-api.com/json/'+encodeURIComponent(ip)+'?fields=status,message,query,country,regionName,city,zip,lat,lon,isp,org,as,timezone':'https://ip-api.com/json/?fields=status,message,query,country,regionName,city,zip,lat,lon,isp,org,as,timezone';fetch(url).then(function(r){return r.json()}).then(function(d){if(d.status==='fail'){area.innerHTML='<div class="loading" style="color:var(--color-error)">查询失败: '+htmlEscape(d.message||'未知错误')+'</div>';out.textContent='查询失败';setStatus('查询失败','error');return}var html='<div class="info-grid"><div class="info-item"><div class="lbl">IP 地址</div><div class="val">'+htmlEscape(d.query)+'</div></div><div class="info-item"><div class="lbl">国家</div><div class="val">'+htmlEscape(d.country)+'</div></div><div class="info-item"><div class="lbl">地区</div><div class="val">'+htmlEscape(d.regionName)+'</div></div><div class="info-item"><div class="lbl">城市</div><div class="val">'+htmlEscape(d.city)+'</div></div><div class="info-item"><div class="lbl">邮编</div><div class="val">'+htmlEscape(d.zip)+'</div></div><div class="info-item"><div class="lbl">经纬度</div><div class="val">'+htmlEscape(d.lat)+', '+htmlEscape(d.lon)+'</div></div><div class="info-item"><div class="lbl">ISP</div><div class="val">'+htmlEscape(d.isp)+'</div></div><div class="info-item"><div class="lbl">组织</div><div class="val">'+htmlEscape(d.org)+'</div></div><div class="info-item"><div class="lbl">AS</div><div class="val">'+htmlEscape(d.as)+'</div></div><div class="info-item"><div class="lbl">时区</div><div class="val">'+htmlEscape(d.timezone)+'</div></div></div><div class="map-placeholder">经纬度: '+htmlEscape(d.lat)+', '+htmlEscape(d.lon)+'（可在地图服务中查看）</div>';area.innerHTML=html;out.textContent=d.query+' - '+d.city+', '+d.country;setStatus('查询成功')}).catch(function(e){area.innerHTML='<div class="loading" style="color:var(--color-error)">请求失败: '+htmlEscape(e.message)+'</div>';out.textContent='请求失败';setStatus('请求失败','error')}).finally(function(){btn.disabled=false})}btn.addEventListener('click',lookup);inp.addEventListener('keydown',function(e){if(e.key==='Enter')lookup()});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
