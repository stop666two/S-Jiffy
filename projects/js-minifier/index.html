<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JS 压缩 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.code-pair{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:300px}@media(max-width:700px){.code-pair{grid-template-columns:1fr}}.code-pair textarea{height:300px;resize:vertical;font-family:var(--font-mono);font-size:13px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.code-pair textarea:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.stats{display:flex;gap:16px;font-size:12px;color:var(--color-text-secondary);margin-top:8px;flex-wrap:wrap}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>JS 压缩</h1><p class="tool-desc">压缩 JavaScript 代码：移除注释、多余空白和换行。</p>
<div class="card">
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
<button id="minifyBtn" class="btn btn-primary">压缩</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="code-pair">
<textarea id="jsInput" class="js-focus-input" placeholder="粘贴 JS 代码...">// 这是一个函数
function hello(name) {
  /* 打印问候 */
  var msg = 'Hello, ' + name + '!';
  console.log(msg);
  return msg;
}
</textarea>
<textarea id="js输出" readonly placeholder="压缩结果..." style="background:var(--color-bg-soft);"></textarea>
</div>
<div class="stats" id="stats"></div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var jsInput=document.getElementById('jsInput');
var js输出=document.getElementById('js输出');
var minifyBtn=document.getElementById('minifyBtn');
var clearBtn=document.getElementById('clearBtn');
var 输出El=document.getElementById('输出Text');
var copyBtn=document.getElementById('copyBtn');
var stats=document.getElementById('stats');

function minify(){
var code=jsInput.value;
if(!code.trim()){js输出.value='';stats.textContent='';输出El.textContent='';setStatus('请输入 JS 代码','error');return;}
var 结果=code;
结果=结果.replace(/\/\/.*$/gm,'');
结果=结果.replace(/\/\*[\s\S]*?\*\//g,'');
结果=结果.replace(/^\s*[\r\n]+/gm,'');
var strBuf=[];
var strIdx=0;
var inStr=null;
var strStart=0;
for(var i=0;i<结果.length;i++){
var c=结果[i];
if(inStr!==null){
if(c===inStr&&结果[i-1]!=='\\'){
strBuf.push(结果.slice(strStart,i+1));
inStr=null;
}
}else if(c==="'"||c==='"'||c==='`'){
inStr=c;
strStart=i;
}
}
if(inStr!==null)strBuf.push(结果.slice(strStart));
var parts=结果.split(/(['"`][\s\S]*?['"`])/);
for(var i=0;i<parts.length;i++){
if((parts[i].startsWith("'")||parts[i].startsWith('"')||parts[i].startsWith('`'))&&parts[i].length>1)continue;
parts[i]=parts[i].replace(/\s+/g,' ');
}
结果=parts.join('');
结果=结果.replace(/\s*([{}();,=+\-*/%!<>&|^~?:])\s*/g,'$1');
结果=结果.replace(/;[}]/g,'}');
结果=结果.replace(/^\s+|\s+$/g,'');
js输出.value=结果;
var inputSize=code.length;
var 输出Size=结果.length;
var saved=inputSize-输出Size;
var pct=inputSize>0?((saved/inputSize)*100).toFixed(1):0;
stats.innerHTML='<span>原始: '+inputSize+' 字节</span><span>压缩: '+输出Size+' 字节</span><span>节省: '+saved+' 字节 ('+pct+'%)</span>';
输出El.textContent='压缩完成';
setStatus('');
}

clearBtn.addEventListener('click',function(){jsInput.value='';js输出.value='';stats.textContent='';输出El.textContent='';setStatus('');jsInput.focus();});
minifyBtn.addEventListener('click',minify);
copyBtn.addEventListener('click',function(){if(js输出.value){copyToClipboard(js输出.value,copyBtn);setStatus('已复制');}});
jsInput.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')minify();});
})();</script></body></html>
