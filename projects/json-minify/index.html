<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 压缩 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>JSON 压缩</h1>
    <p class="tool-desc">去除 JSON 中所有空白字符，压缩为紧凑格式。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="粘贴 JSON 文本..." style="min-height:180px;"></textarea>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin-bottom:24px;">
      <button id="minifyBtn" class="btn btn-primary">压缩 Minify</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var inputEl = document.getElementById('inputText');
      var 输出El = document.getElementById('输出Text');
      var minifyBtn = document.getElementById('minifyBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');

      function minify() {
        var text = inputEl.value.trim();
        if (!text) { 输出El.textContent = ''; setStatus('请输入 JSON', 'error'); return; }
        try {
          var parsed = JSON.parse(text);
          输出El.textContent = JSON.stringify(parsed);
          setStatus('压缩成功，节省 ' + (text.length - JSON.stringify(parsed).length) + ' 字符');
        } catch (e) {
          输出El.textContent = '';
          setStatus('JSON 格式错误: ' + e.message, 'error');
        }
      }

      minifyBtn.addEventListener('click', minify);
      clearBtn.addEventListener('click', function () { inputEl.value = ''; 输出El.textContent = ''; setStatus(''); inputEl.focus(); });
      copyBtn.addEventListener('click', function () { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
      inputEl.addEventListener('keydown', function (e) { if (e.ctrlKey && e.key === 'Enter') minify(); });
    })();
  </script>
</body>
</html>
