<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON 美化 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>JSON 美化</h1><p class="tool-desc">格式化 JSON 并缩进（2/4/8 空格或 Tab），支持按键排序。</p>
<div class="card">
<div style="display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;">
<label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">缩进</label>
<select id="indentSelect" class="input" style="width:100px;"><option value="2">2 空格</option><option value="4" selected>4 空格</option><option value="8">8 空格</option><option value="tab">Tab</option></select>
<label style="margin-left:12px;display:flex;align-items:center;gap:4px;font-size:var(--font-size-sm);cursor:pointer;"><input type="checkbox" id="sortKeys"> 按键排序</label>
</div>
</div>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入 JSON..." style="min-height:150px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin:var(--space-2) 0;flex-wrap:wrap;align-items:center;">
<button id="formatBtn" class="btn btn-primary">格式化</button><button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;font-family:var(--font-mono);font-size:var(--font-size-xs);white-space:pre-wrap;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('输出Text');
var formatBtn=document.getElementById('formatBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
var indentSelect=document.getElementById('indentSelect');
var sortKeys=document.getElementById('sortKeys');
function getIndent(){
var v=indentSelect.value;
if(v==='tab')return'\t';
return parseInt(v);
}
function sortObject(obj){
if(typeof obj!=='object'||obj===null||Array.isArray(obj))return obj;
var sorted={};
Object.keys(obj).sort().forEach(function(k){sorted[k]=sortObject(obj[k]);});
return sorted;
}
formatBtn.addEventListener('click',function(){
var t=inputEl.value.trim();
if(!t){setStatus('请输入 JSON','error');return;}
try{
var parsed=JSON.parse(t);
var data=sortKeys.checked?sortObject(parsed):parsed;
输出El.textContent=JSON.stringify(data,null,getIndent());
setStatus('');
}catch(e){
setStatus('JSON 格式错误: '+e.message,'error');
}
});
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
