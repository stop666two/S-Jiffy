<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON 转 C# 类 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>JSON 转 C# 类</h1><p class="tool-desc">将 JSON 数据转换为 C# 类定义代码。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><label>输入 JSON</label><textarea id="inputJson" class="input textarea js-focus-input" style="min-height:120px" placeholder="[{\"name\":\"Alice\",\"age\":30}]"></textarea></div>
<div class="row"><div><label>类名</label><input id="className" class="input" value="RootClass"></div><div style="display:flex;align-items:end;gap:8px"><button id="convertBtn" class="btn btn-primary">转换</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var ij=document.getElementById("inputJson"),cn=document.getElementById("className"),o=document.getElementById("outputText");
function jsonToCSharp(json,rootName){var obj;try{obj=JSON.parse(json)}catch(e){return"// 无效 JSON: "+e.message}
if(!obj||typeof obj!=="object")return"// 需要对象或数组";if(Array.isArray(obj)&&obj.length>0)obj=obj[0];if(typeof obj!=="object"||obj===null)return"// 无法推断结构";
function getType(v){if(v===null)return"object";if(typeof v==="string")return"string";if(typeof v==="number")return v%1===0?"int":"double";if(typeof v==="boolean")return"bool";if(Array.isArray(v))return"List<object>";return"object"}
function toPascal(s){return s.charAt(0).toUpperCase()+s.slice(1).replace(/[^a-zA-Z0-9]/g,"_")}
var lines=["public class "+rootName+"\n{"];for(var k in obj){var propName=toPascal(k);var propType=getType(obj[k]);lines.push("    public "+propType+" "+propName+" { get; set; }")}
lines.push("}");return lines.join("\n")}
document.getElementById("convertBtn").addEventListener("click",function(){var json=ij.value.trim(),name=cn.value.trim()||"RootClass";if(!json){setStatus("请输入 JSON","error");return}
o.textContent=jsonToCSharp(json,name);setStatus("转换完成")});
document.getElementById("clearBtn").addEventListener("click",function(){ij.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
