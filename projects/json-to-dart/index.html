<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON → Dart 类 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.output-box { font-family: var(--font-mono); font-size: 13px; }</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>JSON → Dart 类</h1><p class="tool-desc">将 JSON 数据转换为 Dart 语言类定义</p>
<div class="card"><textarea id="inputJson" class="input textarea js-focus-input" placeholder='{"id":1,"title":"Task","done":false,"priority":null}' style="min-height:200px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;"><button id="convertBtn" class="btn btn-primary">转换</button><button id="clearBtn" class="btn btn-secondary">清空</button></div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function () {
  var inputEl = document.getElementById('inputJson');
  var outputEl = document.getElementById('outputText');

  function capitalize(s) {
    if (!s) return 'EmptyField';
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
  function camelCase(s) {
    return s.replace(/[^a-zA-Z0-9]+(.)/g, function (_, c) { return c.toUpperCase(); }).replace(/^[A-Z]/, function (c) { return c.toLowerCase(); });
  }
  function safeName(s) {
    return s.replace(/[^a-zA-Z0-9_]/g, '_').replace(/^(\d)/, '_$1');
  }

  function dartType(val, depth) {
    if (depth === undefined) depth = 0;
    if (depth > 10) return 'dynamic';
    if (val === null) return 'dynamic';
    if (typeof val === 'boolean') return 'bool';
    if (typeof val === 'number') {
      if (Number.isInteger(val)) return 'int';
      return 'double';
    }
    if (typeof val === 'string') return 'String';
    if (Array.isArray(val)) {
      if (val.length === 0) return 'List<dynamic>';
      var elem = dartType(val[0], depth + 1);
      for (var i = 1; i < val.length; i++) {
        if (dartType(val[i], depth + 1) !== elem) { elem = 'dynamic'; break; }
      }
      return 'List<' + elem + '>';
    }
    if (typeof val === 'object') return 'class';
    return 'dynamic';
  }

  var usedNames = {};
  function uniqueName(base) {
    var n = base; var i = 1;
    while (usedNames[n]) { n = base + i; i++; }
    usedNames[n] = true;
    return n;
  }

  function generateClass(val, name, depth) {
    if (depth === undefined) depth = 0;
    if (depth > 10) return '';
    if (val === null || typeof val !== 'object' || Array.isArray(val)) return '';
    var keys = Object.keys(val);
    var result = 'class ' + name + ' {\n';
    var fieldNames = [];
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var v = val[k];
      var fName = camelCase(safeName(k)) || ('field' + i);
      fName = uniqueName(fName);
      fieldNames.push({ name: fName, jsonKey: k, value: v });
      var dType = dartType(v);
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && depth < 8) {
        var subName = uniqueName(capitalize(safeName(k)));
        result += '  ' + subName + '? ' + fName + ';\n';
      } else if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0]) && depth < 8) {
        var arrSubName = uniqueName(capitalize(safeName(k)) + 'Item');
        result += '  List<' + arrSubName + '>? ' + fName + ';\n';
      } else {
        if (v === null) dType += '?';
        result += '  ' + dType + ' ' + fName + ';\n';
      }
    }
    result += '\n  ' + name + '({';
    var constrFields = [];
    for (var i = 0; i < fieldNames.length; i++) {
      constrFields.push('this.' + fieldNames[i].name);
    }
    result += constrFields.join(', ');
    result += '});\n\n';
    result += '  factory ' + name + '.fromJson(Map<String, dynamic> json) {\n    return ' + name + '(\n';
    for (var i = 0; i < fieldNames.length; i++) {
      var fn = fieldNames[i];
      var jk = fn.jsonKey;
      var v = fn.value;
      if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
        var subName = uniqueName(capitalize(safeName(jk)));
        result += '      ' + fn.name + ': json[' + JSON.stringify(jk) + '] != null ? ' + subName + '.fromJson(json[' + JSON.stringify(jk) + ']) : null,\n';
      } else if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0])) {
        var arrSubName = uniqueName(capitalize(safeName(jk)) + 'Item');
        result += '      ' + fn.name + ': json[' + JSON.stringify(jk) + '] != null ? (json[' + JSON.stringify(jk) + '] as List).map((e) => ' + arrSubName + '.fromJson(e)).toList() : null,\n';
      } else {
        result += '      ' + fn.name + ': json[' + JSON.stringify(jk) + '],\n';
      }
    }
    result += '    );\n  }\n\n';
    result += '  Map<String, dynamic> toJson() {\n    return {\n';
    for (var i = 0; i < fieldNames.length; i++) {
      var fn = fieldNames[i];
      var v = fn.value;
      if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
        var subName = uniqueName(capitalize(safeName(fn.jsonKey)));
        result += '      ' + JSON.stringify(fn.jsonKey) + ': this.' + fn.name + '?.toJson(),\n';
      } else if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0])) {
        result += '      ' + JSON.stringify(fn.jsonKey) + ': this.' + fn.name + '?.map((e) => e.toJson())?.toList(),\n';
      } else {
        result += '      ' + JSON.stringify(fn.jsonKey) + ': this.' + fn.name + ',\n';
      }
    }
    result += '    };\n  }\n}\n';
    for (var i = 0; i < fieldNames.length; i++) {
      var v = fieldNames[i].value;
      var jk = fieldNames[i].jsonKey;
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && depth < 8) {
        var subName = uniqueName(capitalize(safeName(jk)));
        result += '\n' + generateClass(v, subName, depth + 1);
      }
      if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0]) && depth < 8) {
        var arrSubName = uniqueName(capitalize(safeName(jk)) + 'Item');
        result += '\n' + generateClass(v[0], arrSubName, depth + 1);
      }
    }
    return result;
  }

  function convert() {
    var text = inputEl.value.trim();
    if (!text) { setStatus('请输入 JSON', 'error'); return; }
    try {
      var parsed = JSON.parse(text);
      usedNames = {};
      var name = uniqueName('Root');
      var result = '// Generated Dart class\n\n';
      result += generateClass(parsed, name, 0);
      outputEl.textContent = result;
      setStatus('转换成功');
    } catch (e) {
      outputEl.textContent = '';
      setStatus('JSON 格式错误: ' + e.message, 'error');
    }
  }

  document.getElementById('convertBtn').addEventListener('click', convert);
  document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; outputEl.textContent = ''; setStatus(''); inputEl.focus(); });
  document.getElementById('copyBtn').addEventListener('click', function () { if (outputEl.textContent) { copyToClipboard(outputEl.textContent, this); setStatus('已复制到剪贴板'); } });
})();
</script></body></html>
