<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON → Go 结构体 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.output-box { font-family: var(--font-mono); font-size: 13px; }
.hint { font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: var(--space-1); }
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>JSON → Go 结构体</h1><p class="tool-desc">将 JSON 数据转换为 Go 语言结构体定义</p>
<div class="card"><textarea id="inputJson" class="input textarea js-focus-input" placeholder='{"name":"John","age":30,"active":true,"items":["a","b"],"address":{"city":"NYC","zip":10001}}' style="min-height:200px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;"><button id="convertBtn" class="btn btn-primary">转换</button><button id="clearBtn" class="btn btn-secondary">清空</button><label class="file-upload" style="cursor:pointer;">选择文件<input type="file" id="fileInput" accept=".json" style="display:none;"></label></div>
<div class="hint">结构体名: <input id="structName" class="input" value="AutoGenerated" style="width:180px;height:36px;display:inline-block;font-size:13px;vertical-align:middle;"></div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function () {
  var inputEl = document.getElementById('inputJson');
  var outputEl = document.getElementById('outputText');
  var structNameEl = document.getElementById('structName');

  function jsonType(val) {
    if (val === null) return 'interface{}';
    if (typeof val === 'boolean') return 'bool';
    if (typeof val === 'number') {
      if (Number.isInteger(val)) return 'int64';
      return 'float64';
    }
    if (typeof val === 'string') return 'string';
    if (Array.isArray(val)) {
      if (val.length === 0) return '[]interface{}';
      var elemType = jsonType(val[0]);
      for (var i = 1; i < val.length; i++) {
        var t = jsonType(val[i]);
        if (t !== elemType) { elemType = 'interface{}'; break; }
      }
      return '[]' + elemType;
    }
    if (typeof val === 'object') return 'struct';
    return 'interface{}';
  }

  function capitalize(s) {
    if (!s) return 'EmptyField';
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function safeName(s) {
    return s.replace(/[^a-zA-Z0-9_]/g, '_').replace(/^(\d)/, '_$1');
  }

  var usedNames = {};

  function uniqueName(base) {
    var name = base;
    var idx = 1;
    while (usedNames[name]) { name = base + '_' + idx; idx++; }
    usedNames[name] = true;
    return name;
  }

  function goTypeName(val, depth) {
    if (depth === undefined) depth = 0;
    if (depth > 10) return 'interface{}';
    if (val === null) return 'interface{}';
    if (typeof val === 'boolean') return 'bool';
    if (typeof val === 'number') {
      if (Number.isInteger(val)) return 'int64';
      return 'float64';
    }
    if (typeof val === 'string') return 'string';
    if (Array.isArray(val)) {
      if (val.length === 0) return '[]interface{}';
      var elem = goTypeName(val[0], depth + 1);
      for (var i = 1; i < val.length; i++) {
        var t = goTypeName(val[i], depth + 1);
        if (t !== elem) { elem = 'interface{}'; break; }
      }
      return '[]' + elem;
    }
    if (typeof val === 'object') return 'map[string]interface{}';
    return 'interface{}';
  }

  function generateStruct(val, name, depth) {
    if (depth === undefined) depth = 0;
    if (depth > 10) return '';
    if (val === null || typeof val !== 'object' || Array.isArray(val)) return '';
    var keys = Object.keys(val);
    var result = 'type ' + name + ' struct {\n';
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var v = val[k];
      var fieldName = uniqueName(capitalize(safeName(k)));
      var tag = k;
      var goType = goTypeName(v, depth);
      var inlineStruct = false;
      if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
        inlineStruct = true;
        var structName = uniqueName(capitalize(safeName(k)) + 'Struct');
        if (depth < 8) {
          result += '  ' + fieldName + ' ' + structName + ' `json:"' + htmlEscape(tag) + '"`\n';
        } else {
          goType = goTypeName(v, depth);
          result += '  ' + fieldName + ' ' + goType + ' `json:"' + htmlEscape(tag) + '"`\n';
          inlineStruct = false;
        }
      } else if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0])) {
        var arrStructName = uniqueName(capitalize(safeName(k)) + 'Item');
        inlineStruct = true;
        result += '  ' + fieldName + ' []' + arrStructName + ' `json:"' + htmlEscape(tag) + '"`\n';
      } else {
        result += '  ' + fieldName + ' ' + goType + ' `json:"' + htmlEscape(tag) + '"`\n';
      }
    }
    result += '}\n';
    for (var i = 0; i < keys.length; i++) {
      var v = val[keys[i]];
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && depth < 8) {
        var subName = uniqueName(capitalize(safeName(keys[i])) + 'Struct');
        result += '\n' + generateStruct(v, subName, depth + 1);
      }
      if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0])) {
        var arrSubName = uniqueName(capitalize(safeName(keys[i])) + 'Item');
        result += '\n' + generateStruct(v[0], arrSubName, depth + 1);
      }
    }
    return result;
  }

  function convert() {
    var text = inputEl.value.trim();
    if (!text) { setStatus('请输入 JSON', 'error'); return; }
    try {
      var parsed = JSON.parse(text);
      usedNames = {};
      var name = structNameEl.value.trim() || 'AutoGenerated';
      name = uniqueName(capitalize(safeName(name)));
      var result = 'package main\n\n';
      result += generateStruct(parsed, name, 0);
      outputEl.textContent = result;
      setStatus('转换成功');
    } catch (e) {
      outputEl.textContent = '';
      setStatus('JSON 格式错误: ' + e.message, 'error');
    }
  }

  document.getElementById('convertBtn').addEventListener('click', convert);
  document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; outputEl.textContent = ''; setStatus(''); inputEl.focus(); });
  document.getElementById('copyBtn').addEventListener('click', function () { if (outputEl.textContent) { copyToClipboard(outputEl.textContent, this); setStatus('已复制到剪贴板'); } });
  document.getElementById('fileInput').addEventListener('change', function (e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) { inputEl.value = ev.target.result; convert(); };
    reader.readAsText(file);
  });
})();
</script></body></html>
