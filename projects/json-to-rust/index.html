<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON → Rust 结构体 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.output-box { font-family: var(--font-mono); font-size: 13px; }</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>JSON → Rust 结构体</h1><p class="tool-desc">将 JSON 数据转换为 Rust 语言结构体</p>
<div class="card"><textarea id="inputJson" class="input textarea js-focus-input" placeholder='{"name":"John","age":30,"active":true,"score":95.5,"tags":["dev","ops"]}' style="min-height:200px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;"><button id="convertBtn" class="btn btn-primary">转换</button><button id="clearBtn" class="btn btn-secondary">清空</button></div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function () {
  var inputEl = document.getElementById('inputJson');
  var outputEl = document.getElementById('outputText');

  function capitalize(s) {
    if (!s) return 'EmptyField';
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
  function safeName(s) {
    return s.replace(/[^a-zA-Z0-9_]/g, '_').replace(/^(\d)/, '_$1');
  }
  function rustType(val, depth) {
    if (depth === undefined) depth = 0;
    if (depth > 10) return 'serde_json::Value';
    if (val === null) return 'Option<serde_json::Value>';
    if (typeof val === 'boolean') return 'bool';
    if (typeof val === 'number') {
      if (Number.isInteger(val)) {
        if (val >= 0 && val <= 127) return 'i8';
        if (val >= -128 && val <= 127) return 'i8';
        if (val >= -32768 && val <= 32767) return 'i16';
        if (val >= -2147483648 && val <= 2147483647) return 'i32';
        return 'i64';
      }
      return 'f64';
    }
    if (typeof val === 'string') return 'String';
    if (Array.isArray(val)) {
      if (val.length === 0) return 'Vec<serde_json::Value>';
      var elem = rustType(val[0], depth + 1);
      for (var i = 1; i < val.length; i++) {
        if (rustType(val[i], depth + 1) !== elem) { elem = 'serde_json::Value'; break; }
      }
      return 'Vec<' + elem + '>';
    }
    if (typeof val === 'object') return 'struct';
    return 'serde_json::Value';
  }

  var usedNames = {};
  function uniqueName(base) {
    var n = base; var i = 1;
    while (usedNames[n]) { n = base + i; i++; }
    usedNames[n] = true;
    return n;
  }

  function generateStruct(val, name, depth) {
    if (depth === undefined) depth = 0;
    if (depth > 10) return '';
    if (val === null || typeof val !== 'object' || Array.isArray(val)) return '';
    var keys = Object.keys(val);
    var derives = '#[derive(Debug, Clone, Serialize, Deserialize)]\n';
    var result = derives + 'pub struct ' + name + ' {\n';
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var v = val[k];
      var fieldName = safeName(k);
      var fieldRust = fieldName.replace(/_([a-z])/g, function (m, c) { return c.toUpperCase(); });
      fieldRust = fieldName.split('_').map(function (s) { if (s.length === 0) return s; return s.charAt(0).toUpperCase() + s.slice(1); }).join('');
      if (fieldRust.length === 0) fieldRust = 'Field' + i;
      fieldRust = uniqueName(capitalize(fieldRust));
      var rType = rustType(v, depth);
      var isOptional = v === null;
      var serdeAttr = '#[serde(rename = ' + JSON.stringify(k) + ')]';
      var typeStr;
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && depth < 8) {
        var subName = uniqueName(capitalize(safeName(k)));
        result += '  ' + serdeAttr + '\n  pub ' + fieldName + ': ' + subName + ',\n';
        for (var j = 0; j < keys.length; j++) {
          if (j === i) continue;
        }
      } else if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0]) && depth < 8) {
        var arrSubName = uniqueName(capitalize(safeName(k)) + 'Item');
        result += '  ' + serdeAttr + '\n  pub ' + fieldName + ': Vec<' + arrSubName + '>,\n';
      } else {
        typeStr = rType;
        if (v === null) typeStr = 'Option<' + typeStr + '>';
        result += '  ' + serdeAttr + '\n  pub ' + fieldName + ': ' + typeStr + ',\n';
      }
    }
    result += '}\n';
    for (var i = 0; i < keys.length; i++) {
      var v = val[keys[i]];
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && depth < 8) {
        var subName = uniqueName(capitalize(safeName(keys[i])));
        result += '\n' + generateStruct(v, subName, depth + 1);
      }
      if (Array.isArray(v) && v.length > 0 && v[0] !== null && typeof v[0] === 'object' && !Array.isArray(v[0]) && depth < 8) {
        var arrSubName = uniqueName(capitalize(safeName(keys[i])) + 'Item');
        result += '\n' + generateStruct(v[0], arrSubName, depth + 1);
      }
    }
    return result;
  }

  function convert() {
    var text = inputEl.value.trim();
    if (!text) { setStatus('请输入 JSON', 'error'); return; }
    try {
      var parsed = JSON.parse(text);
      usedNames = {};
      var name = uniqueName('Root');
      var result = 'use serde::{Deserialize, Serialize};\n\n';
      result += generateStruct(parsed, name, 0);
      outputEl.textContent = result;
      setStatus('转换成功');
    } catch (e) {
      outputEl.textContent = '';
      setStatus('JSON 格式错误: ' + e.message, 'error');
    }
  }

  document.getElementById('convertBtn').addEventListener('click', convert);
  document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; outputEl.textContent = ''; setStatus(''); inputEl.focus(); });
  document.getElementById('copyBtn').addEventListener('click', function () { if (outputEl.textContent) { copyToClipboard(outputEl.textContent, this); setStatus('已复制到剪贴板'); } });
})();
</script></body></html>
