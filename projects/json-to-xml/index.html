<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON to XML - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>JSON → XML</h1>
    <p class="tool-desc">将 JSON 格式转换为 XML。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder='{"root":{"item":[{"@id":"1","name":"Alice","age":30},{"@id":"2","name":"Bob","age":25}]}}' style="min-height:200px;"></textarea>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
      <button id="convertBtn" class="btn btn-primary">转换到 XML</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box" id="输出Container">
      <span id="输出Text" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var inputEl = document.getElementById('inputText');
      var 输出El = document.getElementById('输出Text');

      function jsonToXml(obj, nodeName, indent) {
        if (indent === undefined) indent = 0;
        var pad = '  ';
        var padStr = pad.repeat(indent);
        var 结果 = '';

        if (obj === null || obj === undefined) {
          结果 += padStr + '<' + nodeName + '/>\n';
          return 结果;
        }

        if (typeof obj === 'string' || typeof obj === 'number' || typeof obj === 'boolean') {
          结果 += padStr + '<' + nodeName + '>' + escapeXml(String(obj)) + '</' + nodeName + '>\n';
          return 结果;
        }

        if (Array.isArray(obj)) {
          for (var i = 0; i < obj.length; i++) {
            结果 += jsonToXml(obj[i], nodeName, indent);
          }
          return 结果;
        }

        if (typeof obj === 'object') {
          var attrs = '';
          var children = {};
          var hasText = false;
          var textVal = '';

          var keys = Object.keys(obj);
          for (var i = 0; i < keys.length; i++) {
            var k = keys[i];
            var v = obj[k];
            if (k.charAt(0) === '@') {
              attrs += ' ' + k.substring(1) + '="' + escapeXml(String(v)) + '"';
            } else if (k === '#text') {
              hasText = true;
              textVal = escapeXml(String(v));
            } else {
              children[k] = v;
            }
          }

          var childKeys = Object.keys(children);
          if (childKeys.length === 0) {
            if (hasText) {
              结果 += padStr + '<' + nodeName + attrs + '>' + textVal + '</' + nodeName + '>\n';
            } else {
              结果 += padStr + '<' + nodeName + attrs + '/>\n';
            }
          } else {
            结果 += padStr + '<' + nodeName + attrs + '>\n';
            if (hasText) {
              结果 += padStr + pad + textVal + '\n';
            }
            for (var i = 0; i < childKeys.length; i++) {
              结果 += jsonToXml(children[childKeys[i]], childKeys[i], indent + 1);
            }
            结果 += padStr + '</' + nodeName + '>\n';
          }
          return 结果;
        }
        return 结果;
      }

      function escapeXml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
      }

      document.getElementById('convertBtn').addEventListener('click', function () {
        var text = inputEl.value.trim();
        if (!text) { setStatus('请输入 JSON', 'error'); return; }
        try {
          var parsed = JSON.parse(text);
          var keys = Object.keys(parsed);
          if (keys.length === 0) { 输出El.textContent = ''; setStatus('空对象', 'error'); return; }
          var rootName = keys[0];
          var 结果 = '<?xml version="1.0" encoding="UTF-8"?>\n';
          结果 += jsonToXml(parsed[rootName], rootName, 0);
          输出El.textContent = 结果;
          setStatus('');
        } catch (e) {
          输出El.textContent = '';
          setStatus('JSON 格式错误', 'error');
        }
      });

      document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; 输出El.textContent = ''; setStatus(''); inputEl.focus(); });
      document.getElementById('copyBtn').addEventListener('click', function () { if (输出El.textContent) { copyToClipboard(输出El.textContent, this); setStatus('已复制到剪贴板'); } });
    })();
  </script>
</body>
</html>
