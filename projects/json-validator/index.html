<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON 验证器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.json-input{min-height:250px;resize:vertical;font-family:var(--font-mono);font-size:13px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none;width:100%;display:block;tab-size:2}.json-input:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.error-detail{font-size:13px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:8px;background:#fce8e6;color:#9f2f2d;white-space:pre-wrap}.success-detail{font-size:13px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:8px;background:#e6f4ea;color:#346538}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>JSON 验证器</h1><p class="tool-desc">验证 JSON 格式正确性，显示详细的错误位置和原因。</p>
<div class="card">
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
<button id="validateBtn" class="btn btn-primary">验证</button>
<button id="formatBtn" class="btn btn-secondary">格式化</button>
<button id="minifyBtn" class="btn btn-secondary">压缩</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<textarea id="jsonInput" class="json-input js-focus-input" placeholder='输入 JSON 字符串...'>{&#10;  "name": "S-Jiffy",&#10;  "version": 1.0,&#10;  "tools": ["validator", "converter"]&#10;}</textarea>
<div id="resultArea"></div>
</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var jsonInput=document.getElementById('jsonInput');
var resultArea=document.getElementById('resultArea');
var validateBtn=document.getElementById('validateBtn');
var formatBtn=document.getElementById('formatBtn');
var minifyBtn=document.getElementById('minifyBtn');
var clearBtn=document.getElementById('clearBtn');
var outputEl=document.getElementById('outputText');
var copyBtn=document.getElementById('copyBtn');

function validate(){
var text=jsonInput.value;
if(!text.trim()){resultArea.innerHTML='<div class="error-detail">请输入 JSON 内容</div>';outputEl.textContent='';return;}
try{
var parsed=JSON.parse(text);
resultArea.innerHTML='<div class="success-detail">✔ JSON 有效！<br>类型：'+(typeof parsed)+'<br>根层级：'+(Array.isArray(parsed)?'数组 (长度 '+parsed.length+')':'对象 (键数 '+Object.keys(parsed).length+')')+'</div>';
outputEl.textContent='JSON 有效';
setStatus('');
}catch(e){
var msg=e.message;
var m=msg.match(/position\s+(\d+)/);
var detail='';
if(m){
var pos=parseInt(m[1]);
var start=Math.max(0,pos-40);
var end=Math.min(text.length,pos+40);
var snippet=text.slice(start,end);
var pointer='';
for(var i=0;i<Math.min(40,pos-start);i++)pointer+=' ';
detail+='\n位置: 第 '+pos+' 字符\n';
detail+='上下文: ...'+snippet+'...\n';
detail+='         '+pointer+'↑ 此处出错';
}
resultArea.innerHTML='<div class="error-detail">✘ '+msg+detail+'</div>';
outputEl.textContent='JSON 无效';
setStatus('验证失败','error');
}
}

function format(){
try{
var parsed=JSON.parse(jsonInput.value);
jsonInput.value=JSON.stringify(parsed,null,2);
validate();
setStatus('已格式化');
}catch(e){
setStatus('格式化失败：JSON 无效','error');
}
}

function minify(){
try{
var parsed=JSON.parse(jsonInput.value);
jsonInput.value=JSON.stringify(parsed);
validate();
setStatus('已压缩');
}catch(e){
setStatus('压缩失败：JSON 无效','error');
}
}

validateBtn.addEventListener('click',validate);
formatBtn.addEventListener('click',format);
minifyBtn.addEventListener('click',minify);
clearBtn.addEventListener('click',function(){jsonInput.value='';resultArea.innerHTML='';outputEl.textContent='';setStatus('');jsonInput.focus();});
copyBtn.addEventListener('click',function(){if(jsonInput.value){copyToClipboard(jsonInput.value,copyBtn);setStatus('已复制');}});
})();</script></body></html>
