<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Viewer - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    #treeContainer { padding:var(--space-2); font-size:13px; line-height:1.7; }
    .jv-toggle { cursor:pointer; user-select:none; color:var(--color-text-disabled); margin-right:4px; font-size:11px; }
    .jv-toggle:hover { color:var(--color-text-primary); }
    .jv-key { color:#881280; }
    .jv-str { color:#0B7500; }
    .jv-num { color:#1750EB; }
    .jv-bool { color:#1750EB; }
    .jv-null { color:var(--color-text-disabled); }
    .jv-bracket { color:var(--color-text-secondary); }
    .jv-ellipsis { color:var(--color-text-disabled); cursor:pointer; font-size:11px; }
    .jv-ellipsis:hover { color:var(--color-text-primary); }
    .jv-children { padding-left:18px; }
    .jv-children.collapsed { display:none; }
    .jv-row { white-space:nowrap; }
    .jv-comma { color:var(--color-text-disabled); }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>JSON 查看器</h1>
    <p class="tool-desc">粘贴 JSON，以可折叠树形结构浏览。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder='{"name":"test","items":[1,2,3],"nested":{"a":1}}' style="min-height:150px;"></textarea>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
      <button id="viewBtn" class="btn btn-primary">查看树形</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box" id="输出Container">
      <div id="treeContainer"></div>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var inputEl = document.getElementById('inputText');
      var treeEl = document.getElementById('treeContainer');

      function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function renderValue(val, topLevel) {
        if (val === null) return '<span class="jv-null">null</span>';
        if (typeof val === 'boolean') return '<span class="jv-bool">' + val + '</span>';
        if (typeof val === 'number') return '<span class="jv-num">' + val + '</span>';
        if (typeof val === 'string') return '<span class="jv-str">"' + esc(val) + '"</span>';
        if (Array.isArray(val)) return renderArray(val, topLevel);
        if (typeof val === 'object') return renderObject(val, topLevel);
        return esc(String(val));
      }

      function renderObject(obj, topLevel) {
        var keys = Object.keys(obj);
        if (keys.length === 0) return '<span class="jv-bracket">{}</span>';
        var id = 'obj-' + (++renderValue.counter);
        var lines = [];
        lines.push('<span class="jv-bracket">{</span>');
        lines.push('<span class="jv-toggle" data-target="' + id + '">▼</span>');
        lines.push('<span class="jv-ellipsis" data-target="' + id + '">' + keys.length + ' keys</span>');
        lines.push('<div class="jv-children" id="' + id + '">');
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i];
          var comma = i < keys.length - 1 ? '<span class="jv-comma">,</span>' : '';
          lines.push('<div class="jv-row"><span class="jv-key">"' + esc(k) + '"</span><span class="jv-bracket">: </span>' + renderValue(obj[k]) + comma + '</div>');
        }
        lines.push('</div>');
        lines.push('<span class="jv-bracket">}</span>');
        return lines.join('');
      }

      function renderArray(arr, topLevel) {
        if (arr.length === 0) return '<span class="jv-bracket">[]</span>';
        var id = 'arr-' + (++renderArray.counter);
        var lines = [];
        lines.push('<span class="jv-bracket">[</span>');
        lines.push('<span class="jv-toggle" data-target="' + id + '">▼</span>');
        lines.push('<span class="jv-ellipsis" data-target="' + id + '">' + arr.length + ' items</span>');
        lines.push('<div class="jv-children" id="' + id + '">');
        for (var i = 0; i < arr.length; i++) {
          var comma = i < arr.length - 1 ? '<span class="jv-comma">,</span>' : '';
          lines.push('<div class="jv-row">' + renderValue(arr[i]) + comma + '</div>');
        }
        lines.push('</div>');
        lines.push('<span class="jv-bracket">]</span>');
        return lines.join('');
      }
      renderValue.counter = 0;
      renderArray.counter = 0;

      function buildTree(jsonStr) {
        renderValue.counter = 0;
        renderArray.counter = 0;
        var parsed;
        try { parsed = JSON.parse(jsonStr); }
        catch (e) { return null; }
        return renderValue(parsed, true);
      }

      treeEl.addEventListener('click', function (e) {
        var target = e.target;
        if (target.classList.contains('jv-toggle')) {
          var id = target.getAttribute('data-target');
          var children = document.getElementById(id);
          if (children) {
            if (children.classList.contains('collapsed')) {
              children.classList.remove('collapsed');
              target.textContent = '▼';
            } else {
              children.classList.add('collapsed');
              target.textContent = '▶';
            }
          }
        }
        if (target.classList.contains('jv-ellipsis')) {
          var id = target.getAttribute('data-target');
          var children = document.getElementById(id);
          var toggle = target.previousElementSibling;
          if (children) {
            if (children.classList.contains('collapsed')) {
              children.classList.remove('collapsed');
              if (toggle) toggle.textContent = '▼';
            } else {
              children.classList.add('collapsed');
              if (toggle) toggle.textContent = '▶';
            }
          }
        }
      });

      document.getElementById('viewBtn').addEventListener('click', function () {
        var text = inputEl.value.trim();
        if (!text) { setStatus('请输入 JSON', 'error'); return; }
        var html = buildTree(text);
        if (html === null) { treeEl.innerHTML = ''; setStatus('JSON 格式错误', 'error'); return; }
        treeEl.innerHTML = html;
        setStatus('');
      });

      document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; treeEl.innerHTML = ''; setStatus(''); inputEl.focus(); });

      document.getElementById('copyBtn').addEventListener('click', function () {
        var raw = treeEl.textContent;
        if (raw && raw.trim()) {
          try { var pretty = JSON.stringify(JSON.parse(inputEl.value.trim()), null, 2); copyToClipboard(pretty, this); setStatus('已复制格式化 JSON'); }
          catch (e) { copyToClipboard(raw, this); setStatus('已复制'); }
        }
      });
    })();
  </script>
</body>
</html>
