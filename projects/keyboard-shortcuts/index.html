<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>快捷键可视化 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.filter-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-2)}.filter-bar .input{width:240px}.platform-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--space-2)}.plat-btn{padding:6px 14px;border:1px solid var(--color-border);border-radius:999px;background:var(--color-bg);cursor:pointer;font-size:12px;transition:all 0.1s}.plat-btn.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary)}.shortcut-table{width:100%;border-collapse:collapse;font-size:13px}.shortcut-table th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--color-border);font-weight:600;position:sticky;top:0;background:var(--color-bg)}.shortcut-table td{padding:7px 12px;border-bottom:1px solid var(--color-border)}.shortcut-table tr:hover{background:var(--color-bg-soft)}kbd{display:inline-block;padding:2px 7px;font-size:12px;font-family:var(--font-mono);background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:4px;box-shadow:0 1px 0 var(--color-border);margin:1px 2px;white-space:nowrap}.cat-tag{font-size:11px;padding:2px 8px;background:var(--color-bg-soft);border-radius:999px;color:var(--color-text-secondary)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>快捷键可视化</h1><p class="tool-desc">查看常用 IDE/工具的键盘快捷键</p>
<div class="card"><div class="filter-bar"><input id="searchInput" class="input js-focus-input" placeholder="搜索快捷键功能..."><select id="platformSelect" style="height:48px;padding:0 12px;border:1px solid #ddd;border-radius:var(--radius-md);font-size:13px"><option value="all">全部工具</option><option value="vscode">VS Code</option><option value="intellij">IntelliJ IDEA</option><option value="webstorm">WebStorm</option><option value="vim">Vim</option></select></div>
<div style="max-height:520px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius-md)"><table class="shortcut-table"><thead><tr><th>功能</th><th>快捷键</th><th>工具</th><th>类别</th></tr></thead><tbody id="tableBody"></tbody></table></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var searchInput=document.getElementById('searchInput'),platformSelect=document.getElementById('platformSelect'),tableBody=document.getElementById('tableBody'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var data=[{name:'打开命令面板',keys:'Ctrl+Shift+P',platform:'vscode',cat:'通用'},{name:'快速文件跳转',keys:'Ctrl+P',platform:'vscode',cat:'导航'},{name:'多光标编辑',keys:'Alt+Click',platform:'vscode',cat:'编辑'},{name:'行复制',keys:'Shift+Alt+↑/↓',platform:'vscode',cat:'编辑'},{name:'行删除',keys:'Ctrl+Shift+K',platform:'vscode',cat:'编辑'},{name:'格式化文档',keys:'Shift+Alt+F',platform:'vscode',cat:'格式化'},{name:'重命名符号',keys:'F2',platform:'vscode',cat:'重构'},{name:'查找引用',keys:'Shift+F12',platform:'vscode',cat:'导航'},{name:'定义跳转',keys:'F12',platform:'vscode',cat:'导航'},{name:'侧栏切换',keys:'Ctrl+B',platform:'vscode',cat:'视图'},{name:'终端切换',keys:'Ctrl+`',platform:'vscode',cat:'视图'},{name:'全局搜索',keys:'Ctrl+Shift+F',platform:'vscode',cat:'搜索'},{name:'代码折叠',keys:'Ctrl+Shift+[',platform:'vscode',cat:'编辑'},{name:'打开设置',keys:'Ctrl+,',platform:'vscode',cat:'通用'},{name:'搜索所有地方',keys:'Shift+Shift',platform:'intellij',cat:'搜索'},{name:'智能补全',keys:'Ctrl+Shift+Space',platform:'intellij',cat:'编辑'},{name:'最近文件',keys:'Ctrl+E',platform:'intellij',cat:'导航'},{name:'类跳转',keys:'Ctrl+N',platform:'intellij',cat:'导航'},{name:'文件跳转',keys:'Ctrl+Shift+N',platform:'intellij',cat:'导航'},{name:'方法/符号跳转',keys:'Ctrl+Alt+Shift+N',platform:'intellij',cat:'导航'},{name:'代码生成',keys:'Alt+Insert',platform:'intellij',cat:'编辑'},{name:'重构菜单',keys:'Ctrl+Alt+Shift+T',platform:'intellij',cat:'重构'},{name:'抽取变量',keys:'Ctrl+Alt+V',platform:'intellij',cat:'重构'},{name:'抽取方法',keys:'Ctrl+Alt+M',platform:'intellij',cat:'重构'},{name:'查找用法',keys:'Alt+F7',platform:'intellij',cat:'导航'},{name:'快速定义',keys:'Ctrl+Shift+I',platform:'intellij',cat:'导航'},{name:'版本控制',keys:'Alt+`',platform:'intellij',cat:'VCS'},{name:'运行',keys:'Shift+F10',platform:'intellij',cat:'运行'},{name:'调试',keys:'Shift+F9',platform:'intellij',cat:'运行'},{name:'优化导入',keys:'Ctrl+Alt+O',platform:'intellij',cat:'编辑'},{name:'代码格式化',keys:'Ctrl+Alt+L',platform:'intellij',cat:'格式化'},{name:'搜索/替换',keys:'Ctrl+Shift+R',platform:'webstorm',cat:'搜索'},{name:'打开文件',keys:'Ctrl+Shift+N',platform:'webstorm',cat:'导航'},{name:'选择模式',keys:'v',platform:'vim',cat:'模式'},{name:'插入模式',keys:'i',platform:'vim',cat:'模式'},{name:'保存退出',keys:':wq',platform:'vim',cat:'文件'},{name:'强制退出',keys:':q!',platform:'vim',cat:'文件'},{name:'撤销',keys:'u',platform:'vim',cat:'编辑'},{name:'复制行',keys:'yy',platform:'vim',cat:'编辑'},{name:'粘贴',keys:'p',platform:'vim',cat:'编辑'},{name:'搜索',keys:'/',platform:'vim',cat:'搜索'},{name:'替换',keys:':%s/old/new/g',platform:'vim',cat:'搜索'},{name:'行首',keys:'0',platform:'vim',cat:'导航'},{name:'行尾',keys:'$',platform:'vim',cat:'导航'},{name:'跳到定义',keys:'gd',platform:'vim',cat:'导航'},{name:'分屏垂直',keys:':vsplit',platform:'vim',cat:'视图'},{name:'分屏水平',keys:':split',platform:'vim',cat:'视图'}];function kbdHtml(s){return s.replace(/(\w+\+)?(\w+)/g,function(m){return'<kbd>'+htmlEscape(m)+'</kbd>'})}function render(){var filter=searchInput.value.toLowerCase().trim();var plat=platformSelect.value;var html='';for(var i=0;i<data.length;i++){var d=data[i];if(plat!=='all'&&d.platform!==plat)continue;if(filter&&d.name.toLowerCase().indexOf(filter)===-1&&d.keys.toLowerCase().indexOf(filter)===-1)continue;html+='<tr>';html+='<td>'+htmlEscape(d.name)+'</td>';html+='<td>'+kbdHtml(d.keys)+'</td>';html+='<td><span class="cat-tag">'+d.platform+'</span></td>';html+='<td><span style="font-size:12px;color:var(--color-text-secondary)">'+htmlEscape(d.cat)+'</span></td>';html+='</tr>'}tableBody.innerHTML=html;outputText.textContent='共显示 '+tableBody.querySelectorAll('tr').length+' 条'}searchInput.addEventListener('input',render);platformSelect.addEventListener('change',render);render();copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
