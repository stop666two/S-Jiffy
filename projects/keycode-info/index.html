<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>按键信息 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .key-display { font-size: 48px; font-weight: 600; text-align: center; padding: var(--space-5) 0; min-height: 120px; display: flex; align-items: center; justify-content: center; }
    .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--space-2); }
    .key-item { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-1) var(--space-2); display: flex; justify-content: space-between; align-items: center; }
    .key-item label { font-size: var(--font-size-xs); color: var(--color-text-secondary); }
    .key-item span { font-size: var(--font-size-sm); font-weight: 500; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>按键信息</h1>
    <p class="tool-desc">按下任意键盘按键，查看详细按键信息。</p>
    <div class="card">
      <div class="key-display" id="keyDisplay">按下任意键</div>
    </div>
    <div class="key-grid" id="keyGrid">
      <div class="key-item"><label>key</label><span id="kvKey">-</span></div>
      <div class="key-item"><label>keyCode</label><span id="kvKeyCode">-</span></div>
      <div class="key-item"><label>code</label><span id="kvCode">-</span></div>
      <div class="key-item"><label>location</label><span id="kvLocation">-</span></div>
      <div class="key-item"><label>altKey</label><span id="kvAlt">false</span></div>
      <div class="key-item"><label>ctrlKey</label><span id="kvCtrl">false</span></div>
      <div class="key-item"><label>shiftKey</label><span id="kvShift">false</span></div>
      <div class="key-item"><label>metaKey</label><span id="kvMeta">false</span></div>
      <div class="key-item"><label>repeat</label><span id="kvRepeat">false</span></div>
      <div class="key-item"><label>which</label><span id="kvWhich">-</span></div>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var display = document.getElementById('keyDisplay');
    var kvKey = document.getElementById('kvKey');
    var kvKeyCode = document.getElementById('kvKeyCode');
    var kvCode = document.getElementById('kvCode');
    var kvLocation = document.getElementById('kvLocation');
    var kvAlt = document.getElementById('kvAlt');
    var kvCtrl = document.getElementById('kvCtrl');
    var kvShift = document.getElementById('kvShift');
    var kvMeta = document.getElementById('kvMeta');
    var kvRepeat = document.getElementById('kvRepeat');
    var kvWhich = document.getElementById('kvWhich');
    function locationName(l) {
      return ['标准', '左', '右', '数字键盘', '移动设备', '手柄'][l] || '未知';
    }
    document.addEventListener('keydown', function(e) {
      display.textContent = e.key || ' ';
      kvKey.textContent = e.key || '(空)';
      kvKeyCode.textContent = e.keyCode;
      kvCode.textContent = e.code;
      kvLocation.textContent = e.location + ' (' + locationName(e.location) + ')';
      kvAlt.textContent = e.altKey ? 'true' : 'false';
      kvCtrl.textContent = e.ctrlKey ? 'true' : 'false';
      kvShift.textContent = e.shiftKey ? 'true' : 'false';
      kvMeta.textContent = e.metaKey ? 'true' : 'false';
      kvRepeat.textContent = e.repeat ? 'true' : 'false';
      kvWhich.textContent = e.which;
      setStatus('捕获按键: ' + (e.key || ' '));
      e.preventDefault();
    });
  })();</script>
</body>
</html>
