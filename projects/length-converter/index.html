<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长度单位转换 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .len-grid { display:grid; gap:var(--space-3); }
    .len-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
    .len-row .field { flex:1; min-width:120px; }
    .len-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>长度单位转换</h1>
    <p class="tool-desc">m / cm / km / in / ft / yd / mi 互转。</p>
    <div class="card">
      <div class="len-grid">
        <div class="len-row">
          <div class="field"><label for="inputM">米 (m)</label><input id="inputM" class="input" type="number" value="100"></div>
          <div class="field"><label for="inputCm">厘米 (cm)</label><input id="inputCm" class="input" type="number" value="10000"></div>
          <div class="field"><label for="inputKm">千米 (km)</label><input id="inputKm" class="input" type="number" value="0.1"></div>
        </div>
        <div class="len-row">
          <div class="field"><label for="inputIn">英寸 (in)</label><input id="inputIn" class="input" type="number" value="3937.01"></div>
          <div class="field"><label for="inputFt">英尺 (ft)</label><input id="inputFt" class="input" type="number" value="328.08"></div>
          <div class="field"><label for="inputYd">码 (yd)</label><input id="inputYd" class="input" type="number" value="109.36"></div>
        </div>
        <div class="len-row">
          <div class="field"><label for="inputMi">英里 (mi)</label><input id="inputMi" class="input" type="number" value="0.06"></div>
        </div>
      </div>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputM = document.getElementById('inputM');
      var inputCm = document.getElementById('inputCm');
      var inputKm = document.getElementById('inputKm');
      var inputIn = document.getElementById('inputIn');
      var inputFt = document.getElementById('inputFt');
      var inputYd = document.getElementById('inputYd');
      var inputMi = document.getElementById('inputMi');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');
      var updating = false;

      function r(v) { return Math.round(v * 1e8) / 1e8; }

      function fromMeters(m) {
        if (updating) return;
        updating = true;
        inputM.value = m;
        inputCm.value = r(m * 100);
        inputKm.value = r(m / 1000);
        inputIn.value = r(m * 39.3701);
        inputFt.value = r(m * 3.28084);
        inputYd.value = r(m * 1.09361);
        inputMi.value = r(m / 1609.344);
        输出El.textContent = m + ' m = ' + inputKm.value + ' km = ' + inputFt.value + ' ft = ' + inputMi.value + ' mi';
        updating = false;
      }

      inputM.addEventListener('input', function() { fromMeters(parseFloat(this.value) || 0); });
      inputCm.addEventListener('input', function() { fromMeters((parseFloat(this.value) || 0) / 100); });
      inputKm.addEventListener('input', function() { fromMeters((parseFloat(this.value) || 0) * 1000); });
      inputIn.addEventListener('input', function() { fromMeters((parseFloat(this.value) || 0) / 39.3701); });
      inputFt.addEventListener('input', function() { fromMeters((parseFloat(this.value) || 0) / 3.28084); });
      inputYd.addEventListener('input', function() { fromMeters((parseFloat(this.value) || 0) / 1.09361); });
      inputMi.addEventListener('input', function() { fromMeters((parseFloat(this.value) || 0) * 1609.344); });

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });

      fromMeters(100);
    })();
  </script>
</body>
</html>
