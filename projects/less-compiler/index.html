<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LESS 变量替换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.split-pane{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:350px}@media(max-width:700px){.split-pane{grid-template-columns:1fr}}.split-pane textarea{height:350px;resize:vertical;font-family:var(--font-mono);font-size:13px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.split-pane textarea:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>LESS 编译器</h1><p class="tool-desc">基础 LESS 变量替换：识别 @variable: value; 定义，在 CSS 中替换变量引用。</p>
<div class="card">
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
<button id="compileBtn" class="btn btn-primary">编译</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="split-pane">
<textarea id="lessInput" class="js-focus-input" placeholder="输入 LESS 代码（变量定义 + CSS）...">@primary-color: #3498db;
@font-size: 16px;
@padding: 12px;
@border-radius: 4px;

body {
  font-size: @font-size;
  color: @primary-color;
}

.button {
  background: @primary-color;
  padding: @padding;
  border-radius: @border-radius;
  font-size: @font-size;
}
</textarea>
<textarea id="css输出" readonly placeholder="编译结果..." style="background:var(--color-bg-soft);"></textarea>
</div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var lessInput=document.getElementById('lessInput');
var css输出=document.getElementById('css输出');
var compileBtn=document.getElementById('compileBtn');
var clearBtn=document.getElementById('clearBtn');
var 输出El=document.getElementById('输出Text');
var copyBtn=document.getElementById('copyBtn');

function compile(){
var text=lessInput.value;
if(!text.trim()){css输出.value='';输出El.textContent='';setStatus('请输入 LESS 代码','error');return;}
var vars={};
var lines=text.split('\n');
var cleanLines=[];
for(var i=0;i<lines.length;i++){
var line=lines[i];
var m=line.match(/^\s*@([a-zA-Z0-9_-]+)\s*:\s*(.*?)\s*;/);
if(m){
vars[m[1]]=m[2];
}else{
cleanLines.push(line);
}
}
var 结果=cleanLines.join('\n');
for(var name in vars){
var re=new RegExp('@'+name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
结果=结果.replace(re,vars[name]);
}
css输出.value=结果;
输出El.textContent='已替换 '+(Object.keys(vars).length)+' 个变量';
setStatus('');
}

compileBtn.addEventListener('click',compile);
clearBtn.addEventListener('click',function(){lessInput.value='';css输出.value='';输出El.textContent='';setStatus('');lessInput.focus();});
copyBtn.addEventListener('click',function(){if(css输出.value){copyToClipboard(css输出.value,copyBtn);setStatus('已复制');}});
lessInput.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')compile();});
})();</script></body></html>
