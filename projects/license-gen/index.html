<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>开源许可证生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.license-select{width:100%;height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);margin-bottom:var(--space-2);cursor:pointer}.license-select:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-2)}.form-row .input{width:200px}.license-meta{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-bottom:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);font-size:13px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>开源许可证生成</h1><p class="tool-desc">根据选择生成开源许可证文本</p>
<div class="card"><select id="licenseSelect" class="license-select"><option value="MIT">MIT License</option><option value="Apache-2.0">Apache License 2.0</option><option value="GPL-3.0">GNU General Public License v3.0</option><option value="GPL-2.0">GNU General Public License v2.0</option><option value="BSD-2-Clause">BSD 2-Clause "Simplified" License</option><option value="BSD-3-Clause">BSD 3-Clause "New" License</option><option value="LGPL-3.0">GNU Lesser General Public License v3.0</option><option value="MPL-2.0">Mozilla Public License 2.0</option><option value="Unlicense">The Unlicense</option><option value="AGPL-3.0">GNU Affero General Public License v3.0</option></select>
<div class="form-row"><input id="yearInput" class="input js-focus-input" placeholder="年份" value=""><input id="authorInput" class="input" placeholder="作者/组织" value="" style="width:280px"><button id="genBtn" class="btn btn-primary">生成</button></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>

ESS OR IMPLIED WARRANTIES, INCLUDING, BUT NOT LIMITED TO, THE IMPLIED WARRANTIES OF MERCHANTABILITY AND FITNESS FOR A PARTICULAR PURPOSE ARE DISCLAIMED. IN NO EVENT SHALL THE COPYRIGHT HOLDER OR CONTRIBUTORS BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL, SPECIAL, EXEMPLARY, OR CONSEQUENTIAL DAMAGES...','BSD-3-Clause':'BSD 3-Clause License\n\nCopyright (c) {{year}}, {{author}}\nAll rights reserved.\n\nRedistribution and use in source and binary forms, with or without modification, are permitted provided that the following conditions are met:\n\n1. Redistributions of source code must retain the above copyright notice, this list of conditions and the following disclaimer.\n\n2. Redistributions in binary form must reproduce the above copyright notice, this list of conditions and the following disclaimer in the documentation and/or other materials provided with the distribution.\n\n3. Neither the name of the copyright holder nor the names of its contributors may be used to endorse or promote products derived from this software without specific prior written permission.\n\nTHIS SOFTWARE IS PROVIDED BY THE COPYRIGHT HOLDERS AND CONTRIBUTORS "AS IS" AND ANY EXPRESS OR IMPLIED WARRANTIES...','LGPL-3.0':'                   GNU LESSER GENERAL PUBLIC LICENSE\n                       Version 3, 29 June 2007\n\nCopyright (C) {{year}} {{author}}\n\nThis program is free software: you can redistribute it and/or modify it under the terms of the GNU Lesser General Public License as published by the Free Software Foundation, either version 3 of the License, or (at your option) any later version.\n\nThis program is distributed in the hope that it will be useful, but WITHOUT ANY WARRANTY; without even the implied warranty of MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE. See the GNU Lesser General Public License for more details.\n\nYou should have received a copy of the GNU Lesser General Public License along with this program.','MPL-2.0':'Mozilla Public License Version 2.0\n\nCopyright (c) {{year}} {{author}}\n\nThis Source Code Form is subject to the terms of the Mozilla Public License, v. 2.0. If a copy of the MPL was not distributed with this file, You can obtain one at http://mozilla.org/MPL/2.0/.','Unlicense':'This is free and unencumbered software released into the public domain.\n\nAnyone is free to copy, modify, publish, use, compile, sell, or distribute this software, either in source code form or as a compiled binary, for any purpose, commercial or non-commercial, and by any means.\n\nIn jurisdictions that recognize copyright laws, the author or authors of this software dedicate any and all copyright interest in the software to the public domain.\n\nFor more information, please refer to <http://unlicense.org/>','AGPL-3.0':'                    GNU AFFERO GENERAL PUBLIC LICENSE\n                       Version 3, 19 November 2007\n\nCopyright (C) {{year}} {{author}}\n\nThis program is free software: you can redistribute it and/or modify it under the terms of the GNU Affero General Public License as published by the Free Software Foundation, either version 3 of the License, or (at your option) any later version.\n\nThis program is distributed in the hope that it will be useful, but WITHOUT ANY WARRANTY; without even the implied warranty of MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE. See the GNU Affero General Public License for more details.\n\nYou should have received a copy of the GNU Affero General Public License along with this program. If not, see <https://www.gnu.org/licenses/>.'};function gen(){var key=licenseSelect.value;var year=yearInput.value.trim()||new Date().getFullYear().toString();var author=authorInput.value.trim()||'[Copyright Holder]';var info=licenses[key];var text=licenseTexts[key].replace(/\{\{year\}\}/g,year).replace(/\{\{author\}\}/g,author);var html='<div class="license-meta"><div><strong>许可证:</strong> '+htmlEscape(info.name)+'</div><div><strong>SPDX:</strong> '+htmlEscape(key)+'</div></div>';html+='<div class="license-meta"><div><strong>允许:</strong> <span style="color:var(--color-success)">'+info.perms.join(', ')+'</span></div><div><strong>条件:</strong> <span style="color:#e65100">'+(info.conditions.length?info.conditions.join(', '):'无')+'</span></div><div><strong>限制:</strong> <span style="color:var(--color-error)">'+info.limitations.join(', ')+'</span></div></div>';html+='<hr style="border:none;border-top:1px solid var(--color-border);margin:var(--space-2) 0"><pre style="font-size:12px;line-height:1.4;white-space:pre-wrap">'+htmlEscape(text)+'</pre>';outputText.innerHTML=html;setStatus('已生成')}genBtn.addEventListener('click',gen);copyBtn.addEventListener('click',function(){var pre=outputText.querySelector('pre');if(pre){copyToClipboard(pre.textContent,this);setStatus('已复制')}});yearInput.value=new Date().getFullYear().toString()})();</script>
</body></html>
