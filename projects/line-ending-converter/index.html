<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>换行符转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.conv-toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-2)}.conv-toolbar select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-2);margin-bottom:var(--space-2)}.stat-box{text-align:center;padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.stat-box .num{font-size:var(--font-size-lg);font-weight:700}.stat-box .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.stat-box.active{background:var(--color-text-primary);color:#fff}.stat-box.active .lbl{color:rgba(255,255,255,0.7)}textarea{font-family:var(--font-mono)!important;font-size:13px!important;line-height:1.5!important}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>换行符转换</h1><p class="tool-desc">在 LF/CRLF/CR 换行符之间转换</p>
<div class="card"><div class="stats-grid" id="statsGrid"><div class="stat-box" id="lfStat"><div class="num" id="lfCount">0</div><div class="lbl">LF (\\n)</div></div><div class="stat-box" id="crlfStat"><div class="num" id="crlfCount">0</div><div class="lbl">CRLF (\\r\\n)</div></div><div class="stat-box" id="crStat"><div class="num" id="crCount">0</div><div class="lbl">CR (\\r)</div></div></div>
<div class="conv-toolbar"><select id="toEnding"><option value="lf">转换为 LF (Unix/macOS)</option><option value="crlf">转换为 CRLF (Windows)</option><option value="cr">转换为 CR (Old Mac)</option></select><button id="convertBtn" class="btn btn-primary">转换</button></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><textarea id="inputText" class="input textarea" placeholder="粘贴文本（自动检测换行符）" style="min-height:250px">line 1
line 2
line 3</textarea><textarea id="outputTextArea" class="input textarea" placeholder="转换结果" style="min-height:250px;background:var(--color-bg-soft)" readonly></textarea></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var inputText=document.getElementById('inputText'),outputTextArea=document.getElementById('outputTextArea'),toEnding=document.getElementById('toEnding'),convertBtn=document.getElementById('convertBtn'),copyBtn=document.getElementById('copyBtn'),outputText=document.getElementById('outputText');var lfStat=document.getElementById('lfStat'),crlfStat=document.getElementById('crlfStat'),crStat=document.getElementById('crStat');var lfCountEl=document.getElementById('lfCount'),crlfCountEl=document.getElementById('crlfCount'),crCountEl=document.getElementById('crCount');function detectEndings(text){var crlf=(text.match(/\r\n/g)||[]).length;var lf=(text.match(/\n/g)||[]).length-crlf;var cr=(text.match(/\r/g)||[]).length-crlf;return{lf:lf,crlf:crlf,cr:cr}}function updateStats(){var text=inputText.value;var counts=detectEndings(text);lfCountEl.textContent=counts.lf;crlfCountEl.textContent=counts.crlf;crCountEl.textContent=counts.cr;lfStat.className='stat-box'+(counts.lf>counts.crlf&&counts.lf>counts.cr?' active':'');crlfStat.className='stat-box'+(counts.crlf>counts.lf&&counts.crlf>counts.cr?' active':'');crStat.className='stat-box'+(counts.cr>counts.lf&&counts.cr>counts.crlf?' active':'')}function convert(){var text=inputText.value;if(!text){setStatus('请输入文本','error');return}var target=toEnding.value;var normalized;if(target==='lf'){normalized=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n')}else if(target==='crlf'){normalized=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n/g,'\r\n')}else if(target==='cr'){normalized=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n/g,'\r')}outputTextArea.value=normalized;var fromCounts=detectEndings(text);var toCounts=detectEndings(normalized);var total=fromCounts.lf+fromCounts.crlf+fromCounts.cr;outputText.innerHTML='原文本: '+total+' 个换行符 → '+'目标: '+(toCounts.lf+toCounts.crlf+toCounts.cr)+' 个换行符';setStatus('转换完成');updateStats()}convertBtn.addEventListener('click',function(){convert()});copyBtn.addEventListener('click',function(){if(outputTextArea.value){copyToClipboard(outputTextArea.value,this);setStatus('已复制')}});inputText.addEventListener('input',updateStats);updateStats()})();</script>
</body></html>
