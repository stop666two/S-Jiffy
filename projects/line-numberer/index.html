<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行号添加器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .ln-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .ln-row .field { flex:1; min-width:100px; }
    .ln-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>行号添加器</h1>
    <p class="tool-desc">为每行文本添加行号，可自定义起始值和格式。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="输入文本..."></textarea>
    </div>
    <div class="ln-row">
      <div class="field">
        <label for="startNum">起始编号</label>
        <input id="startNum" class="input" type="number" value="1" min="0">
      </div>
      <div class="field">
        <label for="formatStr">格式 ({n} 代表行号)</label>
        <input id="formatStr" class="input" value="{n}. " placeholder='如 {n}. 或 [{n}] '>
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button id="numberBtn" class="btn btn-primary">添加行号</button>
      </div>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var startNum = document.getElementById('startNum');
      var formatStr = document.getElementById('formatStr');
      var numberBtn = document.getElementById('numberBtn');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');

      function numberLines() {
        var text = inputEl.value;
        if (!text) { setStatus('请输入文本', 'error'); return; }
        var lines = text.split('\n');
        var start = parseInt(startNum.value, 10) || 1;
        var fmt = formatStr.value || '{n}. ';
        var 结果 = [];
        for (var i = 0; i < lines.length; i++) {
          var n = start + i;
          结果.push(fmt.replace('{n}', n) + lines[i]);
        }
        输出El.textContent = 结果.join('\n');
        setStatus('已添加行号，共 ' + lines.length + ' 行');
      }

      numberBtn.addEventListener('click', numberLines);

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent;
        if (text) {
          copyToClipboard(text, copyBtn);
          setStatus('已复制到剪贴板');
        }
      });

      inputEl.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') numberLines();
      });
    })();
  </script>
</body>
</html>
