<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>贷款计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:120px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>贷款计算器</h1><p class="tool-desc">等额本息贷款月供和利息计算器。</p><div class="card"><div class="row"><div><label>贷款金额 (元)</label><input id="amount" class="input" type="number" value="1000000" min="1"></div><div><label>年利率 (%)</label><input id="rate" class="input" type="number" value="4.2" min="0" step="0.01"></div><div><label>贷款期限 (年)</label><input id="years" class="input" type="number" value="30" min="1" max="50"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="monthlyVal">—</div><div class="l">月供 (元)</div></div><div class="res-item"><div class="v" id="interestVal">—</div><div class="l">总利息 (元)</div></div><div class="res-item"><div class="v" id="totalVal">—</div><div class="l">还款总额 (元)</div></div><div class="res-item"><div class="v" id="ratioVal">—</div><div class="l">利息占比</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var am=document.getElementById('amount'),ra=document.getElementById('rate'),yr=document.getElementById('years'),mv=document.getElementById('monthlyVal'),iv=document.getElementById('interestVal'),tv=document.getElementById('totalVal'),rv=document.getElementById('ratioVal'),o=document.getElementById('outputText');
function calc(){var p=parseFloat(am.value),r=parseFloat(ra.value)/100/12,n=parseInt(yr.value)*12;if(!p||!r||!n||p<1||n<1){setStatus('请输入有效数据','error');return}
var m=p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);var total=m*n;var interest=total-p;
mv.textContent=m.toFixed(2);iv.textContent=interest.toFixed(2);tv.textContent=total.toFixed(2);rv.textContent=(interest/total*100).toFixed(1)+'%';
o.textContent='月供: '+m.toFixed(2)+' 元 | 总利息: '+interest.toFixed(2)+' 元 | 还款总额: '+total.toFixed(2)+' 元';setStatus('计算完成')}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('clearBtn').addEventListener('click',function(){mv.textContent='—';iv.textContent='—';tv.textContent='—';rv.textContent='—';o.textContent='';setStatus('')});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制')}});calc();})();</script></body></html>
