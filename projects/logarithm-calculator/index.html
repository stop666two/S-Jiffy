<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对数计算器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .lc-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .lc-row .field { flex:1; min-width:100px; }
    .lc-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
    .log-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:var(--space-2); }
    .log-item { background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-2); }
    .log-item .label { font-size:var(--font-size-xs); color:var(--color-text-secondary); }
    .log-item .value { font-size:var(--font-size-lg); font-weight:600; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>对数计算器</h1>
    <p class="tool-desc">同时计算常用对数 (log₁₀)、自然对数 (ln)、以 2 为底的对数和自定义底数。</p>
    <div class="card">
      <div class="lc-row">
        <div class="field"><label for="inputVal">数值</label><input id="inputVal" class="input" type="number" value="100" step="any" min="0.0001"></div>
        <div class="field"><label for="baseVal">自定义底数（可选）</label><input id="baseVal" class="input" type="number" placeholder="留空不显示" step="any" min="0.1"></div>
      </div>
      <div><button id="genBtn" class="btn btn-primary">计算</button></div>
      <div class="log-grid" id="logGrid">
        <div class="log-item"><div class="label">log₁₀ (常用对数)</div><div class="value" id="log10Val">-</div></div>
        <div class="log-item"><div class="label">ln (自然对数)</div><div class="value" id="lnVal">-</div></div>
        <div class="log-item"><div class="label">log₂ (二进制对数)</div><div class="value" id="log2Val">-</div></div>
        <div class="log-item"><div class="label" id="customLabel">自定义底数</div><div class="value" id="customVal">-</div></div>
      </div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputVal');
    var baseEl = document.getElementById('baseVal');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function generate() {
      var val = parseFloat(inputEl.value);
      if (isNaN(val) || val <= 0) { setStatus('请输入大于 0 的有效数字', 'error'); return; }

      var log10 = Math.log10(val);
      var ln = Math.log(val);
      var log2 = Math.log2(val);

      document.getElementById('log10Val').textContent = log10.toFixed(6);
      document.getElementById('lnVal').textContent = ln.toFixed(6);
      document.getElementById('log2Val').textContent = log2.toFixed(6);

      var customBase = baseEl.value.trim();
      if (customBase) {
        var base = parseFloat(customBase);
        if (isNaN(base) || base <= 0 || base === 1) {
          document.getElementById('customVal').textContent = '无效底数';
        } else {
          var customLog = Math.log(val) / Math.log(base);
          document.getElementById('customLabel').textContent = 'log' + base.sub;
          document.getElementById('customLabel').innerHTML = 'log<sub>' + base + '</sub>';
          document.getElementById('customVal').textContent = customLog.toFixed(6);
        }
      } else {
        document.getElementById('customLabel').innerHTML = '自定义底数';
        document.getElementById('customVal').textContent = '-';
      }

      var 输出 = 'log₁₀(' + val + ') = ' + log10.toFixed(6) + '\n';
      输出 += 'ln(' + val + ') = ' + ln.toFixed(6) + '\n';
      输出 += 'log₂(' + val + ') = ' + log2.toFixed(6);
      if (customBase) {
        var base = parseFloat(customBase);
        if (!isNaN(base) && base > 0 && base !== 1) {
          var customLog = Math.log(val) / Math.log(base);
          输出 += '\nlog_' + base + '(' + val + ') = ' + customLog.toFixed(6);
        }
      }
      输出El.textContent = 输出;
      setStatus('计算完成');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
