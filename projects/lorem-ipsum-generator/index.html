<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Lorem Ipsum Generator - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.lorem-controls{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:var(--space-3);}
.lorem-controls label{display:block;font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:4px;}
.lorem-controls .field{min-width:100px;}
.lorem-controls input{width:100px;}
.gen-stats{display:flex;gap:var(--space-2);margin-bottom:var(--space-2);flex-wrap:wrap;}
.gen-stats .stat{font-size:var(--font-size-sm);color:var(--color-text-secondary);background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:4px 12px;}
.gen-stats .stat strong{color:var(--color-text-primary);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace">
<h1>Lorem Ipsum 生成器</h1>
<p class="tool-desc">Generate placeholder text with bytes, markdown modes, and locale word lists.</p>
<div class="card">
<div class="lorem-controls">
<div class="field"><label for="loremUnit">单位</label>
<select id="loremUnit" class="input" style="width:auto;">
<option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option><option value="chars">Characters</option><option value="bytes">Bytes</option>
</select></div>
<div class="field"><label for="loremCount">计数</label><input id="loremCount" class="input" type="number" min="1" max="500" value="3"></div>
<div class="field"><label for="loremFormat">格式化</label>
<select id="loremFormat" class="input" style="width:auto;">
<option value="text">Plain text</option><option value="html">HTML</option><option value="markdown">Markdown</option>
</select></div>
<div class="field"><label for="loremLocale">Locale</label>
<select id="loremLocale" class="input" style="width:auto;">
<option value="latin">Latin</option><option value="english">English</option><option value="chinese">Chinese</option>
</select></div>
<div><button id="generateBtn" class="btn btn-primary">生成</button></div>
</div>
<div class="gen-stats" id="genStats">
<span class="stat">Words: <strong id="statWords">0</strong></span>
<span class="stat">Chars: <strong id="statChars">0</strong></span>
<span class="stat">Paragraphs: <strong id="statParas">0</strong></span>
<span class="stat">Sentences: <strong id="statSents">0</strong></span>
</div>
</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){
  var loremUnit=document.getElementById('loremUnit'),loremCount=document.getElementById('loremCount'),loremFormat=document.getElementById('loremFormat'),loremLocale=document.getElementById('loremLocale');
  var generateBtn=document.getElementById('generateBtn'),输出El=document.getElementById('outputText');
  var statWords=document.getElementById('statWords'),statChars=document.getElementById('statChars'),statParas=document.getElementById('statParas'),statSents=document.getElementById('statSents');

  var wordLists={
    latin:['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','officia','deserunt','mollit','anim','id','est','laborum'],
    english:['the','quick','brown','fox','jumps','over','lazy','dog','hello','world','example','sample','text','generate','random','content','placeholder','data','value','test','demo','user','input','输出','format','parser','builder','maker','tool','utility','function','method','variable','constant','string','number','array','object','boolean','null','undefined'],
    chinese:['你好','世界','示例','文本','生成','随机','内容','占位','数据','测试','用户','输入','输出','格式','解析','构建','工具','功能','方法','变量','常量','字符串','数字','数组','对象','布尔','空值']
  };
  function getWords(){return wordLists[loremLocale.value]||wordLists.latin;}
  function randomWord(){var w=getWords();return w[Math.floor(Math.random()*w.length)];}
  function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}
  function makeSentence(){var len=5+Math.floor(Math.random()*10),sent=[];for(var i=0;i<len;i++)sent.push(randomWord());return capitalize(sent.join(' '))+'.';}

  function generate(){
    var unit=loremUnit.value,count=parseInt(loremCount.value,10)||1;if(count<1)count=1;
    var max=unit==='chars'||unit==='bytes'?10000:500;if(count>max)count=max;
    var format=loremFormat.value,结果=[];
    if(unit==='words'){for(var i=0;i<count;i++)结果.push(randomWord());输出El.textContent=结果.join(' ');}
    else if(unit==='chars'){var str='';while(str.replace(/\s/g,'').length<count)str+=makeSentence()+' ';输出El.textContent=str.trim();}
    else if(unit==='bytes'){var str2='',target=count;while(new TextEncoder().encode(str2).length<target)str2+=makeSentence()+' ';输出El.textContent=str2.trim();}
    else if(unit==='sentences'){for(var i=0;i<count;i++)结果.push(makeSentence());输出El.textContent=结果.join(' ');}
    else{for(var p=0;p<count;p++){var para=[],sentCount=3+Math.floor(Math.random()*5);for(var i=0;i<sentCount;i++)para.push(makeSentence());结果.push(para.join(' '));}
    输出El.textContent=结果.join('\n\n');}

    var raw=输出El.textContent;
    if(format==='html'){var hp=raw.split('\n\n'),ho=[];for(var i=0;i<hp.length;i++){if(hp[i].trim())ho.push('<p>'+hp[i].trim()+'</p>');}
    输出El.textContent=ho.join('\n');}else if(format==='markdown'){var mp=raw.split('\n\n'),mo=[];for(var i=0;i<mp.length;i++){if(mp[i].trim())mo.push(mp[i].trim()+'\n');}
    输出El.textContent=mo.join('\n\n');}

    var ft=输出El.textContent;statWords.textContent=ft.trim()?ft.trim().split(/\s+/).length：0;
    statChars.textContent=ft.length;statParas.textContent=ft.split(/\n\s*\n/).filter(function(p){return p.trim().length>0;}).length||(ft.trim()?1:0);
    statSents.textContent=ft.split(/[.!?。！？]+/).filter(function(s){return s.trim().length>0;}).length;
    setStatus('Generated '+count+' '+unit);}

  generateBtn.addEventListener('click',generate);
  document.getElementById('copyBtn').addEventListener('click',function(){var t=输出El.textContent;if(t){copyToClipboard(t,this);setStatus('已复制');}});
  generate();
})();
</script></body></html>
