      function normalizeMac(s) {
        s = s.to大写().replace(/[^0-9A-F]/g, '');
        if (s.length < 6) return null;
        var parts = [];
        for (var i = 0; i < s.length && i < 12; i += 2) {
          parts.push(s.substring(i, i + 2));
        }
        return parts.join(':');
      }

      function lookupOui(normalized) {
        var oui3 = normalized.substring(0, 8);
        var oui6 = normalized.substring(0, 17);
        // Try full MAC first
        for (var i = 0; i < ouiDb.length; i++) {
          if (ouiDb[i].oui === oui6) return ouiDb[i];
        }
        for (var i = 0; i < ouiDb.length; i++) {
          if (ouiDb[i].oui === oui3) return ouiDb[i];
        }
        return null;
      }

      document.getElementById('lookupBtn').addEventListener('click', function () {
        var raw = macInput.value.trim();
        if (!raw) { setStatus('请输入 MAC 地址', 'error'); return; }

        var normalized = normalizeMac(raw);
        if (!normalized || normalized.length < 8) {
          结果El.innerHTML = '<div class="mac-empty">无效的 MAC 地址格式</div>';
          setStatus('格式错误', 'error');
          return;
        }

        var found = lookupOui(normalized);
        if (found) {
          结果El.innerHTML = '<div class="mac-结果"><div><div class="mac-vendor">' + found.vendor + '</div><div class="mac-oui">OUI: ' + found.oui + ' · 完整 MAC: ' + normalized + '</div></div></div>';
          setStatus('查询成功');
        } else {
          结果El.innerHTML = '<div class="mac-empty">未找到厂商信息 (OUI: ' + normalized.substring(0, 8) + ')</div>';
          setStatus('未匹配到厂商', 'error');
        }
      });

        if (e.key === 'Enter') document.getElementById('lookupBtn').click();
      });
