<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Makefile 生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.form-row{display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap}.form-row .input{width:280px}.target-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:var(--space-3)}.target-btn{padding:8px 16px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);cursor:pointer;font-size:13px;font-family:var(--font-mono);transition:all 0.1s;user-select:none}.target-btn:hover{border-color:var(--color-text-primary)}.target-btn.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary)}.opt-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-2)}.opt-row label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}.opt-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--color-text-primary)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Makefile 生成</h1><p class="tool-desc">生成常见任务 Makefile 模板</p>
<div class="card"><div class="form-row"><input id="nameInput" class="input js-focus-input" placeholder="项目名称" value="my-project"></div>
<div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:8px">选择目标:</div>
<div class="target-grid" id="targetGrid"><button class="target-btn active" data-target="build">build</button><button class="target-btn" data-target="test">test</button><button class="target-btn active" data-target="clean">clean</button><button class="target-btn" data-target="lint">lint</button><button class="target-btn" data-target="fmt">fmt</button><button class="target-btn" data-target="run">run</button><button class="target-btn" data-target="install">install</button><button class="target-btn" data-target="docker-build">docker-build</button><button class="target-btn" data-target="release">release</button><button class="target-btn" data-target="docs">docs</button></div>
<div class="opt-row"><label><input type="checkbox" id="phoneyCheck" checked> .PHONY 声明</label><label><input type="checkbox" id="helpCheck" checked> help 目标</label><label><input type="checkbox" id="varsCheck" checked> 变量定义</label></div>
<button id="genBtn" class="btn btn-primary">生成 Makefile</button></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var nameInput=document.getElementById('nameInput'),genBtn=document.getElementById('genBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var targetBtns=document.querySelectorAll('#targetGrid .target-btn');for(var i=0;i<targetBtns.length;i++){(function(btn){btn.addEventListener('click',function(){btn.classList.toggle('active')})})(targetBtns[i])}var targetTemplates={build:['.PHONY: build','build:','\t@echo "Building $(APP_NAME)..."','\t@# TODO: add build command here'],test:['.PHONY: test','test:','\t@echo "Running tests..."','\t@# TODO: add test command'],clean:['.PHONY: clean','clean:','\t@echo "Cleaning..."','\trm -rf dist/ build/ __pycache__/','\t@# TODO: add more clean targets'],lint:['.PHONY: lint','lint:','\t@echo "Linting..."','\t@# TODO: add linter command'],fmt:['.PHONY: fmt','fmt:','\t@echo "Formatting..."','\t@# TODO: add formatter command'],run:['.PHONY: run','run:','\t@echo "Starting $(APP_NAME)..."','\t@# TODO: add run command'],install:['.PHONY: install','install:','\t@echo "Installing dependencies..."','\t@# TODO: add install command'],'docker-build':['.PHONY: docker-build','docker-build:','\t@echo "Building Docker image..."','\t@docker build -t $(APP_NAME):latest .'],release:['.PHONY: release','release:','\t@echo "Releasing $(APP_NAME)..."','\t@# TODO: add release command'],docs:['.PHONY: docs','docs:','\t@echo "Generating docs..."','\t@# TODO: add docs generation command']};function gen(){var name=nameInput.value.trim()||'my-project';var targets=[];for(var i=0;i<targetBtns.length;i++){if(targetBtns[i].classList.contains('active'))targets.push(targetBtns[i].getAttribute('data-target'))}if(!targets.length){setStatus('请至少选择一个目标','error');return}var lines=[];if(document.getElementById('varsCheck').checked){lines.push('# Makefile for '+name);lines.push('');lines.push('APP_NAME ?= '+name);lines.push('BUILD_DIR ?= ./dist');lines.push('');}if(document.getElementById('helpCheck').checked){lines.push('.PHONY: help');lines.push('help:');lines.push('\t@echo "Usage: make [target]"');lines.push('\t@echo ""');lines.push('\t@echo "Available targets:"');for(var j=0;j<targets.length;j++){lines.push('\t@echo "  '+targets[j]+'"')}lines.push('');}if(document.getElementById('phoneyCheck').checked){lines.push('.PHONY: '+targets.join(' '));lines.push('');}for(var k=0;k<targets.length;k++){var tmpl=targetTemplates[targets[k]];if(tmpl){for(var l=0;l<tmpl.length;l++){lines.push(tmpl[l])}lines.push('')}}outputText.textContent=lines.join('\n');setStatus('已生成')}genBtn.addEventListener('click',gen);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
