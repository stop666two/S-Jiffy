<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Markdown 预览 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.markdown-split{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:400px}@media(max-width:700px){.markdown-split{grid-template-columns:1fr}}.markdown-split textarea{height:400px;resize:vertical;font-family:var(--font-mono);font-size:14px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.markdown-split textarea:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.preview-area{padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);overflow-y:auto;height:400px;background:var(--color-bg);font-family:var(--font-family);line-height:1.7}.preview-area h1{font-size:24px;font-weight:700;margin:16px 0 8px;padding-bottom:8px;border-bottom:1px solid var(--color-border)}.preview-area h2{font-size:20px;font-weight:600;margin:14px 0 6px}.preview-area h3{font-size:17px;font-weight:600;margin:12px 0 4px}.preview-area p{margin:8px 0}.preview-area code{background:var(--color-bg-soft);padding:2px 6px;border-radius:3px;font-family:var(--font-mono);font-size:13px}.preview-area pre{background:var(--color-bg-soft);padding:12px;border-radius:var(--radius-md);overflow-x:auto;margin:12px 0}.preview-area pre code{padding:0;background:none}.preview-area a{color:var(--color-text-primary);text-decoration:underline}.preview-area strong{font-weight:700}.preview-area em{font-style:italic}.preview-area ul,.preview-area ol{padding-left:24px;margin:8px 0}.preview-area blockquote{border-left:3px solid var(--color-text-primary);padding-left:12px;margin:12px 0;color:var(--color-text-secondary)}.preview-area hr{border:none;border-top:1px solid var(--color-border);margin:16px 0}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Markdown 预览</h1><p class="tool-desc">Markdown 实时预览，支持标题、加粗、斜体、链接、代码等基础语法。</p>
<div class="card">
<div class="markdown-split">
<textarea id="mdInput" class="js-focus-input" placeholder="# 标题&#10;在此输入 Markdown...&#10;&#10;**加粗** *斜体* `代码`&#10;&#10;- 列表项 1&#10;- 列表项 2&#10;&#10;[链接](https://example.com)"># 欢迎使用 Markdown 预览

**加粗文本** 和 *斜体文本*

行内 `code` 以及代码块：

```
console.log('hello');
```

- 无序列表项 1
- 无序列表项 2

1. 有序列表项
2. 有序列表项

[链接示例](https://example.com)

> 引用文本</textarea>
<div class="preview-area" id="previewArea"></div>
</div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var mdInput=document.getElementById('mdInput');
var previewArea=document.getElementById('previewArea');
var 输出El=document.getElementById('输出Text');
var copyBtn=document.getElementById('copyBtn');

function render(md){
var html='';
var lines=md.split('\n');
var inCode=false;
var codeBuf=[];
for(var i=0;i<lines.length;i++){
var line=lines[i];
if(inCode){
if(line.trim().startsWith('```')){
html+='<pre><code>'+escapeHtml(codeBuf.join('\n'))+'</code></pre>';
codeBuf=[];
inCode=false;
}else{
codeBuf.push(line);
}
continue;
}
if(line.trim().startsWith('```')){
inCode=true;
codeBuf=[];
continue;
}
if(line.trim()===''){html+='<p><br></p>';continue;}
if(line.trim().startsWith('#')){
var level=0;
var j=0;
while(j<line.length&&line[j]==='#'){level++;j++;}
if(level>6)level=6;
var content=line.slice(j).trim();
html+='<h'+level+'>'+inlineRender(content)+'</h'+level+'>';
continue;
}
if(line.trim().startsWith('> ')){
html+='<blockquote>'+inlineRender(line.trim().slice(2))+'</blockquote>';
continue;
}
if(line.trim().startsWith('- ')||line.trim().startsWith('* ')){
html+='<ul><li>'+inlineRender(line.trim().slice(2))+'</li></ul>';
continue;
}
if(/^\d+\.\s/.test(line.trim())){
html+='<ol><li>'+inlineRender(line.trim().replace(/^\d+\.\s/,''))+'</li></ol>';
continue;
}
if(line.trim()==='---'||line.trim()==='***'||line.trim()==='___'){
html+='<hr>';
continue;
}
html+='<p>'+inlineRender(line)+'</p>';
}
previewArea.innerHTML=html;
输出El.textContent='已渲染 '+(md.length||0)+' 字符';
}

function inlineRender(text){
text=escapeHtml(text);
text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
text=text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
text=text.replace(/__([^_]+)__/g,'<strong>$1</strong>');
text=text.replace(/\*([^*]+)\*/g,'<em>$1</em>');
text=text.replace(/_([^_]+)_/g,'<em>$1</em>');
text=text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
return text;
}

function escapeHtml(s){
return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

mdInput.addEventListener('input',function(){render(this.value);});
copyBtn.addEventListener('click',function(){
var html=previewArea.innerHTML;
if(html){copyToClipboard(html,copyBtn);setStatus('已复制 HTML');}
});
render(mdInput.value);
})();</script></body></html>
