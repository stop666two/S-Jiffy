<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 转 HTML - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .md-container { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .md-pane { }
    .md-pane label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:6px; }
    .md-pane textarea { min-height:300px; font-family:var(--font-mono); font-size:13px; }
    .md-preview { border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-3); min-height:300px; overflow-y:auto; font-family:var(--font-family); line-height:1.7; background:#fff; }
    .md-preview h1 { font-size:24px; margin:16px 0 8px; }
    .md-preview h2 { font-size:20px; margin:14px 0 6px; }
    .md-preview h3 { font-size:17px; margin:12px 0 4px; }
    .md-preview p { margin:8px 0; }
    .md-preview pre { background:#f5f5f5; border-radius:var(--radius-sm); padding:12px; overflow-x:auto; font-size:13px; }
    .md-preview code { background:#f0f0f0; padding:2px 5px; border-radius:3px; font-size:13px; }
    .md-preview pre code { background:transparent; padding:0; }
    .md-preview ul, .md-preview ol { padding-left:24px; margin:8px 0; }
    .md-preview li { margin:4px 0; }
    .md-preview a { color:#1a73e8; text-decoration:underline; }
    .md-preview blockquote { border-left:3px solid #ddd; padding-left:12px; margin:12px 0; color:#666; }
    .md-preview hr { border:none; border-top:1px solid #ddd; margin:16px 0; }
    .md-preview strong { font-weight:600; }
    .md-preview em { font-style:italic; }
    .md-preview table { border-collapse:collapse; margin:12px 0; }
    .md-preview th, .md-preview td { border:1px solid #ddd; padding:6px 12px; }
    .md-preview th { background:#f5f5f5; font-weight:600; }
    .md-preview img { max-width:100%; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>Markdown 转 HTML</h1>
    <p class="tool-desc">将 Markdown 文本实时转换为 HTML，支持标题、粗体、斜体、链接、列表、代码等基本语法。</p>
    <div class="md-container">
      <div class="md-pane">
        <label for="mdInput">Markdown</label>
        <textarea id="mdInput" class="input textarea js-focus-input" placeholder="输入 Markdown..." style="min-height:300px;"># Hello World

这是一段**粗体**和*斜体*文本。

## 列表
- 项目 1
- 项目 2
  - 嵌套项

## 代码
`行内代码` 和代码块:

```
function hello() {
  console.log("hi");
}
```

## 链接
[点击这里](https://example.com)</textarea>
      </div>
      <div class="md-pane">
        <label>HTML 预览</label>
        <div id="previewArea" class="md-preview"></div>
      </div>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
      <button id="copyHtmlBtn" class="btn btn-primary">复制 HTML</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box" id="输出Container">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var mdInput = document.getElementById('mdInput');
      var previewArea = document.getElementById('previewArea');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');
      var copyHtmlBtn = document.getElementById('copyHtmlBtn');
      var clearBtn = document.getElementById('clearBtn');

      function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function convertMarkdown(md) {
        var html = '';
        var lines = md.split('\n');
        var i = 0;
        var inCodeBlock = false;
        var codeContent = '';
        var codeLang = '';

        while (i < lines.length) {
          var line = lines[i];

          // Code block
          if (line.trim().startsWith('```')) {
            if (inCodeBlock) {
              html += '<pre><code>' + escapeHtml(codeContent.replace(/\n$/, '')) + '</code></pre>\n';
              codeContent = '';
              codeLang = '';
              inCodeBlock = false;
              i++;
              continue;
            } else {
              inCodeBlock = true;
              codeLang = line.trim().slice(3).trim();
              codeContent = '';
              i++;
              continue;
            }
          }

          if (inCodeBlock) {
            codeContent += line + '\n';
            i++;
            continue;
          }

          // Horizontal rule
          if (/^(-{3,}|\*{3,})$/.test(line.trim())) {
            html += '<hr>\n';
            i++;
            continue;
          }

          // Headings
          var hMatch = line.match(/^(#{1,6})\s+(.+)$/);
          if (hMatch) {
            var level = hMatch[1].length;
            var text = parseInline(hMatch[2]);
            html += '<h' + level + '>' + text + '</h' + level + '>\n';
            i++;
            continue;
          }

          // Blockquote
          var bqMatch = line.match(/^>\s?(.*)$/);
          if (bqMatch) {
            html += '<blockquote>' + parseInline(bqMatch[1]) + '</blockquote>\n';
            i++;
            continue;
          }

          // Unordered list
          if (/^\s*[-*+]\s+/.test(line)) {
            html += '<ul>\n';
            while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
              var liText = lines[i].replace(/^\s*[-*+]\s+/, '');
              var indent = lines[i].match(/^\s*/)[0].length;
              html += '<li>' + parseInline(liText) + '</li>\n';
              i++;
              // Handle indented sub-items
              while (i < lines.length && /^\s+[-*+]\s+/.test(lines[i])) {
                var subText = lines[i].replace(/^\s+[-*+]\s+/, '');
                html += '<li>' + parseInline(subText) + '</li>\n';
                i++;
              }
            }
            html += '</ul>\n';
            continue;
          }

          // Ordered list
          if (/^\s*\d+\.\s+/.test(line)) {
            html += '<ol>\n';
            while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
              var liText = lines[i].replace(/^\s*\d+\.\s+/, '');
              html += '<li>' + parseInline(liText) + '</li>\n';
              i++;
            }
            html += '</ol>\n';
            continue;
          }

          // Empty line
          if (line.trim() === '') {
            html += '\n';
            i++;
            continue;
          }

          // Paragraph
          var paraLines = [];
          while (i < lines.length && line.trim() !== '' && !line.trim().startsWith('```') && !/^(#{1,6}|>|---|\*{3,}|-{3,}|\s*[-*+]\s+|\s*\d+\.\s+)/.test(line)) {
            paraLines.push(line);
            i++;
            if (i < lines.length) line = lines[i];
          }
          if (paraLines.length > 0) {
            html += '<p>' + parseInline(paraLines.join('\n')) + '</p>\n';
          }
        }

        if (inCodeBlock && codeContent) {
          html += '<pre><code>' + escapeHtml(codeContent.replace(/\n$/, '')) + '</code></pre>\n';
        }

        return html;
      }

      function parseInline(text) {
        // Escape HTML first
        text = escapeHtml(text);
        // Images ![alt](url)
        text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
        // Links [text](url)
        text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        // Inline code
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Bold **text** or __text__
        text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
        // Italic *text* or _text_
        text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
        // Strikethrough ~~text~~
        text = text.replace(/~~([^~]+)~~/g, '<del>$1</del>');
        return text;
      }

      function render() {
        var md = mdInput.value;
        var html = convertMarkdown(md);
        previewArea.innerHTML = html;
        输出El.textContent = '<div class="md-preview">\n' + html + '\n</div>';
        setStatus('已转换');
      }

      mdInput.addEventListener('input', render);

      copyHtmlBtn.addEventListener('click', function() {
        var html = previewArea.innerHTML;
        var full = '<div class="md-preview">\n' + html + '\n</div>';
        copyToClipboard(full, copyHtmlBtn);
        setStatus('HTML 已复制');
      });

      copyBtn.addEventListener('click', function() {
        if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); }
      });

      clearBtn.addEventListener('click', function() {
        mdInput.value = '';
        previewArea.innerHTML = '';
        输出El.textContent = '';
        setStatus('');
        mdInput.focus();
      });

      render();
    })();
  </script>
</body>
</html>
