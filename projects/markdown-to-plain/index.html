<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Markdown to Plain Text - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.stat-row{display:flex;gap:16px;margin-bottom:var(--space-2);font-size:var(--font-size-sm);color:var(--color-text-secondary);}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>Markdown 转纯文本</h1><p class="tool-desc">Strip all Markdown formatting, keep plain text content only.</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="# Hello\nThis is **bold** and *italic* text." style="min-height:160px;"></textarea></div>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-3);">
<button id="convertBtn" class="btn btn-primary">转换</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="stat-row"><span>Original chars: <strong id="origChars">0</strong></span><span>Stripped chars: <strong id="stripChars">0</strong></span><span>Reduction: <strong id="reduction">0%</strong></span></div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var i=document.getElementById('inputText'),o=document.getElementById('输出Text');
var oc=document.getElementById('origChars'),sc=document.getElementById('stripChars'),rd=document.getElementById('reduction');

function stripMd(t){
t=t.replace(/^#{1,6}\s+/gm,'');
t=t.replace(/\*\*\*(.+?)\*\*\*/g,'$1');
t=t.replace(/\*\*(.+?)\*\*/g,'$1');
t=t.replace(/\*(.+?)\*/g,'$1');
t=t.replace(/___(.+?)___/g,'$1');
t=t.replace(/__(.+?)__/g,'$1');
t=t.replace(/_(.+?)_/g,'$1');
t=t.replace(/~~(.+?)~~/g,'$1');
t=t.replace(/`{1,3}[^`]+`{1,3}/g,function(m){return m.replace(/`/g,'');});
t=t.replace(/\[([^\]]+)\]\([^)]+\)/g,'$1');
t=t.replace(/!\[([^\]]*)\]\([^)]+\)/g,'$1');
t=t.replace(/^[>\s]+/gm,'');
t=t.replace(/^[\s]*[-*+]\s+/gm,'');
t=t.replace(/^\d+\.\s+/gm,'');
t=t.replace(/^[-*_]{3,}\s*$/gm,'');
t=t.replace(/\|/g,'');
t=t.replace(/[:\-]{3,}/g,'');
t=t.replace(/<[^>]+>/g,'');
t=t.replace(/\n{3,}/g,'\n\n');
return t.trim();}

function convert(){var t=i.value;if(!t){o.textContent='';oc.textContent='0';sc.textContent='0';rd.textContent='0%';return;}
var orig=t.length;var plain=stripMd(t);var stripped=plain.length;
o.textContent=plain;oc.textContent=orig;sc.textContent=stripped;
rd.textContent=orig>0?Math.round((1-stripped/orig)*100)+'%':'0%';
setStatus('Stripped to '+plain.split(/\s+/).length+' words');}

document.getElementById('convertBtn').addEventListener('click',convert);
document.getElementById('clearBtn').addEventListener('click',function(){i.value='';o.textContent='';oc.textContent='0';sc.textContent='0';rd.textContent='0%';setStatus('');i.focus();});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('Copied');}});
})();
</script></body></html>
