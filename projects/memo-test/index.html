<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>记忆测试 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.game-area{text-align:center;padding:24px 0}.game-btn{width:120px;height:120px;border-radius:50%;border:none;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s}.game-btn.ready{background:#4CAF50;color:#fff}.game-btn.waiting{background:#F44336;color:#fff}.game-btn:active{transform:scale(0.95)}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>记忆测试</h1><p class="tool-desc">数字记忆广度测试游戏。</p><div class="card"><div class="game-area"><div id="memoDisplay" style="font-size:48px;font-weight:700;letter-spacing:8px;font-family:var(--font-mono);min-height:60px">点击开始</div>
<div class="row" style="justify-content:center;margin-top:16px"><input id="userInput" class="input" placeholder="输入数字" disabled style="width:200px;text-align:center;font-size:20px"></div>
<div class="row" style="justify-content:center"><button id="startBtn" class="btn btn-primary">开始游戏</button><button id="submitBtn" class="btn btn-secondary" disabled>确认</button></div>
<div class="res-grid" style="margin-top:12px"><div class="res-item"><div class="v" id="levelVal">0</div><div class="l">当前位数</div></div><div class="res-item"><div class="v" id="bestVal">0</div><div class="l">最高纪录</div></div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var md=document.getElementById("memoDisplay"),ui=document.getElementById("userInput"),sb=document.getElementById("startBtn"),sm=document.getElementById("submitBtn"),lv=document.getElementById("levelVal"),bv=document.getElementById("bestVal"),o=document.getElementById("输出Text");var level=3,currentNum="",best=0,showing=false;
function nextRound(){level++;currentNum="";for(var i=0;i<level;i++)currentNum+=Math.floor(Math.random()*10);md.textContent=currentNum;ui.value="";ui.disabled=true;sb.disabled=true;sm.disabled=true;showing=true;setStatus("记住这个数字...");
setTimeout(function(){md.textContent="?";ui.disabled=false;sb.disabled=false;sm.disabled=false;ui.focus();showing=false;setStatus("输入你看到的数字")},1000+level*200)}
document.getElementById("startBtn").addEventListener("click",function(){level=3;nextRound()});
document.getElementById("submitBtn").addEventListener("click",function(){var ans=ui.value.trim();if(ans===currentNum){lv.textContent=level;if(level>best){best=level;bv.textContent=best}o.textContent="正确! 进入下一关 (位数: "+level+")";setStatus("正确!");setTimeout(nextRound,1000)}else{md.textContent=currentNum;o.textContent="错误! 数字是 "+currentNum+" | 最高纪录: "+best+" 位";setStatus("错误!","error");ui.disabled=true;sb.disabled=false;sm.disabled=true}});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
