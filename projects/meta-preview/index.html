<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>社交 Meta 预览 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>社交 Meta 预览</h1><p class="tool-desc">预览网页在社交媒体上的显示效果。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><div><label>页面标题</label><input id="ogTitle" class="input" value="S-Jiffy · 即用即走工具集" style="width:100%"></div><div style="margin-top:8px"><label>描述</label><textarea id="ogDesc" class="input textarea" style="min-height:50px">轻量、瞬时的生产力工具，打开即用，用完即走。</textarea></div></div>
<div class="row"><button id="previewBtn" class="btn btn-primary">预览</button></div>
<div id="mockCard" style="border:1px solid var(--color-border);border-radius:8px;overflow:hidden;background:var(--color-bg);display:none"><div style="height:120px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:600">S</div><div style="padding:12px"><div style="font-weight:600;font-size:14px" id="mockTitle"></div><div style="font-size:12px;color:#666;margin-top:4px" id="mockDesc"></div><div style="font-size:11px;color:#999;margin-top:6px">example.com</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var t=document.getElementById("ogTitle"),d=document.getElementById("ogDesc"),mc=document.getElementById("mockCard"),mt=document.getElementById("mockTitle"),md=document.getElementById("mockDesc"),o=document.getElementById("输出Text");
document.getElementById("previewBtn").addEventListener("click",function(){var title=t.value.trim()||"无标题",desc=d.value.trim()||"无描述";mt.textContent=title;md.textContent=desc;mc.style.display="block";o.textContent="Title: "+title+"\nDescription: "+desc;setStatus("预览已生成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
