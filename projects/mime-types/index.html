<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIME Types - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .mime-search { display:flex; gap:12px; margin-bottom:var(--space-3); }
    .mime-search .input { flex:1; }
    .mime-table { width:100%; border-collapse:collapse; font-size:var(--font-size-sm); }
    .mime-table th { text-align:left; padding:8px 12px; border-bottom:2px solid var(--color-border); background:var(--color-bg-soft); font-weight:600; }
    .mime-table td { padding:6px 12px; border-bottom:1px solid var(--color-border); }
    .mime-table tr:hover td { background:var(--color-bg-soft); }
    .mime-table .ext { font-family:var(--font-mono); color:var(--color-text-primary); }
    .mime-table .mime { font-family:var(--font-mono); color:var(--color-text-secondary); font-size:12px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>MIME 类型大全</h1>
    <p class="tool-desc">MIME 类型与文件扩展名查询对照表。</p>
    <div class="card">
      <div class="mime-search">
        <input id="mimeSearch" class="input js-focus-input" type="text" placeholder="搜索扩展名或 MIME 类型...">
        <button class="btn btn-secondary" id="clearSearchBtn">清空</button>
      </div>
      <div style="max-height:400px; overflow-y:auto;">
        <table class="mime-table">
          <thead><tr><th>扩展名</th><th>MIME 类型</th></tr></thead>
          <tbody id="mimeTbody"></tbody>
        </table>
      </div>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var mimeSearch = document.getElementById('mimeSearch');
      var clearSearchBtn = document.getElementById('clearSearchBtn');
      var mimeTbody = document.getElementById('mimeTbody');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');

      var mimeData = [
        ['.html','text/html'],['.htm','text/html'],['.css','text/css'],['.js','text/javascript'],['.mjs','text/javascript'],
        ['.json','application/json'],['.xml','application/xml'],['.rss','application/rss+xml'],['.atom','application/atom+xml'],
        ['.txt','text/plain'],['.md','text/markdown'],['.csv','text/csv'],['.tsv','text/tab-separated-values'],
        ['.pdf','application/pdf'],['.doc','application/msword'],['.docx','application/vnd.openxmlformats-officedocument.wordprocessingml.document'],
        ['.xls','application/vnd.ms-excel'],['.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'],
        ['.ppt','application/vnd.ms-powerpoint'],['.pptx','application/vnd.openxmlformats-officedocument.presentationml.presentation'],
        ['.png','image/png'],['.jpg','image/jpeg'],['.jpeg','image/jpeg'],['.gif','image/gif'],['.svg','image/svg+xml'],
        ['.webp','image/webp'],['.ico','image/vnd.microsoft.icon'],['.bmp','image/bmp'],['.tiff','image/tiff'],['.avif','image/avif'],
        ['.mp3','audio/mpeg'],['.wav','audio/wav'],['.ogg','audio/ogg'],['.flac','audio/flac'],['.aac','audio/aac'],
        ['.mp4','video/mp4'],['.webm','video/webm'],['.avi','video/x-msvideo'],['.mov','video/quicktime'],['.mkv','video/x-matroska'],
        ['.woff','font/woff'],['.woff2','font/woff2'],['.ttf','font/ttf'],['.otf','font/otf'],['.eot','application/vnd.ms-fontobject'],
        ['.zip','application/zip'],['.tar','application/x-tar'],['.gz','application/gzip'],['.bz2','application/x-bzip2'],
        ['.7z','application/x-7z-compressed'],['.rar','application/vnd.rar'],
        ['.wasm','application/wasm'],['.manifest','application/manifest+json'],['.yaml','application/x-yaml'],['.yml','application/x-yaml'],
        ['.toml','application/toml'],['.env','text/plain'],['.sh','application/x-sh'],['.bat','application/x-bat'],
        ['.exe','application/x-msdownload'],['.dll','application/x-msdownload'],['.iso','application/x-iso9660-image'],
        ['.sql','text/plain'],['.py','text/x-python'],['.java','text/x-java'],['.cpp','text/x-c++'],['.c','text/x-c'],
        ['.go','text/x-go'],['.rs','text/x-rust'],['.rb','text/x-ruby'],['.php','text/x-php'],['.swift','text/x-swift'],
        ['.kt','text/x-kotlin'],['.ts','text/typescript'],['.tsx','text/typescript'],['.jsx','text/jsx'],
        ['.map','application/json'],['.dump','application/octet-stream'],['.bin','application/octet-stream']
      ];

      function render(filter) {
        mimeTbody.innerHTML = '';
        var match = filter ? filter.to小写() : '';
        var count = 0;
        for (var i = 0; i < mimeData.length; i++) {
          var row = mimeData[i];
          if (match && row[0].indexOf(match) === -1 && row[1].indexOf(match) === -1) continue;
          var tr = document.createElement('tr');
          tr.innerHTML = '<td class="ext">' + row[0] + '</td><td class="mime">' + row[1] + '</td>';
          mimeTbody.appendChild(tr);
          count++;
        }
        输出El.textContent = '共 ' + count + ' 条记录' + (match ? '（匹配 "' + filter + '"）' : '');
      }

      mimeSearch.addEventListener('input', function () { render(this.value); });

      clearSearchBtn.addEventListener('click', function () {
        mimeSearch.value = '';
        render('');
        mimeSearch.focus();
      });

      copyBtn.addEventListener('click', function () {
        var text = 输出El.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });

      render('');
    })();
  </script>
</body>
</html>
