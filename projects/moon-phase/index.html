<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Moon Phase - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.moon-visual{text-align:center;padding:var(--space-3);}
.moon-visual svg{display:block;margin:0 auto;}
.moon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:var(--space-2);margin-top:var(--space-3);}
.moon-item{border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2);text-align:center;}
.moon-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary);}
.moon-item .val{font-size:var(--font-size-lg);font-weight:600;font-family:var(--font-mono);}
.date-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:var(--space-3);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>月相计算器</h1><p class="tool-desc">Show current or any date moon phase with illumination percentage.</p>
<div class="card"><div class="date-row"><label style="font-size:var(--font-size-sm);">日期</label><input id="dateInput" class="input" type="date"><button id="todayBtn" class="btn btn-secondary">今天</button></div></div>
<div class="card"><div class="moon-visual"><svg id="moonSvg" width="200" height="200" viewBox="0 0 200 200"></svg></div>
<div style="text-align:center;margin-top:var(--space-2);"><span id="phaseName" style="font-size:var(--font-size-lg);font-weight:600;"></span><br><span id="illumPct" style="font-size:var(--font-size-sm);color:var(--color-text-secondary);"></span></div>
<div class="moon-grid"><div class="moon-item"><div class="lbl">New Moon</div><div class="val" id="nextNew">—</div></div><div class="moon-item"><div class="lbl">Full Moon</div><div class="val" id="nextFull">—</div></div><div class="moon-item"><div class="lbl">First Quarter</div><div class="val" id="nextFirstQ">—</div></div><div class="moon-item"><div class="lbl">Last Quarter</div><div class="val" id="nextLastQ">—</div></div></div></div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>
(function(){var di=document.getElementById('dateInput'),svg=document.getElementById('moonSvg'),pn=document.getElementById('phaseName'),ip=document.getElementById('illumPct'),o=document.getElementById('输出Text');
di.value=new Date().toISOString().slice(0,10);

function moonPhase(date){var d=new Date(date);if(isNaN(d.getTime()))return null;
var knownNew=new Date('2000-01-06T18:14:00Z');var millis=d.getTime()-knownNew.getTime();var days=millis/86400000;
var lunarDay=days%29.53058867;if(lunarDay<0)lunarDay+=29.53058867;
var phase=lunarDay/29.53058867;var illum=0.5*(1-Math.cos(2*Math.PI*phase));
var names=['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
var idx=Math.round(phase*8)%8;
return{phase:phase,illumination:illum*100,name:names[idx],index:idx,lunarDay:lunarDay};}

function drawMoon(phase){var cx=100,cy=100,r=90;var f=2*phase-1;
var lit=f>0?'#f5d742':'#1a1a2e';var dark=f>0?'#1a1a2e':'#f5d742';
if(Math.abs(f)<0.01){lit='#f5d742';dark='#1a1a2e';}
var d='M'+cx+','+(cy-r)+'A'+r+','+r+' 0 0,1 '+cx+','+(cy+r)+'A'+r+','+r+' 0 0,1 '+cx+','+(cy-r)+'Z';
var d2='M'+cx+','+(cy-r)+'A'+r+','+r+' 0 0,'+(f>0?0:1)+' '+cx+','+(cy+r)+'A'+Math.abs(f)*r+','+r+' 0 0,'+(f>0?1:0)+' '+cx+','+(cy-r)+'Z';
var svgContent='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="'+r+'" fill="'+dark+'"/>';
svgContent+='<path d="'+d2+'" fill="'+lit+'"/>';
var grad=svgContent+'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--color-border)" stroke-width="1"/>';
svg.innerHTML=grad;}

function nextPhase(date,type){var d=new Date(date);var knownNew=new Date('2000-01-06T18:14:00Z');var millis=d.getTime()-knownNew.getTime();var days=millis/86400000;
var targets={new:0,firstQ:7.382647,full:14.765294,lastQ:22.147941};
var target=targets[type]||0;var lunarDay=days%29.53058867;if(lunarDay<0)lunarDay+=29.53058867;
var diff=(target-lunarDay+29.53058867)%29.53058867;var next=new Date(d.getTime()+diff*86400000);
return next.toLocaleDateString('zh-CN');}

function update(){var val=di.value;if(!val){setStatus('Select a date','error');return;}
var mp=moonPhase(val);if(!mp){setStatus('Invalid date','error');return;}
drawMoon(mp.lunarDay/29.53058867);pn.textContent=mp.name;ip.textContent='Illumination: '+mp.illumination.toFixed(1)+'%';
var nNew=nextPhase(val,'new'),nFull=nextPhase(val,'full'),nFQ=nextPhase(val,'firstQ'),nLQ=nextPhase(val,'lastQ');
document.getElementById('nextNew').textContent=nNew;document.getElementById('nextFull').textContent=nFull;
document.getElementById('nextFirstQ').textContent=nFQ;document.getElementById('nextLastQ').textContent=nLQ;
o.textContent=mp.name+' ('+mp.illumination.toFixed(1)+'%)';}

document.getElementById('todayBtn').addEventListener('click',function(){di.value=new Date().toISOString().slice(0,10);update();});
di.addEventListener('change',update);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('Copied');}});
update();})();
</script></body></html>
