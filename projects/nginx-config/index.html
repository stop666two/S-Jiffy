<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Nginx 配置生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>Nginx 配置生成</h1><p class="tool-desc">生成 Nginx 反向代理/静态文件配置。</p><div class="card"><div class="row"><div><label>域名</label><input id="domain" class="input" value="example.com" style="width:180px"></div><div><label>模式</label><select id="mode" class="input" style="width:auto"><option value="static">静态站点</option><option value="proxy" selected>反向代理</option><option value="spa">SPA 应用</option></select></div></div>
<div class="row" id="proxyRow"><div><label>代理地址</label><input id="proxyTarget" class="input" value="http://localhost:3000" style="width:200px"></div></div>
<div class="row"><button id="generateBtn" class="btn btn-primary">生成</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var d=document.getElementById("domain"),m=document.getElementById("mode"),pr=document.getElementById("proxyRow"),pt=document.getElementById("proxyTarget"),o=document.getElementById("输出Text");
m.addEventListener("change",function(){pr.style.display=m.value==="static"?"none":"flex"});
document.getElementById("generateBtn").addEventListener("click",function(){var domain=d.value.trim(),mode=m.value,target=pt.value.trim();if(!domain){setStatus("请输入域名","error");return}
var cfg="server {\n    listen 80;\n    server_name "+domain+";\n    charset utf-8;\n\n";
if(mode==="proxy"){if(!target){setStatus("请输入代理地址","error");return}
cfg+="    location / {\n        proxy_pass "+target+";\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n"
}else if(mode==="spa"){cfg+="    root /var/www/"+domain+";\n    index index.html;\n\n    location / {\n        try_files $uri $uri/ /index.html;\n    }\n"
}else{cfg+="    root /var/www/"+domain+";\n    index index.html;\n\n    location / {\n        try_files $uri $uri/ =404;\n    }\n"}
cfg+="\n    location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {\n        expires 30d;\n        add_header Cache-Control \"public, immutable\";\n    }\n\n    gzip on;\n    gzip_types text/css application/javascript image/svg+xml;\n}"
o.textContent=cfg;setStatus("配置已生成")});
document.getElementById("clearBtn").addEventListener("click",function(){o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
