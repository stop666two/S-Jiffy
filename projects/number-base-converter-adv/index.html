<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>通用进制转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>通用进制转换</h1><p class="tool-desc">2-36 进制任意数字互相转换。</p><div class="card"><div class="row"><div style="flex:1"><label>输入数字</label><input id="inputNum" class="input" value="FF" style="width:100%"></div></div>
<div class="row"><div><label>输入进制</label><select id="fromBase" class="input" style="width:auto"><option value="2">二进制 (2)</option><option value="8">八进制 (8)</option><option value="10">十进制 (10)</option><option value="16" selected>十六进制 (16)</option><option value="36">三十六进制 (36)</option></select></div><div><label>输出进制</label><select id="toBase" class="input" style="width:auto"><option value="2">二进制 (2)</option><option value="8">八进制 (8)</option><option value="10" selected>十进制 (10)</option><option value="16">十六进制 (16)</option><option value="36">三十六进制 (36)</option></select></div><div style="display:flex;align-items:end;gap:8px"><button id="convertBtn" class="btn btn-primary">转换</button></div></div>
<div class="res-grid"><div class="res-item" style="grid-column:1/3"><div class="v" id="resultVal" style="font-size:16px;font-family:var(--font-mono)">—</div><div class="l">转换结果</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputNum"),fb=document.getElementById("fromBase"),tb=document.getElementById("toBase"),rv=document.getElementById("resultVal"),o=document.getElementById("输出Text");
document.getElementById("convertBtn").addEventListener("click",function(){var v=inp.value.trim(),f=parseInt(fb.value),t=parseInt(tb.value);if(!v){setStatus("请输入数字","error");return}
var dec=parseInt(v,f);if(isNaN(dec)){setStatus("无效的 "+f+" 进制数字","error");return}
var result=dec.toString(t).toUpperCase();rv.textContent=result;o.textContent=v+" ("+f+"进制) = "+result+" ("+t+"进制)";setStatus("转换完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
