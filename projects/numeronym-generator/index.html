<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numeronym 生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .example-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--space-3); }
    .example-tag { background: var(--color-bg-soft); border: 1px solid var(--color-border); border-radius: 9999px; padding: 4px 12px; font-size: var(--font-size-sm); cursor: pointer; transition: border-color 0.15s; }
    .example-tag:hover { border-color: var(--color-text-primary); }
    .结果-line { display: flex; align-items: center; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--color-border); }
    .结果-line:last-child { border-bottom: none; }
    .结果-original { font-size: var(--font-size-sm); color: var(--color-text-secondary); min-width: 200px; }
    .结果-arrow { color: var(--color-text-disabled); }
    .结果-numeronym { font-weight: 600; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>Numeronym 生成器</h1>
    <p class="tool-desc">将单词转换为 numeronym 缩写：首字母 + 中间字母数 + 尾字母，如 "internationalization" → "i18n"。</p>
    <div class="card" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="输入文本（每行一个单词）" style="min-height:100px;flex:1;"></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap;">
      <button id="generateBtn" class="btn btn-primary">转换</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="example-tags">
      <span class="example-tag" data-text="internationalization">i18n</span>
      <span class="example-tag" data-text="localization">l10n</span>
      <span class="example-tag" data-text="globalization">g11n</span>
      <span class="example-tag" data-text="accessibility">a11y</span>
      <span class="example-tag" data-text="personalization">p13n</span>
      <span class="example-tag" data-text="localization">L10N</span>
    </div>
    <div class="输出-box">
      <div id="输出Text" style="display:block;padding-right:60px;"></div>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputText');
    var 输出El = document.getElementById('输出Text');
    function toNumeronym(word) {
      word = word.trim();
      if (!word) return '';
      if (word.length <= 2) return word;
      var first = word[0];
      var last = word[word.length - 1];
      var middle = word.length - 2;
      return first + middle + last;
    }
    function convert() {
      var text = inputEl.value.trim();
      if (!text) { setStatus('请输入文本', 'error'); return; }
      var lines = text.split('\n');
      var html = '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;
        var numeronym = toNumeronym(line);
        html += '<div class="结果-line"><span class="结果-original">' + line + '</span><span class="结果-arrow">→</span><span class="结果-numeronym">' + numeronym + '</span></div>';
      }
      输出El.innerHTML = html;
      setStatus('转换完成');
    }
    document.getElementById('generateBtn').addEventListener('click', convert);
    document.getElementById('clearBtn').addEventListener('click', function() { inputEl.value = ''; 输出El.innerHTML = ''; setStatus(''); inputEl.focus(); });
    document.getElementById('copyBtn').addEventListener('click', function() {
      var texts = [];
      var lines = 输出El.querySelectorAll('.结果-line');
      for (var i = 0; i < lines.length; i++) {
        var numEl = lines[i].querySelector('.结果-numeronym');
        if (numEl) texts.push(numEl.textContent);
      }
      if (texts.length) { copyToClipboard(texts.join('\n'), this); setStatus('已复制'); }
    });
    var tags = document.querySelectorAll('.example-tag');
    for (var i = 0; i < tags.length; i++) {
      tags[i].addEventListener('click', function() {
        var t = inputEl.value.trim();
        inputEl.value = t ? t + '\n' + this.getAttribute('data-text') : this.getAttribute('data-text');
        convert();
      });
    }
  })();</script>
</body>
</html>
