<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>密码检测器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.inp-row{margin-bottom:var(--space-3)}.score-bar{height:8px;background:var(--color-border);border-radius:4px;overflow:hidden;margin:var(--space-2) 0}.score-bar .fill{height:100%;transition:width .3s,background .3s;border-radius:4px}.score-label{font-size:var(--font-size-sm);text-align:center;margin-bottom:var(--space-2)}.detail-list{list-style:none;padding:0;margin:var(--space-2) 0;font-size:var(--font-size-sm)}.detail-list li{padding:4px 0;display:flex;align-items:center;gap:8px}.detail-list .pass{color:var(--color-success)}.detail-list .fail{color:var(--color-error)}.detail-list .ic{width:16px;text-align:center}.checks-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:600px){.checks-grid{grid-template-columns:1fr}}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>密码检测器</h1><p class="tool-desc">检测密码强度：检查长度、字符种类、常见模式等。</p>
<div class="card">
<div class="inp-row"><input id="pwdInput" class="input" type="password" placeholder="输入要检测的密码..." style="font-size:20px"></div>
<div class="score-label" id="scoreLabel">等待输入</div>
<div class="score-bar"><div class="fill" id="scoreFill" style="width:0"></div></div>
<div class="checks-grid" id="checksGrid"></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById('pwdInput'),scoreLabel=document.getElementById('scoreLabel'),scoreFill=document.getElementById('scoreFill'),grid=document.getElementById('checksGrid'),out=document.getElementById('输出Text');var commonPasswords=['123456','password','12345678','qwerty','123456789','12345','1234','111111','1234567','sunshine','qwerty123','iloveyou','princess','admin','welcome','666666','abc123','football','123123','monkey','654321','!@#$%^&*','charlie','aa123456','donald','password1','qwerty12345','1q2w3e4r','qwertyuiop'];function getStrength(score){if(score>=80)return{label:'很强',color:'#346538'};if(score>=60)return{label:'强',color:'#558b2f'};if(score>=40)return{label:'中等',color:'#f9a825'};if(score>=20)return{label:'弱',color:'#ef6c00'};return{label:'极弱',color:'#c62828'}}function analyze(pwd){if(!pwd){scoreLabel.textContent='等待输入';scoreFill.style.width='0';scoreFill.style.background='var(--color-border)';grid.innerHTML='';out.textContent='';return}var checks=[];var score=0;var len=pwd.length;var hasLower=/[a-z]/.test(pwd);var hasUpper=/[A-Z]/.test(pwd);var hasDigit=/\d/.test(pwd);var hasSpecial=/[^a-zA-Z\d]/.test(pwd);var hasRepeats=/(.)\1{2,}/.test(pwd);var isCommon=commonPasswords.indexOf(pwd.to小写())!==-1;var isSeq=/^(?:123|234|345|456|567|678|789|890|abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz|qwe|wer|ert|rty|tyu|yui|uio|iop|asd|sdf|dfg|fgh|ghj|hjk|jkl|zxc|xcv|cvb|vbn|bnm)/i.test(pwd);if(len>=8)checks.push({pass:true,text:'长度 ≥ 8 ('+len+'字符)'});else checks.push({pass:false,text:'长度 ≥ 8 (当前'+len+'字符)'});if(len>=12)score+=20;else if(len>=8)score+=10;else score+=Math.max(0,(len-4)*2);checks.push({pass:hasLower,text:'包含小写字母'});if(hasLower)score+=10;checks.push({pass:hasUpper,text:'包含大写字母'});if(hasUpper)score+=15;checks.push({pass:hasDigit,text:'包含数字'});if(hasDigit)score+=10;checks.push({pass:hasSpecial,text:'包含特殊字符'});if(hasSpecial)score+=20;if(hasLower&&hasUpper&&hasDigit)score+=10;if(hasLower&&hasUpper&&hasDigit&&hasSpecial)score+=15;if(hasRepeats){checks.push({pass:false,text:'存在重复字符 (如 aaa)'});score-=10}if(isCommon){checks.push({pass:false,text:'常见密码，极不安全'});score=Math.min(score,10)}if(isSeq){checks.push({pass:false,text:'存在连续字符模式'});score-=5}if(len>12&&hasLower&&hasUpper&&hasDigit&&hasSpecial&&!hasRepeats&&!isCommon){checks.push({pass:true,text:'推荐: 混合大小写 + 数字 + 符号 + 长度 > 12'})}score=Math.max(0,Math.min(100,score));var strength=getStrength(score);scoreLabel.textContent='强度: '+strength.label+' ('+score+'/100)';scoreFill.style.width=score+'%';scoreFill.style.background=strength.color;grid.innerHTML='';for(var i=0;i<checks.length;i++){var chk=checks[i];var div=document.createElement('div');div.style.fontSize='var(--font-size-sm)';div.style.padding='4px 0';div.innerHTML=(chk.pass?'<span style="color:var(--color-success)">✓</span> ':'<span style="color:var(--color-error)">✗</span> ')+chk.text;grid.appendChild(div)}out.textContent='安全评分: '+score+'/100 - '+strength.label}inp.addEventListener('input',function(){analyze(this.value)});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
