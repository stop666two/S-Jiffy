<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .strength-bar { height:6px; border-radius:3px; background:var(--color-border); margin:8px 0; overflow:hidden; }
    .strength-fill { height:100%; border-radius:3px; transition:width .3s, background .3s; width:0; }
    .pw-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .pw-row label { font-size:var(--font-size-sm); color:var(--color-text-secondary); white-space:nowrap; }
    .pw-val { font-family:var(--font-mono); font-size:var(--font-size-lg); letter-spacing:2px; word-break:break-all; padding:8px 0; }
    .strength-label { font-size:var(--font-size-xs); font-family:var(--font-mono); }
    .meter-wrap { flex:1; min-width:120px; }
    .range-wrap { display:flex; align-items:center; gap:8px; }
    .range-wrap input[type=range] { flex:1; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>密码生成器</h1>
    <p class="tool-desc">可配置字符集、强度指示、排除相似字符的强密码生成。</p>

    <div class="card">
      <div class="pw-row" style="margin-bottom:12px;">
        <label>密码</label>
        <div style="flex:1;font-family:var(--font-mono);font-size:var(--font-size-lg);letter-spacing:2px;word-break:break-all;" id="passwordDisplay"></div>
        <button id="generateBtn" class="btn btn-primary">生成</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div style="display:flex;justify-content:space-between;">
        <span class="strength-label" id="strengthLabel">—</span>
        <span class="strength-label" id="entropyLabel">0 bit</span>
      </div>
    </div>

    <div class="card" style="display:flex; flex-direction:column; gap:12px;">
      <div class="range-wrap">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">长度 <span id="lenValue">16</span></label>
        <input id="lengthSlider" type="range" min="4" max="128" value="16" style="flex:1;">
      </div>
      <div class="pw-row">
        <label style="display:flex;align-items:center;gap:4px;font-size:var(--font-size-sm);cursor:pointer;"><input type="checkbox" id="chkUpper" checked> A-Z</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:var(--font-size-sm);cursor:pointer;"><input type="checkbox" id="chkLower" checked> a-z</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:var(--font-size-sm);cursor:pointer;"><input type="checkbox" id="chkDigits" checked> 0-9</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:var(--font-size-sm);cursor:pointer;"><input type="checkbox" id="chkSymbols"> !@#$%</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:var(--font-size-sm);cursor:pointer;"><input type="checkbox" id="chkSimilar"> 排除相似字符</label>
      </div>
      <div class="pw-row">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">最少数字</label>
        <input id="minDigits" class="input" type="number" value="1" min="0" max="20" style="width:70px;">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">最少符号</label>
        <input id="minSymbols" class="input" type="number" value="0" min="0" max="20" style="width:70px;">
      </div>
    </div>

    <div class="output-box" id="outputContainer">
      <span id="outputText" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var pwDisplay = document.getElementById('passwordDisplay');
      var slider = document.getElementById('lengthSlider'), lenValue = document.getElementById('lenValue');
      var fill = document.getElementById('strengthFill'), sLabel = document.getElementById('strengthLabel'), eLabel = document.getElementById('entropyLabel');
      var chkU = document.getElementById('chkUpper'), chkL = document.getElementById('chkLower'), chkD = document.getElementById('chkDigits'), chkS = document.getElementById('chkSymbols'), chkSim = document.getElementById('chkSimilar');
      var minDig = document.getElementById('minDigits'), minSym = document.getElementById('minSymbols');
      var o = document.getElementById('outputText');
      var currentPassword = '';

      var upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      var lower = 'abcdefghijklmnopqrstuvwxyz';
      var digits = '0123456789';
      var symbols = '!@#$%^&*()-_=+[]{}|;:,.<>?';
      var similar = '0O1lI|';

      function shuffle(s) {
        var a = s.split('');
        for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = a[i]; a[i] = a[j]; a[j] = t; }
        return a.join('');
      }

      function calcEntropy(charsetSize, len) { return len * Math.log2(charsetSize); }

      function getStrength(entropy) {
        if (entropy < 30) return { label: '非常弱', pct: 10, color: '#9F2F2D' };
        if (entropy < 50) return { label: '弱', pct: 30, color: '#C75C3A' };
        if (entropy < 70) return { label: '中等', pct: 50, color: '#D4A72C' };
        if (entropy < 100) return { label: '强', pct: 75, color: '#4A7C3F' };
        return { label: '非常强', pct: 100, color: '#346538' };
      }

      function generateOne(len, chars, needDigits, needSym) {
        var dChars = digits, sChars = symbols;
        var mainChars = chars;
        for (var attempt = 0; attempt < 100; attempt++) {
          var arr = new Uint32Array(len);
          crypto.getRandomValues(arr);
          var result = '';
          for (var i = 0; i < len; i++) result += mainChars[arr[i] % mainChars.length];
          var dc = (result.match(/\d/g) || []).length;
          var sc = (result.match(/[!@#$%^&*()\-_=+\[\]{}|;:,.<>?]/g) || []).length;
          if (dc >= needDigits && sc >= needSym) return result;
        }
        var arr2 = new Uint32Array(len);
        crypto.getRandomValues(arr2);
        var r = '';
        for (var j = 0; j < len; j++) r += mainChars[arr2[j] % mainChars.length];
        return r;
      }

      function updateStrength(password, charsetSize) {
        var entropy = calcEntropy(charsetSize, password.length);
        var s = getStrength(entropy);
        fill.style.width = s.pct + '%';
        fill.style.background = s.color;
        sLabel.textContent = s.label;
        eLabel.textContent = entropy.toFixed(1) + ' bit';
      }

      function generate() {
        var chars = '';
        if (chkU.checked) chars += upper;
        if (chkL.checked) chars += lower;
        if (chkD.checked) chars += digits;
        if (chkS.checked) chars += symbols;
        if (chkSim.checked) {
          var filtered = '';
          for (var i = 0; i < chars.length; i++) { if (similar.indexOf(chars[i]) === -1) filtered += chars[i]; }
          chars = filtered;
        }
        if (!chars) { setStatus('请至少选择一种字符类型', 'error'); return; }
        var len = parseInt(slider.value) || 16;
        var needDigits = parseInt(minDig.value) || 0;
        var needSym2 = parseInt(minSym.value) || 0;
        if (needDigits + needSym2 > len) { setStatus('最少字符要求超过密码长度', 'error'); return; }
        var pw = generateOne(len, chars, needDigits, needSym2);
        currentPassword = pw;
        pwDisplay.textContent = pw;
        var cs = 0;
        if (chkU.checked) cs += 26;
        if (chkL.checked) cs += 26;
        if (chkD.checked) cs += 10;
        if (chkS.checked) cs += symbols.length;
        if (chkSim.checked) {
          for (var j = 0; j < similar.length; j++) { if (chars.indexOf(similar[j]) !== -1) cs--; }
        }
        updateStrength(pw, cs);
        o.textContent = pw;
        setStatus('密码已生成');
      }

      slider.addEventListener('input', function () { lenValue.textContent = this.value; });
      document.getElementById('generateBtn').addEventListener('click', generate);
      document.getElementById('copyBtn').addEventListener('click', function () {
        if (currentPassword) { copyToClipboard(currentPassword, this); setStatus('已复制'); if (o.textContent) generate(); }
      });
      generate();
    })();
  </script>
</body>
</html>
