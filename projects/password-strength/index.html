<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码强度分析 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .strength-bar { height: 8px; background: var(--color-border); border-radius: 9999px; overflow: hidden; margin: var(--space-2) 0; }
    .strength-fill { height: 100%; border-radius: 9999px; transition: width 0.3s, background 0.3s; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: var(--space-2); margin-top: var(--space-2); }
    .info-item { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-1) var(--space-2); }
    .info-item label { font-size: var(--font-size-xs); color: var(--color-text-secondary); display: block; }
    .info-item span { font-size: var(--font-size-sm); font-weight: 500; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>密码强度分析</h1>
    <p class="tool-desc">实时分析密码强度：字符集、熵值、破解时间、综合评分。</p>
    <div class="card">
      <input id="passwordInput" class="input js-focus-input" type="password" placeholder="输入密码..." autocomplete="off" style="font-size:16px;letter-spacing:2px;">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%;background:var(--color-border);"></div></div>
      <div style="text-align:right;font-size:var(--font-size-sm);color:var(--color-text-secondary);"><span id="scoreText">等待输入</span></div>
    </div>
    <div class="info-grid">
      <div class="info-item"><label>长度</label><span id="infoLength">0</span></div>
      <div class="info-item"><label>字符集大小</label><span id="infoCharset">0</span></div>
      <div class="info-item"><label>熵值 (bits)</label><span id="infoEntropy">0</span></div>
      <div class="info-item"><label>破解时间 (离线)</label><span id="infoCrackTime">-</span></div>
      <div class="info-item"><label>包含小写</label><span id="infoLower">否</span></div>
      <div class="info-item"><label>包含大写</label><span id="infoUpper">否</span></div>
      <div class="info-item"><label>包含数字</label><span id="infoDigit">否</span></div>
      <div class="info-item"><label>包含符号</label><span id="infoSymbol">否</span></div>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('passwordInput');
    var fillEl = document.getElementById('strengthFill');
    var scoreEl = document.getElementById('scoreText');
    var infoLength = document.getElementById('infoLength');
    var infoCharset = document.getElementById('infoCharset');
    var infoEntropy = document.getElementById('infoEntropy');
    var infoCrackTime = document.getElementById('infoCrackTime');
    var infoLower = document.getElementById('infoLower');
    var infoUpper = document.getElementById('infoUpper');
    var infoDigit = document.getElementById('infoDigit');
    var infoSymbol = document.getElementById('infoSymbol');
    function analyze(pwd) {
      var len = pwd.length;
      var hasLower = /[a-z]/.test(pwd);
      var hasUpper = /[A-Z]/.test(pwd);
      var hasDigit = /[0-9]/.test(pwd);
      var hasSymbol = /[^a-zA-Z0-9]/.test(pwd);
      var charsetSize = 0;
      if (hasLower) charsetSize += 26;
      if (hasUpper) charsetSize += 26;
      if (hasDigit) charsetSize += 10;
      if (hasSymbol) charsetSize += 32;
      var entropy = len > 0 && charsetSize > 0 ? len * Math.log2(charsetSize) : 0;
      var crackTime = '';
      if (entropy > 0) {
        var guessesPerSec = 10000000000;
        var seconds = Math.pow(2, entropy) / guessesPerSec;
        if (seconds < 1) { crackTime = '瞬间'; }
        else if (seconds < 60) { crackTime = Math.ceil(seconds) + ' 秒'; }
        else if (seconds < 3600) { crackTime = Math.ceil(seconds / 60) + ' 分钟'; }
        else if (seconds < 86400) { crackTime = Math.ceil(seconds / 3600) + ' 小时'; }
        else if (seconds < 31536000) { crackTime = Math.ceil(seconds / 86400) + ' 天'; }
        else if (seconds < 315360000) { crackTime = Math.ceil(seconds / 31536000) + ' 年'; }
        else { crackTime = '∞ (极强)'; }
      } else { crackTime = '-'; }
      var score = 0;
      if (len >= 8) score += 20;
      if (len >= 12) score += 10;
      if (len >= 16) score += 10;
      if (hasLower && hasUpper) score += 15;
      if (hasDigit) score += 10;
      if (hasSymbol) score += 15;
      if (len >= 8 && hasLower && hasUpper && hasDigit) score += 10;
      if (len >= 10 && hasLower && hasUpper && hasDigit && hasSymbol) score += 10;
      score = Math.min(100, score);
      return { len: len, hasLower: hasLower, hasUpper: hasUpper, hasDigit: hasDigit, hasSymbol: hasSymbol, charsetSize: charsetSize, entropy: entropy, crackTime: crackTime, score: score };
    }
    function update() {
      var pwd = inputEl.value;
      var r = analyze(pwd);
      infoLength.textContent = r.len;
      infoCharset.textContent = r.charsetSize;
      infoEntropy.textContent = r.entropy.toFixed(1);
      infoCrackTime.textContent = r.crackTime;
      infoLower.textContent = r.hasLower ? '是' : '否';
      infoUpper.textContent = r.hasUpper ? '是' : '否';
      infoDigit.textContent = r.hasDigit ? '是' : '否';
      infoSymbol.textContent = r.hasSymbol ? '是' : '否';
      fillEl.style.width = r.score + '%';
      if (r.score < 30) { fillEl.style.background = '#9F2F2D'; scoreEl.textContent = '弱 - ' + r.score + '/100'; }
      else if (r.score < 60) { fillEl.style.background = '#B8860B'; scoreEl.textContent = '中等 - ' + r.score + '/100'; }
      else if (r.score < 80) { fillEl.style.background = '#346538'; scoreEl.textContent = '强 - ' + r.score + '/100'; }
      else { fillEl.style.background = '#1B5E20'; scoreEl.textContent = '非常强 - ' + r.score + '/100'; }
    }
    inputEl.addEventListener('input', update);
    update();
  })();</script>
</body>
</html>
