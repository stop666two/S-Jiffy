<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>随机手机号生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.preset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}.preset-btn{padding:10px;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);cursor:pointer;text-align:center;font-size:13px;transition:all .15s}.preset-btn:hover{border-color:var(--color-text-primary);background:var(--color-bg-soft)}.preset-btn .code{font-weight:600;font-size:15px}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>电话号码生成</h1><p class="tool-desc">按国家/地区代码生成随机手机号码，支持批量生成。</p>
<div class="card">
<div class="preset-grid" id="presetGrid"></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">
<select id="countrySelect" class="input" style="width:auto;min-width:180px;height:48px;padding:0 12px;"></select>
<input id="countInput" class="input" type="number" value="5" min="1" max="100" style="width:80px;text-align:center;">
<button id="generateBtn" class="btn btn-primary">生成</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var countries=[
{code:"+86",name:"中国",format:"1[3-9]XXXXXXXX"},{code:"+1",name:"美国/加拿大",format:"[2-9]XX XXX XXXX"},{code:"+44",name:"英国",format:"7XXX XXXXXX"},{code:"+81",name:"日本",format:"[7-9]0 XXXX XXXX"},{code:"+82",name:"韩国",format:"10 XXXX XXXX"},{code:"+91",name:"印度",format:"[6-9]XXXXXXXXX"},{code:"+49",name:"德国",format:"1XX XXXXXXXX"},{code:"+33",name:"法国",format:"6 XX XX XX XX"},{code:"+39",name:"意大利",format:"3XX XXX XXXX"},{code:"+55",name:"巴西",format:"[6-9]9 XXXX XXXX"},{code:"+7",name:"俄罗斯",format:"9XX XXX XX XX"},{code:"+61",name:"澳大利亚",format:"4XX XXX XXX"},{code:"+62",name:"印度尼西亚",format:"8XX XXXX XXXX"},{code:"+63",name:"菲律宾",format:"9XX XXX XXXX"},{code:"+66",name:"泰国",format:"[6-9]X XXXX XXXX"},{code:"+84",name:"越南",format:"[3-9]X XXXXXXX"},{code:"+60",name:"马来西亚",format:"1X-XXX XXXX"},{code:"+65",name:"新加坡",format:"8XXX XXXX"},{code:"+31",name:"荷兰",format:"6 XXXXXXXX"},{code:"+46",name:"瑞典",format:"7X-XXX XX XX"},{code:"+41",name:"瑞士",format:"7X XXX XX XX"},{code:"+34",name:"西班牙",format:"6XX XXX XXX"},{code:"+351",name:"葡萄牙",format:"9XX XXX XXX"},{code:"+30",name:"希腊",format:"69X XXXX XXXX"},{code:"+90",name:"土耳其",format:"5XX XXX XX XX"},{code:"+27",name:"南非",format:"[6-8]X XXX XXXX"},{code:"+52",name:"墨西哥",format:"1XX XXX XXXX"},{code:"+54",name:"阿根廷",format:"11 XXXX XXXX"},{code:"+56",name:"智利",format:"9 XXXX XXXX"},{code:"+64",name:"新西兰",format:"2X XXX XXXX"}
];
var countrySelect=document.getElementById('countrySelect');
var countInput=document.getElementById('countInput');
var generateBtn=document.getElementById('generateBtn');
var clearBtn=document.getElementById('clearBtn');
var 输出El=document.getElementById('输出Text');
var copyBtn=document.getElementById('copyBtn');
var presetGrid=document.getElementById('presetGrid');

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function generatePhone(countryCode){
if(countryCode==='+86'){
var second=rand(3,9);
var rest='';
for(var i=0;i<9;i++)rest+=rand(0,9);
return '+86 1'+second+rest;
}
if(countryCode==='+1'){
var area=rand(200,999);
var pre=rand(100,999);
var line=rand(1000,9999);
return '+1 ('+area+') '+pre+'-'+line;
}
if(countryCode==='+44'){
return '+44 7'+rand(0,9)+rand(0,9)+rand(0,9)+' '+rand(100,999)+' '+rand(100,999);
}
if(countryCode==='+81'){
return '+81 '+rand(70,90)+'-'+rand(1000,9999)+'-'+rand(1000,9999);
}
if(countryCode==='+82'){
return '+82 10-'+rand(1000,9999)+'-'+rand(1000,9999);
}
if(countryCode==='+91'){
var s='+91 ';
for(var i=0;i<10;i++)s+=rand(6,9);
return s;
}
if(countryCode==='+49'){
return '+49 1'+rand(50,99)+' '+rand(1000000,9999999);
}
if(countryCode==='+33'){
return '+33 6 '+rand(10,99)+' '+rand(10,99)+' '+rand(10,99)+' '+rand(10,99);
}
if(countryCode==='+62'){
return '+62 8'+rand(11,99)+'-'+rand(1000,9999)+'-'+rand(1000,9999);
}
if(countryCode==='+65'){
return '+65 '+rand(8000,9999)+' '+rand(1000,9999);
}
var s=countryCode+' ';
var digits=8+rand(0,3);
for(var i=0;i<digits;i++)s+=rand(0,9);
return s;
}

function generate(){
var idx=countrySelect.value;
var c=countries[parseInt(idx)];
var count=parseInt(countInput.value)||5;
if(count<1)count=1;if(count>100)count=100;
var lines=[];
for(var i=0;i<count;i++)lines.push(generatePhone(c.code));
输出El.textContent=lines.join('\n');
setStatus('生成 '+count+' 个 '+c.name+' 号码');
}

function populateSelect(){
var html='';
for(var i=0;i<countries.length;i++){
html+='<option value="'+i+'">'+countries[i].code+' '+countries[i].name+'</option>';
}
countrySelect.innerHTML=html;
}

function populatePresets(){
var html='';
for(var i=0;i<Math.min(countries.length,12);i++){
(function(idx){
var c=countries[idx];
html+='<div class="preset-btn" data-idx="'+idx+'"><div class="code">'+c.code+'</div><div style="font-size:11px;color:var(--color-text-secondary)">'+c.name+'</div></div>';
})(i);
}
presetGrid.innerHTML=html;
var btns=presetGrid.querySelectorAll('.preset-btn');
for(var i=0;i<btns.length;i++){
(function(el,idx){
el.addEventListener('click',function(){
countrySelect.value=idx;
generate();
});
})(btns[i],parseInt(btns[i].getAttribute('data-idx')));
}
}

generateBtn.addEventListener('click',generate);
clearBtn.addEventListener('click',function(){输出El.textContent='';setStatus('');});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
populateSelect();
populatePresets();
})();</script></body></html>
