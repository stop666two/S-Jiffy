      var best = null;
      for (var i = 0; i < countryCodes.length; i++) {
        var cc = countryCodes[i];
        if (digits.indexOf(cc.code) === 0) {
          if (!best || cc.code.length > best.code.length) { best = cc; }
        }
      }
      return best;
    }
    function parsePhone(raw) {
      var cleaned = raw.trim();
      var country = detectCountry(cleaned);
      var digits = cleaned.replace(/[^\d]/g, '');
      var hasPlus = cleaned.indexOf('+') !== -1;
      var nationalNumber = country ? digits.substr(country.code.length) : digits;
      return { raw: cleaned, digits: digits, hasPlus: hasPlus, country: country, nationalNumber: nationalNumber, isValid: hasPlus && country && nationalNumber.length >= 6 };

        { label: '国家或地区', val: d.country ? d.country.name : '-' },
        { label: '国内号码', val: d.nationalNumber || '-' },
        { label: '数字长度', val: d.digits.length + ' 位' }
      ];
      var html = '';
      for (var i = 0; i < items.length; i++) {
        html += '<div class="phone-item"><label>' + items[i].label + '</label><span>' + items[i].val + '</span></div>';
      }
      gridEl.innerHTML = html;
    }

      if (!raw) { setStatus('请输入电话号码', 'error'); render(null); return; }

      render(结果);
      setStatus(结果.isValid ? '解析完成' : '号码格式可能不完整');
