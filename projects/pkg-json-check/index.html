<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>package.json 分析 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:var(--space-2);margin-top:var(--space-2)}.stat-card{text-align:center;padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.stat-card .num{font-size:var(--font-size-xl);font-weight:700}.stat-card .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.warn-item{padding:8px;margin-top:6px;background:#fff8e1;border-radius:var(--radius-sm);font-size:13px;border-left:3px solid #f9a825}.err-item{padding:8px;margin-top:6px;background:#ffebee;border-radius:var(--radius-sm);font-size:13px;border-left:3px solid var(--color-error)}.ok-item{padding:8px;margin-top:6px;background:#e8f5e9;border-radius:var(--radius-sm);font-size:13px;border-left:3px solid var(--color-success)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>package.json 分析</h1><p class="tool-desc">分析和验证 package.json 文件内容</p>
<div class="card"><textarea id="jsonInput" class="input textarea" placeholder="粘贴 package.json 内容">{"name":"my-project","version":"1.0.0","dependencies":{"express":"^4.18.0","lodash":"^4.17.21"},"devDependencies":{"jest":"^29.0.0","eslint":"^8.0.0"},"peerDependencies":{"react":"^18.0.0"},"scripts":{"start":"node index.js","test":"jest"}}</textarea><button id="parseBtn" class="btn btn-primary" style="margin-top:var(--space-2)">分析</button></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var jsonInput=document.getElementById('jsonInput'),parseBtn=document.getElementById('parseBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function countDeps(obj){if(!obj||typeof obj!=='object')return 0;return Object.keys(obj).length}function analyze(){var raw=jsonInput.value.trim();if(!raw){setStatus('请粘贴 package.json 内容','error');return}var pkg;try{pkg=JSON.parse(raw)}catch(e){outputText.innerHTML='<div class="err-item">JSON 解析错误: '+htmlEscape(e.message)+'</div>';return}var name=pkg.name||'(未设置)';var ver=pkg.version||'(未设置)';var deps=countDeps(pkg.dependencies);var devDeps=countDeps(pkg.devDependencies);var peerDeps=countDeps(pkg.peerDependencies);var optDeps=countDeps(pkg.optionalDependencies);var scripts=countDeps(pkg.scripts);var total=deps+devDeps+peerDeps+optDeps;var html='<div class="stat-grid">';html+='<div class="stat-card"><div class="num">'+total+'</div><div class="lbl">总依赖</div></div>';html+='<div class="stat-card"><div class="num">'+deps+'</div><div class="lbl">dependencies</div></div>';html+='<div class="stat-card"><div class="num">'+devDeps+'</div><div class="lbl">devDependencies</div></div>';html+='<div class="stat-card"><div class="num">'+peerDeps+'</div><div class="lbl">peerDependencies</div></div>';html+='<div class="stat-card"><div class="num">'+optDeps+'</div><div class="lbl">optionalDependencies</div></div>';html+='<div class="stat-card"><div class="num">'+scripts+'</div><div class="lbl">scripts</div></div>';html+='</div>';html+='<div style="margin-top:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)"><div style="font-size:13px"><strong>名称:</strong> '+htmlEscape(name)+'</div><div style="font-size:13px"><strong>版本:</strong> '+htmlEscape(ver)+'</div></div>';var warnings=[];if(!pkg.license)warnings.push({type:'warn',msg:'缺少 license 字段'});if(!pkg.description)warnings.push({type:'warn',msg:'缺少 description 字段'});if(!pkg.repository)warnings.push({type:'warn',msg:'缺少 repository 字段'});if(deps===0&&devDeps===0)warnings.push({type:'warn',msg:'未定义任何依赖'});if(pkg.scripts){var s=pkg.scripts;if(!s.start)warnings.push({type:'warn',msg:'缺少 start 脚本'});if(!s.test)warnings.push({type:'warn',msg:'缺少 test 脚本'});}if(warnings.length){html+='<div style="margin-top:var(--space-2)"><strong style="font-size:13px">检查结果:</strong>';for(var i=0;i<warnings.length;i++){var cls=warnings[i].type==='warn'?'warn-item':'err-item';html+='<div class="'+cls+'">'+htmlEscape(warnings[i].msg)+'</div>'}html+='</div>'}else{html+='<div class="ok-item" style="margin-top:var(--space-2)">✓ 所有基本字段齐全</div>'}outputText.innerHTML=html;setStatus('分析完成')}parseBtn.addEventListener('click',analyze);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
