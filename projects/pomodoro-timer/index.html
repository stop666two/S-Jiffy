<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>番茄钟 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.timer-display{font-size:72px;font-family:var(--font-mono);text-align:center;padding:var(--space-4) 0;font-weight:600;letter-spacing:4px}.phase-label{text-align:center;font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-bottom:var(--space-2)}.ctrl-row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.ctrl-row .btn{min-width:100px}.progress-bar{height:4px;background:var(--color-border);border-radius:2px;margin:var(--space-3) 0;overflow:hidden}.progress-bar .fill{height:100%;background:var(--color-text-primary);transition:width .5s;width:0}.settings-row{display:flex;justify-content:center;gap:var(--space-3);flex-wrap:wrap;margin-top:var(--space-3);padding-top:var(--space-3);border-top:1px solid var(--color-border)}.settings-row label{font-size:var(--font-size-sm);display:flex;align-items:center;gap:6px}.settings-row input{width:60px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>番茄钟</h1><p class="tool-desc">25 分钟专注工作 + 5 分钟休息的番茄钟计时器。</p>
<div class="card">
<div class="phase-label" id="phaseLabel">工作时间</div>
<div class="timer-display" id="timerDisplay">25:00</div>
<div class="progress-bar"><div class="fill" id="progressFill"></div></div>
<div class="ctrl-row"><button id="startBtn" class="btn btn-primary">开始</button><button id="pauseBtn" class="btn btn-secondary">暂停</button><button id="resetBtn" class="btn btn-secondary">重置</button></div>
<div class="settings-row"><label>工作时间 <input id="workMin" class="input" type="number" value="25" min="1" max="120"></label><label>休息时间 <input id="breakMin" class="input" type="number" value="5" min="1" max="60"></label></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var timerEl=document.getElementById('timerDisplay'),phaseEl=document.getElementById('phaseLabel'),fillEl=document.getElementById('progressFill'),workInp=document.getElementById('workMin'),breakInp=document.getElementById('breakMin'),startBtn=document.getElementById('startBtn'),pauseBtn=document.getElementById('pauseBtn'),resetBtn=document.getElementById('resetBtn'),out=document.getElementById('输出Text');var totalSecs=25*60,remaining=totalSecs,isWork=true,running=false,interval;function formatTime(s){var m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')}function updateDisplay(){timerEl.textContent=formatTime(remaining);var pct=((totalSecs-remaining)/totalSecs)*100;fillEl.style.width=Math.min(pct,100)+'%';phaseEl.textContent=isWork?'工作时间':'休息时间'}function tick(){remaining--;if(remaining<=0){clearInterval(interval);running=false;isWork=!isWork;totalSecs=(isWork?parseInt(workInp.value):parseInt(breakInp.value))*60;remaining=totalSecs;updateDisplay();startBtn.textContent='开始';out.textContent=(isWork?'工作':'休息')+'周期完成！';var phrase=isWork?'工作':'休息';setStatus(phrase+'时间开始');if(isWork){navigator.Notification&&Notification.permission==='granted'&&new Notification('S-Jiffy 番茄钟',{body:'工作时间开始！'})}}updateDisplay()}function start(){if(running)return;if(remaining<=0){totalSecs=(isWork?parseInt(workInp.value):parseInt(breakInp.value))*60;remaining=totalSecs}running=true;startBtn.textContent='运行中';interval=setInterval(tick,1000);updateDisplay();setStatus('计时开始')}function pause(){if(!running)return;clearInterval(interval);running=false;startBtn.textContent='继续';setStatus('已暂停')}function reset(){clearInterval(interval);running=false;isWork=true;totalSecs=parseInt(workInp.value)*60;remaining=totalSecs;startBtn.textContent='开始';updateDisplay();setStatus('已重置')}startBtn.addEventListener('click',start);pauseBtn.addEventListener('click',pause);resetBtn.addEventListener('click',reset);workInp.addEventListener('change',function(){if(!running){totalSecs=parseInt(this.value)*60;remaining=totalSecs;updateDisplay()}});breakInp.addEventListener('change',function(){if(!running){updateDisplay()}});updateDisplay();if(navigator.Notification&&Notification.permission==='default'){Notification.requestPermission()}out.textContent='点击"开始"启动番茄钟';document.getElementById('copyBtn').addEventListener('click',function(){var t=timerEl.textContent+'-'+phaseEl.textContent;copyToClipboard(t,this);setStatus('已复制')})})();</script></body></html>
