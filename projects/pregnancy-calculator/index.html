<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>预产期计算 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>预产期计算</h1><p class="tool-desc">根据末次月经计算预产期和孕周。</p><div class="card"><div class="row"><div><label>末次月经第一日</label><input id="lmp" class="input" type="date" style="width:auto"></div><div><label>周期 (天)</label><input id="cycle" class="input" type="number" value="28" min="21" max="42"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="eddVal">—</div><div class="l">预产期</div></div><div class="res-item"><div class="v" id="weekVal">—</div><div class="l">当前孕周</div></div><div class="res-item"><div class="v" id="dayVal">—</div><div class="l">已怀孕天数</div></div><div class="res-item"><div class="v" id="remainVal">—</div><div class="l">剩余天数</div></div><div class="res-item" style="grid-column:1/3"><div class="v" id="trimesterVal" style="font-size:16px">—</div><div class="l">孕三期</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var l=document.getElementById("lmp"),cy=document.getElementById("cycle"),ev=document.getElementById("eddVal"),wv=document.getElementById("weekVal"),dv=document.getElementById("dayVal"),rv=document.getElementById("remainVal"),tv=document.getElementById("trimesterVal"),o=document.getElementById("输出Text");
l.valueAsDate=new Date();l.valueAsDate.setMonth(l.valueAsDate.getMonth()-3);
document.getElementById("calcBtn").addEventListener("click",function(){var d=l.valueAsDate;if(!d){setStatus("请选择日期","error");return}
var cycle=parseInt(cy.value)||28;var adj=(cycle-28);var edd=new Date(d);edd.setDate(edd.getDate()+280+adj);var now=new Date();var daysPreg=Math.round((now-d)/(24*60*60*1000));var weeks=Math.floor(daysPreg/7);var remain=280+adj-daysPreg;
var options={year:"numeric",month:"long",day:"numeric"};ev.textContent=edd.toLocaleDateString("zh-CN",options);wv.textContent=weeks+" 周";dv.textContent=daysPreg+" 天";rv.textContent=Math.max(0,remain)+" 天";
var tri=weeks<14?"第一孕期 (1-13周)":weeks<28?"第二孕期 (14-27周)":"第三孕期 (28-40周)";tv.textContent=tri;o.textContent="预产期: "+edd.toLocaleDateString("zh-CN",options)+" | 孕"+weeks+"周 | 剩余"+Math.max(0,remain)+"天";setStatus("计算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
