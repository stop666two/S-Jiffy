<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>质数检测器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .result-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2); margin-top:var(--space-2); }
    .result-item { padding:var(--space-2); background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-sm); }
    .result-item label { font-size:var(--font-size-xs); color:var(--color-text-disabled); display:block; }
    .result-item span { font-size:var(--font-size-sm); font-family:var(--font-mono); word-break:break-all; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>质数检测器</h1>
    <p class="tool-desc">检测质数、分解质因数、查找最近质数。</p>
    <div class="card" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <input id="numInput" class="input js-focus-input" type="number" placeholder="输入整数" style="width:220px;">
      <button id="checkBtn" class="btn btn-primary">检测</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div id="resultBox" class="output-box" style="min-height:200px;">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var input = document.getElementById('numInput'), o = document.getElementById('outputText');
      var checkBtn = document.getElementById('checkBtn'), clearBtn = document.getElementById('clearBtn'), copyBtn = document.getElementById('copyBtn');

      function isPrime(n) {
        if (n < 2) return false;
        if (n === 2) return true;
        if (n % 2 === 0) return false;
        var limit = Math.floor(Math.sqrt(n));
        for (var i = 3; i <= limit; i += 2) { if (n % i === 0) return false; }
        return true;
      }

      function factorize(n) {
        var factors = [], num = n;
        for (var i = 2; i * i <= num; i++) {
          while (num % i === 0) { factors.push(i); num /= i; }
        }
        if (num > 1) factors.push(num);
        return factors;
      }

      function nearestPrimes(n) {
        var prev = n - 1, next = n + 1;
        while (prev >= 2 && !isPrime(prev)) prev--;
        while (!isPrime(next)) next++;
        return { prev: prev >= 2 ? prev : null, next: next };
      }

      function getFactors(n) {
        var factors = [];
        for (var i = 1; i <= Math.floor(Math.sqrt(n)); i++) {
          if (n % i === 0) { factors.push(i); if (i !== n / i) factors.push(n / i); }
        }
        return factors.sort(function (a, b) { return a - b; });
      }

      function update() {
        var raw = input.value.trim();
        if (!raw) { o.innerHTML = ''; setStatus(''); return; }
        var num = parseInt(raw, 10);
        if (isNaN(num) || num < 1) { o.innerHTML = '<span style="color:var(--color-error)">请输入正整数</span>'; setStatus('输入无效', 'error'); return; }

        var prime = isPrime(num);
        var factors = factorize(num);
        var allFactors = getFactors(num);
        var nearest = nearestPrimes(num);
        var factorStr = factors.length ? factors.join(' × ') : '（无）';

        var html = '<div class="result-grid">';
        html += '<div class="result-item"><label>检测结果</label><span style="font-size:var(--font-size-base);font-weight:600;color:' + (prime ? 'var(--color-success)' : 'var(--color-error)') + '">' + (prime ? '是质数' : '不是质数') + '</span></div>';
        html += '<div class="result-item"><label>质因数分解</label><span>' + raw + ' = ' + factorStr + '</span></div>';
        html += '<div class="result-item"><label>因数数量</label><span>' + allFactors.length + ' 个</span></div>';
        html += '<div class="result-item"><label>所有因数</label><span>' + allFactors.join(', ') + '</span></div>';
        html += '<div class="result-item"><label>前一个质数</label><span>' + (nearest.prev !== null ? nearest.prev : '无') + '</span></div>';
        html += '<div class="result-item"><label>后一个质数</label><span>' + nearest.next + '</span></div>';
        html += '</div>';
        o.innerHTML = html;
        setStatus('');
      }

      checkBtn.addEventListener('click', update);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') update(); });
      clearBtn.addEventListener('click', function () { input.value = ''; o.innerHTML = ''; setStatus(''); input.focus(); });
      copyBtn.addEventListener('click', function () { if (o.textContent) { copyToClipboard(o.textContent, copyBtn); setStatus('已复制'); } });
    })();
  </script>
</body>
</html>
