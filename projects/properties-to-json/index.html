<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Properties → JSON - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.action-bar{display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap;align-items:center;}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Properties → JSON</h1><p class="tool-desc">将 Java .properties 格式文件转换为 JSON 对象。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="# Database Configuration&#10;db.host=localhost&#10;db.port=3306&#10;db.name=myapp&#10;app.name=My Application&#10;app.debug=true&#10;app.version=1.0.0" style="min-height:160px;"></textarea></div>
<div class="action-bar">
<button id="convertBtn" class="btn btn-primary">转换到 JSON</button>
<label style="font-size:var(--font-size-sm);display:flex;align-items:center;gap:4px;"><input id="nestKeys" type="checkbox" checked> 嵌套键</label>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var i=document.getElementById('inputText'),o=document.getElementById('outputText');
var nest=document.getElementById('nestKeys');
function parseProperties(text){
  var result={};var lines=text.split('\n');
  for(var li=0;li<lines.length;li++){
    var line=lines[li].trim();
    if(!line||line.charAt(0)==='#'||line.charAt(0)==='!')continue;
    var eqIdx=line.indexOf('=');
    if(eqIdx===-1)eqIdx=line.indexOf(':');
    if(eqIdx===-1)continue;
    var key=line.substring(0,eqIdx).trim();
    var val=line.substring(eqIdx+1).trim();
    val=val.replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\:/g,':').replace(/\\=/g,'=').replace(/\\\\/g,'\\');
    if(nest.checked){
      var parts=key.split('.');
      var cur=result;
      for(var pi=0;pi<parts.length;pi++){
        var p=parts[pi];
        if(pi===parts.length-1){cur[p]=val;}
        else{if(!cur[p]||typeof cur[p]!=='object')cur[p]={};cur=cur[p];}
      }
    }else{result[key]=val;}
  }
  return result;
}
document.getElementById('convertBtn').addEventListener('click',function(){
  var text=i.value;if(!text.trim()){setStatus('请输入 .properties 内容','error');return;}
  try{
    var parsed=parseProperties(text);
    var keys=Object.keys(parsed);
    o.textContent=JSON.stringify(parsed,null,2);
    setStatus('已转换 '+keys.length+' 个属性');
  }catch(e){o.textContent='';setStatus('解析失败: '+e.message,'error');}
});
document.getElementById('clearBtn').addEventListener('click',function(){i.value='';o.textContent='';setStatus('');i.focus();});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
})();</script>
</body></html>
