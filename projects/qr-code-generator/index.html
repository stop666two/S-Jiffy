<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 码生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    #qrcode { display:inline-block; padding:var(--space-2); background:#fff; border:1px solid var(--color-border); border-radius:var(--radius-md); }
    #qrcode img, #qrcode canvas { display:block; }
    .qr-options { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
    .qr-options label { font-size:var(--font-size-sm); color:var(--color-text-secondary); white-space:nowrap; }
    .qr-options input[type=color] { width:40px; height:40px; border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:2px; cursor:pointer; background:none; }
    .qr-size-btns { display:flex; gap:4px; }
    .qr-size-btn { padding:4px 16px; font-size:var(--font-size-sm); border:1px solid var(--color-border); border-radius:var(--radius-sm); background:transparent; cursor:pointer; font-family:var(--font-mono); }
    .qr-size-btn.active { background:var(--color-text-primary); color:#fff; border-color:var(--color-text-primary); }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>QR 码生成器</h1>
    <p class="tool-desc">从文本生成 QR 二维码，支持尺寸、颜色与纠错等级自定义。</p>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-3);">
        <input id="textInput" class="input js-focus-input" type="text" placeholder="输入文本或 URL..." style="flex:1;min-width:200px;">
        <button id="generateBtn" class="btn btn-primary">生成</button>
      </div>
      <div class="qr-options">
        <div>
          <label>尺寸</label>
          <div class="qr-size-btns">
            <button class="qr-size-btn" data-size="128">小</button>
            <button class="qr-size-btn active" data-size="256">中</button>
            <button class="qr-size-btn" data-size="512">大</button>
          </div>
        </div>
        <div>
          <label>纠错</label>
          <select id="eccSelect" class="input" style="width:auto;min-width:80px;">
            <option value="L">L (低)</option>
            <option value="M" selected>M (中)</option>
            <option value="Q">Q (较高)</option>
            <option value="H">H (高)</option>
          </select>
        </div>
        <div><label>前景</label><input id="fgColor" type="color" value="#000000"></div>
        <div><label>背景</label><input id="bgColor" type="color" value="#FFFFFF"></div>
      </div>
    </div>
    <div style="text-align:center;padding:var(--space-3) 0;">
      <div id="qrcode"></div>
      <div style="margin-top:var(--space-2);display:flex;gap:8px;justify-content:center;">
        <button id="downloadBtn" class="btn btn-secondary">下载 PNG</button>
      </div>
    </div>
    <div class="output-box" style="text-align:center;">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制链接</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var textEl = document.getElementById('textInput');
    var eccEl = document.getElementById('eccSelect');
    var qrEl = document.getElementById('qrcode');
    var outputEl = document.getElementById('outputText');
    var fgEl = document.getElementById('fgColor');
    var bgEl = document.getElementById('bgColor');
    var currentSize = 256;
    var currentQR = null;

    var sizeBtns = document.querySelectorAll('.qr-size-btn');
    for (var b = 0; b < sizeBtns.length; b++) {
      sizeBtns[b].addEventListener('click', function() {
        for (var k = 0; k < sizeBtns.length; k++) sizeBtns[k].classList.remove('active');
        this.classList.add('active');
        currentSize = parseInt(this.dataset.size);
      });
    }

    function generate() {
      var text = textEl.value.trim();
      if (!text) { setStatus('请输入文本或 URL', 'error'); return; }
      var ecc = eccEl.value;
      qrEl.innerHTML = '';
      currentQR = new QRCode(qrEl, {
        text: text,
        width: currentSize,
        height: currentSize,
        correctLevel: QRCode.CorrectLevel[ecc],
        colorDark: fgEl.value,
        colorLight: bgEl.value
      });
      outputEl.textContent = text;
      setStatus('QR 码已生成');
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    textEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') generate(); });

    document.getElementById('downloadBtn').addEventListener('click', function() {
      var canvas = qrEl.querySelector('canvas');
      if (!canvas) { setStatus('请先生成 QR 码', 'error'); return; }
      var link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      setStatus('已下载');
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
      var canvas = qrEl.querySelector('canvas');
      if (canvas) {
        canvas.toBlob(function(blob) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(function() {
            setStatus('QR 码图片已复制');
          }).catch(function() { setStatus('复制失败', 'error'); });
        });
      } else { setStatus('请先生成 QR 码', 'error'); }
    });
  })();</script>
</body>
</html>
