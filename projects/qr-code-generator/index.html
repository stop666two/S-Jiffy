<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>QR Code Generator - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
#qrcode{display:inline-block;padding:0;background:#fff;border:1px solid var(--color-border);border-radius:var(--radius-md);}
#qrcode img,#qrcode canvas{display:block;}
.qr-options{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.qr-options label{font-size:var(--font-size-sm);color:var(--color-text-secondary);white-space:nowrap;}
.qr-options input[type=color]{width:40px;height:40px;border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:2px;cursor:pointer;background:none;}
.qr-size-btns{display:flex;gap:4px;}
.qr-size-btn{padding:4px 16px;font-size:var(--font-size-sm);border:1px solid var(--color-border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-family:var(--font-mono);}
.qr-size-btn.active{background:var(--color-text-primary);color:#fff;border-color:var(--color-text-primary);}
</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace">
<h1>QR 码生成器</h1>
<p class="tool-desc">Generate QR codes with customizable size, colors, margin, module size, and error correction.</p>
<div class="card">
<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-3);">
<input id="textInput" class="input js-focus-input" type="text" placeholder="Enter text or URL..." style="flex:1;min-width:200px;"><button id="generateBtn" class="btn btn-primary">生成</button></div>
<div class="qr-options">
<div><label>尺寸</label><div class="qr-size-btns"><button class="qr-size-btn" data-size="128">小</button><button class="qr-size-btn active" data-size="256">中</button><button class="qr-size-btn" data-size="512">大</button></div></div>
<div><label>边距</label><select id="marginSelect" class="input" style="width:auto;"><option value="0">0</option><option value="1">1</option><option value="2" selected>2</option><option value="4">4</option></select></div>
<div><label>ECC</label><select id="eccSelect" class="input" style="width:auto;"><option value="L">L (Low)</option><option value="M" selected>M (Medium)</option><option value="Q">Q (High)</option><option value="H">H (Highest)</option></select></div>
<div><label>前景色</label><input id="fgColor" type="color" value="#000000"></div>
<div><label>背景色</label><input id="bgColor" type="color" value="#FFFFFF"></div>
</div>
</div>
<div style="text-align:center;padding:var(--space-3) 0;">
<div style="display:flex;justify-content:center;"><div id="qrcode"></div></div>
<div style="margin-top:var(--space-2);display:flex;gap:8px;justify-content:center;"><button id="downloadBtn" class="btn btn-secondary">Download PNG</button></div>
</div>
<div class="output-box" style="text-align:center;"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">Copy Link</button></div></main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="../../assets/js/global.js"></script>
<script>(function(){
  var textEl=document.getElementById('textInput'),eccEl=document.getElementById('eccSelect'),qrEl=document.getElementById('qrcode'),输出El=document.getElementById('outputText');
  var fgEl=document.getElementById('fgColor'),bgEl=document.getElementById('bgColor'),marginEl=document.getElementById('marginSelect');
  var currentSize=256,currentQR=null;
  var sizeBtns=document.querySelectorAll('.qr-size-btn');
  for(var b=0;b<sizeBtns.length;b++){sizeBtns[b].addEventListener('click',function(){for(var k=0;k<sizeBtns.length;k++)sizeBtns[k].classList.remove('active');this.classList.add('active');currentSize=parseInt(this.dataset.size);});}
  function generate(){
    var text=textEl.value.trim();if(!text){setStatus('Enter text or URL','error');return;}
    var ecc=eccEl.value,margin=parseInt(marginEl.value)||2;qrEl.innerHTML='';
    currentQR=new QRCode(qrEl,{text:text,width:currentSize,height:currentSize,correctLevel:QRCode.CorrectLevel[ecc],colorDark:fgEl.value,colorLight:bgEl.value});
    // Apply margin via padding on the container
    qrEl.style.padding=margin*4+'px';
    输出El.textContent=text;setStatus('QR code generated');}
  document.getElementById('generateBtn').addEventListener('click',generate);
  textEl.addEventListener('keydown',function(e){if(e.key==='Enter')generate();});
  document.getElementById('downloadBtn').addEventListener('click',function(){var canvas=qrEl.querySelector('canvas');if(!canvas){setStatus('Generate QR first','error');return;}
    var link=document.createElement('a');link.download='qrcode.png';link.href=canvas.toDataURL('image/png');link.click();setStatus('Downloaded');});
  document.getElementById('copyBtn').addEventListener('click',function(){var canvas=qrEl.querySelector('canvas');if(canvas){canvas.toBlob(function(blob){navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(function(){setStatus('QR image copied');}).catch(function(){setStatus('Copy failed','error');});});}else{setStatus('Generate QR first','error');}});
})();</script></body></html>
