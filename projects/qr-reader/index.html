<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 码读取器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>QR 码读取器</h1>
    <p class="tool-desc">上传二维码图片，使用 jsQR 解码。</p>
    <div class="card" style="display:flex;flex-direction:column;gap:16px;">
      <input type="file" id="fileInput" accept="image/*" style="font-family:inherit;">
      <div id="previewArea" style="max-width:300px;display:none;">
        <img id="previewImg" style="max-width:100%;border-radius:var(--radius-md);border:1px solid var(--color-border);">
      </div>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var fileInput = document.getElementById('fileInput');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');
      var previewImg = document.getElementById('previewImg');
      var previewArea = document.getElementById('previewArea');

      function decodeQR(imgData) {
        try {
          var code = jsQR(imgData.data, imgData.width, imgData.height);
          if (code && code.data) {
            输出El.textContent = code.data;
            setStatus('解码成功');
          } else {
            输出El.textContent = '未检测到 QR 码';
            setStatus('未检测到 QR 码', 'error');
          }
        } catch (e) {
          输出El.textContent = '解码出错: ' + e.message;
          setStatus('解码失败', 'error');
        }
      }

      fileInput.addEventListener('change', function() {
        var file = fileInput.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          var dataUrl = e.target.结果;
          previewImg.src = dataUrl;
          previewArea.style.display = 'block';
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            decodeQR(imageData);
          };
          img.src = dataUrl;
        };
        reader.readAsDataURL(file);
      });

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent;
        if (text && text.indexOf('未检测') === -1 && text.indexOf('出错') === -1) {
          copyToClipboard(text, copyBtn);
          setStatus('已复制到剪贴板');
        }
      });
    })();
  </script>
</body>
</html>
