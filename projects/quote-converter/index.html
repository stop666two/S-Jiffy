<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>引号转换 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>引号转换</h1><p class="tool-desc">直引号弯引号书名号互相转换。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><label>输入文本</label><textarea id="inputText" class="input textarea js-focus-input" style="min-height:100px" placeholder='输入包含引号的文本，如 "Hello" ...'></textarea></div>
<div class="row"><button id="toCurlyBtn" class="btn btn-primary">转弯引号</button><button id="toStraightBtn" class="btn btn-secondary">转直引号</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputText"),o=document.getElementById("outputText");
document.getElementById("toCurlyBtn").addEventListener("click",function(){var t=inp.value;if(!t){setStatus("请输入文本","error");return}
t=t.replace(/'/g,"\u2018").replace(/'/g,"\u2019").replace(/"/g,"\u201C").replace(/"/g,"\u201D").replace(/<</g,"\u300A").replace(/>>/g,"\u300B");o.textContent=t;setStatus("转换完成")});
document.getElementById("toStraightBtn").addEventListener("click",function(){var t=inp.value;if(!t){setStatus("请输入文本","error");return}
t=t.replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/[\u300A\u300B]/g,"");o.textContent=t;setStatus("转换完成")});
document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
