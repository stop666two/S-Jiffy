<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>彩虹文字生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}.big-num{font-size:40px;font-weight:700;text-align:center}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>彩虹文字生成器</h1><p class="tool-desc">生成彩虹色渐变文字效果。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><label>输入文字</label><input id="inputText" class="input" value="S-Jiffy 彩虹" style="width:100%"></div>
<div class="row"><div><label>饱和度</label><input id="saturation" class="input" type="range" min="0" max="100" value="80" style="width:120px"><span id="satVal">80%</span></div><div><label>亮度</label><input id="lightness" class="input" type="range" min="0" max="100" value="60" style="width:120px"><span id="litVal">60%</span></div><div style="display:flex;align-items:end;gap:8px"><button id="generateBtn" class="btn btn-primary">生成</button></div></div>
<div id="rainbowOutput" style="font-size:28px;font-weight:700;text-align:center;padding:16px 0;min-height:60px;word-break:break-all">S-Jiffy 彩虹</div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputText"),sat=document.getElementById("saturation"),sv=document.getElementById("satVal"),lit=document.getElementById("lightness"),lv=document.getElementById("litVal"),ro=document.getElementById("rainbowOutput"),o=document.getElementById("输出Text");
function gen(){var text=inp.value||" ",s=parseInt(sat.value),l=parseInt(lit.value);sv.textContent=s+"%";lv.textContent=l+"%";
var html="";for(var i=0;i<text.length;i++){var hue=i*360/text.length;html+="<span style='color:hsl("+hue+","+s+"%,"+l+"%)'>"+htmlEscape(text[i])+"</span>"}
ro.innerHTML=html;o.textContent=text+" (彩虹效果)";setStatus("已生成")}
document.getElementById("generateBtn").addEventListener("click",gen);sat.addEventListener("input",gen);lit.addEventListener("input",gen);
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});gen();})();</script></body></html>
