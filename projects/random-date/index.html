<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机日期生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .rd-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .rd-row .field { flex:1; min-width:120px; }
    .rd-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>随机日期生成器</h1>
    <p class="tool-desc">在指定日期范围内生成随机日期，支持多种格式。</p>
    <div class="card">
      <div class="rd-row">
        <div class="field"><label for="startDate">开始日期</label><input id="startDate" class="input" type="date" value="2024-01-01"></div>
        <div class="field"><label for="endDate">结束日期</label><input id="endDate" class="input" type="date" value="2024-12-31"></div>
        <div class="field"><label for="countVal">数量</label><input id="countVal" class="input" type="number" value="5" min="1" max="100"></div>
      </div>
      <div class="rd-row">
        <div class="field"><label for="fmtSel">格式</label>
          <select id="fmtSel" class="input" style="width:auto;min-width:140px;">
            <option value="iso">ISO (YYYY-MM-DD)</option>
            <option value="locale">中文 (2024年1月1日)</option>
            <option value="us">US (MM/DD/YYYY)</option>
            <option value="eu">EU (DD/MM/YYYY)</option>
            <option value="full">完整 (Mon DD, YYYY)</option>
          </select>
        </div>
      </div>
      <div><button id="genBtn" class="btn btn-primary">生成</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var startEl = document.getElementById('startDate');
    var endEl = document.getElementById('endDate');
    var countEl = document.getElementById('countVal');
    var fmtEl = document.getElementById('fmtSel');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function cryptoInt(min, max) {
      var range = max - min + 1;
      var bytes = new Uint32Array(1);
      crypto.getRandomValues(bytes);
      return min + (bytes[0] % range);
    }

    function formatDate(d, fmt) {
      var y = d.getFullYear();
      var m = d.getMonth() + 1;
      var day = d.getDate();
      var mm = m < 10 ? '0' + m : '' + m;
      var dd = day < 10 ? '0' + day : '' + day;
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      switch (fmt) {
        case 'iso': return y + '-' + mm + '-' + dd;
        case 'locale': return y + '年' + m + '月' + day + '日';
        case 'us': return mm + '/' + dd + '/' + y;
        case 'eu': return dd + '/' + mm + '/' + y;
        case 'full': return months[d.getMonth()] + ' ' + dd + ', ' + y;
        default: return y + '-' + mm + '-' + dd;
      }
    }

    function generate() {
      var s = new Date(startEl.value);
      var e = new Date(endEl.value);
      var count = parseInt(countEl.value, 10) || 1;
      if (count < 1) count = 1;
      if (count > 1000) count = 1000;

      if (isNaN(s.getTime()) || isNaN(e.getTime())) { setStatus('请输入有效日期', 'error'); return; }
      if (s > e) { setStatus('开始日期不能晚于结束日期', 'error'); return; }

      var range = e.getTime() - s.getTime();
      var fmt = fmtEl.value;
      var 结果 = [];
      for (var i = 0; i < count; i++) {
        var offset = cryptoInt(0, range);
        var d = new Date(s.getTime() + offset);
        结果.push(formatDate(d, fmt));
      }
      输出El.textContent = 结果.join('\n');
      setStatus('已生成 ' + count + ' 个日期');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
