<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机 IP 生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .ri-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .ri-row .field { flex:1; min-width:100px; }
    .ri-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>随机 IP 地址</h1>
    <p class="tool-desc">生成随机 IPv4 或 IPv6 地址，支持 CIDR 范围过滤。</p>
    <div class="card">
      <div class="ri-row">
        <div class="field"><label for="countVal">数量</label><input id="countVal" class="input" type="number" value="5" min="1" max="100"></div>
      </div>
      <div class="ri-row">
        <label style="display:flex;align-items:center;gap:8px;">类型
          <select id="typeSel" class="input" style="width:auto;min-width:80px;">
            <option value="ipv4">IPv4</option>
            <option value="ipv6">IPv6</option>
            <option value="both">混合</option>
          </select>
        </label>
        <div class="field"><label for="cidrVal">CIDR 范围（可选）</label><input id="cidrVal" class="input" type="text" placeholder="例如 192.168.0.0/16"></div>
      </div>
      <div><button id="genBtn" class="btn btn-primary">生成</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var countEl = document.getElementById('countVal');
    var typeEl = document.getElementById('typeSel');
    var cidrEl = document.getElementById('cidrVal');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function cryptoByte() { var b = new Uint8Array(1); crypto.getRandomValues(b); return b[0]; }
    function cryptoUint32() { var b = new Uint32Array(1); crypto.getRandomValues(b); return b[0]; }

    function randomIPv4() {
      return cryptoByte() + '.' + cryptoByte() + '.' + cryptoByte() + '.' + cryptoByte();
    }

    function randomIPv6() {
      var parts = [];
      for (var i = 0; i < 8; i++) {
        var b = new Uint16Array(1);
        crypto.getRandomValues(b);
        parts.push(b[0].toString(16));
      }
      return parts.join(':');
    }

    function ipv4ToInt(ip) {
      var parts = ip.split('.');
      return ((parseInt(parts[0]) << 24) | (parseInt(parts[1]) << 16) | (parseInt(parts[2]) << 8) | parseInt(parts[3])) >>> 0;
    }

    function intToIPv4(n) {
      return ((n >>> 24) & 255) + '.' + ((n >>> 16) & 255) + '.' + ((n >>> 8) & 255) + '.' + (n & 255);
    }

    function generate() {
      var count = parseInt(countEl.value, 10) || 1;
      if (count < 1) count = 1;
      if (count > 1000) count = 1000;
      var type = typeEl.value;
      var cidr = cidrEl.value.trim();
      var cidrMin = null, cidrMax = null;

      if (cidr) {
        var parts = cidr.split('/');
        if (parts.length === 2) {
          var base = ipv4ToInt(parts[0]);
          var mask = parseInt(parts[1]);
          if (!isNaN(base) && !isNaN(mask) && mask >= 0 && mask <= 32) {
            var maskBits = mask === 0 ? 0 : (0xFFFFFFFF << (32 - mask)) >>> 0;
            cidrMin = base & maskBits;
            cidrMax = cidrMin + (1 << (32 - mask)) - 1;
          }
        }
      }

      var 结果 = [];
      for (var i = 0; i < count; i++) {
        var t = type;
        if (t === 'both') t = cryptoByte() < 128 ? 'ipv4' : 'ipv6';
        var ip;
        if (t === 'ipv4') {
          if (cidrMin !== null && cidrMax !== null) {
            var range = cidrMax - cidrMin;
            var val = cidrMin + (cryptoUint32() % (range + 1));
            ip = intToIPv4(val);
          } else {
            ip = randomIPv4();
          }
        } else {
          ip = randomIPv6();
        }
        结果.push(ip);
      }
      输出El.textContent = 结果.join('\n');
      setStatus('已生成 ' + count + ' 个 IP 地址');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
