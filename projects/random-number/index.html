<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机数生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .rn-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .rn-row .field { flex:1; min-width:100px; }
    .rn-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>随机数生成器</h1>
    <p class="tool-desc">在指定范围内生成随机整数，可设置生成数量和是否允许重复。</p>
    <div class="card">
      <div class="rn-row">
        <div class="field"><label for="minVal">最小值</label><input id="minVal" class="input" type="number" value="1"></div>
        <div class="field"><label for="maxVal">最大值</label><input id="maxVal" class="input" type="number" value="100"></div>
        <div class="field"><label for="countVal">生成数量</label><input id="countVal" class="input" type="number" value="1" min="1" max="1000"></div>
      </div>
      <div class="rn-row">
        <label style="display:flex;align-items:center;gap:8px;">
          <input id="allowRepeat" type="checkbox" checked> 允许重复
        </label>
      </div>
      <div><button id="generateBtn" class="btn btn-primary">生成</button></div>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var minEl = document.getElementById('minVal');
      var maxEl = document.getElementById('maxVal');
      var countEl = document.getElementById('countVal');
      var repeatEl = document.getElementById('allowRepeat');
      var generateBtn = document.getElementById('generateBtn');
      var outputEl = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');

      function generate() {
        var min = parseInt(minEl.value, 10) || 0;
        var max = parseInt(maxEl.value, 10) || 100;
        var count = parseInt(countEl.value, 10) || 1;
        var allowRepeat = repeatEl.checked;

        if (min > max) { setStatus('最小值不能大于最大值', 'error'); return; }
        if (count < 1) count = 1;
        if (count > 10000) count = 10000;

        var range = max - min + 1;
        if (!allowRepeat && count > range) {
          setStatus('不允许重复时，数量不能超过范围大小 (' + range + ')', 'error');
          return;
        }

        var result = [];
        if (allowRepeat) {
          for (var i = 0; i < count; i++) {
            result.push(Math.floor(Math.random() * range) + min);
          }
        } else {
          var pool = [];
          for (var i = min; i <= max; i++) pool.push(i);
          for (var i = pool.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = pool[i];
            pool[i] = pool[j];
            pool[j] = tmp;
          }
          result = pool.slice(0, count);
        }

        outputEl.textContent = result.join(', ');
        setStatus('已生成 ' + count + ' 个随机数');
      }

      generateBtn.addEventListener('click', generate);

      copyBtn.addEventListener('click', function() {
        var text = outputEl.textContent;
        if (text) {
          copyToClipboard(text, copyBtn);
          setStatus('已复制到剪贴板');
        }
      });
    })();
  </script>
</body>
</html>
