<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>安全令牌生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.game-area{text-align:center;padding:24px 0}.game-btn{width:120px;height:120px;border-radius:50%;border:none;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s}.game-btn.ready{background:#4CAF50;color:#fff}.game-btn.waiting{background:#F44336;color:#fff}.game-btn:active{transform:scale(0.95)}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>安全令牌生成器</h1><p class="tool-desc">生成加密安全的随机令牌和 API 密钥。</p><div class="card"><div class="row"><div><label>格式</label><select id="format" class="input" style="width:auto"><option value="hex">Hex</option><option value="base64">Base64</option><option value="alphanum">字母数字</option></select></div><div><label>字节长度</label><input id="length" class="input" type="number" value="32" min="8" max="256"></div><div><label>数量</label><input id="count" class="input" type="number" value="1" min="1" max="50"></div><div style="display:flex;align-items:end;gap:8px"><button id="generateBtn" class="btn btn-primary">生成</button></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var fmt=document.getElementById("format"),len=document.getElementById("length"),cnt=document.getElementById("count"),o=document.getElementById("outputText");
function randomBytes(n){var arr=new Uint8Array(n);crypto.getRandomValues(arr);return arr}
document.getElementById("generateBtn").addEventListener("click",function(){var f=fmt.value,n=parseInt(len.value)||32,c=parseInt(cnt.value)||1;var result=[];for(var i=0;i<c;i++){var bytes=randomBytes(n);if(f==="hex"){result.push(Array.from(bytes).map(function(b){return b.toString(16).padStart(2,"0")}).join(""))}else if(f==="base64"){var s="";for(var j=0;j<bytes.length;j++)s+=String.fromCharCode(bytes[j]);result.push(btoa(s))}else{var chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";var r="";for(var k=0;k<n;k++)r+=chars[bytes[k]%chars.length];result.push(r)}}
o.textContent=result.join("\n");setStatus("已生成 "+c+" 个令牌")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
