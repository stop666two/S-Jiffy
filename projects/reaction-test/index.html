<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>反应速度测试 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.game-area{text-align:center;padding:24px 0}.game-btn{width:120px;height:120px;border-radius:50%;border:none;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s}.game-btn.ready{background:#4CAF50;color:#fff}.game-btn.waiting{background:#F44336;color:#fff}.game-btn:active{transform:scale(0.95)}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>反应速度测试</h1><p class="tool-desc">测试视觉反应时间。</p><div class="card"><div class="game-area"><button id="reactionBtn" class="game-btn ready" style="background:#4CAF50;color:#fff">点击开始</button></div>
<div class="res-grid"><div class="res-item"><div class="v" id="lastTime">—</div><div class="l">本次反应 (ms)</div></div><div class="res-item"><div class="v" id="avgTime">—</div><div class="l">平均反应 (ms)</div></div><div class="res-item"><div class="v" id="bestTime">—</div><div class="l">最快反应 (ms)</div></div><div class="res-item"><div class="v" id="totalTests">0</div><div class="l">测试次数</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var btn=document.getElementById("reactionBtn"),lt=document.getElementById("lastTime"),at=document.getElementById("avgTime"),bt=document.getElementById("bestTime"),tt=document.getElementById("totalTests"),o=document.getElementById("outputText");var state="waiting",timeout=null,startTime=0,total=0,sum=0,best=Infinity,testCount=0;
btn.addEventListener("click",function(){if(state==="waiting"){btn.textContent="等待绿色...";btn.style.background="#FF9800";state="ready";var delay=1000+Math.random()*3000;timeout=setTimeout(function(){btn.textContent="点击!";btn.style.background="#4CAF50";startTime=Date.now();state="go"},delay)}else if(state==="go"){var rt=Date.now()-startTime;clearTimeout(timeout);testCount++;total+=rt;if(rt<best)best=rt;lt.textContent=rt;at.textContent=Math.round(total/testCount);bt.textContent=best;tt.textContent=testCount;o.textContent="反应时间: "+rt+" ms | 平均: "+Math.round(total/testCount)+" ms";setStatus(rt+"ms");btn.textContent="点击开始";btn.style.background="#4CAF50";state="waiting"}else if(state==="ready"){clearTimeout(timeout);btn.textContent="点击开始";btn.style.background="#4CAF50";state="waiting";setStatus("提前点击!","error")}});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
