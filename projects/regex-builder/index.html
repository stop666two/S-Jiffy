<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>正则构建器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>正则构建器</h1><p class="tool-desc">通过可视化选项构建正则表达式。</p><div class="card"><div class="row"><div><label>匹配文本</label><input id="inputText" class="input" value="hello123@example.com" style="width:100%"></div></div>
<div class="row"><div><label>模式预设</label><select id="preset" class="input" style="width:auto"><option value="">自定义</option><option value="\d+">数字</option><option value="[a-zA-Z]+">字母</option><option value="\w+@\w+\.\w+">邮箱</option><option value="https?://[^\s]+">URL</option><option value="1[3-9]\d{9}">手机号</option></select></div></div>
<div class="row"><button id="matchBtn" class="btn btn-primary">匹配</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputText"),pr=document.getElementById("preset"),o=document.getElementById("outputText");
document.getElementById("matchBtn").addEventListener("click",function(){var text=inp.value,pat=pr.value;if(!text){setStatus("请输入文本","error");return}
if(!pat){setStatus("请选择或输入模式","error");return}try{var re=new RegExp(pat,"g");var matches=text.match(re);o.textContent=matches?"匹配 "+matches.length+" 处:\n"+matches.join("\n"):"无匹配";setStatus("匹配 "+(matches?matches.length:0)+" 处")}catch(e){setStatus("正则错误: "+e.message,"error")}});
document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";pr.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
