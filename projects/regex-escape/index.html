<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>正则转义 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>正则转义</h1><p class="tool-desc">对正则表达式特殊字符进行转义/反转义：\\.[]{}()*+?^$| 等。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入需要转义或反转义的文本..." style="min-height:100px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin:var(--space-2) 0;flex-wrap:wrap;align-items:center;">
<button id="escapeBtn" class="btn btn-primary">转义</button>
<button id="unescapeBtn" class="btn btn-secondary">反转义</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;font-family:var(--font-mono);font-size:var(--font-size-sm);"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('输出Text');
var escapeBtn=document.getElementById('escapeBtn');
var unescapeBtn=document.getElementById('unescapeBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
var specialChars=/[.*+?^${}()|[\]\\]/g;
function escapeRegex(text){
return text.replace(specialChars,'\\$&');
}
function unescapeRegex(text){
return text.replace(/\\([.*+?^${}()|[\]\\])/g,'$1');
}
escapeBtn.addEventListener('click',function(){var t=inputEl.value;if(!t){setStatus('请输入文本','error');return;}输出El.textContent=escapeRegex(t);setStatus('');});
unescapeBtn.addEventListener('click',function(){var t=inputEl.value;if(!t){setStatus('请输入文本','error');return;}输出El.textContent=unescapeRegex(t);setStatus('');});
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
