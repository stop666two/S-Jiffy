<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>RGB 转 HEX - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.color-preview{width:100%;height:60px;border-radius:var(--radius-md);border:1px solid var(--color-border);margin-bottom:16px;transition:background .2s}.rgb-sliders{display:flex;flex-direction:column;gap:12px;max-width:360px;margin-bottom:16px}.slider-row{display:flex;align-items:center;gap:12px}.slider-row label{width:20px;font-weight:600;font-size:14px}.slider-row input[type=range]{flex:1;accent-color:var(--color-text-primary)}.slider-row input[type=number]{width:60px;text-align:center;font-family:var(--font-mono);padding:4px;border:1px solid var(--color-border);border-radius:var(--radius-sm)}.result-row{font-family:var(--font-mono);font-size:20px;font-weight:600}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>RGB 转 HEX</h1><p class="tool-desc">将 RGB 颜色值转换为十六进制 HEX 格式，带颜色预览。</p>
<div class="card">
<div class="color-preview" id="colorPreview" style="background:#000000;"></div>
<div class="rgb-sliders">
<div class="slider-row"><label style="color:#e74c3c">R</label><input type="range" id="rSlider" min="0" max="255" value="52"><input type="number" id="rNum" min="0" max="255" value="52"></div>
<div class="slider-row"><label style="color:#2ecc71">G</label><input type="range" id="gSlider" min="0" max="255" value="152"><input type="number" id="gNum" min="0" max="255" value="152"></div>
<div class="slider-row"><label style="color:#3498db">B</label><input type="range" id="bSlider" min="0" max="255" value="219"><input type="number" id="bNum" min="0" max="255" value="219"></div>
</div>
<div class="result-row" id="hexResult">#3498DB</div>
</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var rSlider=document.getElementById('rSlider');
var gSlider=document.getElementById('gSlider');
var bSlider=document.getElementById('bSlider');
var rNum=document.getElementById('rNum');
var gNum=document.getElementById('gNum');
var bNum=document.getElementById('bNum');
var colorPreview=document.getElementById('colorPreview');
var hexResult=document.getElementById('hexResult');
var outputEl=document.getElementById('outputText');
var copyBtn=document.getElementById('copyBtn');

function toHex(v){
var h=parseInt(v).toString(16).toUpperCase();
return h.length===1?'0'+h:h;
}

function update(src){
var r,g,b;
if(src==='r'){r=parseInt(rSlider.value);rNum.value=r;}
else if(src==='g'){g=parseInt(gSlider.value);gNum.value=g;}
else if(src==='b'){b=parseInt(bSlider.value);bNum.value=b;}
if(src==='rn'){var rv=parseInt(rNum.value);if(rv<0)rv=0;if(rv>255)rv=255;rSlider.value=rv;r=rv;}
else if(src==='gn'){var gv=parseInt(gNum.value);if(gv<0)gv=0;if(gv>255)gv=255;gSlider.value=gv;g=gv;}
else if(src==='bn'){var bv=parseInt(bNum.value);if(bv<0)bv=0;if(bv>255)bv=255;bSlider.value=bv;b=bv;}
if(r===undefined)r=parseInt(rSlider.value);
if(g===undefined)g=parseInt(gSlider.value);
if(b===undefined)b=parseInt(bSlider.value);
var hex='#'+toHex(r)+toHex(g)+toHex(b);
hexResult.textContent=hex;
colorPreview.style.background=hex;
outputEl.textContent='RGB('+r+','+g+','+b+') = '+hex;
}

rSlider.addEventListener('input',function(){update('r');});
gSlider.addEventListener('input',function(){update('g');});
bSlider.addEventListener('input',function(){update('b');});
rNum.addEventListener('input',function(){update('rn');});
gNum.addEventListener('input',function(){update('gn');});
bNum.addEventListener('input',function(){update('bn');});
copyBtn.addEventListener('click',function(){if(hexResult.textContent){copyToClipboard(hexResult.textContent,copyBtn);setStatus('已复制');}});
update('r');
})();</script></body></html>
