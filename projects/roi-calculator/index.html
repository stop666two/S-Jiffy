<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>投资回报计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:120px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>投资回报计算器</h1><p class="tool-desc">计算投资回报率 ROI 和年化收益率。</p><div class="card"><div class="row"><div><label>初始投资 (元)</label><input id="invest" class="input" type="number" value="100000" min="1"></div><div><label>最终价值 (元)</label><input id="final" class="input" type="number" value="150000" min="1"></div><div><label>持有年限</label><input id="years" class="input" type="number" value="3" min="0.1" step="0.1"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="roiVal">—</div><div class="l">总回报率 (ROI)</div></div><div class="res-item"><div class="v" id="annualVal">—</div><div class="l">年化收益率</div></div><div class="res-item"><div class="v" id="profitVal">—</div><div class="l">总收益 (元)</div></div><div class="res-item"><div class="v" id="multVal">—</div><div class="l">回报倍数</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inv=document.getElementById('invest'),fn=document.getElementById('final'),yr=document.getElementById('years'),rv=document.getElementById('roiVal'),av=document.getElementById('annualVal'),pv=document.getElementById('profitVal'),mv=document.getElementById('multVal'),o=document.getElementById('输出Text');
function calc(){var i=parseFloat(inv.value),f=parseFloat(fn.value),y=parseFloat(yr.value);if(!i||!f||!y||i<1){setStatus('请输入有效数据','error');return}
var roi=(f-i)/i*100;var ann=(Math.pow(f/i,1/y)-1)*100;var profit=f-i;var mult=f/i;
rv.textContent=roi.toFixed(2)+'%';av.textContent=ann.toFixed(2)+'%';pv.textContent=profit.toFixed(2);mv.textContent=mult.toFixed(2)+'x';
o.textContent='ROI: '+roi.toFixed(2)+'% | 年化: '+ann.toFixed(2)+'% | 收益: '+profit.toFixed(2)+' 元 | 倍数: '+mult.toFixed(2)+'x';setStatus('计算完成')}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('clearBtn').addEventListener('click',function(){rv.textContent='—';av.textContent='—';pv.textContent='—';mv.textContent='—';o.textContent='';setStatus('')});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制')}});calc();})();</script></body></html>
