<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>取整工具 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .rt-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .rt-row .field { flex:1; min-width:100px; }
    .rt-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
    .结果-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:var(--space-2); }
    .结果-item { background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-2); }
    .结果-item .label { font-size:var(--font-size-sm); color:var(--color-text-secondary); }
    .结果-item .value { font-size:var(--font-size-lg); font-weight:600; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>取整工具</h1>
    <p class="tool-desc">对一个数值同时展示向下取整、向上取整、四舍五入和截断取整四种结果。</p>
    <div class="card">
      <div class="rt-row">
        <div class="field"><label for="inputVal">输入数值</label><input id="inputVal" class="input" type="number" value="3.14159" step="any"></div>
        <div class="field"><label for="decVal">小数位数</label><input id="decVal" class="input" type="number" value="2" min="0" max="15"></div>
      </div>
      <div><button id="genBtn" class="btn btn-primary">计算</button></div>
      <div class="结果-grid" id="结果Grid">
        <div class="结果-item"><div class="label">向下取整 (floor)</div><div class="value" id="floorVal">-</div></div>
        <div class="结果-item"><div class="label">向上取整 (ceil)</div><div class="value" id="ceilVal">-</div></div>
        <div class="结果-item"><div class="label">四舍五入 (round)</div><div class="value" id="roundVal">-</div></div>
        <div class="结果-item"><div class="label">截断取整 (trunc)</div><div class="value" id="truncVal">-</div></div>
      </div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputVal');
    var decEl = document.getElementById('decVal');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function generate() {
      var val = parseFloat(inputEl.value);
      if (isNaN(val)) { setStatus('请输入有效数值', 'error'); return; }
      var dec = parseInt(decEl.value, 10);
      if (isNaN(dec) || dec < 0) dec = 0;
      if (dec > 15) dec = 15;

      var factor = Math.pow(10, dec);
      var floorV = Math.floor(val * factor) / factor;
      var ceilV = Math.ceil(val * factor) / factor;
      var roundV = Math.round(val * factor) / factor;
      var truncV = val >= 0 ? Math.floor(val * factor) / factor : Math.ceil(val * factor) / factor;
      truncV = parseFloat(truncV.toFixed(dec));

      document.getElementById('floorVal').textContent = floorV.toFixed(dec);
      document.getElementById('ceilVal').textContent = ceilV.toFixed(dec);
      document.getElementById('roundVal').textContent = roundV.toFixed(dec);
      document.getElementById('truncVal').textContent = truncV.toFixed(dec);

      输出El.textContent = 'Floor: ' + floorV.toFixed(dec) + ', Ceil: ' + ceilV.toFixed(dec) + ', Round: ' + roundV.toFixed(dec) + ', Trunc: ' + truncV.toFixed(dec);
      setStatus('取整完成');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
