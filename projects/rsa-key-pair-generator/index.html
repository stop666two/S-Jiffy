<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSA 密钥对生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .pem-box { margin-top: var(--space-3); }
    .pem-box label { font-size: var(--font-size-xs); color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
    .pem-area { background: var(--color-bg-soft); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-2); font-family: var(--font-mono); font-size: 12px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; min-height: 120px; position: relative; margin-bottom: var(--space-3); }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>RSA 密钥对生成器</h1>
    <p class="tool-desc">使用 Web Crypto API 生成 RSA 密钥对，输出 PEM 格式。<span id="httpsWarning" style="display:none;font-size:var(--font-size-xs);color:var(--color-error);margin-top:4px;">⚠ 需 HTTPS/localhost 环境</span></p>
    <div class="card" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">密钥长度</label>
      <select id="bitsSelect" class="input" style="width:auto;min-width:90px;">
        <option value="1024">1024 位</option>
        <option value="2048" selected>2048 位</option>
        <option value="4096">4096 位</option>
      </select>
      <button id="generateBtn" class="btn btn-primary">生成密钥对</button>
    </div>
    <div class="pem-box">
      <label>公钥 (Public Key)</label>
      <div class="pem-area" id="publicKeyArea">点击上方按钮生成</div>
      <label>私钥 (Private Key)</label>
      <div class="pem-area" id="privateKeyArea">点击上方按钮生成</div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <button id="copyPubBtn" class="btn btn-secondary">复制公钥</button>
      <button id="copyPrivBtn" class="btn btn-secondary">复制私钥</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var bitsEl = document.getElementById('bitsSelect');
    var pubArea = document.getElementById('publicKeyArea');
    var privArea = document.getElementById('privateKeyArea');
    var pubPem = '', privPem = '';
    function arrayBufToPem(buf, label) {
      var bytes = String.fromCharCode.apply(null, new Uint8Array(buf));
      var b64 = btoa(bytes);
      var lines = [];
      lines.push('-----BEGIN ' + label + '-----');
      for (var i = 0; i < b64.length; i += 64) { lines.push(b64.substr(i, 64)); }
      lines.push('-----END ' + label + '-----');
      return lines.join('\n');
    }
    document.getElementById('generateBtn').addEventListener('click', function() {
      var bits = parseInt(bitsEl.value);
      pubArea.textContent = '生成中...';
      privArea.textContent = '生成中...';
      setStatus('正在生成 RSA ' + bits + ' 密钥对...');
      crypto.subtle.generateKey(
        { name: 'RSA-OAEP', modulusLength: bits, publicExponent: new Uint8Array([1, 0, 1]), hash: 'SHA-256' },
        true, ['encrypt', 'decrypt']
      ).then(function(keyPair) {
        return Promise.all([
          crypto.subtle.exportKey('spki', keyPair.publicKey),
          crypto.subtle.exportKey('pkcs8', keyPair.privateKey)
        ]);
      }).then(function(keys) {
        pubPem = arrayBufToPem(keys[0], 'PUBLIC KEY');
        privPem = arrayBufToPem(keys[1], 'PRIVATE KEY');
        pubArea.textContent = pubPem;
        privArea.textContent = privPem;
        setStatus('RSA ' + bits + ' 密钥对生成完成');
      }).catch(function(err) {
        setStatus('生成失败: ' + err.message, 'error');
        pubArea.textContent = '生成失败';
        privArea.textContent = '生成失败';
      });
    });
    document.getElementById('copyPubBtn').addEventListener('click', function() {
      if (pubPem) { copyToClipboard(pubPem, this); setStatus('公钥已复制'); }
    });
    document.getElementById('copyPrivBtn').addEventListener('click', function() {
      if (privPem) { copyToClipboard(privPem, this); setStatus('私钥已复制'); }
    });
  })();if(!isSecureContext()){var w=document.getElementById('httpsWarning');if(w)w.style.display='block';}</script>
</body>
</html>
