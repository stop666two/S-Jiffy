<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safelink 解码 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>SafeLink 解码</h1>
    <p class="tool-desc">解码 Microsoft SafeLinks (statics/links.safelinks.protection.outlook.com) 和 Google 重定向网址 (google.com/url)，还原原始 URL。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="粘贴 SafeLink 或 Google 重定向 URL...&#10;https://statics.teams.cdn.office.net/evergreen-assets/safelinks/1/...&#10;或 https://www.google.com/url?q=..." style="min-height:120px;"></textarea>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
      <button id="decodeBtn" class="btn btn-primary">解码</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box" id="输出Container">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');
      var clearBtn = document.getElementById('clearBtn');

      function decodeSafelink(url) {
        // Microsoft SafeLinks patterns
        var msPatterns = [
          /safelinks\.protection\.outlook\.com\/.*[?&]url=([^&]+)/i,
          /statics\.teams\.cdn\.office\.net\/evergreen-assets\/safelinks\/[^/]+\/[^?]+\?[^#]*url=([^&]+)/i,
          /[?&]data=.*?%3A%2F%2F([^&]+)/i
        ];
        // Google redirect
        var googlePattern = /google\.[a-z.]+\/url\?[^#]*q=([^&]+)/i;
        var m = url.match(googlePattern);
        if (m) return decodeURIComponent(m[1]);
        for (var i = 0; i < msPatterns.length; i++) {
          m = url.match(msPatterns[i]);
          if (m) return decodeURIComponent(m[1]);
        }
        // Generic: try to find url= param
        m = url.match(/[?&]url=([^&]+)/i);
        if (m) return decodeURIComponent(m[1]);
        // Try to find q= param
        m = url.match(/[?&]q=([^&]+)/i);
        if (m) return decodeURIComponent(m[1]);
        return null;
      }

      document.getElementById('decodeBtn').addEventListener('click', function() {
        var text = inputEl.value.trim();
        if (!text) { setStatus('请输入 URL', 'error'); return; }
        var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
        var 结果s = [];
        var decoded = 0;
        for (var i = 0; i < lines.length; i++) {
          var original = decodeSafelink(lines[i]);
          if (original) {
            结果s.push('原始 URL: ' + original + '\n来源: ' + lines[i] + '\n');
            decoded++;
          } else {
            结果s.push('未能解码: ' + lines[i] + '\n');
          }
        }
        输出El.textContent = 结果s.join('\n');
        if (decoded > 0) {
          setStatus('成功解码 ' + decoded + ' 个 URL');
        } else {
          setStatus('未能识别 SafeLink/Google 重定向格式', 'error');
        }
      });

      clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        输出El.textContent = '';
        setStatus('');
        inputEl.focus();
      });

      copyBtn.addEventListener('click', function() {
        if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); }
      });
    })();
  </script>
</body>
</html>
