<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SemVer 版本递增 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.bump-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.bump-grid .input{width:200px}.bump-select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.bump-select:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.result-version{font-size:32px;font-weight:700;text-align:center;padding:var(--space-3);color:var(--color-success)}.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-3);margin-top:var(--space-2)}.detail-item{text-align:center;padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.detail-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.detail-item .val{font-size:var(--font-size-lg);font-weight:600}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>SemVer 版本递增</h1><p class="tool-desc">对语义化版本号进行主/次/补丁递增</p>
<div class="card"><div class="bump-grid"><input id="verInput" class="input js-focus-input" placeholder="1.2.3" value="1.2.3"><select id="bumpType" class="bump-select"><option value="major">Major (主版本)</option><option value="minor" selected>Minor (次版本)</option><option value="patch">Patch (补丁)</option><option value="prerelease">Prerelease (预发布)</option></select><button id="bumpBtn" class="btn btn-primary">递增</button></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var verInput=document.getElementById('verInput'),bumpType=document.getElementById('bumpType'),bumpBtn=document.getElementById('bumpBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function parseSemver(v){var m=v.match(/^(\d+)\.(\d+)\.(\d+)(?:-([\w.]+))?(?:\+([\w.]+))?$/);if(!m)return null;return{major:parseInt(m[1],10),minor:parseInt(m[2],10),patch:parseInt(m[3],10),prerelease:m[4]||'',build:m[5]||'',raw:m[0]}}function bump(){var raw=verInput.value.trim();if(!raw){setStatus('请输入版本号','error');return}var sv=parseSemver(raw);if(!sv){outputText.innerHTML='<div style="color:var(--color-error);text-align:center;padding:var(--space-2)">版本号格式无效。请使用语义化版本号，如 1.2.3</div>';return}var type=bumpType.value;var ma=sv.major,mi=sv.minor,pa=sv.patch,pre=sv.prerelease;if(type==='major'){ma+=1;mi=0;pa=0;pre=''}else if(type==='minor'){mi+=1;pa=0;pre=''}else if(type==='patch'){pa+=1;pre=''}else if(type==='prerelease'){if(pre){var pm=pre.match(/^(\D*)(\d+)$/);if(pm){pre=pm[1]+(parseInt(pm[2],10)+1)}else{pre+='.1'}}else{pre='alpha.1'}}var result=ma+'.'+mi+'.'+pa+(pre?'-'+pre:'');var html='<div class="result-version">'+result+'</div>';html+='<div class="detail-grid">';html+='<div class="detail-item"><div class="lbl">原版本</div><div class="val" style="font-size:16px">'+sv.raw+'</div></div>';html+='<div class="detail-item"><div class="lbl">递增类型</div><div class="val" style="font-size:16px">'+({major:'主版本',minor:'次版本',patch:'补丁',prerelease:'预发布'})[type]+'</div></div>';html+='<div class="detail-item"><div class="lbl">新版本</div><div class="val" style="color:var(--color-success)">'+result+'</div></div>';html+='</div>';outputText.innerHTML=html}function syncOutput(){if(outputText.textContent)bump()}bumpBtn.addEventListener('click',bump);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.querySelector('.result-version')?outputText.querySelector('.result-version').textContent:outputText.textContent,this);setStatus('已复制')}});verInput.addEventListener('keydown',function(e){if(e.key==='Enter')bump()})})();</script>
</body></html>
