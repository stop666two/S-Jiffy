<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SemVer 版本比较 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .version-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .version-row .input { width:220px; }
    .comparison-结果 { font-size:var(--font-size-xl); text-align:center; padding:var(--space-3); }
    .cmp-gt { color:var(--color-success); }
    .cmp-lt { color:var(--color-error); }
    .cmp-eq { color:var(--color-text-secondary); }
    .cmp-invalid { color:var(--color-error); }
    .breakdown-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-3); margin-top:var(--space-3); }
    .breakdown-item { text-align:center; padding:var(--space-2); background:var(--color-bg-soft); border-radius:var(--radius-md); }
    .breakdown-item .label { font-size:var(--font-size-xs); color:var(--color-text-secondary); }
    .breakdown-item .val { font-size:var(--font-size-lg); font-weight:600; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>SemVer 版本比较</h1>
    <p class="tool-desc">语义化版本号比较与校验</p>

    <div class="card">
      <div class="version-row">
        <input id="versionA" class="input js-focus-input" placeholder="1.2.3" value="1.2.3">
        <span style="font-size:var(--font-size-lg);color:var(--color-text-secondary);">vs</span>
        <input id="versionB" class="input" placeholder="1.3.0" value="1.3.0">
        <button id="compareBtn" class="btn btn-primary">比较</button>
        <button id="swapBtn" class="btn btn-secondary">互换</button>
      </div>
    </div>

    <div class="输出-box" style="min-height:120px;">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/semver/7.5.4/semver.min.js"></script>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var versionA = document.getElementById('versionA');
      var versionB = document.getElementById('versionB');
      var 输出Text = document.getElementById('输出Text');
      var compareBtn = document.getElementById('compareBtn');
      var swapBtn = document.getElementById('swapBtn');
      var copyBtn = document.getElementById('copyBtn');

      function formatVersion(v) {
        var parts = v.split('.');
        if (parts.length < 3) return null;
        var ma = parseInt(parts[0], 10);
        var mi = parseInt(parts[1], 10);
        var pa = parseInt(parts[2], 10);
        if (isNaN(ma) || isNaN(mi) || isNaN(pa)) return null;
        return { major: ma, minor: mi, patch: pa, raw: ma + '.' + mi + '.' + pa };
      }

      function buildHtml(aRaw, bRaw) {
        var a = formatVersion(aRaw);
        var b = formatVersion(bRaw);
        if (!a || !b) {
          return '<div class="comparison-结果 cmp-invalid">版本号格式无效。请使用语义化版本号，如 "1.2.3"</div>';
        }
        var validA = semver.valid(a.raw);
        var validB = semver.valid(b.raw);
        if (!validA || !validB) {
          return '<div class="comparison-结果 cmp-invalid">版本号格式无效。语义化版本号格式为 major.minor.patch</div>';
        }
        var cmp = semver.compare(a.raw, b.raw);
        var symbol, cls;
        if (cmp > 0) { symbol = '>'; cls = 'cmp-gt'; }
        else if (cmp < 0) { symbol = '<'; cls = 'cmp-lt'; }
        else { symbol = '='; cls = 'cmp-eq'; }

        var html = '<div class="comparison-结果 ' + cls + '">';
        html += '<span style="font-size:28px;font-weight:700;">' + a.raw + '</span>';
        html += ' &nbsp;<span style="font-size:36px;">' + symbol + '</span>&nbsp; ';
        html += '<span style="font-size:28px;font-weight:700;">' + b.raw + '</span>';
        html += '</div>';

        html += '<div class="breakdown-grid">';
        html += '<div class="breakdown-item"><div class="label">Major</div><div class="val">' + a.major + ' : ' + b.major + '</div></div>';
        html += '<div class="breakdown-item"><div class="label">Minor</div><div class="val">' + a.minor + ' : ' + b.minor + '</div></div>';
        html += '<div class="breakdown-item"><div class="label">Patch</div><div class="val">' + a.patch + ' : ' + b.patch + '</div></div>';
        html += '</div>';

        return html;
      }

      function compare() {
        var a = versionA.value.trim();
        var b = versionB.value.trim();
        if (!a || !b) { setStatus('请输入两个版本号', 'error'); return; }
        输出Text.innerHTML = buildHtml(a, b);
        setStatus('');
      }

      compareBtn.addEventListener('click', compare);

      swapBtn.addEventListener('click', function () {
        var tmp = versionA.value;
        versionA.value = versionB.value;
        versionB.value = tmp;
        compare();
      });

      copyBtn.addEventListener('click', function () {
        if (输出Text.textContent.trim()) { copyToClipboard(输出Text.textContent, this); setStatus('已复制'); }
      });

      versionA.addEventListener('keydown', function (e) { if (e.key === 'Enter') compareBtn.click(); });
      versionB.addEventListener('keydown', function (e) { if (e.key === 'Enter') compareBtn.click(); });
    })();
  </script>
</body>
</html>
