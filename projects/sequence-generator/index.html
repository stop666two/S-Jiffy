<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数列生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .sg-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .sg-row .field { flex:1; min-width:80px; }
    .sg-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>序列生成器</h1>
    <p class="tool-desc">生成等差数列，支持起始、结束、步进、补零、前缀/后缀设置。</p>
    <div class="card">
      <div class="sg-row">
        <div class="field"><label for="startVal">起始值</label><input id="startVal" class="input" type="number" value="1"></div>
        <div class="field"><label for="endVal">结束值</label><input id="endVal" class="input" type="number" value="10"></div>
        <div class="field"><label for="stepVal">步进</label><input id="stepVal" class="input" type="number" value="1" min="1"></div>
      </div>
      <div class="sg-row">
        <div class="field"><label for="padVal">补零位数（0=不补）</label><input id="padVal" class="input" type="number" value="2" min="0" max="10"></div>
        <div class="field"><label for="prefixVal">前缀</label><input id="prefixVal" class="input" type="text" placeholder="例如 #"></div>
        <div class="field"><label for="suffixVal">后缀</label><input id="suffixVal" class="input" type="text" placeholder="例如 ."></div>
      </div>
      <div class="sg-row">
        <label style="display:flex;align-items:center;gap:8px;">分隔符
          <select id="sepSel" class="input" style="width:auto;min-width:80px;">
            <option value=", ">, （逗号）</option>
            <option value="\n">换行</option>
            <option value=" ">空格</option>
            <option value="|">|</option>
          </select>
        </label>
      </div>
      <div><button id="genBtn" class="btn btn-primary">生成</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var startEl = document.getElementById('startVal');
    var endEl = document.getElementById('endVal');
    var stepEl = document.getElementById('stepVal');
    var padEl = document.getElementById('padVal');
    var prefixEl = document.getElementById('prefixVal');
    var suffixEl = document.getElementById('suffixVal');
    var sepEl = document.getElementById('sepSel');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function padNum(n, len) {
      if (len === 0) return '' + n;
      var s = '' + n;
      while (s.length < len) s = '0' + s;
      return s;
    }

    function generate() {
      var start = parseInt(startEl.value, 10) || 1;
      var end = parseInt(endEl.value, 10) || 10;
      var step = parseInt(stepEl.value, 10) || 1;
      var pad = parseInt(padEl.value, 10) || 0;
      var prefix = prefixEl.value;
      var suffix = suffixEl.value;
      var sep = sepEl.value;
      if (sep === '\\n') sep = '\n';

      if (step <= 0) step = 1;
      if (pad < 0) pad = 0;
      if (pad > 10) pad = 10;

      if (start > end) { setStatus('起始值不能大于结束值', 'error'); return; }

      var 结果 = [];
      for (var i = start; i <= end; i += step) {
        结果.push(prefix + padNum(i, pad) + suffix);
      }
      输出El.textContent = 结果.join(sep);
      setStatus('已生成 ' + 结果.length + ' 项');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
