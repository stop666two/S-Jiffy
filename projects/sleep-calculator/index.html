<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>睡眠周期计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}.big-num{font-size:40px;font-weight:700;text-align:center}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>睡眠周期计算器</h1><p class="tool-desc">根据起床时间反推最佳入睡时间。</p><div class="card"><div class="row"><div><label>起床时间</label><input id="wakeTime" class="input" type="time" value="07:00" style="width:auto"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<p style="font-size:13px;color:var(--color-text-secondary)">基于 90 分钟睡眠周期，建议在周期结束时起床。</p>
<div id="results" style="margin-top:12px"></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var wt=document.getElementById("wakeTime"),res=document.getElementById("results"),o=document.getElementById("outputText");
document.getElementById("calcBtn").addEventListener("click",function(){var parts=wt.value.split(":");if(parts.length<2){setStatus("请选择时间","error");return}
var h=parseInt(parts[0]),m=parseInt(parts[1]);var totalMin=h*60+m;var cycles=[5,4,3,2];res.innerHTML="";var lines=[];
cycles.forEach(function(c){var mins=totalMin-c*90;if(mins<0)mins+=1440;var bH=Math.floor(mins/60)%24,bM=mins%60;
var block=document.createElement("div");block.style.cssText="padding:8px 12px;background:var(--color-bg-soft);border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between";
block.innerHTML="<span style='font-weight:600'>"+c+" 个周期 ("+(c*90/60)+"h)</span><span style='font-family:var(--font-mono)'>"+String(bH).padStart(2,"0")+":"+String(bM).padStart(2,"0")+" 入睡</span>";res.appendChild(block);lines.push((c*90/60)+"h睡眠: "+String(bH).padStart(2,"0")+":"+String(bM).padStart(2,"0"))});
o.textContent=lines.join("\n");setStatus("计算完成，建议选择 5-6 个周期")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
