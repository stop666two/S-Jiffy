<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slugify String - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>Slugify String</h1>
    <p class="tool-desc">将文本转换为 URL 友好的 slug（"Hello World" → "hello-world"）。</p>
    <div class="card">
      <input id="inputText" class="input js-focus-input" type="text" placeholder="输入文本..." value="Hello World! Welcome to S-Jiffy.">
    </div>
    <div style="display:flex; gap:12px; margin:var(--space-3) 0;">
      <button id="slugifyBtn" class="btn btn-primary">生成 Slug</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var outputEl = document.getElementById('outputText');
      var slugifyBtn = document.getElementById('slugifyBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');

      function slugify(str) {
        return str
          .toLowerCase()
          .trim()
          .replace(/[^\w\s-]/g, '')
          .replace(/[\s_]+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-+/, '')
          .replace(/-+$/, '');
      }

      slugifyBtn.addEventListener('click', function () {
        var text = inputEl.value;
        if (!text) { setStatus('请输入文本', 'error'); return; }
        outputEl.textContent = slugify(text);
        setStatus('');
      });

      inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          outputEl.textContent = slugify(inputEl.value);
          setStatus('');
        }
      });

      clearBtn.addEventListener('click', function () {
        inputEl.value = '';
        outputEl.textContent = '';
        setStatus('');
        inputEl.focus();
      });

      copyBtn.addEventListener('click', function () {
        var text = outputEl.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });
    })();
  </script>
</body>
</html>
