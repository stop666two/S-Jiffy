<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速度单位转换 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .sp-grid { display:grid; gap:var(--space-3); }
    .sp-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
    .sp-row .field { flex:1; min-width:140px; }
    .sp-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>速度单位转换</h1>
    <p class="tool-desc">km/h ↔ mph ↔ knot ↔ m/s 互转。</p>
    <div class="card">
      <div class="sp-grid">
        <div class="sp-row">
          <div class="field"><label for="kmh">公里/时 (km/h)</label><input id="kmh" class="input" type="number" value="100"></div>
          <div class="field"><label for="mph">英里/时 (mph)</label><input id="mph" class="input" type="number" value="62.14"></div>
        </div>
        <div class="sp-row">
          <div class="field"><label for="knot">节 (knot)</label><input id="knot" class="input" type="number" value="53.99"></div>
          <div class="field"><label for="ms">米/秒 (m/s)</label><input id="ms" class="input" type="number" value="27.78"></div>
        </div>
      </div>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var kmh = document.getElementById('kmh');
      var mph = document.getElementById('mph');
      var knot = document.getElementById('knot');
      var ms = document.getElementById('ms');
      var 输出El = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');
      var updating = false;

      function r(v) { return Math.round(v * 100) / 100; }

      function fromKmh(v) {
        if (updating) return;
        updating = true;
        mph.value = r(v * 0.621371);
        knot.value = r(v * 0.539957);
        ms.value = r(v / 3.6);
        输出El.textContent = v + ' km/h = ' + mph.value + ' mph = ' + knot.value + ' knot = ' + ms.value + ' m/s';
        updating = false;
      }

      function fromMph(v) { fromKmh(v / 0.621371); }
      function fromKnot(v) { fromKmh(v / 0.539957); }
      function fromMs(v) { fromKmh(v * 3.6); }

      kmh.addEventListener('input', function() { fromKmh(parseFloat(this.value) || 0); });
      mph.addEventListener('input', function() { fromMph(parseFloat(this.value) || 0); });
      knot.addEventListener('input', function() { fromKnot(parseFloat(this.value) || 0); });
      ms.addEventListener('input', function() { fromMs(parseFloat(this.value) || 0); });

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });

      fromKmh(100);
    })();
  </script>
</body>
</html>
