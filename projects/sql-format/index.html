<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SQL 格式化 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.inp-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-2)}.inp-row .input{flex:1;min-width:200px}.inp-row select{width:140px}.btn-row{display:flex;gap:8px;margin-bottom:var(--space-3);flex-wrap:wrap}.textarea-box{width:100%;min-height:160px;padding:var(--space-2);font-family:var(--font-mono);font-size:13px;border:1px solid var(--color-border);border-radius:var(--radius-md);resize:vertical;outline:none;transition:border-color .15s}.textarea-box:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.line-num{color:var(--color-text-disabled);padding-right:12px;text-align:right;user-select:none;font-size:12px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>SQL 格式化</h1><p class="tool-desc">SQL 格式化与压缩，支持自定义关键字大小写。</p>
<div class="card">
<div class="inp-row"><select id="caseSelect" class="input" style="width:140px"><option value="upper">关键字大写</option><option value="lower">关键字小写</option><option value="none">保持原样</option></select><select id="modeSelect" class="input" style="width:120px"><option value="格式化">格式化</option><option value="minify">压缩</option></select></div>
<div style="display:flex;gap:12px;flex-wrap:wrap"><div style="flex:1;min-width:300px"><div style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:4px">输入 SQL</div><textarea id="inputSql" class="textarea-box" placeholder="输入 SQL 语句..."></textarea></div><div style="flex:1;min-width:300px"><div style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:4px">输出</div><textarea id="输出Sql" class="textarea-box" readonly placeholder="格式化后的 SQL..."></textarea></div></div>
<div class="btn-row" style="margin-top:var(--space-2)"><button id="formatBtn" class="btn btn-primary">格式化</button><button id="copySqlBtn" class="btn btn-secondary">复制结果</button></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById('inputSql'),outp=document.getElementById('输出Sql'),caseSel=document.getElementById('caseSelect'),modeSel=document.getElementById('modeSelect'),fmtBtn=document.getElementById('formatBtn'),copyBtn=document.getElementById('copySqlBtn'),out=document.getElementById('输出Text');var keywords=['SELECT','FROM','WHERE','AND','OR','NOT','IN','LIKE','BETWEEN','IS','NULL','AS','ON','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','CROSS','NATURAL','USING','ORDER','BY','ASC','DESC','GROUP','HAVING','LIMIT','OFFSET','UNION','ALL','DISTINCT','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','DROP','ALTER','ADD','COLUMN','INDEX','VIEW','PRIMARY','KEY','FOREIGN','REFERENCES','CASCADE','CONSTRAINT','UNIQUE','CHECK','DEFAULT','IF','EXISTS','CASE','WHEN','THEN','ELSE','END','BEGIN','COMMIT','ROLLBACK','TRANSACTION','GRANT','REVOKE','TRUNCATE','REPLACE','MERGE','WITH','RECURSIVE','EXCEPT','INTERSECT','FETCH','NEXT','ROWS','ONLY','COUNT','SUM','AVG','MIN','MAX','CAST','COALESCE','NULLIF','TRUE','FALSE'];function applyCase(s){var cs=caseSel.value;if(cs==='upper')return s.to大写();if(cs==='lower')return s.to小写();return s}function formatSQL(sql){var tokens=[];var current='';var inString=false;var strChar='';for(var i=0;i<sql.length;i++){var ch=sql[i];if(inString){current+=ch;if(ch===strChar&&(i===0||sql[i-1]!=='\\'))inString=false}else{if(ch==="'"||ch==='"'){inString=true;strChar=ch;current+=ch}else if(/[ \t\r\n]/.test(ch)){if(current){tokens.push({type:'word',value:current});current=''}}else if(/[(),;]/.test(ch)){if(current){tokens.push({type:'word',value:current});current=''};tokens.push({type:'sep',value:ch})}else if(/[=<>!]/.test(ch)){if(current){tokens.push({type:'word',value:current});current=''};var next=sql[i+1]||'';if((ch==='<'&&next==='>')||(ch==='!'&&next==='=')||(ch==='='&&next==='=')||(ch==='<'&&next==='=')||(ch==='>'&&next==='=')){tokens.push({type:'op',value:ch+next});i++}else{tokens.push({type:'op',value:ch})}}else{current+=ch}}}if(current)tokens.push({type:'word',value:current});var 结果='';var indent=0;var newLine=true;for(var i=0;i<tokens.length;i++){var t=tokens[i];if(t.type==='sep'){if(t.value==='('){if(!newLine)结果+=' ';结果+='(';indent++;newLine=false}else if(t.value===')'){indent--;结果+=')';newLine=false}else if(t.value===';'){结果+=';\n';newLine=true}}else if(t.type==='op'){结果+=' '+t.value+' ';newLine=false}else{var upper=t.value.to大写();var isKw=keywords.indexOf(upper)!==-1;if(isKw){if(!newLine&&结果.length>0&&结果[结果.length-1]!=='('&&结果[结果.length-1]!=='\n'){结果+='\n'}for(var j=0;j<indent;j++)结果+='  ';结果+=applyCase(t.value);newLine=false;if(t.value.to大写()==='SELECT'||t.value.to大写()==('FROM')||t.value.to大写()==('WHERE')||t.value.to大写()==('ORDER')||t.value.to大写()==('GROUP')||t.value.to大写()==('HAVING')||t.value.to大写()==('LIMIT')||t.value.to大写()==('INSERT')||t.value.to大写()==('UPDATE')||t.value.to大写()==('DELETE')||t.value.to大写()==('CREATE')||t.value.to大写()==('ALTER')||t.value.to大写()==('DROP')){结果+='\n'}}else{if(newLine){for(var j=0;j<indent;j++)结果+='  '}结果+=t.value;newLine=false}}}return 结果.trim()}function minifySQL(sql){var inString=false;var strChar='';var out='';for(var i=0;i<sql.length;i++){var ch=sql[i];if(inString){out+=ch;if(ch===strChar&&sql[i-1]!=='\\')inString=false}else{if(ch==="'"||ch==='"'){inString=true;strChar=ch;out+=ch}else if(/[ \t\n\r]+/.test(ch)){out+=' '}else{out+=ch}}}return out.replace(/\s*([(),;])\s*/g,'$1').replace(/\s{2,}/g,' ').trim()}fmtBtn.addEventListener('click',function(){var sql=inp.value.trim();if(!sql){setStatus('请输入 SQL','error');return}var 结果=modeSel.value==='format'?formatSQL(sql):minifySQL(sql);outp.value=结果;out.textContent=结果.length>100?结果.slice(0,100)+'...':结果;setStatus(modeSel.value==='format'?'格式化完成':'压缩完成')});copyBtn.addEventListener('click',function(){var v=outp.value;if(v){copyToClipboard(v,this);setStatus('已复制')}});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
