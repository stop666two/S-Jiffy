<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Prettify - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>SQL Prettify</h1>
    <p class="tool-desc">SQL 格式化：将关键词转为大写，添加缩进和换行。</p>
    <div class="card">
      <textarea id="inputSql" class="input textarea js-focus-input" placeholder="输入 SQL 语句..." style="min-height:150px;">select u.id, u.name, count(o.id) as order_count from users u join orders o on u.id = o.user_id where u.status = 'active' and o.created_at > '2024-01-01' group by u.id, u.name having count(o.id) > 5 order by order_count desc limit 10;</textarea>
    </div>
    <div style="display:flex; gap:12px; margin-bottom:var(--space-3);">
      <button id="formatBtn" class="btn btn-primary">格式化</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputSql = document.getElementById('inputSql');
      var formatBtn = document.getElementById('formatBtn');
      var clearBtn = document.getElementById('clearBtn');
      var outputEl = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');

      var keywords = [
        'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'NOT', 'IN', 'IS', 'NULL',
        'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'CROSS', 'ON', 'AS',
        'GROUP', 'BY', 'HAVING', 'ORDER', 'ASC', 'DESC',
        'LIMIT', 'OFFSET', 'INSERT', 'INTO', 'VALUES', 'UPDATE', 'SET',
        'DELETE', 'CREATE', 'TABLE', 'DROP', 'ALTER', 'ADD', 'COLUMN',
        'INDEX', 'VIEW', 'IF', 'EXISTS', 'PRIMARY', 'KEY', 'FOREIGN',
        'REFERENCES', 'UNIQUE', 'DEFAULT', 'CHECK', 'CONSTRAINT',
        'DISTINCT', 'COUNT', 'SUM', 'AVG', 'MIN', 'MAX',
        'UNION', 'ALL', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END',
        'LIKE', 'BETWEEN', 'EXISTS', 'CAST', 'COALESCE', 'NULLIF',
        'WITH', 'RECURSIVE', 'EXCEPT', 'INTERSECT',
        'BEGIN', 'COMMIT', 'ROLLBACK', 'TRANSACTION',
        'TRUE', 'FALSE'
      ];

      var majorKeywords = ['SELECT', 'FROM', 'WHERE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'CROSS',
        'GROUP', 'ORDER', 'HAVING', 'LIMIT', 'UNION', 'INSERT', 'INTO', 'VALUES',
        'UPDATE', 'SET', 'DELETE', 'CREATE', 'DROP', 'ALTER', 'BEGIN', 'COMMIT', 'ROLLBACK'];

      function formatSQL(sql) {
        var uc = sql.toUpperCase();
        var result = sql;

        for (var i = 0; i < keywords.length; i++) {
          var kw = keywords[i];
          var re = new RegExp('\\b' + kw + '\\b', 'gi');
          result = result.replace(re, kw);
        }

        result = result.replace(/\s*\(\s*/g, ' (');
        result = result.replace(/\s*\)\s*/g, ') ');
        result = result.replace(/\s*,\s*/g, ', ');

        for (var j = 0; j < majorKeywords.length; j++) {
          var mkw = majorKeywords[j];
          var mkRe = new RegExp('\\b' + mkw + '\\b', 'g');
          result = result.replace(mkRe, '\n' + mkw);
        }

        result = result.replace(/ AND /gi, '\n  AND ');
        result = result.replace(/ OR /gi, '\n  OR ');

        result = result.replace(/\n\s*\n/g, '\n');
        result = result.trim();

        return result;
      }

      formatBtn.addEventListener('click', function () {
        var sql = inputSql.value.trim();
        if (!sql) { setStatus('请输入 SQL 语句', 'error'); return; }
        var formatted = formatSQL(sql);
        outputEl.textContent = formatted;
        setStatus('');
      });

      clearBtn.addEventListener('click', function () {
        inputSql.value = '';
        outputEl.textContent = '';
        setStatus('');
        inputSql.focus();
      });

      copyBtn.addEventListener('click', function () {
        var text = outputEl.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });
    })();
  </script>
</body>
</html>
