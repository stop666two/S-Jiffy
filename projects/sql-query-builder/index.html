<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SQL 查询生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.sqb-preview{font-family:var(--font-mono);font-size:var(--font-size-sm);background:var(--color-bg-secondary);padding:var(--space-3);border-radius:var(--radius-md);white-space:pre-wrap;margin-top:var(--space-2)}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>SQL 查询构造器</h1><p class="tool-desc">可视化构建 SELECT 查询，选择列、表、条件、排序和 LIMIT。</p>
<div class="card">
<div style="display:grid;gap:var(--space-2);">
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">表名</label><input id="tableName" class="input" value="users" style="width:200px;"></div>
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">列（逗号分隔，* 为全部）</label><input id="columns" class="input" value="id, name, email, created_at" style="width:100%;max-width:500px;"></div>
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">WHERE 条件（可选）</label><input id="whereClause" class="input" placeholder="age > 18 AND status = 'active'" style="width:100%;max-width:500px;"></div>
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">ORDER BY（可选）</label><input id="orderBy" class="input" placeholder="created_at DESC" style="width:200px;"></div>
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">LIMIT（可选）</label><input id="limitVal" type="number" class="input" placeholder="100" style="width:100px;"></div>
<button id="generateBtn" class="btn btn-primary" style="width:150px;">生成 SQL</button>
</div>
</div>
<div class="sqb-preview" id="sqlPreview">SELECT 语句将显示在此处</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;font-family:var(--font-mono);font-size:var(--font-size-xs);"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var tableName=document.getElementById('tableName');
var columns=document.getElementById('columns');
var whereClause=document.getElementById('whereClause');
var orderBy=document.getElementById('orderBy');
var limitVal=document.getElementById('limitVal');
var generateBtn=document.getElementById('generateBtn');
var copyBtn=document.getElementById('copyBtn');
var sqlPreview=document.getElementById('sqlPreview');
var 输出El=document.getElementById('outputText');
function buildSQL(){
var table=tableName.value.trim();
if(!table){setStatus('请输入表名','error');return;}
var cols=columns.value.trim();
if(!cols)cols='*';
var sql='SELECT '+cols+' FROM '+table;
var where=whereClause.value.trim();
if(where)sql+=' WHERE '+where;
var order=orderBy.value.trim();
if(order)sql+=' ORDER BY '+order;
var lim=limitVal.value.trim();
if(lim)sql+=' LIMIT '+parseInt(lim);
sql+=';';
return sql;
}
function generate(){
var sql=buildSQL();
sqlPreview.textContent=sql;
输出El.textContent=sql;
setStatus('');
}
columns.addEventListener('input',generate);
tableName.addEventListener('input',generate);
whereClause.addEventListener('input',generate);
orderBy.addEventListener('input',generate);
limitVal.addEventListener('input',generate);
generateBtn.addEventListener('click',generate);
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
generate();
})();
</script></body></html>
