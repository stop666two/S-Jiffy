<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SSH 密钥格式 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-top:var(--space-2)}.detail-item{padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.detail-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.detail-item .val{font-size:var(--font-size-base);font-weight:600;word-break:break-all}.raw-key{font-size:12px;word-break:break-all;font-family:var(--font-mono);line-height:1.5}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>SSH 密钥格式</h1><p class="tool-desc">查看 SSH 公钥/私钥格式详情</p>
<div class="card"><textarea id="keyInput" class="input textarea" placeholder="粘贴 SSH 公钥 (ssh-rsa AAA... 或 ssh-ed25519 AAA...)"></textarea><button id="parseBtn" class="btn btn-primary" style="margin-top:var(--space-2)">解析</button></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var keyInput=document.getElementById('keyInput'),parseBtn=document.getElementById('parseBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');function base64ToHex(b64){try{var raw=atob(b64);var hex='';for(var i=0;i<raw.length;i++){var h=raw.charCodeAt(i).toString(16);hex+=(h.length<2?'0':'')+h}return hex.toUpperCase()}catch(e){return null}}function decodeLength(bytes,offset){if(offset+4>bytes.length)return null;var len=0;for(var i=0;i<4;i++){len=(len<<8)+bytes[offset+i]}return{len:len,newOffset:offset+4}}function parsePubkey(b64){try{var raw=atob(b64);var bytes=[];for(var i=0;i<raw.length;i++)bytes.push(raw.charCodeAt(i));var offset=0;var algoLen=decodeLength(bytes,offset);if(!algoLen)return null;offset=algoLen.newOffset;var algo=String.fromCharCode.apply(null,bytes.slice(offset,offset+algoLen.len));offset+=algoLen.len;var result={algorithm:algo};if(algo==='ssh-rsa'){var expLen=decodeLength(bytes,offset);if(!expLen)return null;offset=expLen.newOffset;var exp=0;for(var j=0;j<expLen.len;j++)exp=(exp<<8)+bytes[offset+j];offset+=expLen.len;result.bitLength=exp;var modLen=decodeLength(bytes,offset);if(!modLen)return null;offset=modLen.newOffset;result.modulusBits=(modLen.len-1)*8;result.bitLength=result.modulusBits}else if(algo==='ssh-ed25519'||algo==='ssh-ed448'){var pkLen=decodeLength(bytes,offset);if(!pkLen)return null;offset=pkLen.newOffset;result.bitLength=algo==='ssh-ed25519'?256:448;result.keyType='EdDSA'}else if(algo==='ecdsa-sha2-nistp256'||algo==='ecdsa-sha2-nistp384'||algo==='ecdsa-sha2-nistp521'){var curveLen=decodeLength(bytes,offset);if(!curveLen)return null;offset=curveLen.newOffset;var curve=String.fromCharCode.apply(null,bytes.slice(offset,offset+curveLen.len));offset+=curveLen.len;result.curve=curve;result.bitLength=parseInt(curve.replace('nistp',''),10);result.keyType='ECDSA'}else{result.bitLength='?'}return result}catch(e){return null}}function getComment(line){var parts=line.trim().split(/\s+/);if(parts.length>=3)return parts.slice(2).join(' ');return''}function parse(){var raw=keyInput.value.trim();if(!raw){setStatus('请粘贴 SSH 公钥','error');return}var lines=raw.split('\n').filter(function(l){return l.trim()&&!l.trim().startsWith('----')});if(!lines.length){setStatus('未找到有效的密钥数据','error');return}var line=lines[0].trim();var parts=line.split(/\s+/);if(parts.length<2){setStatus('无法解析：格式应为 "算法 base64 [注释]"','error');return}var algo=parts[0],b64=parts[1],comment=parts.slice(2).join(' ')||'(无)';var info=parsePubkey(b64);if(!info){outputText.innerHTML='<div style="color:var(--color-error)">无法解析公钥数据。请确保粘贴的是完整的公钥字符串。</div>';return}var html='<div class="detail-grid">';html+='<div class="detail-item"><div class="lbl">算法</div><div class="val">'+htmlEscape(algo)+'</div></div>';html+='<div class="detail-item"><div class="lbl">位长</div><div class="val">'+(info.bitLength||'?')+' bit</div></div>';html+='<div class="detail-item"><div class="lbl">注释</div><div class="val">'+htmlEscape(comment)+'</div></div>';html+='<div class="detail-item"><div class="lbl">类型</div><div class="val">'+(info.keyType||'RSA')+'</div></div>';if(info.curve)html+='<div class="detail-item"><div class="lbl">曲线</div><div class="val">'+htmlEscape(info.curve)+'</div></div>';html+='</div>';html+='<div class="detail-item" style="margin-top:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);padding:var(--space-2)"><div class="lbl">完整指纹数据 (Base64 解码长度: '+b64.length+' 字符)</div></div>';outputText.innerHTML=html}parseBtn.addEventListener('click',parse);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}})})();</script>
</body></html>
