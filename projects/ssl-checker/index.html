<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SSL 证书检测 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.inp-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-3)}.inp-row .input{flex:1;min-width:250px}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.info-item{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}.info-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.info-item .val{font-family:var(--font-mono);font-size:var(--font-size-sm);margin-top:4px;word-break:break-all}.status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600}.status-badge.valid{background:#e8f5e9;color:#2e7d32}.status-badge.invalid{background:#fbe9e7;color:#c62828}.status-badge.unknown{background:#fff3e0;color:#e65100}.loading{text-align:center;padding:var(--space-3);color:var(--color-text-secondary)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>SSL 证书检测</h1><p class="tool-desc">检测目标网站的 SSL 证书基本信息（通过 fetch 获取证书信息）。</p>
<div class="card">
<div class="inp-row"><input id="urlInput" class="input" placeholder="输入域名或 URL，如 example.com"><button id="checkBtn" class="btn btn-primary">检测</button></div>
<div id="resultArea"><div class="loading">输入域名并点击检测</div></div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById('urlInput'),btn=document.getElementById('checkBtn'),area=document.getElementById('resultArea'),out=document.getElementById('outputText');var keyUsages=['digitalSignature','nonRepudiation','keyEncipherment','dataEncipherment','keyAgreement','keyCertSign','cRLSign','encipherOnly','decipherOnly'];function parsePEM(pemStr){var b64=pemStr.replace(/-----BEGIN [A-Z ]+-----/,'').replace(/-----END [A-Z ]+-----/,'').replace(/\s/g,'');try{var raw=atob(b64);var hex='';for(var i=0;i<raw.length;i++){var h=raw.charCodeAt(i).toString(16);hex+=h.length===1?'0'+h:h}return hex}catch(e){return''}}function checkSSL(){var val=inp.value.trim();if(!val){setStatus('请输入域名','error');return}var url=val;if(!/^https?:\/\//i.test(url))url='https://'+url;area.innerHTML='<div class="loading">正在检测证书...</div>';btn.disabled=true;fetch(url,{mode:'cors',cache:'no-cache'}).then(function(r){var secInfo=r.headers.get('X-Frame-Options')||'N/A';var csp=r.headers.get('Content-Security-Policy')||'无';var hsts=r.headers.get('Strict-Transport-Security')||'无';var server=r.headers.get('Server')||'未知';var html='<div style="margin-bottom:var(--space-2)"><span class="status-badge valid">连接正常</span></div><div class="info-grid">';html+='<div class="info-item"><div class="lbl">域名</div><div class="val">'+url+'</div></div>';html+='<div class="info-item"><div class="lbl">状态码</div><div class="val">'+r.status+' '+r.statusText+'</div></div>';html+='<div class="info-item"><div class="lbl">HTTPS</div><div class="val">是 (安全连接)</div></div>';html+='<div class="info-item"><div class="lbl">服务器</div><div class="val">'+server+'</div></div>';html+='<div class="info-item"><div class="lbl">HSTS</div><div class="val" style="font-size:12px">'+hsts+'</div></div>';html+='<div class="info-item"><div class="lbl">CSP</div><div class="val" style="font-size:12px">'+(csp.length>50?csp.slice(0,50)+'...':csp)+'</div></div>';html+='<div class="info-item"><div class="lbl">安全提醒</div><div class="val">'+'请通过浏览器地址栏查看完整的证书详情（本工具有限）</div></div>';html+='</div>';area.innerHTML=html;out.textContent=url+' - SSL 连接正常';setStatus('检测完成: '+r.status)}).catch(function(e){area.innerHTML='<div><span class="status-badge invalid">检测失败</span><p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:8px">'+e.message+'<br>提示：浏览器的跨域限制可能阻止了证书信息获取。请直接在浏览器地址栏查看锁图标获取详细证书信息。</p></div>';out.textContent=url+' - 检测失败';setStatus('检测失败','error')}).finally(function(){btn.disabled=false})}btn.addEventListener('click',checkSSL);inp.addEventListener('keydown',function(e){if(e.key==='Enter')checkSSL()});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
