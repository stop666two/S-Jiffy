<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SVG 编辑器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.svg-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:800px){.svg-layout{grid-template-columns:1fr}}.svg-layout textarea{height:280px;resize:vertical;font-family:var(--font-mono);font-size:12px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.svg-layout textarea:focus{border-color:var(--color-text-primary)}.svg-preview{border:1px solid var(--color-border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;min-height:280px;background:#fff}.svg-preview svg{max-width:100%;max-height:260px}.shape-bar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.shape-bar button{padding:6px 14px;font-size:12px}.control-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px}.control-row label{font-size:12px;color:var(--color-text-secondary)}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>SVG 编辑器</h1><p class="tool-desc">编辑 SVG 代码、添加基本形状、实时预览效果。</p>
<div class="card">
<div class="control-row">
<label>宽度: <input id="svgWidth" type="number" value="400" style="width:70px;" class="input"></label>
<label>高度: <input id="svgHeight" type="number" value="300" style="width:70px;" class="input"></label>
<button id="updateSizeBtn" class="btn btn-secondary" style="height:40px;">更新尺寸</button>
</div>
<div class="shape-bar">
<button class="btn btn-secondary" data-shape="rect" style="height:36px;">矩形</button>
<button class="btn btn-secondary" data-shape="circle" style="height:36px;">圆形</button>
<button class="btn btn-secondary" data-shape="ellipse" style="height:36px;">椭圆</button>
<button class="btn btn-secondary" data-shape="line" style="height:36px;">线条</button>
<button class="btn btn-secondary" data-shape="polygon" style="height:36px;">三角形</button>
<button class="btn btn-secondary" data-shape="star" style="height:36px;">星形</button>
</div>
<div class="svg-layout">
<textarea id="svgInput" class="js-focus-input" placeholder="&lt;svg&gt;...&lt;/svg&gt;"></textarea>
<div class="svg-preview" id="svgPreview"></div>
</div>
</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var svgInput=document.getElementById('svgInput');
var svgPreview=document.getElementById('svgPreview');
var svgWidth=document.getElementById('svgWidth');
var svgHeight=document.getElementById('svgHeight');
var updateSizeBtn=document.getElementById('updateSizeBtn');
var 输出El=document.getElementById('outputText');
var copyBtn=document.getElementById('copyBtn');

function defaultSvg(w,h){
return '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="background:#f8f8f8">\n  <rect x="50" y="50" width="100" height="80" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>\n  <circle cx="280" cy="100" r="50" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>\n  <ellipse cx="200" cy="220" rx="120" ry="40" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>\n</svg>';
}

function render(){
var code=svgInput.value.trim();
if(!code){
svgPreview.innerHTML='<div style="color:var(--color-text-disabled);font-size:13px;">输入 SVG 代码或添加形状</div>';
return;
}
svgPreview.innerHTML=code;
var svgEl=svgPreview.querySelector('svg');
if(svgEl){
svgEl.style.maxWidth='100%';
svgEl.style.maxHeight='260px';
}
输出El.textContent='SVG 尺寸: '+svgWidth.value+'x'+svgHeight.value;
}

function addShape(type){
var w=parseInt(svgWidth.value)||400;
var h=parseInt(svgHeight.value)||300;
var cx=Math.round(w/2);
var cy=Math.round(h/2);
var shapes={
rect:'<rect x="'+(cx-60)+'" y="'+(cy-40)+'" width="120" height="80" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>',
circle:'<circle cx="'+cx+'" cy="'+cy+'" r="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>',
ellipse:'<ellipse cx="'+cx+'" cy="'+cy+'" rx="100" ry="50" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>',
line:'<line x1="'+(cx-80)+'" y1="'+(cy-40)+'" x2="'+(cx+80)+'" y2="'+(cy+40)+'" stroke="#9b59b6" stroke-width="3"/>',
polygon:'<polygon points="'+cx+','+(cy-50)+' '+(cx-50)+','+(cy+40)+' '+(cx+50)+','+(cy+40)+'" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>',
star:'<polygon points="'+cx+','+(cy-50)+' '+(cx+15)+','+(cy-15)+' '+(cx+50)+','+(cy-15)+' '+(cx+22)+','+(cy+10)+' '+(cx+30)+','+(cy+45)+' '+cx+','+(cy+25)+' '+(cx-30)+','+(cy+45)+' '+(cx-22)+','+(cy+10)+' '+(cx-50)+','+(cy-15)+' '+(cx-15)+','+(cy-15)+'" fill="#e91e63" stroke="#c2185b" stroke-width="2"/>'
};
var newSvg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="background:#f8f8f8">\n';
if(svgInput.value.trim()){
var existing=svgInput.value;
existing=existing.replace(/<svg[^>]*>/,'');
existing=existing.replace(/<\/svg>/,'');
newSvg+=existing.trim()+'\n';
}
newSvg+='  '+shapes[type]+'\n</svg>';
svgInput.value=newSvg;
render();
}

updateSizeBtn.addEventListener('click',function(){
var w=parseInt(svgWidth.value)||400;
var h=parseInt(svgHeight.value)||300;
var code=svgInput.value.trim();
if(code){
code=code.replace(/width="[^"]*"/,'width="'+w+'"');
code=code.replace(/height="[^"]*"/,'height="'+h+'"');
code=code.replace(/viewBox="[^"]*"/,'viewBox="0 0 '+w+' '+h+'"');
svgInput.value=code;
render();
}else{
svgInput.value=defaultSvg(w,h);
render();
}
setStatus('尺寸已更新');
});

var shapeBtns=document.querySelectorAll('[data-shape]');
for(var i=0;i<shapeBtns.length;i++){
(function(el){
el.addEventListener('click',function(){addShape(this.getAttribute('data-shape'));});
})(shapeBtns[i]);
}

svgInput.addEventListener('input',render);
copyBtn.addEventListener('click',function(){if(svgInput.value){copyToClipboard(svgInput.value,copyBtn);setStatus('已复制 SVG 代码');}});
svgInput.value=defaultSvg(400,300);
render();
})();</script></body></html>
