<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>列对齐工具 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.align-controls{display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap;align-items:center;}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>列对齐工具</h1><p class="tool-desc">将多行文本按分隔符对齐或左右对齐格式化。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="例如：&#10;name: Alice&#10;age: 30&#10;location: New York" style="min-height:140px;"></textarea></div>
<div class="align-controls">
<input id="delimiter" class="input" value=":" placeholder="分隔符" style="width:100px;">
<select id="alignMode" class="input" style="width:auto;min-width:100px;">
  <option value="delimiter">按分隔符对齐</option>
  <option value="right">右对齐</option>
  <option value="left">左对齐</option>
  <option value="center">居中对齐</option>
</select>
<button id="alignBtn" class="btn btn-primary">对齐</button>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var i=document.getElementById('inputText'),o=document.getElementById('outputText');
var dInput=document.getElementById('delimiter'),am=document.getElementById('alignMode');
document.getElementById('alignBtn').addEventListener('click',function(){
  var text=i.value;if(!text.trim()){setStatus('请输入文本','error');return;}
  var lines=text.split('\n');var delim=dInput.value||':';var mode=am.value;
  if(mode==='delimiter'){
    var parts=lines.map(function(l){var idx=l.indexOf(delim);if(idx===-1)return[l,''];return[l.substring(0,idx),l.substring(idx+delim.length)];});
    var maxLen=0;parts.forEach(function(p){if(p[0].length>maxLen)maxLen=p[0].length;});
    o.textContent=parts.map(function(p){return p[0].trim().padEnd(maxLen)+(p[1]?delim+' '+p[1].trim():'');}).join('\n');
  }else{
    var maxWidth=0;lines.forEach(function(l){if(l.length>maxWidth)maxWidth=l.length;});
    o.textContent=lines.map(function(l){
      if(mode==='right')return l.padStart(maxWidth);
      if(mode==='center'){var pad=Math.max(0,maxWidth-l.length);var lPad=Math.floor(pad/2);return' '.repeat(lPad)+l;}
      return l.padEnd(maxWidth);
    }).join('\n');
  }
  setStatus('');
});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
})();</script>
</body></html>
