<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本对齐器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .ta-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .ta-row .field { flex:1; min-width:80px; }
    .ta-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
    .aligned-输出 { font-family:var(--font-mono); white-space:pre; background:var(--color-bg); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-2); min-height:60px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>文本对齐工具</h1>
    <p class="tool-desc">对文本进行左对齐、居中、右对齐或两端对齐，可配置行宽。</p>
    <div class="card">
      <div class="ta-row">
        <div class="field" style="flex:2;"><label for="inputText">输入文本</label><textarea id="inputText" class="input textarea" style="min-height:80px;">This is a sample text that can be aligned in various ways using this tool.</textarea></div>
      </div>
      <div class="ta-row">
        <div class="field"><label for="widthVal">行宽（字符数）</label><input id="widthVal" class="input" type="number" value="40" min="10" max="200"></div>
        <div class="field"><label for="alignSel">对齐方式</label>
          <select id="alignSel" class="input" style="width:auto;min-width:80px;">
            <option value="left">左对齐</option>
            <option value="center">居中</option>
            <option value="right">右对齐</option>
            <option value="justify">两端对齐</option>
          </select>
        </div>
      </div>
      <div><button id="genBtn" class="btn btn-primary">对齐</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputText');
    var widthEl = document.getElementById('widthVal');
    var alignEl = document.getElementById('alignSel');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function justifyLine(line, width) {
      var words = line.split(/\s+/);
      if (words.length === 1) return line;
      var totalSpaces = width - line.replace(/\s/g, '').length;
      var gaps = words.length - 1;
      var spacePerGap = Math.floor(totalSpaces / gaps);
      var extra = totalSpaces % gaps;
      var 结果 = '';
      for (var i = 0; i < words.length; i++) {
        结果 += words[i];
        if (i < gaps) {
          var spaces = spacePerGap + (i < extra ? 1 : 0);
          for (var s = 0; s < spaces; s++) 结果 += ' ';
        }
      }
      return 结果;
    }

    function generate() {
      var text = inputEl.value;
      if (!text) { setStatus('请输入文本', 'error'); return; }
      var width = parseInt(widthEl.value, 10) || 40;
      if (width < 10) width = 10;
      if (width > 200) width = 200;
      var align = alignEl.value;

      var words = text.split(/\s+/);
      var lines = [];
      var currentLine = '';
      for (var i = 0; i < words.length; i++) {
        if ((currentLine + ' ' + words[i]).length <= width || currentLine === '') {
          currentLine = currentLine ? currentLine + ' ' + words[i] : words[i];
        } else {
          lines.push(currentLine);
          currentLine = words[i];
        }
      }
      if (currentLine) lines.push(currentLine);

      var 输出 = '';
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (align === 'left') {
          输出 += line + '\n';
        } else if (align === 'center') {
          var padding = Math.floor((width - line.length) / 2);
          for (var p = 0; p < padding; p++) 输出 += ' ';
          输出 += line + '\n';
        } else if (align === 'right') {
          var padding = width - line.length;
          for (var p = 0; p < padding; p++) 输出 += ' ';
          输出 += line + '\n';
        } else if (align === 'justify') {
          if (i < lines.length - 1) {
            输出 += justifyLine(line, width) + '\n';
          } else {
            输出 += line + '\n';
          }
        }
      }

      输出El.textContent = 输出;
      setStatus('已对齐 ' + lines.length + ' 行');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
