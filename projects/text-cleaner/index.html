<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>文本清理器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>
.clean-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;min-height:250px}@media(max-width:700px){.clean-layout{grid-template-columns:1fr}}.clean-layout textarea{height:250px;resize:vertical;font-family:var(--font-mono);font-size:13px;padding:12px;border:1px solid var(--color-border);border-radius:var(--radius-md);outline:none}.clean-layout textarea:focus{border-color:var(--color-text-primary);box-shadow:var(--shadow-focus)}.option-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.option-grid label{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 12px;border:1px solid var(--color-border);border-radius:20px;cursor:pointer;transition:all .15s;user-select:none}.option-grid label:hover{border-color:var(--color-text-primary)}.option-grid input[type=checkbox]{accent-color:var(--color-text-primary)}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>文本清理器</h1><p class="tool-desc">清理文本：移除多余空格、特殊字符、空行，统一标点符号和空白字符。</p>
<div class="card">
<div class="option-grid">
<label><input type="checkbox" id="optTrim" checked> 去除首尾空格</label>
<label><input type="checkbox" id="optExtraSpace" checked> 合并多余空格</label>
<label><input type="checkbox" id="optEmptyLines" checked> 移除空行</label>
<label><input type="checkbox" id="optSpecial" checked> 移除特殊字符</label>
<label><input type="checkbox" id="optNormalize" checked> 统一标点</label>
<label><input type="checkbox" id="optUnicode"> Unicode 标准化</label>
</div>
<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
<button id="cleanBtn" class="btn btn-primary">清理</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="clean-layout">
<textarea id="inputText" class="js-focus-input" placeholder="粘贴需要清理的文本...">Hello,  World!!  这是一段  含有多余空格、特殊字符@#$%和 空行的文本。

  第二段  包含  不统一符号...   
第三行</textarea>
<textarea id="outputText" readonly placeholder="清理结果..." style="background:var(--color-bg-soft);"></textarea>
</div>
</div>
<div class="output-box"><span id="statusText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){
var inputEl=document.getElementById('inputText');
var outputEl=document.getElementById('outputText');
var cleanBtn=document.getElementById('cleanBtn');
var clearBtn=document.getElementById('clearBtn');
var statusText=document.getElementById('statusText');
var copyBtn=document.getElementById('copyBtn');
var optTrim=document.getElementById('optTrim');
var optExtraSpace=document.getElementById('optExtraSpace');
var optEmptyLines=document.getElementById('optEmptyLines');
var optSpecial=document.getElementById('optSpecial');
var optNormalize=document.getElementById('optNormalize');
var optUnicode=document.getElementById('optUnicode');

function clean(){
var text=inputEl.value;
if(!text){outputEl.value='';statusText.textContent='';setStatus('请输入文本','error');return;}
var result=text;
if(optUnicode.checked)result=result.normalize('NFKC');
if(optNormalize.checked){
result=result.replace(/[「」『』]/g,'"');
result=result.replace(/[【】]/g,'[]');
result=result.replace(/[！]/g,'!');
result=result.replace(/[？]/g,'?');
result=result.replace(/[，]/g,',');
result=result.replace(/[；]/g,';');
result=result.replace(/[：]/g,':');
result=result.replace(/[。]/g,'.');
result=result.replace(/[～]/g,'~');
result=result.replace(/[·・]/g,'.');
result=result.replace(/\u2018|\u2019/g,"'");
result=result.replace(/\u201c|\u201d/g,'"');
result=result.replace(/\u2013|\u2014/g,'-');
}
if(optSpecial.checked)result=result.replace(/[^\w\s\u4e00-\u9fff.,!?;:'"()\[\]{}\-@#$%&*+\/=<>~^_`|\\]/g,'');
if(optEmptyLines.checked){
result=result.replace(/\n\s*\n/g,'\n');
result=result.replace(/^\s*\n/,'');
}
if(optExtraSpace.checked){
result=result.replace(/[ \t]+/g,' ');
result=result.replace(/\n\s+/g,'\n');
}
if(optTrim.checked)result=result.trim();
outputEl.value=result;
var origLen=text.length;
var newLen=result.length;
statusText.textContent='原始: '+origLen+' 字符 → 清理后: '+newLen+' 字符 (减少 '+(origLen-newLen)+' 字符)';
setStatus('');
}

cleanBtn.addEventListener('click',clean);
clearBtn.addEventListener('click',function(){inputEl.value='';outputEl.value='';statusText.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(outputEl.value){copyToClipboard(outputEl.value,copyBtn);setStatus('已复制');}});
inputEl.addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')clean();});
})();</script></body></html>
