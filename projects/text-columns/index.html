<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>文字分栏 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>文字分栏</h1><p class="tool-desc">将文本按指定列数分栏排版。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><label>输入文本</label><textarea id="inputText" class="input textarea js-focus-input" style="min-height:100px" placeholder="输入文本..."></textarea></div>
<div class="row"><div><label>列数</label><select id="columns" class="input" style="width:auto"><option value="2">2列</option><option value="3" selected>3列</option><option value="4">4列</option></select></div><div style="display:flex;align-items:end;gap:8px"><button id="formatBtn" class="btn btn-primary">分栏</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputText"),col=document.getElementById("columns"),o=document.getElementById("输出Text");
document.getElementById("formatBtn").addEventListener("click",function(){var t=inp.value,n=parseInt(col.value);if(!t){setStatus("请输入文本","error");return}
var lines=t.split("\n").filter(function(l){return l.trim()}),per=Math.ceil(lines.length/n),cols=[];for(var i=0;i<n;i++){cols.push(lines.slice(i*per,Math.min((i+1)*per,lines.length)))}
var r="";for(var y=0;y<per;y++){for(var x=0;x<n;x++){r+=(cols[x][y]||"")+(x<n-1?"\t| ":"")}r+="\n"}o.textContent=r;setStatus("已分"+n+"列，共"+lines.length+"行")});
document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
