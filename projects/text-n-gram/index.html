<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N-gram 生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .ng-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .ng-row .field { flex:1; min-width:80px; }
    .ng-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>N-Gram 分析</h1>
    <p class="tool-desc">从文本中提取 N-gram（连续 N 个单元），并按频率排序显示。</p>
    <div class="card">
      <div class="ng-row">
        <div class="field" style="flex:2;"><label for="inputText">输入文本</label><textarea id="inputText" class="input textarea" style="min-height:80px;">this is a simple test this is a test</textarea></div>
      </div>
      <div class="ng-row">
        <div class="field"><label for="nVal">N 值</label><input id="nVal" class="input" type="number" value="2" min="1" max="10"></div>
        <div class="field"><label for="limitVal">显示数量</label><input id="limitVal" class="input" type="number" value="20" min="1" max="500"></div>
      </div>
      <div class="ng-row">
        <label style="display:flex;align-items:center;gap:8px;">
          单元类型
          <select id="unitSel" class="input" style="width:auto;min-width:80px;">
            <option value="word">单词</option>
            <option value="char">字符</option>
          </select>
        </label>
        <label style="display:flex;align-items:center;gap:8px;"><input id="caseChk" type="checkbox" checked> 忽略大小写</label>
      </div>
      <div><button id="genBtn" class="btn btn-primary">生成</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputText');
    var nEl = document.getElementById('nVal');
    var limitEl = document.getElementById('limitVal');
    var unitEl = document.getElementById('unitSel');
    var caseChk = document.getElementById('caseChk');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function generate() {
      var text = inputEl.value;
      if (!text) { setStatus('请输入文本', 'error'); return; }
      var n = parseInt(nEl.value, 10) || 2;
      if (n < 1) n = 1;
      if (n > 10) n = 10;
      var limit = parseInt(limitEl.value, 10) || 20;
      if (limit < 1) limit = 1;
      if (limit > 500) limit = 500;
      var unit = unitEl.value;
      var ignoreCase = caseChk.checked;

      if (ignoreCase) text = text.toLowerCase();

      var tokens;
      if (unit === 'word') {
        tokens = text.split(/[\s\n\r\t]+/).filter(function(w) { return w !== ''; });
      } else {
        tokens = text.split('').filter(function(c) { return c !== ' ' && c !== '\n' && c !== '\t'; });
      }

      if (tokens.length < n) { setStatus('文本长度不足 ' + n + '，请增加文本或减小 N', 'error'); return; }

      var freq = {};
      for (var i = 0; i <= tokens.length - n; i++) {
        var gram = tokens.slice(i, i + n).join(unit === 'word' ? ' ' : '');
        freq[gram] = (freq[gram] || 0) + 1;
      }

      var entries = [];
      var keys = Object.keys(freq);
      for (var i = 0; i < keys.length; i++) {
        entries.push({ gram: keys[i], count: freq[keys[i]] });
      }
      entries.sort(function(a, b) { return b.count - a.count; });

      var 输出 = 'N = ' + n + ', 共 ' + entries.length + ' 个唯一 N-gram\n';
      输出 += '单元类型: ' + (unit === 'word' ? '单词' : '字符') + '\n';
      输出 += '\n频率排名:\n';
      var display = Math.min(limit, entries.length);
      for (var i = 0; i < display; i++) {
        输出 += (i + 1) + '. "' + entries[i].gram + '" → ' + entries[i].count + ' 次\n';
      }

      输出El.textContent = 输出;
      setStatus('已生成 ' + entries.length + ' 个 N-gram');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
