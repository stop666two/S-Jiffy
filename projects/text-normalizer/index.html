<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>文本规范化 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>文本规范化</h1><p class="tool-desc">清理多余空格空行统一标点符号。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><label>输入文本</label><textarea id="inputText" class="input textarea js-focus-input" style="min-height:100px" placeholder="输入要规范化的文本..."></textarea></div>
<div class="row"><label><input id="trimSpace" type="checkbox" checked> 去除首尾空格</label><label><input id="collapseSpace" type="checkbox" checked> 合并连续空格</label><label><input id="collapseLines" type="checkbox"> 合并空行</label><div style="display:flex;align-items:end;gap:8px;flex:1;justify-content:flex-end"><button id="normalizeBtn" class="btn btn-primary">规范化</button><button id="clearBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px">清空</button></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputText"),ts=document.getElementById("trimSpace"),cs=document.getElementById("collapseSpace"),cl=document.getElementById("collapseLines"),o=document.getElementById("outputText");
document.getElementById("normalizeBtn").addEventListener("click",function(){var t=inp.value;if(!t){setStatus("请输入文本","error");return}
if(ts.checked)t=t.trim();if(cs.checked)t=t.replace(/ +/g," ");if(cl.checked)t=t.replace(/\n{3,}/g,"\n\n");t=t.replace(/[""]/g,"\u201C").replace(/[""]/g,"\u201D").replace(/''/g,"\u2018").replace(/''/g,"\u2019").replace(/--/g,"\u2014").replace(/\.\.\./g,"\u2026");o.textContent=t;setStatus("规范化完成")});
document.getElementById("clearBtn").addEventListener("click",function(){inp.value="";o.textContent="";setStatus("")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
