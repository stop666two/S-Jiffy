<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本填充器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .tp-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .tp-row .field { flex:1; min-width:80px; }
    .tp-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>文本填充工具</h1>
    <p class="tool-desc">在文本左侧、右侧或两侧以指定字符填充至目标长度。</p>
    <div class="card">
      <div class="tp-row">
        <div class="field" style="flex:2;"><label for="inputText">输入文本</label><input id="inputText" class="input" type="text" value="hello" placeholder="输入文本"></div>
      </div>
      <div class="tp-row">
        <div class="field"><label for="targetLen">目标长度</label><input id="targetLen" class="input" type="number" value="20" min="1" max="200"></div>
        <div class="field"><label for="padChar">填充字符</label><input id="padChar" class="input" type="text" value="=" maxlength="1" style="width:60px;"></div>
      </div>
      <div class="tp-row">
        <label style="display:flex;align-items:center;gap:8px;">对齐方式
          <select id="alignSel" class="input" style="width:auto;min-width:80px;">
            <option value="right">左填充（右对齐）</option>
            <option value="left">右填充（左对齐）</option>
            <option value="center">两侧填充（居中）</option>
          </select>
        </label>
      </div>
      <div><button id="genBtn" class="btn btn-primary">填充</button></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputText');
    var targetEl = document.getElementById('targetLen');
    var padCharEl = document.getElementById('padChar');
    var alignEl = document.getElementById('alignSel');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function generate() {
      var text = inputEl.value;
      var target = parseInt(targetEl.value, 10) || 20;
      if (target < 1) target = 1;
      if (target > 200) target = 200;
      var padChar = padCharEl.value || '=';
      var align = alignEl.value;

      if (text.length >= target) {
        输出El.textContent = text;
        setStatus('文本长度已达目标，无需填充');
        return;
      }

      var needed = target - text.length;
      var 结果;
      if (align === 'right') {
        var pad = '';
        for (var i = 0; i < needed; i++) pad += padChar;
        结果 = pad + text;
      } else if (align === 'left') {
        var pad = '';
        for (var i = 0; i < needed; i++) pad += padChar;
        结果 = text + pad;
      } else {
        var left = Math.floor(needed / 2);
        var right = needed - left;
        var leftPad = '', rightPad = '';
        for (var i = 0; i < left; i++) leftPad += padChar;
        for (var i = 0; i < right; i++) rightPad += padChar;
        结果 = leftPad + text + rightPad;
      }

      输出El.textContent = 结果;
      setStatus('已填充至 ' + target + ' 字符');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
