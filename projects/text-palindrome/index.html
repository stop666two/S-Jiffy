<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回文检测器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .tp-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .tp-row .field { flex:1; min-width:100px; }
    .tp-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
    .pal-结果 { font-size:var(--font-size-lg); font-weight:600; margin:var(--space-2) 0; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
  <main class="tool-workspace">
    <h1>回文检测器</h1>
    <p class="tool-desc">检查文本是否为回文，并查找最长回文子串。</p>
    <div class="card">
      <div class="tp-row">
        <div class="field" style="flex:2;"><label for="inputText">输入文本</label><input id="inputText" class="input" type="text" value="A man, a plan, a canal: Panama" placeholder="输入要检查的文本"></div>
      </div>
      <div class="tp-row">
        <label style="display:flex;align-items:center;gap:8px;"><input id="ignoreCaseChk" type="checkbox" checked> 忽略大小写</label>
        <label style="display:flex;align-items:center;gap:8px;"><input id="ignoreNonAlphaChk" type="checkbox" checked> 忽略非字母数字</label>
      </div>
      <div><button id="genBtn" class="btn btn-primary">检查</button></div>
      <div class="pal-结果" id="pal结果"></div>
    </div>
    <div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputText');
    var ignoreCaseChk = document.getElementById('ignoreCaseChk');
    var ignoreNonAlphaChk = document.getElementById('ignoreNonAlphaChk');
    var genBtn = document.getElementById('genBtn');
    var pal结果 = document.getElementById('pal结果');
    var 输出El = document.getElementById('输出Text');
    var copyBtn = document.getElementById('copyBtn');

    function longestPalindrome(s) {
      var n = s.length;
      if (n === 0) return '';
      var start = 0, maxLen = 1;
      function expand(l, r) {
        while (l >= 0 && r < n && s[l] === s[r]) { l--; r++; }
        return r - l - 1;
      }
      for (var i = 0; i < n; i++) {
        var len1 = expand(i, i);
        var len2 = expand(i, i + 1);
        var len = len1 > len2 ? len1 : len2;
        if (len > maxLen) {
          maxLen = len;
          start = i - Math.floor((len - 1) / 2);
        }
      }
      return s.substring(start, start + maxLen);
    }

    function generate() {
      var text = inputEl.value;
      if (!text) { setStatus('请输入文本', 'error'); return; }
      var ignoreCase = ignoreCaseChk.checked;
      var ignoreNonAlpha = ignoreNonAlphaChk.checked;

      var clean = text;
      if (ignoreCase) clean = clean.to小写();
      if (ignoreNonAlpha) clean = clean.replace(/[^a-z0-9\u4e00-\u9fff]/gi, '');

      var isPal = false;
      var reversed = clean.split('').reverse().join('');
      isPal = clean === reversed;

      var longest = longestPalindrome(clean);

      pal结果.textContent = isPal ? '✓ 是回文' : '✗ 不是回文';
      pal结果.style.color = isPal ? 'var(--color-success)' : 'var(--color-error)';

      var 输出 = '原始文本: ' + text + '\n';
      输出 += '处理后文本: ' + (clean || '(空)') + '\n';
      输出 += '是否回文: ' + (isPal ? '是' : '否') + '\n';
      输出 += '最长回文子串: "' + longest + '" (长度: ' + longest.length + ')\n';
      if (isPal) 输出 += '\n反转后: ' + reversed;

      输出El.textContent = 输出;
      setStatus('检查完成');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
