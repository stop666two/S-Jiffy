<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本重复器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .repeater-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .repeater-row .field { flex:1; min-width:120px; }
    .repeater-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>文本重复器</h1>
    <p class="tool-desc">输入文本和重复次数，可选择分隔符。</p>
    <div class="card">
      <div class="repeater-row">
        <div class="field">
          <label for="inputText">文本</label>
          <input id="inputText" class="input js-focus-input" placeholder="要重复的文本">
        </div>
        <div class="field">
          <label for="repeatCount">重复次数</label>
          <input id="repeatCount" class="input" type="number" value="3" min="1" max="10000">
        </div>
      </div>
      <div class="repeater-row">
        <div class="field">
          <label for="separatorInput">分隔符</label>
          <input id="separatorInput" class="input" placeholder="可选，如逗号/换行等">
        </div>
        <div style="display:flex;align-items:flex-end;">
          <button id="repeatBtn" class="btn btn-primary">重复</button>
        </div>
      </div>
    </div>
    <div class="输出-box">
      <span id="输出Text" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var countEl = document.getElementById('repeatCount');
      var sepEl = document.getElementById('separatorInput');
      var repeatBtn = document.getElementById('repeatBtn');
      var 输出El = document.getElementById('输出Text');
      var copyBtn = document.getElementById('copyBtn');

      function repeat() {
        var text = inputEl.value;
        var count = parseInt(countEl.value, 10) || 1;
        if (count < 1) count = 1;
        if (count > 100000) count = 100000;
        if (!text) {
          输出El.textContent = '';
          setStatus('请输入文本', 'error');
          return;
        }
        var sep = sepEl.value;
        var parts = [];
        for (var i = 0; i < count; i++) {
          parts.push(text);
        }
        输出El.textContent = parts.join(sep);
        setStatus('已重复 ' + count + ' 次' + (sep ? '，分隔符: ' + sep : ''));
      }

      repeatBtn.addEventListener('click', repeat);

      copyBtn.addEventListener('click', function() {
        var text = 输出El.textContent;
        if (text) {
          copyToClipboard(text, copyBtn);
          setStatus('已复制到剪贴板');
        }
      });

      inputEl.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') repeat();
      });
    })();
  </script>
</body>
</html>
