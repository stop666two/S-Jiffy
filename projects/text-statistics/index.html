<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Statistics - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:var(--space-2); margin-bottom:var(--space-3); }
    .stat-item { background:var(--color-bg-soft); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:var(--space-2); text-align:center; }
    .stat-item .num { font-size:26px; font-weight:600; }
    .stat-item .label { font-size:var(--font-size-xs); color:var(--color-text-secondary); }
    .word-freq { margin-top:var(--space-2); }
    .word-freq table { width:100%; border-collapse:collapse; font-size:var(--font-size-sm); }
    .word-freq th, .word-freq td { padding:4px 8px; text-align:left; border-bottom:1px solid var(--color-border); }
    .word-freq th { color:var(--color-text-secondary); font-weight:500; }
    .word-freq .bar { height:16px; background:var(--color-text-primary); border-radius:2px; min-width:2px; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>Text Statistics</h1>
    <p class="tool-desc">实时统计文本的各项指标，含高频词、平均词长、预估阅读时间。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="输入或粘贴文本..." style="min-height:200px;"></textarea>
    </div>
    <div class="stat-grid" id="statGrid">
      <div class="stat-item"><div class="num" id="charCount">0</div><div class="label">字符（含空格）</div></div>
      <div class="stat-item"><div class="num" id="charNoSpaceCount">0</div><div class="label">字符（不含空格）</div></div>
      <div class="stat-item"><div class="num" id="charCnCount">0</div><div class="label">中文字数</div></div>
      <div class="stat-item"><div class="num" id="wordCount">0</div><div class="label">单词数</div></div>
      <div class="stat-item"><div class="num" id="sentenceCount">0</div><div class="label">句子数</div></div>
      <div class="stat-item"><div class="num" id="lineCount">0</div><div class="label">行数</div></div>
      <div class="stat-item"><div class="num" id="paraCount">0</div><div class="label">段落数</div></div>
      <div class="stat-item"><div class="num" id="avgWordLen">0</div><div class="label">平均词长</div></div>
      <div class="stat-item"><div class="num" id="readingTime">0</div><div class="label">阅读时间 (min)</div></div>
    </div>
    <div class="card">
      <h2 style="font-size:var(--font-size-base);font-weight:600;margin-bottom:var(--space-2);">高频词 Top 10</h2>
      <div id="freqContainer" class="word-freq"><p style="color:var(--color-text-secondary);font-size:var(--font-size-sm);">输入文本后显示高频词</p></div>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var charCount = document.getElementById('charCount');
      var charNoSpaceCount = document.getElementById('charNoSpaceCount');
      var charCnCount = document.getElementById('charCnCount');
      var wordCount = document.getElementById('wordCount');
      var sentenceCount = document.getElementById('sentenceCount');
      var lineCount = document.getElementById('lineCount');
      var paraCount = document.getElementById('paraCount');
      var avgWordLen = document.getElementById('avgWordLen');
      var readingTime = document.getElementById('readingTime');
      var freqContainer = document.getElementById('freqContainer');
      var outputEl = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');

      function updateStats() {
        var text = inputEl.value;
        var chars = text.length;
        var charsNoSpace = text.replace(/\s/g, '').length;
        var cnChars = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;
        var wordsArr = text.trim() ? text.trim().split(/\s+/) : [];
        var words = wordsArr.length;
        var sentences = text ? text.split(/[.!?。！？\n]+/).filter(function(s) { return s.trim().length > 0; }).length : 0;
        var lines = text ? text.split('\n').length : 0;
        var paras = text ? text.split(/\n\s*\n/).filter(function(p) { return p.trim().length > 0; }).length : 0;
        if (!text.trim()) paras = 0;

        var avgLen = words > 0 ? (wordsArr.reduce(function(sum, w) { return sum + w.length; }, 0) / words) : 0;
        var readTime = words > 0 ? (words / 200).toFixed(1) : '0';

        charCount.textContent = chars;
        charNoSpaceCount.textContent = charsNoSpace;
        charCnCount.textContent = cnChars;
        wordCount.textContent = words;
        sentenceCount.textContent = sentences;
        lineCount.textContent = lines;
        paraCount.textContent = paras;
        avgWordLen.textContent = avgLen.toFixed(1);
        readingTime.textContent = readTime;

        showFreq(wordsArr);

        outputEl.textContent = '字符：' + chars + '（不含空格 ' + charsNoSpace + '）| 单词：' + words + ' | 阅读：' + readTime + 'min';
      }

      function showFreq(wordsArr) {
        if (wordsArr.length === 0) {
          freqContainer.innerHTML = '<p style="color:var(--color-text-secondary);font-size:var(--font-size-sm);">输入文本后显示高频词</p>';
          return;
        }
        var freq = {};
        for (var i = 0; i < wordsArr.length; i++) {
          var w = wordsArr[i].toLowerCase().replace(/[^a-z\u4e00-\u9fff]/g, '');
          if (w) freq[w] = (freq[w] || 0) + 1;
        }
        var sorted = Object.keys(freq).sort(function(a, b) { return freq[b] - freq[a]; });
        var top = sorted.slice(0, 10);
        var maxFreq = top.length > 0 ? freq[top[0]] : 1;
        var html = '<table><thead><tr><th style="width:40px">#</th><th>单词</th><th style="width:60px">次数</th><th>分布</th></tr></thead><tbody>';
        for (var i = 0; i < top.length; i++) {
          var pct = (freq[top[i]] / maxFreq * 100).toFixed(0);
          html += '<tr><td>' + (i + 1) + '</td><td>' + top[i] + '</td><td>' + freq[top[i]] + '</td><td><div class="bar" style="width:' + pct + '%"></div></td></tr>';
        }
        html += '</tbody></table>';
        freqContainer.innerHTML = html;
      }

      inputEl.addEventListener('input', updateStats);

      copyBtn.addEventListener('click', function () {
        var text = outputEl.textContent;
        if (text) { copyToClipboard(text, copyBtn); setStatus('已复制到剪贴板'); }
      });

      updateStats();
    })();
  </script>
</body>
</html>
