<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ASCII 表格生成 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>
.table-controls{display:flex;gap:12px;margin-bottom:var(--space-3);flex-wrap:wrap;align-items:center;}
.ascii-example{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:var(--space-1);white-space:pre;font-family:var(--font-mono);}
</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>ASCII 表格生成</h1><p class="tool-desc">将 JSON 数组或 CSV 文本生成为 ASCII 艺术风格表格。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder='[{"Name":"Alice","Age":30,"City":"New York"},{"Name":"Bob","Age":25,"City":"London"}]' style="min-height:140px;"></textarea></div>
<div class="table-controls">
<select id="inputFormat" class="input" style="width:auto;min-width:100px;">
  <option value="json">JSON 数组</option>
  <option value="csv">CSV 格式</option>
</select>
<button id="generateBtn" class="btn btn-primary">生成表格</button>
</div>
<div class="output-box"><span id="outputText" style="font-family:var(--font-mono);"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){
var i=document.getElementById('inputText'),o=document.getElementById('outputText');
var fmt=document.getElementById('inputFormat');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function repeat(ch,n){var r='';for(var i=0;i<n;i++)r+=ch;return r;}
function padCell(s,w){s=String(s);if(s.length>w-2)s=s.substring(0,w-5)+'...';return' '+s+repeat(' ',w-s.length-1);}
function asciiTable(headers,rows){
  if(!headers||headers.length===0)return'';
  var colWidths=headers.map(function(h){return h.length+2;});
  rows.forEach(function(r){
    headers.forEach(function(h,i){var v=String(r[h]||'').length+2;if(v>colWidths[i])colWidths[i]=v;});
  });
  var sep='+'+colWidths.map(function(w){return repeat('-',w);}).join('+')+'+';
  var lines=[sep];
  lines.push('|'+headers.map(function(h,i){return padCell(h,colWidths[i]);}).join('|')+'|');
  lines.push(sep);
  rows.forEach(function(r){lines.push('|'+headers.map(function(h,i){return padCell(r[h]!==undefined?r[h]:'',colWidths[i]);}).join('|')+'|');});
  lines.push(sep);
  return lines.join('\n');
}
document.getElementById('generateBtn').addEventListener('click',function(){
  var text=i.value.trim();if(!text){setStatus('请输入数据','error');return;}
  try{
    var data,headers;
    if(fmt.value==='json'){
      data=JSON.parse(text);if(!Array.isArray(data))throw new Error('需要 JSON 数组');
      if(data.length===0){o.textContent='';setStatus('空数组','error');return;}
      headers=Object.keys(data[0]);
    }else{
      var lines=text.split('\n').filter(function(l){return l.trim();});
      if(lines.length<2){o.textContent='';setStatus('CSV 至少需要标题行和一行数据','error');return;}
      headers=lines[0].split(',').map(function(s){return s.trim();});
      data=[];
      for(var li=1;li<lines.length;li++){
        var vals=lines[li].split(',').map(function(s){return s.trim();});
        var row={};headers.forEach(function(h,i){row[h]=vals[i]||'';});data.push(row);
      }
    }
    o.textContent=asciiTable(headers,data);
    setStatus('');
  }catch(e){o.textContent='';setStatus('解析失败: '+e.message,'error');}
});
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent)copyToClipboard(o.textContent,this);setStatus('已复制');});
})();</script>
</body></html>
