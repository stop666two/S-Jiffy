<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本与 Unicode 互转 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>文本与 Unicode 互转</h1>
    <p class="tool-desc">将文本转换为 \\uXXXX 格式的 Unicode 码点，或从 \\uXXXX 还原为文本。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="输入文本或 \\uXXXX 序列..." style="min-height:100px;"></textarea>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
      <button id="toUnicodeBtn" class="btn btn-primary">文本 → \\uXXXX</button>
      <button id="toTextBtn" class="btn btn-secondary">\\uXXXX → 文本</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="output-box" id="outputContainer">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function() {
      var inputEl = document.getElementById('inputText');
      var outputEl = document.getElementById('outputText');
      var copyBtn = document.getElementById('copyBtn');
      var clearBtn = document.getElementById('clearBtn');

      document.getElementById('toUnicodeBtn').addEventListener('click', function() {
        var text = inputEl.value;
        if (!text) { setStatus('请输入文本', 'error'); return; }
        var result = [];
        for (var i = 0; i < text.length; i++) {
          var code = text.charCodeAt(i);
          result.push('\\u' + code.toString(16).toUpperCase().padStart(4, '0'));
        }
        outputEl.textContent = result.join('');
        setStatus('已转换 ' + text.length + ' 个字符');
      });

      document.getElementById('toTextBtn').addEventListener('click', function() {
        var raw = inputEl.value;
        if (!raw) { setStatus('请输入 \\uXXXX 序列', 'error'); return; }
        try {
          var result = raw.replace(/\\u([0-9A-Fa-f]{4})/g, function(match, hex) {
            return String.fromCharCode(parseInt(hex, 16));
          });
          outputEl.textContent = result;
          setStatus('已还原为文本');
        } catch (e) {
          setStatus('解析失败：格式无效', 'error');
        }
      });

      clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        outputEl.textContent = '';
        setStatus('');
        inputEl.focus();
      });

      copyBtn.addEventListener('click', function() {
        if (outputEl.textContent) { copyToClipboard(outputEl.textContent, copyBtn); setStatus('已复制'); }
      });
    })();
  </script>
</body>
</html>
