<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本换行器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .tw-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; margin-bottom:var(--space-3); }
    .tw-row .field { flex:1; min-width:80px; }
    .tw-row label { display:block; font-size:var(--font-size-sm); color:var(--color-text-secondary); margin-bottom:4px; }
  </style>
</head>
<body>
  <header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>文本换行工具</h1>
    <p class="tool-desc">将文本按指定宽度换行，支持单词截断和缩进选项。</p>
    <div class="card">
      <div class="tw-row">
        <div class="field" style="flex:2;"><label for="inputText">输入文本</label><textarea id="inputText" class="input textarea" style="min-height:80px;">This is a long text that needs to be wrapped at a specified column width for better readability.</textarea></div>
      </div>
      <div class="tw-row">
        <div class="field"><label for="widthVal">换行宽度</label><input id="widthVal" class="input" type="number" value="30" min="1" max="200"></div>
        <div class="field"><label for="indentVal">缩进空格数</label><input id="indentVal" class="input" type="number" value="0" min="0" max="20"></div>
      </div>
      <div class="tw-row">
        <label style="display:flex;align-items:center;gap:8px;"><input id="breakWordChk" type="checkbox"> 允许单词内断行</label>
      </div>
      <div><button id="genBtn" class="btn btn-primary">换行</button></div>
    </div>
    <div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
  </main>
  <footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('inputText');
    var widthEl = document.getElementById('widthVal');
    var indentEl = document.getElementById('indentVal');
    var breakWordChk = document.getElementById('breakWordChk');
    var genBtn = document.getElementById('genBtn');
    var 输出El = document.getElementById('outputText');
    var copyBtn = document.getElementById('copyBtn');

    function generate() {
      var text = inputEl.value;
      if (!text) { setStatus('请输入文本', 'error'); return; }
      var width = parseInt(widthEl.value, 10) || 30;
      if (width < 1) width = 1;
      if (width > 200) width = 200;
      var indent = parseInt(indentEl.value, 10) || 0;
      if (indent < 0) indent = 0;
      if (indent > 20) indent = 20;
      var breakWord = breakWordChk.checked;

      var indentStr = '';
      for (var i = 0; i < indent; i++) indentStr += ' ';
      var availWidth = width - indent;

      var words = text.split(/\s+/);
      var lines = [];
      var currentLine = '';
      for (var i = 0; i < words.length; i++) {
        var word = words[i];
        if (breakWord && word.length > availWidth) {
          if (currentLine) {
            lines.push(indentStr + currentLine);
            currentLine = '';
          }
          for (var j = 0; j < word.length; j += availWidth) {
            lines.push(indentStr + word.substring(j, j + availWidth));
          }
        } else if ((currentLine + ' ' + word).length <= availWidth || currentLine === '') {
          currentLine = currentLine ? currentLine + ' ' + word : word;
        } else {
          lines.push(indentStr + currentLine);
          currentLine = word;
        }
      }
      if (currentLine) lines.push(indentStr + currentLine);

      输出El.textContent = lines.join('\n');
      setStatus('换行完成，共 ' + lines.length + ' 行');
    }

    genBtn.addEventListener('click', generate);
    copyBtn.addEventListener('click', function() { if (输出El.textContent) { copyToClipboard(输出El.textContent, copyBtn); setStatus('已复制'); } });
  })();</script>
</body>
</html>
