<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>时间间隔 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.td-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:var(--space-2);margin-top:var(--space-3)}.td-card{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:var(--space-3);text-align:center}.td-card .num{font-size:var(--font-size-xxl);font-weight:700;color:var(--color-primary);font-family:var(--font-mono)}.td-card .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:4px}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>时间间隔</h1><p class="tool-desc">计算两个时间之间的精确时、分、秒差。</p>
<div class="card">
<div style="display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:center;">
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">开始时间</label><input id="startTime" type="time" class="input" value="09:00"></div>
<div><label style="font-size:var(--font-size-xs);color:var(--color-text-secondary);display:block;">结束时间</label><input id="endTime" type="time" class="input" value="17:30"></div>
<button id="calcBtn" class="btn btn-primary" style="margin-top:14px;">计算</button>
</div>
</div>
<div class="td-grid">
<div class="td-card"><div class="num" id="hours">-</div><div class="lbl">小时</div></div>
<div class="td-card"><div class="num" id="minutes">-</div><div class="lbl">分钟</div></div>
<div class="td-card"><div class="num" id="seconds">-</div><div class="lbl">秒</div></div>
<div class="td-card"><div class="num" id="totalMin">-</div><div class="lbl">总分钟</div></div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var startTime=document.getElementById('startTime');
var endTime=document.getElementById('endTime');
var calcBtn=document.getElementById('calcBtn');
var copyBtn=document.getElementById('copyBtn');
var hoursEl=document.getElementById('hours');
var minutesEl=document.getElementById('minutes');
var secondsEl=document.getElementById('seconds');
var totalMinEl=document.getElementById('totalMin');
var 输出El=document.getElementById('输出Text');
function calc(){
var s=startTime.value;
var e=endTime.value;
if(!s||!e){setStatus('请选择开始和结束时间','error');return;}
var p=s.split(':').map(Number);
var q=e.split(':').map(Number);
var sMin=p[0]*60+p[1];
var eMin=q[0]*60+q[1];
var diff=eMin-sMin;
if(diff<0)diff+=1440;
var h=Math.floor(diff/60);
var m=diff%60;
var sec=h*3600+m*60;
hoursEl.textContent=h;
minutesEl.textContent=m;
secondsEl.textContent=sec;
totalMinEl.textContent=diff;
输出El.textContent='间隔 '+h+' 小时 '+m+' 分钟（共 '+diff+' 分钟）';
setStatus('');
}
calcBtn.addEventListener('click',calc);
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
calc();
})();
</script></body></html>
