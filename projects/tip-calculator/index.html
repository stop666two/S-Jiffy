<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>小费计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>小费计算器</h1><p class="tool-desc">餐饮小费和人均分摊计算。</p><div class="card"><div class="row"><div><label>账单金额 (元)</label><input id="bill" class="input" type="number" value="368" min="1" step="0.01"></div><div><label>小费比例 (%)</label><input id="tipPct" class="input" type="number" value="15" min="0" max="100" step="1"></div><div><label>人数</label><input id="people" class="input" type="number" value="4" min="1" max="100"></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="tipVal">—</div><div class="l">小费 (元)</div></div><div class="res-item"><div class="v" id="totalVal">—</div><div class="l">含小费总额</div></div><div class="res-item"><div class="v" id="perVal">—</div><div class="l">人均 (元)</div></div><div class="res-item"><div class="v" id="tipPerVal">—</div><div class="l">人均小费</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var b=document.getElementById('bill'),tp=document.getElementById('tipPct'),pe=document.getElementById('people'),tv=document.getElementById('tipVal'),tot=document.getElementById('totalVal'),pv=document.getElementById('perVal'),tpv=document.getElementById('tipPerVal'),o=document.getElementById('outputText');
function calc(){var bill=parseFloat(b.value),tip=parseFloat(tp.value),ppl=parseInt(pe.value);if(!bill||!ppl){setStatus('请输入有效数据','error');return}
var tipAmt=bill*tip/100;var total=bill+tipAmt;var per=total/ppl;
tv.textContent=tipAmt.toFixed(2);tot.textContent=total.toFixed(2);pv.textContent=per.toFixed(2);tpv.textContent=(tipAmt/ppl).toFixed(2);
o.textContent='小费: '+tipAmt.toFixed(2)+' | 总额: '+total.toFixed(2)+' | 人均: '+per.toFixed(2)+' | 人数: '+ppl;setStatus('计算完成')}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制')}});calc();})();</script></body></html>
