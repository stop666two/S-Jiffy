<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>简易待办清单 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.game-area{text-align:center;padding:24px 0}.game-btn{width:120px;height:120px;border-radius:50%;border:none;font-size:18px;font-weight:600;cursor:pointer;transition:all .15s}.game-btn.ready{background:#4CAF50;color:#fff}.game-btn.waiting{background:#F44336;color:#fff}.game-btn:active{transform:scale(0.95)}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>简易待办清单</h1><p class="tool-desc">本地存储的待办事项管理。</p><div class="card"><div class="row"><div style="flex:1"><input id="todoInput" class="input" placeholder="输入待办事项..." style="width:100%"></div><div style="display:flex;align-items:end;gap:8px"><button id="addBtn" class="btn btn-primary">添加</button></div></div>
<div id="todoList" style="margin-top:8px"></div>
<div style="margin-top:12px;display:flex;gap:8px;align-items:center"><span id="todoStats" style="font-size:13px;color:var(--color-text-secondary)">0 项待办</span><button id="clearAllBtn" class="btn btn-secondary" style="min-width:auto;padding:0 12px;height:32px;font-size:12px">清空已完成</button></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var ti=document.getElementById("todoInput"),tl=document.getElementById("todoList"),ts=document.getElementById("todoStats"),ca=document.getElementById("clearAllBtn"),o=document.getElementById("输出Text");
function loadTodos(){try{return JSON.parse(localStorage.getItem("s-jiffy-todos"))||[]}catch(e){return[]}}
function saveTodos(t){localStorage.setItem("s-jiffy-todos",JSON.stringify(t))}
function render(){var todos=loadTodos();tl.innerHTML="";var pending=0;todos.forEach(function(t,i){var div=document.createElement("div");div.style.cssText="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--color-border)";
var cb=document.createElement("input");cb.type="checkbox";cb.checked=t.done;cb.style.cssText="width:18px;height:18px;cursor:pointer";
cb.addEventListener("change",function(){todos[i].done=cb.checked;saveTodos(todos);render()});
var txt=document.createElement("span");txt.textContent=t.text;txt.style.cssText="flex:1;font-size:14px"+(t.done?";text-decoration:line-through;color:var(--color-text-disabled)":"");
var del=document.createElement("button");del.textContent="删除";del.style.cssText="background:none;border:none;color:var(--color-error);cursor:pointer;font-size:12px;padding:2px 6px";
del.addEventListener("click",function(){todos.splice(i,1);saveTodos(todos);render()});
div.appendChild(cb);div.appendChild(txt);div.appendChild(del);tl.appendChild(div);if(!t.done)pending++});
ts.textContent=pending+" 项待办";var completed=todos.filter(function(t){return t.done}).length;o.textContent="待办: "+pending+" 未完成 / "+completed+" 已完成"}
document.getElementById("addBtn").addEventListener("click",function(){var text=ti.value.trim();if(!text){setStatus("请输入内容","error");return}
var todos=loadTodos();todos.push({text:text,done:false});saveTodos(todos);ti.value="";render();setStatus("已添加")});
ca.addEventListener("click",function(){var todos=loadTodos().filter(function(t){return!t.done});saveTodos(todos);render();setStatus("已清空已完成项")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});render();})();</script></body></html>
