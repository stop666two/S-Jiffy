<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOML to JSON - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>TOML → JSON</h1>
    <p class="tool-desc">将 TOML 格式转换为 JSON。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder='[server]
host = "localhost"
port = 8080

[logging]
level = "debug"' style="min-height:200px;"></textarea>
    </div>
    <div class="action-bar" style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
      <button id="convertBtn" class="btn btn-primary">转换到 JSON</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="输出-box" id="输出Container">
      <span id="输出Text" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var inputEl = document.getElementById('inputText');
      var 输出El = document.getElementById('输出Text');

      function parseToml(src) {
        var 结果 = {};
        var currentSection = 结果;
        var sectionPath = [];
        var lines = src.split('\n');

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var trimmed = line.trim();
          if (trimmed === '' || trimmed.charAt(0) === '#') continue;

          if (trimmed.charAt(0) === '[') {
            var close = trimmed.indexOf(']');
            if (close === -1) continue;
            var raw = trimmed.substring(1, close);
            sectionPath = raw.trim().split('.');
            currentSection = 结果;
            for (var s = 0; s < sectionPath.length; s++) {
              var part = sectionPath[s].trim();
              if (!currentSection[part]) currentSection[part] = {};
              currentSection = currentSection[part];
            }
            // handle [table]
            continue;
          }

          var eqIdx = trimmed.indexOf('=');
          if (eqIdx === -1) continue;
          var key = trimmed.substring(0, eqIdx).trim();
          var valStr = trimmed.substring(eqIdx + 1).trim();

          if (valStr.indexOf('"') === 0 || valStr.indexOf("'") === 0) {
            var quote = valStr.charAt(0);
            var end = valStr.lastIndexOf(quote);
            currentSection[key] = valStr.substring(1, end);
          } else if (valStr === 'true' || valStr === 'false') {
            currentSection[key] = valStr === 'true';
          } else if (valStr.indexOf('[') === 0) {
            var inner = valStr.substring(1, valStr.lastIndexOf(']')).trim();
            if (inner === '') { currentSection[key] = []; }
            else {
              var items = inner.split(',').map(function (x) {
                x = x.trim();
                if ((x.charAt(0) === '"' && x.charAt(x.length - 1) === '"') || (x.charAt(0) === "'" && x.charAt(x.length - 1) === "'")) {
                  return x.substring(1, x.length - 1);
                }
                var n = Number(x);
                return isNaN(n) ? x : n;
              });
              currentSection[key] = items;
            }
          } else {
            var num = Number(valStr);
            currentSection[key] = isNaN(num) ? valStr : num;
          }
        }
        return 结果;
      }

      document.getElementById('convertBtn').addEventListener('click', function () {
        var text = inputEl.value.trim();
        if (!text) { setStatus('请输入 TOML', 'error'); return; }
        try {
          var parsed = parseToml(text);
          输出El.textContent = JSON.stringify(parsed, null, 2);
          setStatus('');
        } catch (e) {
          输出El.textContent = '';
          setStatus('TOML 解析错误', 'error');
        }
      });

      document.getElementById('clearBtn').addEventListener('click', function () { inputEl.value = ''; 输出El.textContent = ''; setStatus(''); inputEl.focus(); });

      document.getElementById('copyBtn').addEventListener('click', function () {
        if (输出El.textContent) { copyToClipboard(输出El.textContent, this); setStatus('已复制到剪贴板'); }
      });
    })();
  </script>
</body>
</html>
