<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>补码计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.input-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.input-row .input{width:160px}.bit-width-select{height:48px;padding:0 var(--space-2);font-size:var(--font-size-base);border:1px solid #ddd;border-radius:var(--radius-md);outline:none;background:var(--color-bg);cursor:pointer}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);margin-top:var(--space-2)}.result-item{padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md)}.result-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.result-item .val{font-size:var(--font-size-base);font-weight:600;font-family:var(--font-mono);word-break:break-all}.bit-display{display:flex;gap:2px;font-family:var(--font-mono);font-size:13px;margin-top:8px;flex-wrap:wrap}.bit-display .b{width:28px;text-align:center;padding:4px 0;border-radius:3px}.bit-display .b-1{background:var(--color-text-primary);color:#fff}.bit-display .b-0{background:var(--color-bg-soft);color:var(--color-text-secondary);border:1px solid var(--color-border)}.range-note{font-size:13px;color:var(--color-text-secondary);margin-top:var(--space-1)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>补码计算器</h1><p class="tool-desc">计算整数的二进制补码表示</p>
<div class="card"><div class="input-row"><input id="intInput" class="input js-focus-input" type="number" placeholder="整数" value="-42"><select id="bitWidth" class="bit-width-select"><option value="8">8 位</option><option value="16" selected>16 位</option><option value="32">32 位</option><option value="64">64 位</option></select><button id="calcBtn" class="btn btn-primary">计算</button></div>
<div class="range-note" id="rangeNote"></div></div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var intInput=document.getElementById('intInput'),bitWidth=document.getElementById('bitWidth'),calcBtn=document.getElementById('calcBtn'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn'),rangeNote=document.getElementById('rangeNote');function toTwosComplement(val,bits){var max=1<<(bits-1);var range='-'+(max)+' ~ '+(max-1);rangeNote.textContent='范围: '+range;if(val< -max||val>=max){return{error:'值超出 '+bits+' 位补码表示范围 ('+range+')',bits:bits}}var unsigned=val<0?val+(1<<bits):val;var binStr=unsigned.toString(2).padStart(bits,'0');var hexStr=unsigned.toString(16).toUpperCase().padStart(Math.ceil(bits/4),'0');var isNeg=val<0;var signBit=binStr[0];return{decimal:val,bits:bits,binary:binStr,hex:'0x'+hexStr,isNegative:isNeg,signBit:signBit,unsigned:unsigned,range:range}}function calc(){var val=parseInt(intInput.value,10);if(isNaN(val)){setStatus('请输入整数','error');return}var bits=parseInt(bitWidth.value,10);var result=toTwosComplement(val,bits);if(result.error){outputText.innerHTML='<div style="color:var(--color-error);text-align:center;padding:var(--space-2)">'+htmlEscape(result.error)+'</div>';return}var html='<div class="result-grid">';html+='<div class="result-item"><div class="lbl">十进制</div><div class="val">'+result.decimal+'</div></div>';html+='<div class="result-item"><div class="lbl">位宽</div><div class="val">'+result.bits+' 位</div></div>';html+='<div class="result-item"><div class="lbl">十六进制</div><div class="val">'+result.hex+'</div></div>';html+='<div class="result-item"><div class="lbl">无符号值</div><div class="val">'+result.unsigned+'</div></div>';html+='<div class="result-item"><div class="lbl">符号位</div><div class="val">'+(result.isNegative?'1 (负数)':'0 (正数)')+'</div></div>';var maxVal=1<<(result.bits-1);html+='<div class="result-item"><div class="lbl">取值范围</div><div class="val">-'+maxVal+' ~ '+(maxVal-1)+'</div></div>';html+='</div>';html+='<div style="margin-top:var(--space-2)"><strong>二进制补码 ('+result.bits+' 位):</strong></div>';html+='<div class="bit-display">';for(var i=0;i<result.binary.length;i++){var bitCls=result.binary[i]==='1'?'b-1':'b-0';var extra=i===0?' (符号位)':'';html+='<span class="b '+bitCls+'" title="位 '+i+extra+'">'+result.binary[i]+'</span>'}html+='</div>';var steps=[];if(result.decimal<0){var pos=-result.decimal;var binPos=pos.toString(2).padStart(result.bits,'0');steps.push('1. 取绝对值: '+pos+' = '+binPos);var inv=binPos.split('').map(function(b){return b==='0'?'1':'0'}).join('');steps.push('2. 取反: '+inv);var plus1=(parseInt(inv,2)+1).toString(2).padStart(result.bits,'0');steps.push('3. 加 1: '+plus1);steps.push('4. 结果: '+result.binary);}else{steps.push('正数的补码等于其原码');steps.push('结果: '+result.binary);}html+='<div style="margin-top:var(--space-2);padding:var(--space-2);background:var(--color-bg-soft);border-radius:var(--radius-md);font-size:13px;line-height:1.6">';html+='<strong>计算步骤:</strong><br>'+steps.join('<br>');html+='</div>';outputText.innerHTML=html;setStatus('计算完成')}calcBtn.addEventListener('click',calc);copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}});intInput.addEventListener('keydown',function(e){if(e.key==='Enter')calc()});calc()})();</script>
</body></html>
