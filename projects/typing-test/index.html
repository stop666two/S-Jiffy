<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>打字速度测试 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}.big-num{font-size:40px;font-weight:700;text-align:center}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>打字速度测试</h1><p class="tool-desc">测试打字速度 WPM 和准确率。</p><div class="card"><div class="row" style="flex-direction:column;align-items:stretch"><p id="sampleText" style="font-size:14px;line-height:1.6;padding:12px;background:var(--color-bg-soft);border-radius:8px;min-height:60px;font-family:var(--font-mono)"></p></div>
<div class="row" style="flex-direction:column;align-items:stretch"><textarea id="inputArea" class="input textarea" style="min-height:60px" placeholder="在此输入..."></textarea></div>
<div class="row"><button id="startBtn" class="btn btn-primary">重新开始</button><span id="stats" style="font-size:14px;color:var(--color-text-secondary);margin-left:auto">点击开始测试</span></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var samples=["The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump! The five boxing wizards jump quickly. Sphinx of black quartz, judge my vow.","Life is like a box of chocolates; you never know what you're gonna get. The only way to do great work is to love what you do. In the middle of difficulty lies opportunity.","JavaScript is a programming language that is one of the core technologies of the World Wide Web. It is high-level, often just-in-time compiled, and multi-paradigm."];
var st=document.getElementById("sampleText"),ia=document.getElementById("inputArea"),stt=document.getElementById("stats"),o=document.getElementById("outputText");var startTime=null,timer=null;
function newSample(){st.textContent=samples[Math.floor(Math.random()*samples.length)];ia.value="";startTime=null;stt.textContent="准备好后开始输入";o.textContent=""}
ia.addEventListener("input",function(){if(!startTime&&ia.value.length>0){startTime=Date.now();stt.textContent="测试中..."}
if(startTime){var elapsed=(Date.now()-startTime)/1000/60;var words=ia.value.trim().split(/\s+/).length;var correct=0;var sample=st.textContent;for(var i=0;i<ia.value.length&&i<sample.length;i++){if(ia.value[i]===sample[i])correct++}
var acc=ia.value.length>0?Math.round(correct/ia.value.length*100):0;var wpm=elapsed>0?Math.round(words/elapsed):0;stt.textContent="速度: "+wpm+" WPM | 准确率: "+acc+"% | 用时: "+Math.round(elapsed*60)+"s"}
if(ia.value.length>=st.textContent.length&&startTime){var finalWpm=Math.round(ia.value.trim().split(/\s+/).length/((Date.now()-startTime)/1000/60));stt.textContent="完成! 速度: "+finalWpm+" WPM";o.textContent="打字测试结果: "+finalWpm+" WPM";setStatus("测试完成")}});
document.getElementById("startBtn").addEventListener("click",newSample);newSample();
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
