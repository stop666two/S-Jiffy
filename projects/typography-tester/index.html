<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initialscale=1.0"><title>字体测试 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.ctrl-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:var(--space-2);align-items:center}.ctrl-row label{font-size:var(--font-size-sm);color:var(--color-text-secondary)}.ctrl-row .input{width:auto}.ctrl-row input[type=number]{width:80px}.ctrl-row select{min-width:140px}.preview-area{width:100%;min-height:200px;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3);margin:var(--space-2) 0;transition:all .15s;background:var(--color-bg-soft);overflow:hidden}.preview-area .preview-text{outline:none;white-space:pre-wrap;word-break:break-word}.size-ref{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin:var(--space-2) 0}.size-ref div{text-align:center;padding:6px;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-sm)}.size-ref .s{font-size:var(--font-size-xs);color:var(--color-text-secondary)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>字体测试</h1><p class="tool-desc">预览和测试字体效果，支持自定义文本、字号、字重和行高。</p>
<div class="card">
<div class="ctrl-row"><label>字体</label><select id="fontSelect" class="input"><option value="sans-serif">sans-serif</option><option value="serif">serif</option><option value="monospace">monospace</option><option value="Arial">Arial</option><option value="Helvetica">Helvetica</option><option value="Georgia">Georgia</option><option value="Times New Roman">Times New Roman</option><option value="Courier New">Courier New</option><option value="Verdana">Verdana</option><option value="Trebuchet MS">Trebuchet MS</option><option value="Impact">Impact</option><option value="Comic Sans MS">Comic Sans MS</option><option value="system-ui">system-ui</option><option value="'Segoe UI'">Segoe UI</option><option value="'SF Pro Display'">SF Pro Display</option></select></div>
<div class="ctrl-row"><label>字号</label><input id="sizeInput" class="input" type="number" value="24" min="8" max="200"><span style="font-size:var(--font-size-sm)">px</span><label style="margin-left:12px">字重</label><select id="weightSelect" class="input"><option value="100">100 Thin</option><option value="200">200 Extra Light</option><option value="300">300 Light</option><option value="400" selected>400 Regular</option><option value="500">500 Medium</option><option value="600">600 Semi Bold</option><option value="700">700 Bold</option><option value="800">800 Extra Bold</option><option value="900">900 Black</option></select><label style="margin-left:12px">行高</label><input id="lineHeightInput" class="input" type="number" value="1.5" min="0.5" max="5" step="0.1"></div>
<div class="ctrl-row"><label>样式</label><label style="font-size:var(--font-size-sm)"><input id="italicCheck" type="checkbox"> italic</label><label style="font-size:var(--font-size-sm);margin-left:8px"><input id="underlineCheck" type="checkbox"> underline</label><label style="font-size:var(--font-size-sm);margin-left:8px"><input id="大写Check" type="checkbox"> 大写</label></div>
<div class="ctrl-row"><label>文字颜色</label><input id="colorInput" type="color" value="#111111"><label style="margin-left:12px">背景色</label><input id="bgInput" type="color" value="#f7f6f3"></div>
<div class="ctrl-row"><label style="width:auto">预览文本</label><input id="customText" class="input" value="The quick brown fox jumps over the lazy dog" style="flex:1;min-width:200px"></div>
<div class="preview-area" id="previewArea" style="background:#f7f6f3"><div class="preview-text" id="previewText" style="font-size:24px;font-weight:400;line-height:1.5;color:#111111;font-family:sans-serif">The quick brown fox jumps over the lazy dog</div></div>
<div class="size-ref"><div><div style="font-size:12px">12px</div><div class="s">12</div></div><div><div style="font-size:14px">14px</div><div class="s">14</div></div><div><div style="font-size:16px">16px</div><div class="s">16</div></div><div><div style="font-size:18px">18px</div><div class="s">18</div></div><div><div style="font-size:24px">24px</div><div class="s">24</div></div><div><div style="font-size:36px">36px</div><div class="s">36</div></div></div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var preview=document.getElementById('previewText'),previewArea=document.getElementById('previewArea'),fontS=document.getElementById('fontSelect'),sizeI=document.getElementById('sizeInput'),weightS=document.getElementById('weightSelect'),lhI=document.getElementById('lineHeightInput'),italic=document.getElementById('italicCheck'),underline=document.getElementById('underlineCheck'),upper=document.getElementById('大写Check'),colorI=document.getElementById('colorInput'),bgI=document.getElementById('bgInput'),textI=document.getElementById('customText'),out=document.getElementById('输出Text');function render(){var font=fontS.value,size=sizeI.value||24,weight=weightS.value,lh=lhI.value||1.5;preview.style.fontFamily=font;preview.style.fontSize=size+'px';preview.style.fontWeight=weight;preview.style.lineHeight=lh;preview.style.fontStyle=italic.checked?'italic':'normal';preview.style.textDecoration=underline.checked?'underline':'none';preview.style.textTransform=upper.checked?'大写':'none';preview.style.color=colorI.value;previewArea.style.background=bgI.value;preview.textContent=textI.value||'请输入文本';out.textContent=font+' '+weight+' '+size+'px'}fontS.addEventListener('change',render);sizeI.addEventListener('input',render);weightS.addEventListener('change',render);lhI.addEventListener('input',render);italic.addEventListener('change',render);underline.addEventListener('change',render);upper.addEventListener('change',render);colorI.addEventListener('input',render);bgI.addEventListener('input',render);textI.addEventListener('input',render);render();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
