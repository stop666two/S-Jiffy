<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Unicode 转义 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>Unicode 转义</h1><p class="tool-desc">Unicode \\uXXXX 编码与解码，支持 BMP 和代理对。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入文本或 \\uXXXX 编码..." style="min-height:100px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin-bottom:var(--space-2);flex-wrap:wrap;align-items:center;">
<button id="encodeBtn" class="btn btn-primary">文本 → \\uXXXX</button>
<button id="decodeBtn" class="btn btn-secondary">\\uXXXX → 文本</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('输出Text');
var encodeBtn=document.getElementById('encodeBtn');
var decodeBtn=document.getElementById('decodeBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
function encode(text){
var r='';
for(var i=0;i<text.length;i++){
var code=text.charCodeAt(i);
if(code<128)r+=text[i];
else r+='\\u'+code.toString(16).toUpperCase().padStart(4,'0');
}
return r;
}
function decode(text){
return text.replace(/\\u([0-9A-Fa-f]{4})/g,function(m,c){return String.fromCharCode(parseInt(c,16));});
}
encodeBtn.addEventListener('click',function(){
var t=inputEl.value;
if(!t){setStatus('请输入文本','error');return;}
输出El.textContent=encode(t);
setStatus('');
});
decodeBtn.addEventListener('click',function(){
var t=inputEl.value.trim();
if(!t){setStatus('请输入编码','error');return;}
输出El.textContent=decode(t);
setStatus('');
});
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
