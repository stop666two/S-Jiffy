<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Unicode 查找 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.mode-row{display:flex;gap:12px;margin-bottom:var(--space-2)}.mode-row label{font-size:var(--font-size-sm);display:flex;align-items:center;gap:4px;cursor:pointer}.inp-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--space-3)}.inp-row .input{flex:1;min-width:200px}.结果-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.结果-item{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}.结果-item .label{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.结果-item .value{font-family:var(--font-mono);font-size:var(--font-size-lg);word-break:break-all;margin-top:4px}.结果-item .value.sm{font-size:var(--font-size-base)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>Unicode 查找</h1><p class="tool-desc">Unicode 码点双向查找：输入字符查看码点，或输入码点查看字符。</p>
<div class="card">
<div class="mode-row"><label><input type="radio" name="mode" value="char" checked> 字符 → 码点</label><label><input type="radio" name="mode" value="codepoint"> 码点 → 字符</label></div>
<div class="inp-row"><input id="inputField" class="input" placeholder="输入字符或码点（如 U+0041、0x41、65）"><button id="lookupBtn" class="btn btn-primary" style="min-width:80px">查询</button></div>
<div class="结果-grid" id="结果Grid">
<div class="结果-item"><div class="label">字符</div><div class="value" id="resChar">—</div></div>
<div class="结果-item"><div class="label">码点 (十进制)</div><div class="value sm" id="resDec">—</div></div>
<div class="结果-item"><div class="label">码点 (十六进制)</div><div class="value sm" id="resHex">—</div></div>
<div class="结果-item"><div class="label">Unicode 区块</div><div class="value sm" id="resBlock">—</div></div>
</div>
</div>
<div class="输出-box"><span id="输出Text"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById('inputField'),modeRadios=document.querySelectorAll('input[name="mode"]'),lookupBtn=document.getElementById('lookupBtn');var rChar=document.getElementById('resChar'),rDec=document.getElementById('resDec'),rHex=document.getElementById('resHex'),rBlock=document.getElementById('resBlock'),out=document.getElementById('输出Text');var blocks=[['Basic Latin',0x0000,0x007F],['Latin-1 Supplement',0x0080,0x00FF],['Latin Extended-A',0x0100,0x017F],['Latin Extended-B',0x0180,0x024F],['IPA Extensions',0x0250,0x02AF],['Spacing Modifier Letters',0x02B0,0x02FF],['Combining Diacritical Marks',0x0300,0x036F],['Greek and Coptic',0x0370,0x03FF],['Cyrillic',0x0400,0x04FF],['Cyrillic Supplement',0x0500,0x052F],['Armenian',0x0530,0x058F],['Hebrew',0x0590,0x05FF],['Arabic',0x0600,0x06FF],['Syriac',0x0700,0x074F],['Arabic Supplement',0x0750,0x077F],['Thaana',0x0780,0x07BF],['Devanagari',0x0900,0x097F],['Bengali',0x0980,0x09FF],['Gurmukhi',0x0A00,0x0A7F],['Gujarati',0x0A80,0x0AFF],['Oriya',0x0B00,0x0B7F],['Tamil',0x0B80,0x0BFF],['Telugu',0x0C00,0x0C7F],['Kannada',0x0C80,0x0CFF],['Malayalam',0x0D00,0x0D7F],['Sinhala',0x0D80,0x0DFF],['Thai',0x0E00,0x0E7F],['Lao',0x0E80,0x0EFF],['Tibetan',0x0F00,0x0FFF],['CJK Unified Ideographs',0x4E00,0x9FFF],['Hiragana',0x3040,0x309F],['Katakana',0x30A0,0x30FF],['Bopomofo',0x3100,0x312F],['Hangul Compatibility Jamo',0x3130,0x318F],['Kanbun',0x3190,0x319F],['CJK Unified Ideographs Extension A',0x3400,0x4DBF],['Enclosed CJK Letters and Months',0x3200,0x32FF],['CJK Compatibility',0x3300,0x33FF],['Hangul Syllables',0xAC00,0xD7AF],['High Surrogates',0xD800,0xDB7F],['Private Use High Surrogates',0xDB80,0xDBFF],['Low Surrogates',0xDC00,0xDFFF],['Private Use Area',0xE000,0xF8FF],['CJK Compatibility Ideographs',0xF900,0xFAFF],['Alphabetic Presentation Forms',0xFB00,0xFB4F],['Arabic Presentation Forms-A',0xFB50,0xFDFF],['Variation Selectors',0xFE00,0xFE0F],['Vertical Forms',0xFE10,0xFE1F],['CJK Compatibility Forms',0xFE30,0xFE4F],['Small Form Variants',0xFE50,0xFE6F],['Arabic Presentation Forms-B',0xFE70,0xFEFF],['Halfwidth and Fullwidth Forms',0xFF00,0xFFEF],['Specials',0xFFF0,0xFFFF],['Linear B Syllabary',0x10000,0x1007F],['Aegean 数字',0x10100,0x1013F],['Ancient Greek 数字',0x10140,0x1018F],['CJK Unified Ideographs Extension B',0x20000,0x2A6DF],['CJK Unified Ideographs Extension C',0x2A700,0x2B73F],['CJK Unified Ideographs Extension D',0x2B740,0x2B81F],['Supplemental Arrows-A',0x27F0,0x27FF],['Supplemental Arrows-B',0x2900,0x297F],['Miscellaneous Mathematical 符号-A',0x27C0,0x27EF],['Miscellaneous Mathematical 符号-B',0x2980,0x29FF],['Supplemental Mathematical Operators',0x2A00,0x2AFF],['Miscellaneous 符号 and Arrows',0x2B00,0x2BFF],['Emoticons',0x1F600,0x1F64F],['Ornamental Dingbats',0x1F650,0x1F67F],['Transport and Map 符号',0x1F680,0x1F6FF],['Miscellaneous 符号',0x2600,0x26FF],['Dingbats',0x2700,0x27BF],['CJK 符号 and Punctuation',0x3000,0x303F],['Yijing Hexagram 符号',0x4DC0,0x4DFF],['Miscellaneous Technical',0x2300,0x23FF],['Control Pictures',0x2400,0x243F],['Optical Character Recognition',0x2440,0x245F],['Enclosed Alphanumerics',0x2460,0x24FF],['Box Drawing',0x2500,0x257F],['Block Elements',0x2580,0x259F],['Geometric Shapes',0x25A0,0x25FF],['Currency 符号',0x20A0,0x20CF],['Letterlike 符号',0x2100,0x214F],['Number Forms',0x2150,0x218F],['Arrows',0x2190,0x21FF],['Mathematical Operators',0x2200,0x22FF],['Miscellaneous Technical',0x2300,0x23FF],['Box Drawing',0x2500,0x257F]];function findBlock(cp){for(var i=0;i<blocks.length;i++){if(cp>=blocks[i][1]&&cp<=blocks[i][2])return blocks[i][0]}return'未知 / 未分配'}function lookup(){var isCharMode=document.querySelector('input[name="mode"]:checked').value==='char';var val=inp.value.trim();if(!val){setStatus('请输入内容','error');return}var cp;if(isCharMode){if(val.length===0){setStatus('请输入字符','error');return}cp=val.codePointAt(0)}else{var m;if(m=val.match(/^U[+]([0-9a-fA-F]+)$/))cp=parseInt(m[1],16);else if(m=val.match(/^0[xX]([0-9a-fA-F]+)$/))cp=parseInt(m[1],16);else if(m=val.match(/^([0-9]+)$/))cp=parseInt(m[1],10);else{setStatus('无法解析码点，格式: U+0041 / 0x41 / 65','error');return}}if(isNaN(cp)||cp<0||cp>0x10FFFF){setStatus('码点超出有效范围 (0-0x10FFFF)','error');return}var ch=String.fromCodePoint(cp);rChar.textContent=ch;rDec.textContent=cp;rHex.textContent='U+'+cp.toString(16).to大写().padStart(4,'0');rBlock.textContent=findBlock(cp);out.textContent='U+'+cp.toString(16).to大写().padStart(4,'0')+' → '+ch;setStatus('查询成功')}lookupBtn.addEventListener('click',lookup);inp.addEventListener('keydown',function(e){if(e.key==='Enter')lookup()});document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
