<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>在线率计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:var(--space-3)}.inp-group label{font-size:var(--font-size-sm);color:var(--color-text-secondary);display:block;margin-bottom:4px}.inp-group .input{width:100%}.result-big{text-align:center;padding:var(--space-4) 0}.result-big .pct{font-size:64px;font-weight:600;font-family:var(--font-mono);letter-spacing:-2px}.result-big .label{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:4px}.result-big .nines{font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:8px}.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:var(--space-3) 0}.detail-item{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2);text-align:center}.detail-item .v{font-family:var(--font-mono);font-size:var(--font-size-base);font-weight:600}.detail-item .l{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:2px}.grade{display:inline-block;padding:2px 12px;border-radius:10px;font-size:14px;font-weight:600}.grade.excellent{background:#e8f5e9;color:#2e7d32}.grade.good{background:#e3f2fd;color:#1565c0}.grade.fair{background:#fff3e0;color:#e65100}.grade.poor{background:#fbe9e7;color:#c62828}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>在线率计算器</h1><p class="tool-desc">根据指定周期内的停机时间计算服务在线率（uptime）百分比。</p>
<div class="card">
<div class="inp-grid">
<div class="inp-group"><label>停机时间</label><input id="downtimeInput" class="input" type="number" value="30" min="0"></div>
<div class="inp-group"><label>时间单位</label><select id="unitSelect" class="input"><option value="minute">分钟</option><option value="hour">小时</option><option value="day">天</option></select></div>
<div class="inp-group"><label>周期</label><select id="periodSelect" class="input"><option value="daily">每天 (24h)</option><option value="weekly">每周 (7天)</option><option value="monthly">每月 (30天)</option><option value="yearly">每年 (365天)</option><option value="custom">自定义</option></select></div>
<div class="inp-group" id="customPeriodGroup" style="display:none"><label>自定义周期（小时）</label><input id="customPeriod" class="input" type="number" value="720" min="1"></div>
</div>
<div class="result-big"><div class="pct" id="pctDisplay">99.96%</div><div class="label" id="uptimeLabel">每月在线率</div><div class="nines" id="ninesDisplay">三个九 (3 nines)</div></div>
<div class="detail-grid"><div class="detail-item"><div class="v" id="totalMinutes">43200</div><div class="l">总时间（分钟）</div></div><div class="detail-item"><div class="v" id="downtimeMinutes">30</div><div class="l">停机时间</div></div><div class="detail-item"><div class="v" id="yearlyDowntime">6h 5m</div><div class="l">年化停机</div></div></div>
<div id="gradeArea" style="text-align:center;margin-top:var(--space-2)"><span class="grade excellent" id="gradeBadge">优秀 (Excellent)</span></div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var dtInp=document.getElementById('downtimeInput'),unitSel=document.getElementById('unitSelect'),periodSel=document.getElementById('periodSelect'),customGroup=document.getElementById('customPeriodGroup'),customInp=document.getElementById('customPeriod');var pctDisp=document.getElementById('pctDisplay'),upLabel=document.getElementById('uptimeLabel'),ninesDisp=document.getElementById('ninesDisplay'),totalMin=document.getElementById('totalMinutes'),downtimeMin=document.getElementById('downtimeMinutes'),yearlyD=document.getElementById('yearlyDowntime'),gradeBadge=document.getElementById('gradeBadge'),out=document.getElementById('outputText');function getPeriodHours(period){switch(period){case'daily':return 24;case'weekly':return 168;case'monthly':return 720;case'yearly':return 8760;case'custom':return parseFloat(customInp.value)||720;default:return 720}}function formatDuration(min){var h=Math.floor(min/60),m=Math.round(min%60);if(h>0)return h+'h '+m+'m';return m+'m'}function calc(){var dt=parseFloat(dtInp.value)||0;var unit=unitSel.value;var period=periodSel.value;var dtMinutes;switch(unit){case'minute':dtMinutes=dt;break;case'hour':dtMinutes=dt*60;break;case'day':dtMinutes=dt*1440;break}var periodHours=getPeriodHours(period);var totalMinutes=periodHours*60;var uptimePct=totalMinutes>0?((totalMinutes-dtMinutes)/totalMinutes*100):0;uptimePct=Math.max(0,Math.min(100,uptimePct));pctDisp.textContent=uptimePct.toFixed(4)+'%';var periodNames={daily:'每天',weekly:'每周',monthly:'每月',yearly:'每年',custom:'自定义'};upLabel.textContent=periodNames[period]+'在线率';totalMin.textContent=totalMinutes.toLocaleString();downtimeMin.textContent=dtMinutes+' 分钟';var yearlyMin=dtMinutes*(525600/totalMinutes);yearlyD.textContent=formatDuration(yearlyMin);var pct=uptimePct;var nines;if(pct>=99.999)nines='五个九 (5 nines)';else if(pct>=99.99)nines='四个九 (4 nines)';else if(pct>=99.9)nines='三个九 (3 nines)';else if(pct>=99)nines='两个九 (2 nines)';else if(pct>=90)nines='一个九 (1 nine)';else nines='低于 90%';ninesDisp.textContent=nines;var grade;if(pct>=99.99){grade='等级: 优秀';gradeBadge.className='grade excellent';gradeBadge.textContent='优秀 (Excellent)'}else if(pct>=99.9){grade='等级: 良好';gradeBadge.className='grade good';gradeBadge.textContent='良好 (Good)'}else if(pct>=99){grade='等级: 一般';gradeBadge.className='grade fair';gradeBadge.textContent='一般 (Fair)'}else{grade='等级: 较差';gradeBadge.className='grade poor';gradeBadge.textContent='较差 (Poor)'}out.textContent='在线率: '+uptimePct.toFixed(4)+'% | '+nines}periodSel.addEventListener('change',function(){customGroup.style.display=this.value==='custom'?'block':'none';calc()});dtInp.addEventListener('input',calc);unitSel.addEventListener('change',calc);customInp.addEventListener('input',calc);calc();document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
