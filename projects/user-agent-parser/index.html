<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User-Agent 解析器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .ua-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-2); margin-top: var(--space-3); }
    .ua-item { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-2); }
    .ua-item label { font-size: var(--font-size-xs); color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
    .ua-item span { font-size: var(--font-size-base); font-weight: 500; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>User-Agent 解析器</h1>
    <p class="tool-desc">解析 User-Agent 字符串，提取浏览器、操作系统、引擎和设备信息。</p>
    <div class="card">
      <textarea id="uaInput" class="input textarea js-focus-input" style="min-height:80px;" placeholder="粘贴 User-Agent 字符串..."></textarea>
    </div>
    <button id="parseBtn" class="btn btn-primary">解析</button>
    <div class="ua-grid" id="uaGrid"></div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var inputEl = document.getElementById('uaInput');
    var gridEl = document.getElementById('uaGrid');
    function match(ua, pattern) { var m = ua.match(pattern); return m ? m[1] || m[0] : '未知'; }
    function parseUA(ua) {
      if (!ua) return null;
      var browser = '未知', os = '未知', engine = '未知', device = '桌面';
      if (/Edg\//i.test(ua)) { browser = 'Edge ' + match(ua, /Edg\/([\d.]+)/); }
      else if (/OPR\//i.test(ua) || /Opera/i.test(ua)) { browser = 'Opera ' + match(ua, /(?:OPR|Opera)\/([\d.]+)/); }
      else if (/Chrome\//i.test(ua)) { browser = 'Chrome ' + match(ua, /Chrome\/([\d.]+)/); }
      else if (/Firefox\//i.test(ua)) { browser = 'Firefox ' + match(ua, /Firefox\/([\d.]+)/); }
      else if (/Safari\//i.test(ua)) { browser = 'Safari ' + match(ua, /Version\/([\d.]+)/); }
      if (/Windows NT/i.test(ua)) { os = 'Windows ' + match(ua, /Windows NT ([\d.]+)/); }
      else if (/Mac OS X/i.test(ua)) { os = 'macOS ' + match(ua, /Mac OS X ([\d_]+)/).replace(/_/g, '.'); }
      else if (/Linux/i.test(ua)) { os = 'Linux'; }
      else if (/Android/i.test(ua)) { os = 'Android ' + match(ua, /Android ([\d.]+)/); }
      else if (/iPhone|iPad/i.test(ua)) { os = 'iOS ' + match(ua, /OS ([\d_]+)/).replace(/_/g, '.'); }
      if (/AppleWebKit/i.test(ua)) { engine = 'WebKit ' + match(ua, /AppleWebKit\/([\d.]+)/); }
      if (/Gecko\//i.test(ua)) { engine = 'Gecko'; }
      if (/Trident\//i.test(ua)) { engine = 'Trident'; }
      if (/Mobile|Android|iPhone|iPad/i.test(ua)) { device = /iPad/i.test(ua) ? '平板' : '移动端'; }
      return { browser: browser, os: os, engine: engine, device: device, raw: ua };
    }
    function render(d) {
      if (!d) { gridEl.innerHTML = '<div style="color:var(--color-text-secondary);padding:var(--space-3);">请输入 User-Agent 字符串</div>'; return; }
      var items = [
        { label: '浏览器', val: d.browser },
        { label: '操作系统', val: d.os },
        { label: '渲染引擎', val: d.engine },
        { label: '设备类型', val: d.device }
      ];
      var html = '';
      for (var i = 0; i < items.length; i++) {
        html += '<div class="ua-item"><label>' + items[i].label + '</label><span>' + htmlEscape(items[i].val) + '</span></div>';
      }
      gridEl.innerHTML = html;
    }
    function doParse() {
      var ua = inputEl.value.trim();
      if (!ua) { setStatus('请输入 User-Agent', 'error'); render(null); return; }
      var 结果 = parseUA(ua);
      render(结果);
      setStatus('解析完成');
    }
    document.getElementById('parseBtn').addEventListener('click', doParse);
    inputEl.addEventListener('keydown', function(e) { if (e.key === 'Enter' && e.ctrlKey) doParse(); });
    inputEl.value = navigator.userAgent;
    doParse();
  })();</script>
</body>
</html>
