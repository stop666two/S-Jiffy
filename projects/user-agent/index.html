<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>User Agent - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.ua-string{font-family:var(--font-mono);font-size:13px;word-break:break-all;background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2);margin-bottom:var(--space-3);line-height:1.7}.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}.info-item{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}.info-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.info-item .val{font-family:var(--font-mono);font-size:var(--font-size-sm);margin-top:4px;word-break:break-all}.raw-label{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:6px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>User Agent 解析</h1><p class="tool-desc">查看当前浏览器的 User-Agent 字符串，并解析出浏览器和操作系统信息。</p>
<div class="card">
<div class="raw-label">原始 User-Agent</div>
<div class="ua-string" id="uaRaw"></div>
<div class="info-grid" id="infoGrid"></div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var uaEl=document.getElementById('uaRaw'),grid=document.getElementById('infoGrid'),out=document.getElementById('outputText');var ua=navigator.userAgent;uaEl.textContent=ua;var info=[];var browser='未知';if(ua.indexOf('Firefox/')!==-1&&ua.indexOf('Seamonkey/')===-1)browser='Firefox';else if(ua.indexOf('Chrome/')!==-1&&ua.indexOf('Edg/')===-1&&ua.indexOf('OPR/')===-1)browser='Chrome';else if(ua.indexOf('Edg/')!==-1)browser='Edge';else if(ua.indexOf('OPR/')!==-1||ua.indexOf('Opera/')!==-1)browser='Opera';else if(ua.indexOf('Safari/')!==-1&&ua.indexOf('Chrome/')===-1)browser='Safari';else if(ua.indexOf('Trident/')!==-1||ua.indexOf('MSIE')!==-1)browser='IE';var os='未知';if(ua.indexOf('Windows NT 10.0')!==-1)os='Windows 10';else if(ua.indexOf('Windows NT 11.0')!==-1)os='Windows 11';else if(ua.indexOf('Windows NT 6.3')!==-1)os='Windows 8.1';else if(ua.indexOf('Windows NT 6.1')!==-1)os='Windows 7';else if(ua.indexOf('Mac OS X')!==-1){var m=ua.match(/Mac OS X (\d+[._]\d+)/);os='macOS '+(m?m[1].replace('_','.'):'')}else if(ua.indexOf('Android')!==-1){var m=ua.match(/Android ([\d.]+)/);os='Android '+(m?m[1]:'')}else if(ua.indexOf('Linux')!==-1)os='Linux';else if(ua.indexOf('like Mac OS X')!==-1)os='iOS';var device='桌面端';if(ua.indexOf('Mobile')!==-1)device='移动端';var lang=navigator.language||navigator.userLanguage||'未知';var platform=navigator.platform||'未知';info.push({l:'浏览器',v:browser});info.push({l:'操作系统',v:os});info.push({l:'设备类型',v:device});info.push({l:'语言',v:lang});info.push({l:'平台',v:platform});info.push({l:'浏览器版本',v:(navigator.appVersion||'')});grid.innerHTML='';for(var i=0;i<info.length;i++){var el=document.createElement('div');el.className='info-item';el.innerHTML='<div class="lbl">'+info[i].l+'</div><div class="val">'+info[i].v+'</div>';grid.appendChild(el)}out.textContent='User-Agent: '+ua;document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
