<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>UUencode 编解码 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.uu-输出{font-family:var(--font-mono);font-size:var(--font-size-xs);white-space:pre-wrap}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>UUencode 编解码</h1><p class="tool-desc">Unix-to-Unix 编码（UUencode）与解码，传统二进制到文本编码。</p>
<div class="card"><textarea id="inputText" class="input textarea js-focus-input" placeholder="输入要编码的文本或 UUencoded 字符串..." style="min-height:100px;"></textarea></div>
<div class="action-bar" style="display:flex;gap:12px;margin:var(--space-2) 0;flex-wrap:wrap;align-items:center;">
<button id="encodeBtn" class="btn btn-primary">编码</button>
<button id="decodeBtn" class="btn btn-secondary">解码</button>
<button id="clearBtn" class="btn btn-secondary">清空</button>
</div>
<div class="output-box"><span id="outputText" class="uu-输出" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var inputEl=document.getElementById('inputText');
var 输出El=document.getElementById('outputText');
var encodeBtn=document.getElementById('encodeBtn');
var decodeBtn=document.getElementById('decodeBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
function uuencode(text,name){
var bytes=[];
for(var i=0;i<text.length;i++)bytes.push(text.charCodeAt(i));
var lines=[];
lines.push('begin 644 '+(name||'data.txt'));
for(var i=0;i<bytes.length;i+=45){
var chunk=bytes.slice(i,i+45);
var line=String.fromCharCode(chunk.length+32);
for(var j=0;j<chunk.length;j+=3){
var a=chunk[j]||0,b=chunk[j+1]||0,c=chunk[j+2]||0;
line+=String.fromCharCode(32+((a>>2)&63));
line+=String.fromCharCode(32+(((a<<4)&48)|((b>>4)&15)));
line+=String.fromCharCode(32+(((b<<2)&60)|((c>>6)&3)));
line+=String.fromCharCode(32+(c&63));
}
lines.push(line);
}
lines.push('`');
lines.push('end');
return lines.join('\n');
}
function uudecode(text){
var lines=text.split('\n');
var inData=false;
var bytes=[];
for(var i=0;i<lines.length;i++){
var line=lines[i].trim();
if(line==='end')break;
if(line==='begin'||line.startsWith('begin ')){inData=true;continue;}
if(!inData||!line)continue;
var count=line.charCodeAt(0)-32;
if(count<1)continue;
var data=line.substring(1);
var buf='';
for(var j=0;j<data.length;j+=4){
var vals=[];
for(var k=0;k<4&&j+k<data.length;k++){
vals.push(data.charCodeAt(j+k)-32);
}
while(vals.length<4)vals.push(0);
buf+=String.fromCharCode(((vals[0]<<2)&252)|((vals[1]>>4)&3));
if(buf.length<count)buf+=String.fromCharCode(((vals[1]<<4)&240)|((vals[2]>>2)&15));
if(buf.length<count)buf+=String.fromCharCode(((vals[2]<<6)&192)|(vals[3]&63));
}
for(var k=0;k<count&&k<buf.length;k++)bytes.push(buf.charCodeAt(k));
}
var r='';
for(var i=0;i<bytes.length;i++)r+=String.fromCharCode(bytes[i]);
return r;
}
encodeBtn.addEventListener('click',function(){
var t=inputEl.value;
if(!t){setStatus('请输入文本','error');return;}
try{输出El.textContent=uuencode(t);setStatus('');}catch(e){setStatus('编码错误','error');}
});
decodeBtn.addEventListener('click',function(){
var t=inputEl.value.trim();
if(!t){setStatus('请输入 UUencoded 字符串','error');return;}
try{输出El.textContent=uudecode(t);setStatus('');}catch(e){setStatus('解码错误: '+e.message,'error');}
});
clearBtn.addEventListener('click',function(){inputEl.value='';输出El.textContent='';setStatus('');inputEl.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
