<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UUID 生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>UUID 生成器</h1>
    <p class="tool-desc">生成 UUID v4，支持单条或批量生成。<span id="httpsWarning" style="display:none;font-size:var(--font-size-xs);color:var(--color-error);margin-top:4px;">⚠ 需 HTTPS/localhost 环境</span></p>

    <div class="card" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <label style="font-size:var(--font-size-sm); color:var(--color-text-secondary);">数量</label>
      <input id="countInput" class="input" type="number" value="1" min="1" max="100" style="width:80px;">
      <select id="formatSelect" class="input" style="width:auto; min-width:100px;">
        <option value="lower">小写</option>
        <option value="upper">大写</option>
      </select>
      <button id="generateBtn" class="btn btn-primary">生成</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>

    <div class="输出-box" id="输出Container" style="min-height:200px;">
      <span id="输出Text" style="display:block; padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var countEl = document.getElementById('countInput'), formatEl = document.getElementById('formatSelect'), o = document.getElementById('输出Text');
      function uuid() {
        var u;
        try { u = crypto.randomUUID(); } catch (e) { u = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = crypto.getRandomValues(new Uint8Array(1))[0] % 16; var v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); }); }
        return formatEl.value === 'upper' ? u.toUpperCase() : u;
      }
      document.getElementById('generateBtn').addEventListener('click', function () {
        var n = parseInt(countEl.value) || 1;
        if (n < 1) n = 1;
        if (n > 100) n = 100;
        var arr = [];
        for (var i = 0; i < n; i++) arr.push(uuid());
        o.textContent = arr.join('\n');
        setStatus('已生成 ' + n + ' 个 UUID');
      });
      document.getElementById('clearBtn').addEventListener('click', function () { o.textContent = ''; setStatus(''); });
      document.getElementById('copyBtn').addEventListener('click', function () { if (o.textContent) { copyToClipboard(o.textContent, this); setStatus('已复制'); } });
    })();
  if(!isSecureContext()){var w=document.getElementById('httpsWarning');if(w)w.style.display='block';}</script>
</body>
</html>
