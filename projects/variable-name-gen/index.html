<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>变量名生成器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.form-grid{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:var(--space-3)}.form-grid .input{width:300px}.name-card{display:flex;justify-content:space-between;align-items:center;padding:var(--space-2);margin-bottom:8px;background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);font-family:var(--font-mono);font-size:14px;cursor:pointer;transition:all 0.1s}.name-card:hover{border-color:var(--color-text-primary)}.name-card .style-tag{font-size:11px;padding:2px 10px;border-radius:999px;background:var(--color-text-primary);color:#fff;flex-shrink:0}.name-card .val{word-break:break-all;padding-right:12px}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>变量名生成器</h1><p class="tool-desc">生成各种风格的编程变量名建议</p>
<div class="card"><div class="form-grid"><input id="wordInput" class="input js-focus-input" placeholder="输入词语，空格分隔 (如 user login count)" value="user login count"><button id="genBtn" class="btn btn-primary">生成</button></div></div>
<div class="output-box"><div id="nameList"></div><span id="outputText" style="display:none"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script>
<script>(function(){var wordInput=document.getElementById('wordInput'),genBtn=document.getElementById('genBtn'),nameList=document.getElementById('nameList'),outputText=document.getElementById('outputText'),copyBtn=document.getElementById('copyBtn');var styleNames={camel:'camelCase',pascal:'PascalCase',snake:'snake_case',kebab:'kebab-case',upper:'UPPER_CASE',dot:'dot.case',screaming:'SCREAMING_SNAKE',train:'Train-Case'};function genNames(words){var clean=words.replace(/[^a-zA-Z0-9\s-]/g,'').trim();if(!clean){var alts=['temp','value','result','data'];clean=alts[Math.floor(Math.random()*alts.length)]}var parts=clean.split(/[\s-]+/).filter(function(p){return p.length>0});if(!parts.length)parts=['temp'];var lowerParts=parts.map(function(p){return p.toLowerCase()});var capParts=parts.map(function(p){return p.charAt(0).toUpperCase()+p.slice(1).toLowerCase()});var upperParts=parts.map(function(p){return p.toUpperCase()});return[{style:'camel',val:lowerParts[0]+capParts.slice(1).join('')},{style:'pascal',val:capParts.join('')},{style:'snake',val:lowerParts.join('_')},{style:'kebab',val:lowerParts.join('-')},{style:'upper',val:upperParts.join('_')},{style:'dot',val:lowerParts.join('.')},{style:'screaming',val:upperParts.join('_')},{style:'train',val:capParts.join('-')}]}function render(){var raw=wordInput.value.trim();if(!raw){setStatus('请输入词语','error');return}var names=genNames(raw);var html='';for(var i=0;i<names.length;i++){html+='<div class="name-card" data-text="'+htmlEscape(names[i].val)+'">';html+='<span class="val">'+htmlEscape(names[i].val)+'</span>';html+='<span class="style-tag">'+styleNames[names[i].style]+'</span></div>'}nameList.innerHTML=html;outputText.textContent=names[0].val;var cards=nameList.querySelectorAll('.name-card');for(var j=0;j<cards.length;j++){(function(card){card.addEventListener('click',function(){var text=card.getAttribute('data-text');copyToClipboard(text,copyBtn);setStatus('已复制 '+text)})})(cards[j])}setStatus('已生成 '+names.length+' 个变量名')}genBtn.addEventListener('click',render);wordInput.addEventListener('keydown',function(e){if(e.key==='Enter')render()});copyBtn.addEventListener('click',function(){if(outputText.textContent){copyToClipboard(outputText.textContent,this);setStatus('已复制')}});render()})();</script>
</body></html>
