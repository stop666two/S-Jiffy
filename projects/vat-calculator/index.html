<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>增值税计算器 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>增值税计算器</h1><p class="tool-desc">含税/不含税价格转换和税额计算。</p><div class="card"><div class="row"><div><label>金额 (元)</label><input id="amount" class="input" type="number" value="1000" min="0.01" step="0.01"></div><div><label>税率 (%)</label><select id="rate" class="input" style="width:auto"><option value="13">13%</option><option value="9">9%</option><option value="6" selected>6%</option><option value="3">3%</option><option value="0">0%</option></select></div><div><label>模式</label><select id="mode" class="input" style="width:auto"><option value="exclude">含税转不含税</option><option value="include">不含税转含税</option></select></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="exVal">—</div><div class="l">不含税价</div></div><div class="res-item"><div class="v" id="taxVal">—</div><div class="l">税额</div></div><div class="res-item"><div class="v" id="inVal">—</div><div class="l">含税价</div></div><div class="res-item"><div class="v" id="rateVal">—</div><div class="l">适用税率</div></div></div></div><div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var am=document.getElementById('amount'),ra=document.getElementById('rate'),mo=document.getElementById('mode'),ev=document.getElementById('exVal'),tv=document.getElementById('taxVal'),iv=document.getElementById('inVal'),rv=document.getElementById('rateVal'),o=document.getElementById('outputText');
function calc(){var amount=parseFloat(am.value),rate=parseFloat(ra.value)/100,mode=mo.value;if(!amount){setStatus('请输入金额','error');return}
var excl,tax,incl;if(mode==='exclude'){incl=amount;excl=amount/(1+rate);tax=incl-excl}else{excl=amount;tax=excl*rate;incl=excl+tax}
ev.textContent=excl.toFixed(2);tv.textContent=tax.toFixed(2);iv.textContent=incl.toFixed(2);rv.textContent=(rate*100)+'%';
o.textContent='不含税: '+excl.toFixed(2)+' | 税额: '+tax.toFixed(2)+' | 含税: '+incl.toFixed(2);setStatus('计算完成')}
document.getElementById('calcBtn').addEventListener('click',calc);
document.getElementById('copyBtn').addEventListener('click',function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus('已复制')}});calc();})();</script></body></html>
