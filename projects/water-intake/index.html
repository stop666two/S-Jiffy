<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>每日饮水计算 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>每日饮水计算</h1><p class="tool-desc">根据体重计算每日推荐饮水量。</p><div class="card"><div class="row"><div><label>体重 (kg)</label><input id="weight" class="input" type="number" value="70" min="1"></div><div><label>运动时长 (分钟/天)</label><input id="exercise" class="input" type="number" value="30" min="0"></div><div><label>气温</label><select id="climate" class="input" style="width:auto"><option value="1">凉爽</option><option value="1.1" selected>适中</option><option value="1.2">炎热</option></select></div><div style="display:flex;align-items:end;gap:8px"><button id="calcBtn" class="btn btn-primary">计算</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="baseVal">—</div><div class="l">基础需水 (ml)</div></div><div class="res-item"><div class="v" id="exerciseVal">—</div><div class="l">运动补水 (ml)</div></div><div class="res-item"><div class="v" id="totalVal" style="font-size:28px">—</div><div class="l">每日总计 (ml)</div></div><div class="res-item"><div class="v" id="cupsVal">—</div><div class="l">≈ 杯 (250ml)</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var w=document.getElementById("weight"),e=document.getElementById("exercise"),c=document.getElementById("climate"),bv=document.getElementById("baseVal"),ev=document.getElementById("exerciseVal"),tv=document.getElementById("totalVal"),cv=document.getElementById("cupsVal"),o=document.getElementById("输出Text");
document.getElementById("calcBtn").addEventListener("click",function(){var weight=parseFloat(w.value),ex=parseFloat(e.value)||0,cl=parseFloat(c.value);if(!weight){setStatus("请输入体重","error");return}
var base=weight*35*cl,exWater=ex*12,total=base+exWater;bv.textContent=Math.round(base);ev.textContent=Math.round(exWater);tv.textContent=Math.round(total);cv.textContent=(total/250).toFixed(1);
o.textContent="每日饮水: "+Math.round(total)+" ml | 约 "+Math.round(total/250)+" 杯";setStatus("计算完成")});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
