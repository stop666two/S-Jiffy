<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ISO 周数 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>ISO 周数</h1><p class="tool-desc">计算任意日期的 ISO 8601 周数、年份和星期几。</p>
<div class="card"><input id="dateInput" type="date" class="input" style="width:200px;">
<div style="display:flex;gap:12px;margin-top:var(--space-2);flex-wrap:wrap;"><button id="calcBtn" class="btn btn-primary">计算</button><button id="todayBtn" class="btn btn-secondary">今天</button><button id="clearBtn" class="btn btn-secondary">清空</button></div>
</div>
<div class="card" id="结果Card" style="display:none;">
<p style="font-size:var(--font-size-lg);margin-bottom:var(--space-1);">ISO 周数: <strong id="isoWeek" style="color:var(--color-primary);"></strong></p>
<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">ISO 年份: <span id="isoYear"></span></p>
<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">星期: <span id="dayOfWeek"></span></p>
<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">季度: <span id="quarter"></span></p>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var dateInput=document.getElementById('dateInput');
var calcBtn=document.getElementById('calcBtn');
var todayBtn=document.getElementById('todayBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
var 结果Card=document.getElementById('结果Card');
var isoWeek=document.getElementById('isoWeek');
var isoYear=document.getElementById('isoYear');
var dayOfWeek=document.getElementById('dayOfWeek');
var quarter=document.getElementById('quarter');
var 输出El=document.getElementById('输出Text');
var dayNames=['日','一','二','三','四','五','六'];
function getISOWeek(d){
var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));
var y=dt.getUTCFullYear();
var start=Date.UTC(y,0,1);
var wn=Math.ceil((((dt-start)/86400000)+1)/7);
return{year:y,week:wn};
}
function calc(dateStr){
if(!dateStr){setStatus('请选择日期','error');return;}
var d=new Date(dateStr);
var iso=getISOWeek(d);
结果Card.style.display='block';
isoWeek.textContent=iso.week;
isoYear.textContent=iso.year;
dayOfWeek.textContent='星期'+dayNames[d.getDay()];
quarter.textContent='Q'+Math.ceil((d.getMonth()+1)/3);
输出El.textContent=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+' 是 ISO '+iso.year+' 年第 '+iso.week+' 周';
setStatus('');
}
function setToday(){
var d=new Date();
var m=(d.getMonth()+1).toString().padStart(2,'0');
var day=d.getDate().toString().padStart(2,'0');
dateInput.value=d.getFullYear()+'-'+m+'-'+day;
calc(dateInput.value);
}
dateInput.addEventListener('keydown',function(e){if(e.key==='Enter')calc(dateInput.value);});
calcBtn.addEventListener('click',function(){calc(dateInput.value);});
todayBtn.addEventListener('click',setToday);
clearBtn.addEventListener('click',function(){dateInput.value='';结果Card.style.display='none';输出El.textContent='';setStatus('');dateInput.focus();});
copyBtn.addEventListener('click',function(){if(输出El.textContent){copyToClipboard(输出El.textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
