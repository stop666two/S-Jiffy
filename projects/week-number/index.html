<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ISO е‘Ёж•° - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">вҶҗ иҝ”еӣһ</a></header>
<main class="tool-workspace"><h1>е‘Ёж•°и®Ўз®—еҷЁ</h1><p class="tool-desc">и®Ўз®—д»»ж„Ҹж—Ҙжңҹзҡ„ ISO 8601 е‘Ёж•°гҖҒе№ҙд»Ҫе’ҢжҳҹжңҹеҮ гҖӮ</p>
<div class="card"><input id="dateInput" type="date" class="input" style="width:200px;">
<div style="display:flex;gap:12px;margin-top:var(--space-2);flex-wrap:wrap;"><button id="calcBtn" class="btn btn-primary">и®Ўз®—</button><button id="todayBtn" class="btn btn-secondary">д»ҠеӨ©</button><button id="clearBtn" class="btn btn-secondary">жё…з©ә</button></div>
</div>
<div class="card" id="з»“жһңCard" style="display:none;">
<p style="font-size:var(--font-size-lg);margin-bottom:var(--space-1);">ISO е‘Ёж•°: <strong id="isoWeek" style="color:var(--color-primary);"></strong></p>
<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">ISO е№ҙд»Ҫ: <span id="isoYear"></span></p>
<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">жҳҹжңҹ: <span id="dayOfWeek"></span></p>
<p style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">еӯЈеәҰ: <span id="quarter"></span></p>
</div>
<div class="output-box"><span id="outputText" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">еӨҚеҲ¶</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy В· еҚіз”ЁеҚіиө°</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var dateInput=document.getElementById('dateInput');
var calcBtn=document.getElementById('calcBtn');
var todayBtn=document.getElementById('todayBtn');
var clearBtn=document.getElementById('clearBtn');
var copyBtn=document.getElementById('copyBtn');
var з»“жһңCard=document.getElementById('з»“жһңCard');
var isoWeek=document.getElementById('isoWeek');
var isoYear=document.getElementById('isoYear');
var dayOfWeek=document.getElementById('dayOfWeek');
var quarter=document.getElementById('quarter');
var иҫ“еҮәEl=document.getElementById('outputText');
var dayNames=['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'];
function getISOWeek(d){
var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
dt.setUTCDate(dt.getUTCDate()+4-(dt.getUTCDay()||7));
var y=dt.getUTCFullYear();
var start=Date.UTC(y,0,1);
var wn=Math.ceil((((dt-start)/86400000)+1)/7);
return{year:y,week:wn};
}
function calc(dateStr){
if(!dateStr){setStatus('иҜ·йҖүжӢ©ж—Ҙжңҹ','error');return;}
var d=new Date(dateStr);
var iso=getISOWeek(d);
з»“жһңCard.style.display='block';
isoWeek.textContent=iso.week;
isoYear.textContent=iso.year;
dayOfWeek.textContent='жҳҹжңҹ'+dayNames[d.getDay()];
quarter.textContent='Q'+Math.ceil((d.getMonth()+1)/3);
иҫ“еҮәEl.textContent=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+' жҳҜ ISO '+iso.year+' е№ҙз¬¬ '+iso.week+' е‘Ё';
setStatus('');
}
function setToday(){
var d=new Date();
var m=(d.getMonth()+1).toString().padStart(2,'0');
var day=d.getDate().toString().padStart(2,'0');
dateInput.value=d.getFullYear()+'-'+m+'-'+day;
calc(dateInput.value);
}
dateInput.addEventListener('keydown',function(e){if(e.key==='Enter')calc(dateInput.value);});
calcBtn.addEventListener('click',function(){calc(dateInput.value);});
todayBtn.addEventListener('click',setToday);
clearBtn.addEventListener('click',function(){dateInput.value='';з»“жһңCard.style.display='none';иҫ“еҮәEl.textContent='';setStatus('');dateInput.focus();});
copyBtn.addEventListener('click',function(){if(иҫ“еҮәEl.textContent){copyToClipboard(иҫ“еҮәEl.textContent,copyBtn);setStatus('е·ІеӨҚеҲ¶');}});
})();
</script></body></html>
