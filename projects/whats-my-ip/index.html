<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>我的 IP - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css">
<style>.ip-display{font-size:48px;font-weight:600;text-align:center;padding:var(--space-4) 0;font-family:var(--font-mono);letter-spacing:2px}.ip-label{text-align:center;font-size:var(--font-size-sm);color:var(--color-text-secondary)}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:var(--space-3)}.info-item{background:var(--color-bg-soft);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-2)}.info-item .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary)}.info-item .val{font-family:var(--font-mono);font-size:var(--font-size-base);margin-top:4px;word-break:break-all}.loading{text-align:center;padding:var(--space-3);color:var(--color-text-secondary)}</style></head><body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header>
<main class="tool-workspace"><h1>本机 IP 查询</h1><p class="tool-desc">显示当前网络的外网 IP 地址及浏览器信息。</p>
<div class="card">
<div class="loading" id="loadingEl">正在获取 IP 地址...</div>
<div class="ip-display" id="ipDisplay" style="display:none">—</div>
<div class="ip-label" id="ipLabel" style="display:none">您的公网 IP 地址</div>
<button id="refreshBtn" class="btn btn-secondary" style="display:block;margin:0 auto">刷新</button>
<div class="info-grid" id="infoGrid" style="display:none"><div class="info-item"><div class="lbl">ISP</div><div class="val" id="ispVal">—</div></div><div class="info-item"><div class="lbl">位置</div><div class="val" id="locVal">—</div></div></div>
</div>
<div class="output-box"><span id="outputText"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>(function(){var ipDisp=document.getElementById('ipDisplay'),ipLabel=document.getElementById('ipLabel'),loading=document.getElementById('loadingEl'),refreshBtn=document.getElementById('refreshBtn'),infoGrid=document.getElementById('infoGrid'),ispVal=document.getElementById('ispVal'),locVal=document.getElementById('locVal'),out=document.getElementById('outputText');function getIP(){loading.style.display='block';ipDisp.style.display='none';ipLabel.style.display='none';infoGrid.style.display='none';refreshBtn.disabled=true;fetch('https://api.ipify.org?format=json').then(function(r){return r.json()}).then(function(d){var ip=d.ip;ipDisp.textContent=ip;ipDisp.style.display='block';ipLabel.style.display='block';loading.style.display='none';out.textContent='IP: '+ip;setStatus('IP 地址获取成功');refreshBtn.disabled=false;return fetch('https://ip-api.com/json/'+ip+'?fields=query,isp,org,city,region,country')}).then(function(r){return r.json()}).then(function(d){if(d.isp||d.org){infoGrid.style.display='grid';ispVal.textContent=d.isp||d.org||'未知';locVal.textContent=[d.city,d.region,d.country].filter(Boolean).join(', ')||'未知'}}).catch(function(e){ipDisp.textContent='获取失败';ipDisp.style.display='block';loading.style.display='none';out.textContent='获取失败: '+e.message;refreshBtn.disabled=false;setStatus('获取失败','error')})}getIP();refreshBtn.addEventListener('click',getIP);document.getElementById('copyBtn').addEventListener('click',function(){if(out.textContent){copyToClipboard(out.textContent,this);setStatus('已复制')}})})();</script></body></html>
