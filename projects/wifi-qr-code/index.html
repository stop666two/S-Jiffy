<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi QR 码生成器 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    #qrcode { display: inline-block; padding: var(--space-2); background: #fff; border: 1px solid var(--color-border); border-radius: var(--radius-md); }
    #qrcode img, #qrcode canvas { display: block; }
  </style>
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  <a href="../../index.html" class="back-btn">← 返回</a></header>
  <main class="tool-workspace">
    <h1>WiFi QR 码</h1>
    <p class="tool-desc">生成 WiFi 连接二维码，手机扫码即可自动连接。</p>
    <div class="card" style="display:flex;flex-direction:column;gap:12px;">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">SSID</label>
        <input id="ssidInput" class="input js-focus-input" type="text" placeholder="WiFi 名称" style="flex:1;min-width:150px;">
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">密码</label>
        <input id="pwdInput" class="input" type="text" placeholder="WiFi 密码" style="flex:1;min-width:150px;">
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">加密</label>
        <select id="encryptSelect" class="input" style="width:auto;min-width:120px;">
          <option value="WPA">WPA/WPA2</option>
          <option value="WEP">WEP</option>
          <option value="nopass">无密码</option>
        </select>
        <label style="font-size:var(--font-size-sm);color:var(--color-text-secondary);">隐藏</label>
        <input id="hiddenCheck" type="checkbox" style="width:18px;height:18px;cursor:pointer;">
        <button id="generateBtn" class="btn btn-primary">生成二维码</button>
      </div>
    </div>
    <div style="text-align:center;padding:var(--space-3) 0;">
      <div id="qrcode"></div>
    </div>
    <div class="output-box" style="text-align:center;">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="../../assets/js/global.js"></script>
  <script>(function(){
    var ssidEl = document.getElementById('ssidInput');
    var pwdEl = document.getElementById('pwdInput');
    var encEl = document.getElementById('encryptSelect');
    var hiddenEl = document.getElementById('hiddenCheck');
    var qrEl = document.getElementById('qrcode');
    var 输出El = document.getElementById('outputText');
    function generate() {
      var ssid = ssidEl.value.trim();
      if (!ssid) { setStatus('请输入 SSID', 'error'); return; }
      var pwd = pwdEl.value;
      var enc = encEl.value;
      var hidden = hiddenEl.checked ? 'H:true' : '';
      var wifiStr = 'WIFI:S:' + ssid + ';T:' + enc + ';P:' + pwd + ';' + hidden + ';';
      qrEl.innerHTML = '';
      new QRCode(qrEl, { text: wifiStr, width: 256, height: 256, correctLevel: QRCode.CorrectLevel.M });
      输出El.textContent = wifiStr;
      setStatus('WiFi 二维码已生成');
    }
    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('copyBtn').addEventListener('click', function() {
      var canvas = qrEl.querySelector('canvas');
      if (canvas) {
        canvas.toBlob(function(blob) {
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(function() {
            setStatus('二维码图片已复制');
          }).catch(function() { setStatus('复制失败', 'error'); });
        });
      } else { setStatus('请先生成二维码', 'error'); }
    });
  })();</script>
</body>
</html>
