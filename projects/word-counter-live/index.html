<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>实时字数统计 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>实时字数统计</h1><p class="tool-desc">实时统计字符数/单词数/行数/段落数。</p><div class="card"><textarea id="inputText" class="input textarea js-focus-input" style="min-height:150px;height:auto" placeholder="输入文本，实时统计..."></textarea>
<div class="res-grid"><div class="res-item"><div class="v" id="charVal">0</div><div class="l">字符数</div></div><div class="res-item"><div class="v" id="charNoSpace">0</div><div class="l">不含空格</div></div><div class="res-item"><div class="v" id="wordVal">0</div><div class="l">单词/词数</div></div><div class="res-item"><div class="v" id="lineVal">0</div><div class="l">行数</div></div><div class="res-item"><div class="v" id="paraVal">0</div><div class="l">段落数</div></div><div class="res-item"><div class="v" id="cnVal">0</div><div class="l">中文字数</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var inp=document.getElementById("inputText"),cv=document.getElementById("charVal"),cns=document.getElementById("charNoSpace"),wv=document.getElementById("wordVal"),lv=document.getElementById("lineVal"),pv=document.getElementById("paraVal"),cnv=document.getElementById("cnVal"),o=document.getElementById("输出Text");
inp.addEventListener("input",function(){var t=inp.value;cv.textContent=t.length;cns.textContent=t.replace(/\s/g,"").length;wv.textContent=t.trim()?t.trim().split(/\s+/).length:0;lv.textContent=t?t.split("\n").length:0;pv.textContent=t?t.split(/\n\s*\n/).filter(function(p){return p.trim()}).length:0;cnv.textContent=(t.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g)||[]).length;o.textContent="字符: "+t.length+" | 单词: "+(t.trim()?t.trim().split(/\s+/).length:0)+" | 行: "+t.split("\n").length});document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
