<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOR 加密 - S-Jiffy</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
  <header class="global-header">
    <a href="../../index.html" class="logo">S-Jiffy</a>
  </header>
  <main class="tool-workspace">
    <h1>XOR 加密</h1>
    <p class="tool-desc">使用 XOR 算法加密解密文本。</p>
    <div class="card">
      <textarea id="inputText" class="input textarea js-focus-input" placeholder="输入要处理的文本..." style="min-height:120px;"></textarea>
    </div>
    <div class="card" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
      <input id="keyInput" class="input" placeholder="密钥 (Key)" style="width:200px;">
      <select id="outputFormat" class="input" style="width:120px;">
        <option value="hex">Hex</option>
        <option value="base64">Base64</option>
      </select>
      <button id="encryptBtn" class="btn btn-primary">加密</button>
      <button id="decryptBtn" class="btn btn-secondary">解密</button>
      <button id="clearBtn" class="btn btn-secondary">清空</button>
    </div>
    <div class="output-box">
      <span id="outputText" style="display:block;padding-right:60px;"></span>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>
  </main>
  <footer class="global-footer">
    <div class="tool-status" id="statusBar"></div>
    <div>S-Jiffy · 即用即走</div>
  </footer>
  <script src="../../assets/js/global.js"></script>
  <script>
    (function () {
      var inputEl = document.getElementById('inputText');
      var keyEl = document.getElementById('keyInput');
      var formatEl = document.getElementById('outputFormat');
      var outputEl = document.getElementById('outputText');
      var encryptBtn = document.getElementById('encryptBtn');
      var decryptBtn = document.getElementById('decryptBtn');
      var clearBtn = document.getElementById('clearBtn');
      var copyBtn = document.getElementById('copyBtn');

      function xorBytes(text, key) {
        var result = [];
        for (var i = 0; i < text.length; i++) {
          result.push(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
        }
        return result;
      }

      function bytesToHex(bytes) {
        return bytes.map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
      }

      function bytesToBase64(bytes) {
        var binary = '';
        for (var i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
      }

      function hexToBytes(hex) {
        var bytes = [];
        for (var i = 0; i < hex.length; i += 2) {
          bytes.push(parseInt(hex.substr(i, 2), 16));
        }
        return bytes;
      }

      function base64ToBytes(b64) {
        var binary = atob(b64);
        var bytes = [];
        for (var i = 0; i < binary.length; i++) {
          bytes.push(binary.charCodeAt(i));
        }
        return bytes;
      }

      function doEncrypt() {
        var text = inputEl.value;
        var key = keyEl.value.trim();
        if (!text) { setStatus('请输入文本', 'error'); return; }
        if (!key) { setStatus('请输入密钥', 'error'); return; }
        var bytes = xorBytes(text, key);
        var fmt = formatEl.value;
        outputEl.textContent = fmt === 'hex' ? bytesToHex(bytes) : bytesToBase64(bytes);
        setStatus('');
      }

      function doDecrypt() {
        var text = inputEl.value.trim();
        var key = keyEl.value.trim();
        if (!text) { setStatus('请输入文本', 'error'); return; }
        if (!key) { setStatus('请输入密钥', 'error'); return; }
        var fmt = formatEl.value;
        var bytes;
        try {
          bytes = fmt === 'hex' ? hexToBytes(text) : base64ToBytes(text);
        } catch (e) {
          setStatus(fmt === 'hex' ? 'Hex 格式无效' : 'Base64 格式无效', 'error');
          return;
        }
        var result = '';
        for (var i = 0; i < bytes.length; i++) {
          result += String.fromCharCode(bytes[i] ^ key.charCodeAt(i % key.length));
        }
        outputEl.textContent = result;
        setStatus('');
      }

      encryptBtn.addEventListener('click', doEncrypt);
      decryptBtn.addEventListener('click', doDecrypt);
      clearBtn.addEventListener('click', function () { inputEl.value = ''; keyEl.value = ''; outputEl.textContent = ''; setStatus(''); inputEl.focus(); });
      copyBtn.addEventListener('click', function () { if (outputEl.textContent) { copyToClipboard(outputEl.textContent, copyBtn); setStatus('已复制'); } });
    })();
  </script>
</body>
</html>
