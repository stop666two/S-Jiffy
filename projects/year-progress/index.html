<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>年度进度 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.progress-bar{width:100%;height:24px;background:var(--color-border);border-radius:12px;overflow:hidden;margin:var(--space-3) 0;position:relative}.progress-fill{height:100%;background:linear-gradient(90deg,var(--color-primary),#4fc3f7);transition:width 0.6s ease;border-radius:12px}.progress-label{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:var(--font-size-sm);font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--space-2);margin:var(--space-3) 0}.stat-card{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:var(--space-3);text-align:center}.stat-card .num{font-size:var(--font-size-xxl);font-weight:700;color:var(--color-primary);font-family:var(--font-mono)}.stat-card .lbl{font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:4px}</style></head>
<body>
<header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a></header>
<main class="tool-workspace"><h1>年度进度</h1><p class="tool-desc">查看当前年份已完成百分比，统计已过天数与剩余天数。</p>
<div class="card"><h3 id="yearLabel" style="margin-bottom:var(--space-2);font-size:var(--font-size-lg);text-align:center;"></h3>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div><div class="progress-label" id="progressLabel">0%</div></div>
<div class="stats-grid">
<div class="stat-card"><div class="num" id="daysElapsed">-</div><div class="lbl">已过天数</div></div>
<div class="stat-card"><div class="num" id="daysRemaining">-</div><div class="lbl">剩余天数</div></div>
<div class="stat-card"><div class="num" id="totalDays">-</div><div class="lbl">全年天数</div></div>
<div class="stat-card"><div class="num" id="weekNum">-</div><div class="lbl">当前周数</div></div>
</div>
</div>
<div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div>
</main>
<footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer>
<script src="../../assets/js/global.js"></script><script>
(function(){
var now=new Date();
var year=now.getFullYear();
var start=new Date(year,0,1);
var end=new Date(year+1,0,1);
var total=Math.round((end-start)/86400000);
var elapsed=Math.round((now-start)/86400000);
var pct=((elapsed/total)*100).toFixed(2);
document.getElementById('yearLabel').textContent=year+' 年';
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressLabel').textContent=pct+'%';
document.getElementById('daysElapsed').textContent=elapsed;
document.getElementById('daysRemaining').textContent=total-elapsed;
document.getElementById('totalDays').textContent=total;
var weekStart=new Date(now);
weekStart.setDate(weekStart.getDate()+1-(weekStart.getDay()||7));
var weekNum=Math.ceil((((weekStart-start)/86400000)+start.getDay()+1)/7);
document.getElementById('weekNum').textContent=weekNum;
document.getElementById('输出Text').textContent=year+'年 进度 '+pct+'%，已过 '+elapsed+' 天，剩余 '+(total-elapsed)+' 天';
var copyBtn=document.getElementById('copyBtn');
copyBtn.addEventListener('click',function(){if(document.getElementById('输出Text').textContent){copyToClipboard(document.getElementById('输出Text').textContent,copyBtn);setStatus('已复制');}});
})();
</script></body></html>
