<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>星座查询 - S-Jiffy</title><link rel="stylesheet" href="../../assets/css/global.css"><style>.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:12px}.row label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:4px}.row .input{width:130px}.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.res-item{padding:12px;background:var(--color-bg-soft);border-radius:8px;text-align:center}.res-item .v{font-size:20px;font-weight:600}.res-item .l{font-size:12px;color:var(--color-text-secondary);margin-top:4px}</style></head><body><header class="global-header"><a href="../../index.html" class="logo">S-Jiffy</a><a href="../../index.html" class="back-btn">← 返回</a></header><main class="tool-workspace"><h1>星座查询</h1><p class="tool-desc">根据生日查询星座和性格特点。</p><div class="card"><div class="row"><div><label>出生日期</label><input id="birthday" class="input" type="date" style="width:auto"></div><div style="display:flex;align-items:end;gap:8px"><button id="queryBtn" class="btn btn-primary">查询</button></div></div>
<div class="res-grid"><div class="res-item"><div class="v" id="zodiacName">—</div><div class="l">星座</div></div><div class="res-item"><div class="v" id="zodiacDate">—</div><div class="l">日期范围</div></div><div class="res-item" style="grid-column:1/3"><div class="v" id="zodiacDesc" style="font-size:14px;font-weight:400">—</div><div class="l">性格特点</div></div></div></div><div class="输出-box"><span id="输出Text" style="display:block;padding-right:60px;"></span><button class="copy-btn" id="copyBtn">复制</button></div></main><footer class="global-footer"><div class="tool-status" id="statusBar"></div><div>S-Jiffy · 即用即走</div></footer><script src="../../assets/js/global.js"></script><script>(function(){var bd=document.getElementById("birthday"),zn=document.getElementById("zodiacName"),zd=document.getElementById("zodiacDate"),zdc=document.getElementById("zodiacDesc"),o=document.getElementById("输出Text");
var zodiacs=[{name:"白羊座",start:"03-21",end:"04-19",desc:"热情冲动、自信勇敢、充满活力"}, {name:"金牛座",start:"04-20",end:"05-20",desc:"稳重务实、耐心坚韧、享受生活"}, {name:"双子座",start:"05-21",end:"06-21",desc:"聪明机智、好奇心强、善于沟通"}, {name:"巨蟹座",start:"06-22",end:"07-22",desc:"温柔体贴、家庭观念强、直觉敏锐"}, {name:"狮子座",start:"07-23",end:"08-22",desc:"自信大方、领导力强、热情慷慨"}, {name:"处女座",start:"08-23",end:"09-22",desc:"细心严谨、追求完美、分析力强"}, {name:"天秤座",start:"09-23",end:"10-23",desc:"优雅公正、社交高手、追求平衡"}, {name:"天蝎座",start:"10-24",end:"11-22",desc:"深沉神秘、意志坚定、洞察力强"}, {name:"射手座",start:"11-23",end:"12-21",desc:"乐观自由、热爱冒险、真诚直率"}, {name:"摩羯座",start:"12-22",end:"01-19",desc:"踏实努力、责任心强、目标明确"}, {name:"水瓶座",start:"01-20",end:"02-18",desc:"独立创新、思想前卫、重视友情"}, {name:"双鱼座",start:"02-19",end:"03-20",desc:"浪漫感性、富有同情心、创造力强"}];
bd.valueAsDate=new Date();bd.valueAsDate.setFullYear(2000,0,1);
document.getElementById("queryBtn").addEventListener("click",function(){var d=bd.valueAsDate;if(!d){setStatus("请选择日期","error");return}
var mmdd=String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");var z=zodiacs.find(function(x){return mmdd>=x.start||(x.start>x.end&&(mmdd>=x.start||mmdd<=x.end))});
if(!z){var last=zodiacs[zodiacs.length-1];if(mmdd>=last.start||mmdd<=last.end)z=last}
if(z){zn.textContent=z.name;zd.textContent=z.start+" ~ "+z.end;zdc.textContent=z.desc;o.textContent="星座: "+z.name+" | "+z.desc;setStatus("查询完成")}});
document.getElementById("copyBtn").addEventListener("click",function(){if(o.textContent){copyToClipboard(o.textContent,this);setStatus("已复制")}});})();</script></body></html>
